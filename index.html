mmunications technology; UK-incorporated, ASX-listed.\n\n## What they do\n\nEtherstack plc is a wireless communications technology company that designs, develops and deploys radio products for defence, public safety and utility networks. It specialises in waveform software, radio protocol stacks and deployable tactical communications systems, supplying defence organisations, public-safety agencies, carriers and utilities. The UK operating entity is Etherstack Wireless Limited; the parent is incorporated in the UK and listed on the Australian Securities Exchange (ASX: ESK), with R&D across the UK, Australia, the USA and Japan.\n\n## Products and solutions\n\n- **Defence waveforms** - P25, TETRA, DMR and NXDN protocol stacks plus NATO and sovereign waveforms, ported across multiple radio platforms.\n- **Tactical communications** - deployable repeater and push-to-talk-over-IP systems for resilient field communications.\n- **LMR-IWF** - 3GPP-compliant interworking function for migrating land mobile radio to LTE and 5G.\n- **Cryptography and key management** - AES-256 encryption for secure voice and data.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group; TCCA.\n\n## Recent news\n\n- **2025-11-11** - Awarded a UK Home Office MCPTX contract to bridge TETRA Airwave and the new 5G Emergency Services Network. [source](https://www.etherstack.com/etherstack-awarded-uk-home-office-mcptx-contract/)\n- **2025-08-11** - Selected by AT&T as 3GPP-compliant LMR interworking supplier for FirstNet. [source](https://www.etherstack.com/etherstack-selected-by-att-for-mcx-iwf-technology/)\n\n## Links\n\n- Website: https://www.etherstack.com\n- LinkedIn: https://www.linkedin.com/company/etherstack\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (etherstack.com), Companies House (no. 07951056), ADS members directory (Etherstack Wireless Limited), ASX listing (ESK)."}, {"name": "Eviden", "website": "https://eviden.com", "linkedin": "https://www.linkedin.com/company/eviden", "hq": "Bezons, France", "region": "", "size": "large", "headcount": "", "founded": "2023", "tags": ["defence", "cyber", "ai", "data", "software", "sensors", "size-large", "type-prime", "owned-foreign", "listed"], "summary": "Atos Group brand for cybersecurity, vision AI and mission-critical systems, with a defence offering serving European and Five Eyes ministries of defence.", "body": "# Eviden\n\n> Atos Group brand for cybersecurity, vision AI and mission-critical systems, with a defence offering serving European and Five Eyes ministries of defence.\n\n## What they do\n\nEviden is the Atos Group brand for advanced computing, cybersecurity products, mission-critical systems and vision AI. It builds cyber-secure-by-design systems and electronics, data platforms for equipment availability and personnel readiness, and high-performance and AI computing, positioning around digital sovereignty and mission-critical applications. It runs a defence offering under its Mission-Critical Systems unit and operates a Cyber Defence Centre providing offensive security, red teaming and penetration testing. Eviden is part of Atos SE, which is publicly listed on Euronext Paris.\n\n## Products and solutions\n\n- **Cybersecurity products** - data encryption, digital identity management, post-quantum security, and a Cyber Defence Centre offering penetration testing, red teaming and phishing simulation.\n- **Mission-critical systems** - defence, public safety and transport systems, including secure real-time communications.\n- **Vision AI** - including ELIT AI, a radar-signals sensor with built-in sovereign AI.\n\n## Frameworks, accreditations and memberships\n\n- Eviden states a trusted presence among European and Five Eyes ministries of defence. No specific named certifications were independently confirmed from public pages.\n\n## Recent news\n\n- **2026-05-18** - Eviden launched ELIT AI, a next-generation radar-signals sensor with built-in sovereign AI. [source](https://www.globenewswire.com/news-release/2026/05/18/3296343/0/en/Eviden-launches-ELIT-AI-its-next-generation-radar-signals-sensor-with-built-in-sovereign-AI.html)\n- **2025-07** - Atos signed a share purchase agreement to separate its former Advanced Computing business (HPC, quantum, AI); that business is becoming the French-State-owned company Bull, and the BullSequana supercomputing capability moves to Bull rather than Eviden. [source](https://www.techzine.eu/news/applications/140149/french-government-acquires-bull-from-atos-for-e404-million/)\n\n## Links\n\n- Website: https://eviden.com\n- LinkedIn: https://www.linkedin.com/company/eviden\n\n## Sources\n\nPublic information verified 2026-06-29. Eviden website (about and defence pages), LinkedIn company page, Atos Group press releases, HPCwire, Techzine, GlobeNewswire, Atos Wikipedia. France-headquartered (Bezons), with a London office and UK-registered entities. The Eviden brand was launched in 2023 from Atos's digital, big data and cybersecurity divisions; the former HPC arm has since been carved out as Bull."}, {"name": "Evolve Dynamics Limited", "website": "https://www.evolvedynamics.com", "linkedin": "https://www.linkedin.com/company/evolve-dynamics-uav", "hq": "Guildford, UK", "region": "South East", "size": "medium", "headcount": "", "founded": "", "tags": ["defence", "drones", "uas", "isr", "sensors", "manufacturing", "hardware", "software", "size-medium", "type-sme", "type-manufacturer", "mbr-ads"], "summary": "British designer and manufacturer of all-weather, long-endurance unmanned air systems.", "body": "# Evolve Dynamics\n\n> British designer and manufacturer of all-weather, long-endurance unmanned air systems.\n\n## What they do\n\nEvolve Dynamics is a UK engineering company that designs, develops and manufactures unmanned air systems, payloads and software. Its systems are built for extreme-weather, persistent operation and are used across defence, police and security, search and rescue, and infrastructure inspection. The company reports field experience supporting Ukrainian forces in contested airspace.\n\n## Products and solutions\n\n- **Sky Mantis** - all-weather, payload-agnostic long-endurance UAS, capable of battery or tethered persistent flight for ISR and force protection.\n- **Sky Mantis 2** - upgraded variant unveiled in 2024 with anti-jamming datalinks, improved GNSS resilience and high-resolution imaging, developed with front-line user feedback.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-03** - Opened a new office in Kyiv to support engineering, operations and flight testing in Ukraine. [source](https://www.evolvedynamics.com/evolve-dynamics-opens-new-kyiv-office-ukraine/)\n- **2024-07** - Showcased Sky Mantis 2 at Farnborough, citing development shaped by experience in the Russia-Ukraine conflict. [source](https://www.janes.com/osint-insights/defence-news/air/farnborough-2024-evolve-dynamics-steering-sky-mantis-2-uas-evolution-with-experiences-in-russia-ukraine-conflict)\n\n## Links\n\n- Website: https://www.evolvedynamics.com\n- LinkedIn: https://www.linkedin.com/company/evolve-dynamics-uav\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (evolvedynamics.com), Companies House (no. 10489160), ADS members directory, Janes, company news releases."}, {"name": "ExTrac", "website": "https://www.extrac.ai", "linkedin": "https://uk.linkedin.com/company/extracrisk", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "", "founded": "2022", "tags": ["defence", "ai", "isr", "data", "software", "size-small", "type-startup", "owned-uk", "fw-gcloud", "mbr-ads"], "summary": "British AI-driven open-source intelligence and geopolitical risk-analytics company serving defence, security and government.", "body": "# ExTrac\n\n> British AI-driven open-source intelligence and geopolitical risk-analytics company serving defence, security and government.\n\n## What they do\n\nExTrac is a British OSINT and geopolitical risk-intelligence company. It combines curated data, human subject-matter expertise and domain-specific AI to detect and forecast risk across the physical world, online, and where the two intersect. It ingests high-relevance, hard-to-reach data streams to track violence, map narratives and surface emerging threats, supporting customers in defence, security, government, public safety, executive protection and risk monitoring. The registered entity is ExTrac AI Limited.\n\n## Products and solutions\n\n- **ExTrac platform** - a customisable web application for leaders, decision-makers and analysts, hiding complexity by default while keeping the underlying data fully accessible and auditable.\n- **Co-Analyst** - a domain-specific, agentic AI that retrieves data, surfaces insight and generates visualisations and reports in response to analyst requests.\n- **Curated data feeds and bespoke reporting** - expert-curated, hard-to-access data streams, with the option for customers to integrate their own data, plus a mobile app and bespoke reporting.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** listed on the UK G-Cloud Digital Marketplace as a supplier.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-04-21** - ExTrac promoted its attendance at SOF Week 2026 in Tampa, positioning the platform for special operations forces and commanders. [source](https://uk.linkedin.com/company/extracrisk)\n- **2025-04** - ExTrac's co-founder was interviewed in the Combating Terrorism Center at West Point's CTC Sentinel. [source](https://ctc.westpoint.edu/a-view-from-the-ct-foxhole-charlie-winter-co-founder-extrac-ai/)\n\n## Links\n\n- Website: https://www.extrac.ai\n- LinkedIn: https://uk.linkedin.com/company/extracrisk\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (extrac.ai), Companies House (ExTrac AI Limited 14532778), LinkedIn company page, ADS Group members directory, UK Digital Marketplace, CTC West Point. LinkedIn lists the company-size band as 11-50 employees. No public funding-round figures or named investors were confirmed."}, {"name": "Faculty Science Limited", "website": "https://faculty.ai", "linkedin": "https://uk.linkedin.com/company/facultyai", "hq": "London, UK", "region": "London", "size": "medium", "headcount": "201-500", "founded": "2014", "tags": ["defence", "ai", "data", "software", "isr", "c2", "cyber", "size-medium", "type-scaleup", "owned-uk"], "summary": "London applied-AI company building and deploying AI systems for defence, national security and law enforcement.", "body": "# Faculty\n\n> London applied-AI company building and deploying AI systems for defence, national security and law enforcement.\n\n## What they do\n\nFaculty is a UK applied artificial intelligence company that designs, builds and deploys AI systems for customers across defence, national security, government and commercial sectors. In defence and security it builds bespoke AI algorithms and customised off-the-shelf solutions spanning sensor enhancement, data exploitation and multi-domain command and control, with a stated emphasis on AI safety and ethical deployment. The company works with the UK Ministry of Defence and national security and law enforcement partners.\n\n## Products and solutions\n\n- **Defence AI** - bespoke and customised AI systems for use cases from sensor enhancement to multi-domain command and control.\n- **National security and law enforcement** - AI systems designed, built and deployed for operational use with security partners.\n- **AI safety and assurance** - dedicated R&D and safety practice underpinning deployed systems.\n\n## Recent news\n\n- **2025-05-13** - Partnered with Leonardo to co-develop next-generation defence technologies, focused initially on Cognitive Intelligent Sensing and electronic warfare. [source](https://tech.eu/2025/05/13/leonardo-partners-with-london-based-faculty-ai-to-advance-defencetech/)\n\n## Links\n\n- Website: https://faculty.ai\n- LinkedIn: https://uk.linkedin.com/company/facultyai\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (faculty.ai), Companies House (no. 08873131), Tech.eu, UK Defence Journal, Leonardo UK newsroom."}, {"name": "Flann Microwave Ltd", "website": "https://flann.com", "linkedin": "https://www.linkedin.com/company/2476889", "hq": "Bodmin, UK", "region": "South West", "size": "medium", "headcount": "~65", "founded": "1956", "tags": ["defence", "rf", "sensors", "space", "hardware", "manufacturing", "size-medium", "type-manufacturer", "accr-iso9001", "mbr-ads"], "summary": "Designer and manufacturer of RF, microwave and millimetre-wave components and precision test instrumentation.", "body": "# Flann Microwave\n\n> Designer and manufacturer of RF, microwave and millimetre-wave components and precision test instrumentation.\n\n## What they do\n\nFlann Microwave is a UK manufacturer of precision passive RF, microwave and millimetre-wave components, sub-systems and calibration instrumentation, operating from around 300 MHz to 1.1 THz. Trading since 1956 and based in Bodmin, Cornwall, it serves aerospace and defence, space and satellite communications, metrology and test, telecommunications, and research markets, with the majority of production exported. It employs around 65 staff.\n\n## Products and solutions\n\n- **Waveguide components** - flexible and sub-millimetre waveguide, assemblies, bends, transitions and waveguide-to-coaxial transitions.\n- **Antennas and horns** - standard gain horns, corrugated and dual-polarised horns, feed systems and orthomode transducers.\n- **RF components** - attenuators, couplers, filters and diplexers, polarisers, switches, phase changers, loads and terminations.\n- **Calibration and metrology** - calibration and verification kits, reflectometers and multi-port standards.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001:2015.\n- **Memberships:** ADS Group; Cornwall Manufacturing Group.\n\n## Recent news\n\n- **2026-06-09** - Demonstrating WG32/WR3 solutions at the International Microwave Symposium 2026. [source](https://flann.com/2026/06/09/ims-2026-is-officially-underway/)\n- **2026-02-17** - Recognised at the Royal Cornwall Polytechnic Society Medal Awards for contribution to industry in Cornwall. [source](https://flann.com/2026/02/17/11651/)\n\n## Links\n\n- Website: https://flann.com\n- LinkedIn: https://www.linkedin.com/company/2476889\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (flann.com), ISO 9001 certificate, ADS members directory."}, {"name": "Flowcopter Ltd", "website": "https://www.flowcopter.com", "linkedin": "https://www.linkedin.com/company/flowcopter", "hq": "Loanhead, Midlothian, UK", "region": "Scotland", "size": "micro", "headcount": "", "founded": "2019", "tags": ["drones", "uas", "logistics", "autonomy", "manufacturing", "hardware", "size-micro", "type-startup", "type-manufacturer"], "summary": "Scottish developer of hydraulic-drive heavy-lift cargo drones for long-range missions.", "body": "# Flowcopter\n\n> Scottish developer of hydraulic-drive heavy-lift cargo drones for long-range missions.\n\n## What they do\n\nFlowcopter designs and manufactures heavy-lift uncrewed air systems built around digital hydraulic drive technology, a spin-out from Artemis Intelligent Power. Its platforms are aimed at markets traditionally served by helicopters, including offshore logistics, renewables, agriculture, emergency response and humanitarian aid. The company pairs combustion engines with digital displacement pumps feeding hydraulic motors that regulate propeller speed.\n\n## Products and solutions\n\n- **FC100** - heavy-lift cargo drone designed to carry payloads up to 100 kg over distances around 200 km with multi-hour endurance, positioned as a lower-fuel alternative to helicopters.\n\n## Recent news\n\n- **2024-05** - Completed flight testing of its heavy-lift cargo drone at HCA Airport in Denmark, its European test base. [source](https://dronelife.com/2024/05/23/flowcopter-successfully-tests-heavylift-cargo-drone-at-hca-airport/)\n- **2024-01** - Secured close to £1m from Scottish Enterprise to develop greener heavy-lift industrial drones. [source](https://www.suasnews.com/2024/01/flowcopter-lands-funding-from-scottish-enterprise-to-develop-greener-greater-drones-to-rival-helicopters/)\n\n## Links\n\n- Website: https://www.flowcopter.com\n- LinkedIn: https://www.linkedin.com/company/flowcopter\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (flowcopter.com), Companies House (no. SC637173), Scottish Enterprise, DroneLife, sUAS News."}, {"name": "Frazer-Nash Consultancy Limited", "website": "https://www.fnc.co.uk", "linkedin": "https://www.linkedin.com/company/frazer-nash-consultancy", "hq": "Leatherhead, UK", "region": "South East", "size": "large", "headcount": "1400+", "founded": "", "tags": ["defence", "maritime", "systems-engineering", "consultancy", "test-evaluation", "software", "size-large", "type-consultancy", "owned-foreign", "mbr-ads"], "summary": "Systems, engineering and technology consultancy serving UK defence; part of the KBR group.", "body": "# Frazer-Nash Consultancy\n\n> Systems, engineering and technology consultancy serving UK defence; part of the KBR group.\n\n## What they do\n\nFrazer-Nash Consultancy is a UK systems, engineering and technology company that delivers engineering and technology solutions across defence, nuclear, transport, energy and other sectors. In defence it provides systems engineering, procurement support, design assurance and through-life support, with a long-established practice in submarine and surface-ship work. The company operates from a network of UK and Australian offices and is part of the US-headquartered KBR group, which acquired it in 2021.\n\n## Products and solutions\n\n- **Systems engineering and assurance** - design, integration and safety assurance for defence platforms including submarines and surface ships.\n- **Procurement and acquisition support** - technical advisory and programme support to defence customers.\n- **Technology and digital services** - modelling, simulation, data and digital engineering for complex systems.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group; Society of Maritime Industries.\n\n## Recent news\n\n- **2025** - Part of Team Calibre (with KBR and V.Group) supporting the Royal Navy's Type 31 frigate through-life support, expected to commence Q4 2025. [source](https://www.fnc.co.uk/discover-frazer-nash/news/kbr-frazer-nash-and-vgroup-combine-expertise-to-strengthen-uk-naval-capability/)\n\n## Links\n\n- Website: https://www.fnc.co.uk\n- LinkedIn: https://www.linkedin.com/company/frazer-nash-consultancy\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (fnc.co.uk), Companies House (no. 02562870), ADS members directory, Society of Maritime Industries directory, KBR press releases."}, {"name": "G3 Systems Limited", "website": "https://www.g3-systems.co.uk", "linkedin": "https://www.linkedin.com/company/g3-systems-limited", "hq": "Portland, UK", "region": "South West", "size": "medium", "headcount": "", "founded": "2001", "tags": ["defence", "logistics", "manufacturing", "hardware", "land", "size-medium", "type-prime", "owned-foreign"], "summary": "Portland-based provider of deployable and fixed military infrastructure, engineering and support services for austere environments.", "body": "# G3 Systems\n\n> Portland-based provider of deployable and fixed military infrastructure, engineering and support services for austere environments.\n\n## What they do\n\nG3 Systems designs and produces deployable infrastructure solutions and delivers engineering, service and support to defence and government customers operating in austere locations. Its work spans deployable and fixed infrastructure and systems, outsourced fire and rescue services, and through-life support. The company is a wholly owned subsidiary of US-headquartered Intrepid Global Solutions and operates from Portland, England.\n\n## Products and solutions\n\n- **Deployable facilities** - military shelters, containerised laboratories and field operating sites for expeditionary use.\n- **Deployable logistics infrastructure** - flatracks, containers and associated equipment supplied to defence ministries.\n- **Engineering and support services** - through-life support and outsourced fire and rescue services in austere environments.\n\n## Recent news\n\n- **2025-05** - Awarded a contract to supply the Netherlands Ministry of Defence with circa 700 flatracks and containers under its WTB programme, a 30-month delivery phase followed by a 15-year support phase. [source](https://www.defenseadvancement.com/news/g3-systems-provides-military-infrastructure-engineering-service-solutions-for-defense/)\n- **2025-03** - Completed Stage 1 of its third overseas infrastructure contract with the UK Foreign, Commonwealth and Development Office. [source](https://www.armadainternational.com/2025/03/g3-systems-completes-stage-1-on-their-third-overseas-infrastructure-contract-with-the-uks-foreign-and-commonwealth-development-office-fcdo/)\n\n## Links\n\n- Website: https://www.g3-systems.co.uk\n- LinkedIn: https://www.linkedin.com/company/g3-systems-limited\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (g3-systems.co.uk), Companies House (no. 04206095), Defense Advancement, Armada International."}, {"name": "GaardTech Pty Ltd", "website": "https://www.gaardtech.com.au", "linkedin": "https://au.linkedin.com/company/gaardtech", "hq": "Brisbane, Australia", "region": "", "size": "micro", "headcount": "", "founded": "2017", "tags": ["defence", "training", "robotics", "autonomy", "land", "hardware", "manufacturing", "size-micro", "type-sme", "owned-foreign"], "summary": "Australian maker of robotic enemy-vehicle targets and live-fire training systems for armed forces.", "body": "# GaardTech\n\n> Australian maker of robotic enemy-vehicle targets and live-fire training systems for armed forces.\n\n## What they do\n\nGaardTech designs and manufactures robotic enemy-vehicle targets and live-fire training systems for armies. Its catalogue of 3D Robotic Enemy Vehicles replicates a range of enemy platforms with thermal, electronic and radar signatures, and the mobile targets can be operated remotely or autonomously across terrain. The company is based in Brisbane, Queensland, and exports to several allied armed forces.\n\n## Products and solutions\n\n- **3D Robotic Enemy Vehicles** - mobile robotic targets replicating tanks, armoured personnel carriers and other platforms with multi-spectral signatures for live-fire training.\n- **Flatpack robotic targets** - deployable, recyclable robotic targets and decoys.\n- **Doctrinally correct enemy formations** - target groupings representing enemy battle groups for collective live-fire training.\n\n## Recent news\n\n- **2025** - Awarded a contract to supply the British Army with 32 3D Robotic Enemy Vehicles for live-fire training, to be built in Brisbane. [source](https://www.defenceconnect.com.au/land/7479-gaardtech-awarded-british-army-contract)\n\n## Links\n\n- Website: https://www.gaardtech.com.au\n- LinkedIn: https://au.linkedin.com/company/gaardtech\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (gaardtech.com.au), LinkedIn company page, Defence Connect, Australian Manufacturing Forum."}, {"name": "Getac Technology Corporation", "website": "https://www.getac.com", "linkedin": "https://www.linkedin.com/company/getactechnology", "hq": "Taipei, Taiwan", "region": "", "size": "large", "headcount": "", "founded": "1989", "tags": ["defence", "hardware", "manufacturing", "land", "air", "maritime", "size-large", "type-prime", "listed", "owned-foreign"], "summary": "Taiwanese manufacturer of rugged laptops, tablets and mobile computing for defence and field use.", "body": "# Getac\n\n> Taiwanese manufacturer of rugged laptops, tablets and mobile computing for defence and field use.\n\n## What they do\n\nGetac is a Taiwanese manufacturer of rugged computing devices, including fully rugged and semi-rugged laptops and tablets, software and mobile video solutions built to military-grade durability standards. The company was established in 1989 as a joint venture with GE Aerospace to provide defence electronics and now serves defence, public safety, utilities, automotive, manufacturing and logistics customers in over 100 countries. Getac Technology Corporation is a subsidiary of Getac Holdings Corporation, listed on the Taiwan Stock Exchange, and is headquartered in Taipei.\n\n## Products and solutions\n\n- **Rugged laptops and tablets** - fully and semi-rugged devices certified to MIL-STD-810 and IP ingress standards for field use.\n- **5G rugged devices** - rugged hardware for defence, first response and resources frontline operations.\n- **Mobile video and software solutions** - field data, video and device-management software for operational deployment.\n\n## Recent news\n\n- **2026-04-24** - Launched the G140 Copilot+ PC, a fully rugged tablet powered by AMD technology with edge-AI capability for field use. [source](https://www.prnewswire.com/apac/news-releases/getac-redefines-rugged-mobility-with-launch-of-g140-copilot-pc-powered-by-amd-technology-302749897.html)\n\n## Links\n\n- Website: https://www.getac.com\n- LinkedIn: https://www.linkedin.com/company/getactechnology\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (getac.com), Getac newsroom, PR Newswire, Wikipedia."}, {"name": "Global Satellite Vu Ltd", "website": "https://www.satellitevu.com/", "linkedin": "https://www.linkedin.com/company/satvu", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "", "founded": "2016", "tags": ["defence", "space", "sensors", "isr", "data", "type-scaleup", "size-small", "owned-uk", "backed-vc", "accr-ce-plus", "mbr-ads"], "summary": "UK operator of high-resolution thermal infrared Earth observation satellites, trading as SatVu.", "body": "# Satellite Vu\n\n> UK operator of high-resolution thermal infrared Earth observation satellites, trading as SatVu.\n\n## What they do\n\nSatVu (Global Satellite Vu Ltd) captures high-resolution thermal infrared imagery from space, building a satellite constellation intended to provide high-frequency global revisit. Its first satellite, HotSat-1, launched in 2023 and HotSat-2 followed in 2026. The company serves national security, economic monitoring and climate resilience applications, providing thermal data on infrastructure and activity worldwide.\n\n## Products and solutions\n\n- **Thermal imagery** - high-resolution thermal infrared data captured from the HotSat constellation.\n- **Tasking** - commissioning the satellites to capture specified targets and areas of interest.\n- **Catalog** - access to previously captured, archived thermal imagery.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Cyber Essentials Plus.\n- **Memberships:** ADS Group, UKspace, World Geospatial Industry Council, Space4Climate, USGIF.\n\n## Recent news\n\n- **2026-05** - HotSat-2 first light images released, examining strategic energy sites. [source](https://www.electronicsweekly.com/news/satvus-hotsat-2-first-light-images-examine-strategic-energy-sites-2026-05/)\n- **2026-03-30** - HotSat-2 launched on SpaceX's Transporter-16 rideshare mission. [source](https://orbitaltoday.com/2026/04/12/uks-satvu-expands-thermal-eyes-in-the-sky-with-hotsat-2-launch/)\n- **2026-02-17** - Closed a ~£30m funding round led by the NATO Innovation Fund to expand the thermal constellation. [source](https://spacenews.com/satvu-to-expand-thermal-imaging-constellation-with-nato-backed-funds/)\n\n## Links\n\n- Website: https://www.satellitevu.com/\n- LinkedIn: https://www.linkedin.com/company/satvu\n\n## Sources\n\nPublic information verified 2026-06-29. SatVu website, LinkedIn company page, ADS members directory (adsgroup.org.uk/members/global-satellite-vu-ltd-1), Companies House (10163800), SpaceNews, Orbital Today, Electronics Weekly."}, {"name": "Gravity Industries Ltd", "website": "https://gravity.co", "linkedin": "https://www.linkedin.com/company/gravity-industries", "hq": "Salisbury, UK", "region": "South West", "size": "micro", "headcount": "", "founded": "2017", "tags": ["defence", "autonomy", "hardware", "manufacturing", "size-micro", "type-startup", "owned-founder"], "summary": "British developer of the patented Jet Suit for human-vectored flight.", "body": "# Gravity Industries\n\n> British developer of the patented Jet Suit for human-vectored flight.\n\n## What they do\n\nGravity Industries designs and builds the Jet Suit, a wearable human propulsion system enabling vectored-thrust flight and agile manoeuvre. Founded in 2017, the company has moved from demonstration and entertainment toward professional and defence deployment, with applications cited in ship boarding, coast guard operations, special forces mobility, and medical and mountain rescue.\n\n## Products and solutions\n\n- **Jet Suit** - patented wearable jet propulsion system providing human-vectored thrust, demonstrated at speeds in excess of 80 mph.\n- **Defence and security applications** - rapid ship boarding, force mobility and casualty-response use cases trialled with military and rescue users.\n\n## Recent news\n\n- **2021-11** - The British Army and Royal Marines trialled the Jet Suit for ship boarding and combat mobility off the UK's southern coast. [source](https://thedefensepost.com/2021/11/05/british-army-jet-suit-combat/)\n\n## Links\n\n- Website: https://gravity.co\n- LinkedIn: https://www.linkedin.com/company/gravity-industries\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (gravity.co), Companies House (no. 10605602), The Defense Post, Sifted."}, {"name": "Hadean Supercomputing Ltd", "website": "https://hadean.com", "linkedin": "https://www.linkedin.com/company/hadean", "hq": "London, UK", "region": "London", "size": "medium", "headcount": "", "founded": "2015", "tags": ["defence", "ai", "simulation", "training", "c2", "software", "data", "size-medium", "type-scaleup", "backed-vc"], "summary": "London developer of distributed spatial computing software for simulation, wargaming and command and control.", "body": "# Hadean\n\n> London developer of distributed spatial computing software for simulation, wargaming and command and control.\n\n## What they do\n\nHadean builds a distributed spatial computing platform for massively scalable simulations, synthetic environments and virtual worlds. Its technology supports defence customers with digital wargaming, command and control, and AI-driven synthetic training, alongside applications in gaming, space and enterprise. The company is venture-backed and works with the UK Ministry of Defence and partners across the UK defence technology sector.\n\n## Products and solutions\n\n- **Spatial computing platform** - distributed engine for large-scale, interoperable simulation and synthetic environments.\n- **Wargaming** - simulation tooling that models realistic human behaviours and evolving scenarios.\n- **Command and control** - software integrating diverse data sources into a single operational picture for real-time situational awareness.\n\n## Recent news\n\n- **2025-09-10** - Partnered with Palantir to deliver simulation and AI products across the UK Armed Forces, deploying Hadean software on Palantir Foundry and into MoD environments. [source](https://hadean.com/news/palantir-and-hadean-partner-to-bring-a-suite-of-simulation-and-ai-products-across-the-uk-armed-forces/)\n- **2026-03-12** - Secured a bridge funding round to support its AI and conflict-simulation work. [source](https://www.uktech.news/defence-tech/ai-conflict-simulation-firm-hadean-secures-bridge-round-20260312)\n\n## Links\n\n- Website: https://hadean.com\n- LinkedIn: https://www.linkedin.com/company/hadean\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (hadean.com), Companies House (no. 09808169), Palantir/Hadean press release, UKTN."}, {"name": "Hale Hamilton (Valves) Limited", "website": "https://www.halehamilton.com", "linkedin": "https://www.linkedin.com/company/hale-hamilton", "hq": "Uxbridge, UK", "region": "London", "size": "medium", "headcount": "", "founded": "1947", "tags": ["defence", "maritime", "hardware", "manufacturing", "size-medium", "type-prime", "owned-foreign"], "summary": "Uxbridge manufacturer of high-pressure valves and gas control systems for naval and defence platforms; part of CIRCOR.", "body": "# Hale Hamilton\n\n> Uxbridge manufacturer of high-pressure valves and gas control systems for naval and defence platforms; part of CIRCOR.\n\n## What they do\n\nHale Hamilton manufactures high-pressure valves and fluid and gas control equipment for naval defence, industrial gas and high-technology industrial markets. Its valves are fitted across the UK naval fleet, including submarines and surface warships, and on platforms operated by other navies, with a long-standing relationship with the UK Ministry of Defence. All products are designed and manufactured in the UK at Uxbridge, and the company operates as part of the US-headquartered CIRCOR International group.\n\n## Products and solutions\n\n- **High-pressure valves** - valves and flow-control equipment for naval submarines and surface ships.\n- **Gas control systems** - high-pressure fluid and gas control equipment for defence and industrial applications.\n- **Industrial and hydrogen valves** - valve systems for industrial gas, power and hydrogen markets.\n\n## Frameworks, accreditations and memberships\n\n- **Ownership:** subsidiary of CIRCOR International, within its Instrumentation and Thermal Fluid Products segment.\n\n## Links\n\n- Website: https://www.halehamilton.com\n- LinkedIn: https://www.linkedin.com/company/hale-hamilton\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (halehamilton.com), Companies House (no. 01563775), CIRCOR brand pages, Naval Technology."}, {"name": "Harland & Wolff", "website": "https://www.harland-wolff.com/", "linkedin": "https://www.linkedin.com/company/harland-wolff/", "hq": "Belfast, United Kingdom", "region": "Northern Ireland", "size": "large", "headcount": "", "founded": "1861", "tags": ["defence", "maritime", "manufacturing", "shipbuilding", "size-large", "type-prime", "owned-foreign", "prog-fss"], "summary": "Shipbuilding, ship repair and heavy fabrication group operating four UK yards, now owned by Spain's Navantia.", "body": "# Harland & Wolff\n\n> Shipbuilding, ship repair and heavy fabrication group operating four UK yards, now owned by Spain's Navantia.\n\n## What they do\n\nHarland & Wolff is a shipbuilding and fabrication business operating yards at Belfast (Northern Ireland), Appledore (Devon), and Methil and Arnish (Scotland). The Belfast and Appledore yards focus on naval and commercial shipbuilding and ship repair; the Scottish yards specialise in energy-sector fabrication. The business was acquired by Navantia UK, the British arm of the Spanish state-owned shipbuilder Navantia, in January 2025, which retained more than 1,000 jobs across the four sites.\n\n## Products and solutions\n\n- **Naval shipbuilding** - construction of vessels for UK defence programmes, including work on the Fleet Solid Support (FSS) ships for the Royal Fleet Auxiliary at Belfast and Appledore.\n- **Ship repair and conversion** - dry-dock and repair services across the yards.\n- **Heavy fabrication** - structures for the energy and offshore sectors, primarily at the Methil and Arnish yards.\n\n## Recent news\n\n- **2025-01-27** - Navantia UK completed its acquisition of Harland & Wolff's four UK yards, protecting more than 1,000 jobs. [Navantia UK](https://navantia.co.uk/2025/01/27/navantia-uk-completes-acquisition-of-harland-wolff/)\n- **2025-04-23** - Navantia UK announced acceleration of modernisation work at the Belfast yard, part of a £115 million investment across the four UK sites. [Harland & Wolff](https://www.harland-wolff.com/news/navantia-uk-accelerates-modernisation-of-harland-wolff-to-create-cutting-edge-shipyard-in-belfast/)\n- **2025-09-25** - Navantia UK and the Ministry of Defence attended Factory Acceptance Tests in Finland as part of the FSS modernisation programme. [Navantia UK](https://navantia.co.uk/2025/09/25/harland-wolff-modernisation-reaches-milestone-as-navantia-uk-and-ministry-of-defence-attend-factory-acceptance-tests-in-finland/)\n\n## Links\n\n- Website: https://www.harland-wolff.com/\n- LinkedIn: https://www.linkedin.com/company/harland-wolff/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: Harland & Wolff website, Navantia UK press releases, Marine Link and Naval Today reporting on the Navantia acquisition."}, {"name": "HDT Global", "website": "https://www.hdtglobal.com/", "linkedin": "https://www.linkedin.com/company/hdt-global", "hq": "Solon, Ohio, United States", "region": "", "size": "large", "headcount": "501-1000", "founded": "1937", "tags": ["defence", "robotics", "manufacturing", "hardware", "land", "size-large", "type-manufacturer", "owned-foreign"], "summary": "US manufacturer of deployable military shelters, environmental control, power generation, CBRN filtration and robotic systems.", "body": "# HDT Global\n\n> US manufacturer of deployable military shelters, environmental control, power generation, CBRN filtration and robotic systems.\n\n## What they do\n\nHDT Global designs and manufactures fully integrated deployable solutions for US and allied military units, including shelters, generators, heaters, environmental control units and air filtration systems. The company also operates a robotics division producing manipulators, actuators and mobile robotic vehicles for military, commercial, healthcare and underwater applications. Manufacturing of shelters, ECUs, generators, CBRN filters and robotic components is carried out in-house.\n\n## Products and solutions\n\n- **Military shelters** - soft-wall and rigid-wall deployable shelters and expeditionary command and control systems.\n- **Environmental control units (ECUs)** - military-grade heating, cooling and air handling for deployable systems.\n- **Power generation** - military generators for expeditionary use.\n- **CBRN filtration** - chemical, biological, radiological and nuclear air filtration systems.\n- **Robotics** - Adroit manipulators and actuators, plus mobile robotic vehicles.\n\n## Links\n\n- Website: https://www.hdtglobal.com/\n- LinkedIn: https://www.linkedin.com/company/hdt-global\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: HDT Global website, HDT Global LinkedIn company page, ADS equipment directory listing."}, {"name": "Helsing", "website": "https://helsing.ai", "linkedin": "https://www.linkedin.com/company/helsing", "hq": "Munich, Germany", "region": "South West England", "size": "large", "headcount": "", "founded": "2021", "tags": ["defence", "ai", "autonomy", "uas", "drones", "maritime", "air", "software", "size-large", "type-manufacturer", "owned-uk", "owned-foreign"], "summary": "Software-native defence company building AI-enabled autonomous systems across air, land, sea and space.", "body": "# Helsing\n\n> Software-native defence company building AI-enabled autonomous systems across air, land, sea and space.\n\n## What they do\n\nHelsing develops AI software and autonomous systems for defence, connecting existing hardware into AI-enabled networks and designing its own platforms across all domains. The company describes defence as having become a software problem, requiring a software-native company to develop advanced AI algorithms and architectures. It is headquartered in Munich and has built a UK presence, including a manufacturing facility in Plymouth.\n\n## Products and solutions\n\n- **Altra** - reconnaissance-strike software platform for land combat, providing AI mission planning and command and control for autonomous systems.\n- **HX-2** - software-defined, mass-produceable AI strike drone with a range up to around 100 km.\n- **Centaur** - AI air-combat software acting as an autonomous pilot for existing and future fighter aircraft.\n- **CA-1 Europa** - autonomous multi-role uncrewed combat aerial vehicle.\n- **SG-1 Fathom** - autonomous underwater glider designed and manufactured in Britain.\n- **Lura** - maritime AI platform for persistent underwater surveillance and submarine detection, paired with SG-1 Fathom.\n\n## Frameworks, accreditations and memberships\n\n- **Other:** Foreign-headquartered (Germany) with a UK entity (Helsing Limited) and a UK manufacturing facility in Plymouth.\n\n## Recent news\n\n- **2026-06-10** - Helsing introduced the CA-1 Electronic Attack, an autonomous combat aircraft for electronic warfare. [source](https://helsing.ai/newsroom/helsing-introduces-the-ca-1-electronic-attack-an-autonomous-combat-aircraft-for-electronic-warfare)\n- **2026-06-01** - Helsing unveiled its Area 9 site and launched RX-1, its first European robotics research platform. [source](https://helsing.ai/newsroom/helsing-unveils-area-9-and-launches-rx-1-its-first-european-robotics-research-platform)\n- **2026-05-19** - Helsing and OHB established a joint venture, KIRK, for tactical space-based reconnaissance systems. [source](https://helsing.ai/newsroom/helsing-and-ohb-establish-joint-venture-kirk-for-tactical-space-based-reconnaissance-systems)\n- **2025-11-19** - Helsing opened its first UK Resilience Factory in Plymouth to build AI-enabled submarine-hunters. [source](https://helsing.ai/newsroom/helsing-opens-its-first-uk-resilience-factory-in-plymouth-to-build-ai-enabled-submarine-hunters)\n\n## Links\n\n- Website: https://helsing.ai\n- LinkedIn: https://www.linkedin.com/company/helsing\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (helsing.ai newsroom), Companies House (HELSING LIMITED, company number 13447361, incorporated 9 June 2021), Wikipedia (founding 2021, Munich), and company press releases."}, {"name": "HENSOLDT", "website": "https://www.hensoldt.net/", "linkedin": "https://www.linkedin.com/company/hensoldt", "hq": "Taufkirchen, Germany", "region": "", "size": "large", "headcount": "~9500", "founded": "2017", "tags": ["defence", "sensors", "radar", "ew", "optronics", "isr", "space", "size-large", "type-prime", "listed", "owned-foreign", "prog-eurofighter"], "summary": "German sensor-solutions group for defence and security, spanning radar, electronic warfare, optronics and avionics, with a UK arm.", "body": "# HENSOLDT\n\n> German sensor-solutions group for defence and security, spanning radar, electronic warfare, optronics and avionics, with a UK arm.\n\n## What they do\n\nHENSOLDT AG is a German multinational focused on sensor technologies for defence, security and aerospace, with main product areas in radar, optoelectronics and avionics. It originated from the defence electronics unit of Airbus, was sold to KKR in 2017, and listed on the Frankfurt Stock Exchange in September 2020. The group has production sites in Germany, France and the United Kingdom. Its UK arm, HENSOLDT UK (formerly Kelvin Hughes, acquired in 2017 and renamed in 2019), is based in Enfield, North London, and develops maritime navigation and surveillance radar.\n\n## Products and solutions\n\n- **Radar systems** - surveillance, reconnaissance, air traffic control and air defence radars used on platforms including the Eurofighter, German Navy F125 frigates and US Navy littoral combat ships.\n- **Electronic warfare** - the Kalaetron family of airborne EW systems, including Kalaetron Attack for radar jamming.\n- **Optronics** - daylight cameras, thermal imagers, image intensifiers and laser rangefinders for military and civil security.\n- **Kelvin Hughes SharpEye** - solid-state maritime navigation and surveillance radar developed by HENSOLDT UK.\n\n## Recent news\n\n- **2025-03** - HENSOLDT reported a strong first quarter for 2025 with growth in order intake and revenue. [HENSOLDT](https://www.hensoldt.net/news/hensoldt-reports-strong-first-quarter-2025-with-growth-in-order-intake-and-revenue)\n- **2025** - The Eurofighter Common Radar System Mark 1 (ECRS Mk1), developed with Indra, began testing in live operations, with delivery to Germany and Spain targeted for 2027. [HENSOLDT](https://www.hensoldt.net/news/eurofighter-radar-mk1-begins-testing-in-live-operations)\n- **2026** - HENSOLDT reported record 2025 order intake of EUR 4,710 million and revenue of EUR 2,455 million with around 9,500 employees, and raised its 2026 outlook. [HENSOLDT](https://www.hensoldt.net/news/financial-year-2025-hensoldt-achieves-record-order-intake-and-confirms-structural-growth-path)\n\n## Links\n\n- Website: https://www.hensoldt.net/\n- LinkedIn: https://www.linkedin.com/company/hensoldt\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: HENSOLDT website and investor news, Wikipedia, HENSOLDT UK country hub page, Defence Industry Europe reporting."}, {"name": "Hybrid Drones Ltd", "website": "https://www.hydradrones.com/", "linkedin": "https://uk.linkedin.com/company/hydradrones", "hq": "London, United Kingdom", "region": "London", "size": "micro", "headcount": "", "founded": "2019", "tags": ["defence", "uas", "drones", "air", "logistics", "manufacturing", "type-startup", "size-micro", "owned-uk", "mbr-ads"], "summary": "UK manufacturer of heavy-lift hybrid jet-electric uncrewed aerial systems, trading as HYDRA.", "body": "# Hybrid Drones\n\n> UK manufacturer of heavy-lift hybrid jet-electric uncrewed aerial systems, trading as HYDRA.\n\n## What they do\n\nHybrid Drones Ltd is a UK heavy-lift hybrid UAS manufacturer, founded in 2019 to develop a hybrid jet-electric VTOL drone concept. Its platforms are designed to carry large payloads over tactical distances, with a modular design offering fully-electric and multi-jet variants. Stated use cases include logistical resupply, ship-to-ship transfer, casualty evacuation and weapons employment.\n\n## Products and solutions\n\n- **HYDRA-400** - heavy-lift VTOL UAV using hybrid propulsion combining electric rotors with micro jet turbines, with a maximum lift of up to 400 kg and rapid field assembly.\n- **Platform variants** - four configurable variants of the platform (fully-electric, 2-jet, 4-jet and 6-jet), with maximum lift rising from 260 kg to 400 kg.\n- **Stores carriage** - fitted with an L3Harris Gnat stores release system, able to carry casualty evacuation pods, cargo racks, under-slung loads and weapons.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group, ARPAS-UK.\n\n## Recent news\n\n- **2026-03-05** - MBDA announced the HYDRA-400 VTOL UAV completed its successful first flight. [source](https://www.mbda-systems.com/mbda-backed-sme-marks-successful-first-flight-innovative-drone)\n- **2025-05-12** - MBDA became a significant shareholder, investing to develop the HYDRA-400 to production standard. [source](https://www.mbda-systems.com/mbda-invests-uk-sme-maker-innovative-hydra-drone)\n\n## Links\n\n- Website: https://www.hydradrones.com/\n- LinkedIn: https://uk.linkedin.com/company/hydradrones\n\n## Sources\n\nPublic information verified 2026-06-29. HYDRA / Hybrid Drones website, LinkedIn company page, ADS members directory (adsgroup.org.uk/members/hybrid-drones-ltd-2), Companies House (12259467), MBDA press releases, The Defense Post."}, {"name": "Hypermotive", "website": "https://www.hyper-motive.com/", "linkedin": "https://uk.linkedin.com/company/hypermotive-ltd", "hq": "Northampton, United Kingdom", "region": "East Midlands", "size": "small", "headcount": "", "founded": "2016", "tags": ["defence", "hardware", "manufacturing", "land", "maritime", "size-small", "type-manufacturer"], "summary": "UK specialist in electrical systems for electrification, hybrid and hydrogen platforms across defence, automotive, motorsport and aerospace.", "body": "# Hypermotive\n\n> UK specialist in electrical systems for electrification, hybrid and hydrogen platforms across defence, automotive, motorsport and aerospace.\n\n## What they do\n\nHypermotive designs and manufactures high-performance electrical systems for battery-electric, fuel-cell and hydrogen platforms, working since 2016 across automotive, defence, motorsport and aerospace. Its products include low and high voltage wiring harnesses, power distribution units, DC-DC converters and EMC/EMI filters. The company operates a manufacturing facility in Northampton optimised for low to medium volume production. In defence it is active in land vehicle electrification and in subsea applications including uncrewed surface vehicles.\n\n## Products and solutions\n\n- **Wiring harnesses** - low and high voltage harnesses for electrified platforms.\n- **Power Distribution Units (PDU)** - power distribution for electric and hybrid systems.\n- **DC-DC converters** - voltage conversion for electrified platforms.\n- **EMC/EMI filters** - electromagnetic compatibility and interference filtering.\n\n## Recent news\n\n- **2025** - Hypermotive attended Undersea Defence Technology (UDT) at ExCeL London, presenting work on electrification for uncrewed surface vehicles. [Hypermotive](https://www.hyper-motive.com/hypermotive-attending-udt-undersea-defence-technology-at-the-excel-in-london/)\n\n## Links\n\n- Website: https://www.hyper-motive.com/\n- LinkedIn: https://uk.linkedin.com/company/hypermotive-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: Hypermotive website, Hypermotive LinkedIn company page."}, {"name": "iCOMAT", "website": "https://www.icomat.co.uk/", "linkedin": "https://www.linkedin.com/company/icomat", "hq": "Bristol, United Kingdom", "region": "South West", "size": "small", "headcount": "", "founded": "2019", "tags": ["defence", "manufacturing", "hardware", "air", "space", "size-small", "type-manufacturer", "backed-vc"], "summary": "Bristol composites manufacturer whose Rapid Tow Shearing technology steers fibres without defects for aerospace, defence and automotive parts.", "body": "# iCOMAT\n\n> Bristol composites manufacturer whose Rapid Tow Shearing technology steers fibres without defects for aerospace, defence and automotive parts.\n\n## What they do\n\niCOMAT is a manufacturer of advanced composite components for the aerospace, defence and automotive industries. It spun out of the University of Bristol in 2019 to industrialise its proprietary Rapid Tow Shearing (RTS) process, which steers composite fibres without defects to enable lighter, optimised structures at high production rate. The company operates a production facility, Factory One, and has been building a further automated facility in Gloucester.\n\n## Products and solutions\n\n- **Rapid Tow Shearing (RTS)** - proprietary fibre-steering process using in-plane shearing rather than bending, enabling defect-free curved fibre paths for optimised composite parts.\n- **Advanced composite components** - turnkey supply from tooling to finished parts for aerospace, defence and automotive customers.\n\n## Recent news\n\n- **2024-06** - iCOMAT raised $22.5 million (over £17.5 million) in a Series A round co-led by 8VC and the NATO Innovation Fund, with Syensqo Ventures and Velocity Partners participating. It was the NATO Innovation Fund's first publicly announced investment. [PR Newswire](https://www.prnewswire.co.uk/news-releases/icomat-raises-22-5m-financing-led-by-8vc-and-nato-innovation-fund-to-automate-composites-manufacturing-302164253.html)\n\n## Links\n\n- Website: https://www.icomat.co.uk/\n- LinkedIn: https://www.linkedin.com/company/icomat\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: iCOMAT website, University of Bristol news, PR Newswire and Vestbee reporting on the Series A round."}, {"name": "Igne UXO Ltd", "website": "https://www.igne.com/", "linkedin": "https://www.linkedin.com/company/ignegroup", "hq": "Ross-on-Wye, United Kingdom", "region": "West Midlands", "size": "medium", "headcount": "", "founded": "2023", "tags": ["defence", "munitions", "sensors", "gis", "maritime", "type-sme", "size-medium", "owned-uk", "accr-iso9001", "accr-iso14001", "mbr-ads"], "summary": "UK provider of unexploded ordnance survey, risk assessment and clearance services, formerly BACTEC.", "body": "# Igne UXO\n\n> UK provider of unexploded ordnance survey, risk assessment and clearance services, formerly BACTEC.\n\n## What they do\n\nIgne UXO Ltd is the unexploded ordnance arm of Igne, a UK subsurface services group formed in 2023 by consolidating several specialist businesses. The UXO business, formerly BACTEC, specialises in unexploded ordnance risk mitigation and explosive ordnance disposal, with land and marine coverage and a nationwide geospatial UXO risk database. It is one of the few UK contractors licensed to acquire and keep ordnance.\n\n## Products and solutions\n\n- **UXO risk assessments** - desk-study preliminary risk assessments using a nationwide UXO risk database, structured to CIRIA C681 guidance.\n- **UXO surveys** - non-intrusive, intrusive and drone-borne magnetometer surveys to detect ferrous anomalies.\n- **EOD services** - explosive ordnance disposal: search, clearance, disposal and on-site watching briefs.\n- **Marine UXO** - offshore, inshore and nearshore UXO and chemical-munition risk mitigation for renewables, cabling and port operators.\n- **UXO training** - CPD-accredited UXO safety training and toolbox talks.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, ISO 14001, ISO 45001, PAS 2080:2023, UKAS-accredited testing.\n- **Memberships:** ADS Group, British Drilling Association, plus industry schemes including Constructionline Gold, CHAS and RISQS.\n\n## Recent news\n\n- **2025-10-03** - Launched a new interactive UXO Risk Map for developers, planners and consultants. [source](https://www.igne.com/news/uxo-risk-map-launch)\n- **2025-09-11** - Achieved PAS 2080 carbon management certification from BSI. [source](https://www.igne.com/news/pas-2080)\n- **2025-04-11** - Published a piece on the UXO unit's lineage from BACTEC to Igne. [source](https://www.igne.com/news/from-bactec-to-igne2)\n\n## Links\n\n- Website: https://www.igne.com/\n- LinkedIn: https://www.linkedin.com/company/ignegroup\n\n## Sources\n\nPublic information verified 2026-06-29. Igne website, LinkedIn company page, ADS members directory (adsgroup.org.uk/members/igne-uxo-ltd-1), Companies House (Igne UXO Ltd 14747649; Igne Group Ltd 14740656)."}, {"name": "Inova Design Solutions Ltd (trading as Bodytrak)", "website": "https://bodytrak.co", "linkedin": "https://www.linkedin.com/company/bodytrak", "hq": "London, UK", "region": "London", "size": "small", "headcount": "", "founded": "2011", "tags": ["defence", "sensors", "data", "ai", "hardware", "size-small", "type-sme"], "summary": "In-ear wearable that provides real-time physiological monitoring, including core body temperature and heart rate, for workplace and operational safety.", "body": "# Inova Design Solutions Ltd (trading as Bodytrak)\n\n> In-ear wearable that provides real-time physiological monitoring, including core body temperature and heart rate, for workplace and operational safety.\n\n## What they do\n\nBodytrak is a wearable safety solution built around an in-ear earpiece with multiple sensors that capture real-time physiological data, analysed by AI on the device and in the cloud. The ear's proximity to the hypothalamus allows the device to measure core body temperature and heart rate, with reported mean absolute error of 0.18C against the gastro-intestinal pill at elevated temperatures. The company markets the solution across industrial, emergency services, defence and scientific or research sectors.\n\n## Products and solutions\n\n- **Bodytrak 1** - in-ear wearable for real-time physiological monitoring.\n- **Bodytrak 1 IS** - intrinsically safe variant for hazardous environments.\n- **Smart Safety Solution** - platform covering heat stress monitoring, fatigue monitoring, lone worker safety, musculoskeletal disorder prevention, geolocation and geofencing, alerts and automated reporting.\n\n## Recent news\n\n- **2025-03-25** - Joint Administrators appointed to Inova Design Solutions Ltd (trading as Bodytrak); the company entered administration. [source](https://bodytrak.co/legal-information/)\n- **2022-05** - Lakeland Industries extended its strategic investment in Inova Design Solutions to GBP 3.5 million. [source](https://www.setsquared.co.uk/inova-design-solutions-t-a-bodytrak-secures-an-additional-1-5-million-investment-from-lakeland-industries/)\n\n## Links\n\n- Website: https://bodytrak.co\n- LinkedIn: https://www.linkedin.com/company/bodytrak\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, Companies House (07513025, insolvency proceedings), SETsquared, public investment announcements."}, {"name": "Jaltek Systems", "website": "https://www.jaltek.com", "linkedin": "https://uk.linkedin.com/company/jaltek-systems-ltd", "hq": "Luton, United Kingdom", "region": "East of England", "size": "small", "headcount": "", "founded": "1988", "tags": ["defence", "manufacturing", "hardware", "air", "size-small", "type-sme", "accr-as9100", "accr-iso13485", "accr-iso14001", "accr-iso27001", "accr-ce-plus", "mbr-ads", "mbr-joscar"], "summary": "UK electronics design and contract manufacturer serving defence, aerospace and other regulated sectors.", "body": "# Jaltek Systems\n\n> UK electronics design and contract manufacturer serving defence, aerospace and other regulated sectors.\n\n## What they do\n\nJaltek Systems is a UK electronics design and manufacturing company based in Luton with over 35 years' experience. It focuses on low-to-medium volume, high-mix product profiles, supporting tier 1 UK and US defence contractors. The company describes a 20-year history in the defence and aerospace electronics manufacturing sector.\n\n## Products and solutions\n\n- **Electronics manufacturing services (EMS)** - contract manufacture, test and final product assembly of printed circuit board assemblies and complete products.\n- **Design and engineering** - conceptual design, hardware and software/firmware development, PCB layout and mechanical engineering.\n- **Environmental protection** - conformal coatings, pottings and encapsulations for products operating in extreme environments.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS9100, ISO 13485, ISO 14001, ISO/IEC 27001, Cyber Essentials Plus, and BSI Kitemark to IPC-A-610.\n- **Memberships:** ADS Group; JOSCAR registered.\n\n## Recent news\n\n- **2023-08-15** - Jaltek Systems marked 25 years of ownership under Pravin Sood. [source](https://m.luton.gov.uk/Page/Show/Business/news/Pages/jaltek-systems-celebrates-25-years.aspx)\n\n## Links\n\n- Website: https://www.jaltek.com\n- LinkedIn: https://uk.linkedin.com/company/jaltek-systems-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (jaltek.com), Jaltek LinkedIn company page, ADS Group members directory, Companies House (02312905), Luton Council business news."}, {"name": "JET Connectivity", "website": "https://jet-eng.co.uk", "linkedin": "https://www.linkedin.com/company/jet-connectivity", "hq": "Bromsgrove, United Kingdom", "region": "West Midlands", "size": "micro", "headcount": "", "founded": "2020", "tags": ["defence", "comms", "rf", "maritime", "sensors", "hardware", "size-micro", "type-startup", "backed-angel"], "summary": "UK developer of secure sovereign 5G mesh networks delivered on floating buoy platforms for maritime and remote environments.", "body": "# JET Connectivity\n\n> UK developer of secure sovereign 5G mesh networks delivered on floating buoy platforms for maritime and remote environments.\n\n## What they do\n\nJET Connectivity delivers secure 5G/6G mesh networks with integrated backhaul and positioning, navigation and timing capabilities for maritime and expeditionary environments. The company, spun out from JET Engineering in 2020 and trading under the JET Connectivity name from October 2022, has built its own hardware and software stack. It positions its sovereign networks as land and sea-based alternatives to satellite services for offshore, coastal and remote sites.\n\n## Products and solutions\n\n- **5G connectivity buoys** - floating buoy platforms hosting bespoke 5G networks, sharing coverage between buoys and relaying data to shore.\n- **Pop-up 5G IAB mesh** - secure mesh capability designed for littoral, offshore and remote environments, including GPS-denied conditions.\n- **Platform range** - a compact buoy for rivers and coastal areas, a mid-size platform for wider maritime zones, and an offshore station for year-round connectivity miles from shore, with onboard sensors collecting sea state, weather and video data.\n\n## Recent news\n\n- **2026-04** - JET Connectivity raised a £1.2m Pre-Series A round led by TRICAPITAL Angels, with The FSE Group and private investors, to scale its sovereign 5G systems through 2026. [source](https://tricapital.co.uk/tricapital-angels-leads-1-2m-investment-into-sovereign-dual-use-5g-solutions/)\n\n## Links\n\n- Website: https://jet-eng.co.uk\n- LinkedIn: https://www.linkedin.com/company/jet-connectivity\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (jet-eng.co.uk), Companies House (14386396), TRICAPITAL Angels, Scottish Business News, Offshore Renewable Energy Catapult case study."}, {"name": "K Sharp", "website": "https://www.ksharp.co.uk", "linkedin": "https://uk.linkedin.com/company/k-sharp-ltd", "hq": "Llanelli, United Kingdom", "region": "Wales", "size": "micro", "headcount": "", "founded": "", "tags": ["defence", "data", "simulation", "size-micro", "type-sme", "mbr-ciehf"], "summary": "Human factors and human science research consultancy working across defence, security and public safety.", "body": "# K Sharp\n\n> Human factors and human science research consultancy working across defence, security and public safety.\n\n## What they do\n\nK Sharp provides strategic and applied human sciences research and human factors consultancy, specialising in cultural and behavioural analysis and technology adoption. The team uses human-centred design to help clients understand and predict user behaviour and adopt the right technologies. It describes more than a decade of delivery into defence, alongside health, aviation, space and smart technology.\n\n## Products and solutions\n\n- **Human factors consultancy** - human-centred design and human factors integration across the product lifecycle, from research through to design and delivery.\n- **Applied human science research** - cultural and behavioural analysis, technology adoption studies and user research.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** Chartered Institute of Ergonomics and Human Factors (CIEHF); Aerospace Wales Forum.\n\n## Links\n\n- Website: https://www.ksharp.co.uk\n- LinkedIn: https://uk.linkedin.com/company/k-sharp-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (ksharp.co.uk), K Sharp LinkedIn company page, CIEHF resource listing, Aerospace Wales Forum directory."}, {"name": "Kainos Group", "website": "https://www.kainos.com", "linkedin": "https://www.linkedin.com/company/kainos", "hq": "Belfast, United Kingdom", "region": "Northern Ireland", "size": "large", "headcount": "~2900", "founded": "1986", "tags": ["defence", "software", "ai", "data", "cyber", "size-large", "type-prime", "listed", "fw-dips", "fw-gcloud", "prog-ddap"], "summary": "London-listed digital technology company delivering software, data and AI services to public sector, defence and healthcare.", "body": "# Kainos Group\n\n> London-listed digital technology company delivering software, data and AI services to public sector, defence and healthcare.\n\n## What they do\n\nKainos Group plc is a digital technology company headquartered in Belfast, Northern Ireland, listed on the London Stock Exchange (LSE: KNOS) and a constituent of the FTSE 250. Founded in 1986 as a joint venture between Fujitsu and Queen's University Belfast's business incubation unit, it develops information technology for businesses and organisations. The group operates three divisions: Digital Services, Workday Services and Workday Products, and is a UK supplier of digital, data and AI capability to public sector, defence and healthcare.\n\n## Products and solutions\n\n- **Digital Services** - digital transformation, software development, data and AI delivery for government, healthcare and commercial clients.\n- **Workday Services** - implementation and support partner for Workday enterprise applications.\n- **Workday Products** - software products extending and automating Workday deployments.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** Crown Commercial Service Digital and IT Professional Services (DIPS); G-Cloud; Defence Innovation and Procurement frameworks.\n\n## Recent news\n\n- **2025-01** - Kainos was awarded a three-year contract worth £50m to evolve the Ministry of Defence's Defence Data Analytics Platform (DDAP), via the CCS Digital and IT Professional Services framework, taking over from Cognizant. [source](https://www.kainos.com/insights/news/kainos-extends-partnership-with-ministry-of-defence-to-drive-data-and-ai-innovation-with-enhanced-platform-capabilities)\n\n## Links\n\n- Website: https://www.kainos.com\n- LinkedIn: https://www.linkedin.com/company/kainos\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (kainos.com), Kainos LinkedIn company page, Companies House (NI019370), Wikipedia, Computer Weekly, Sync NI, ADS Advance."}, {"name": "Karve International", "website": "https://www.karveinternational.com", "linkedin": "https://uk.linkedin.com/company/karve-international", "hq": "Poole, United Kingdom", "region": "South West", "size": "micro", "headcount": "", "founded": "2021", "tags": ["defence", "software", "data", "c2", "size-micro", "type-sme", "mbr-ads"], "summary": "UK defence technology company building software platforms and advisory services for defence and national security programmes.", "body": "# Karve International\n\n> UK defence technology company building software platforms and advisory services for defence and national security programmes.\n\n## What they do\n\nKarve International is a UK defence technology company building software platforms for high-trust environments where delivery is complex and coordination is critical. Founded in 2021, it develops sovereign-aligned infrastructure for defence and national security programmes that span multiple organisations, approvals and constraints. Alongside its software, Karve provides growth, intelligence and strategic advisory services.\n\n## Products and solutions\n\n- **KarveOS** - enterprise operating infrastructure that connects data, platforms, funding streams and operational demand into a single executable system, designed to coordinate procurement, resource allocation and delivery across distributed programmes and national boundaries.\n- **Advisory services** - mission-focused growth, intelligence and strategic advisory to align innovation with operational requirements and scale dual-use and mission-critical technologies.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2023-12-12** - Karve ran an event on navigating procurement pitfalls for novel technology with the South West Regional Defence and Security Cluster. [source](https://southwestrdsc.co.uk/innovation-unleashed-navigating-procurement-pitfalls-for-novel-tech-an-event-with-karve-12-dec-2023/)\n\n## Links\n\n- Website: https://www.karveinternational.com\n- LinkedIn: https://uk.linkedin.com/company/karve-international\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (karveinternational.com), Karve LinkedIn company page, ADS Group members directory, Companies House (13679834), South West Regional Defence and Security Cluster."}, {"name": "KHIPU Networks", "website": "https://www.khipu-networks.com/", "linkedin": "https://www.linkedin.com/company/khipu-networks", "hq": "Fleet, United Kingdom", "region": "South East England", "size": "medium", "headcount": "", "founded": "2005", "tags": ["defence", "cyber", "comms", "software", "data", "size-medium", "type-sme", "owned-uk", "accr-iso27001", "accr-cyber-essentials"], "summary": "International cyber security specialists delivering managed security, networking and wireless solutions.", "body": "# KHIPU Networks\n\n> International cyber security specialists delivering managed security, networking and wireless solutions.\n\n## What they do\n\nKHIPU Networks are a privately owned, international cyber security specialist delivering network, wireless and security solutions across multiple sectors. They run 24x7 Network and Security Operations Centres in the UK and South Africa, serving education, healthcare, government and the private sector. Their stated approach is to partner with customers, understand their challenges and design fitted solutions.\n\n## Products and solutions\n\n- **XMDR (eXtended Managed Detection and Response)** - 24x7 managed detection and response service delivered through KHIPU's SOC, providing threat hunting, triage, investigation and response.\n- **Managed SOC and NOC services** - integrated network, NOC and SOC delivery.\n- **Cyber Essentials consultancy** - guides organisations through Cyber Essentials certification.\n- **Simulated phishing and security awareness training** - specialist simulated phishing and cyber awareness training.\n- **Networking and wireless security** - network access, wireless and remote access security.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Royal Warrant by Appointment to His Majesty The King; NCSC-recognised (certified under the Cyber Incident Response scheme); ISO 27001.\n\n## Recent news\n\n- **2026-02-01** - Awarded Worcestershire County Council Switch Support contract, running to December 2027. [source](https://d3tenders.com/contract/?ocid=ocds-h6vhtk-0607a2)\n\n## Links\n\n- Website: https://www.khipu-networks.com/\n- LinkedIn: https://www.linkedin.com/company/khipu-networks\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, LinkedIn company page, Companies House (05218573), NCSC organisation register, Palo Alto Networks published case studies, D3 Tenders contract notice."}, {"name": "Kraken Technology Group", "website": "https://krakentechnology.com", "linkedin": "https://uk.linkedin.com/company/kraken-technology-group", "hq": "Fareham, United Kingdom", "region": "South East England", "size": "small", "headcount": "", "founded": "2020", "tags": ["defence", "maritime", "autonomy", "uas", "manufacturing", "size-small", "type-manufacturer", "owned-uk", "mbr-ads"], "summary": "UK builder of high-speed boats and low-cost, open-architecture uncrewed surface vessels.", "body": "# Kraken Technology Group\n\n> UK builder of high-speed boats and low-cost, open-architecture uncrewed surface vessels.\n\n## What they do\n\nKraken Technology Group is a UK company applying precision design and advanced engineering to the performance marine market, with a focus on uncrewed surface vessels. It develops cost-effective, open-architecture USVs for surveillance, force protection and multi-domain operations. The company is based in Fareham, Hampshire.\n\n## Products and solutions\n\n- **K3 Scout** - high-performance, low-cost uncrewed surface vessel with a fully modular payload bay, adaptable for reconnaissance, communications relay, electronic warfare, decoy, logistics or strike tasks. The 8.4 m composite hull can reach around 55 knots with a stated range of 650 nautical miles at 25 knots.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-03-11** - Royal Navy announced procurement of 20 Kraken uncrewed boats as testbeds for future operations, under Project Beehive. [source](https://www.royalnavy.mod.uk/news/2026/march/11/20260311-kraken-usv-procurement-announcement)\n- **2025-11-25** - US special forces selected Kraken for advanced surface and subsurface drone vessels. [source](https://thedefensepost.com/2025/11/25/us-kraken-drone-vessels/)\n- **2025-06-23** - Kraken secured investment from the NATO Innovation Fund and the UK's National Security Strategic Investment Fund to fund expansion. [source](https://www.nif.fund/news/nato-innovation-fund-invests-in-kraken-technology-group-to-expand-the-alliances-autonomous-maritime-capabilities/)\n\n## Links\n\n- Website: https://krakentechnology.com\n- LinkedIn: https://uk.linkedin.com/company/kraken-technology-group\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (krakentechnology.com), Companies House (KRAKEN TECHNOLOGY GROUP LIMITED, company number 13099283, incorporated 24 December 2020), ADS Group members directory, Royal Navy, NATO Innovation Fund, and reputable news."}, {"name": "Kromek Group plc", "website": "https://www.kromek.com", "linkedin": "https://www.linkedin.com/company/kromek", "hq": "Sedgefield, United Kingdom", "region": "North East England", "size": "medium", "headcount": "150+", "founded": "", "tags": ["defence", "sensors", "detection", "hardware", "manufacturing", "size-medium", "type-manufacturer", "listed"], "summary": "AIM-listed developer of radiation and biological threat detection technology based on cadmium zinc telluride sensors.", "body": "# Kromek Group plc\n\n> AIM-listed developer of radiation and biological threat detection technology based on cadmium zinc telluride sensors.\n\n## What they do\n\nKromek Group supplies and develops radiation detection solutions based on cadmium zinc telluride (CZT) and other materials, for the medical imaging, civil nuclear, security screening and homeland security markets. It also works with OEMs, governments and other agencies to design and build new solutions. The company is headquartered at NETPark in Sedgefield, County Durham, and operates across two continents.\n\n## Products and solutions\n\n- **D3S** - handheld radioisotope identification devices for CBRN detection, including the D3S ID and personal radiation detector variants.\n- **D5 RIID** - high-accuracy, ruggedised handheld radioisotope identifier.\n- **AARM** - autonomous airborne radiation monitoring system for UAV-based survey.\n- **Biological threat detection** - bio-security detection products developed for government and defence customers.\n- **CZT gamma detectors** - detectors and modules for SPECT medical imaging and advanced imaging applications.\n\n## Frameworks, accreditations and memberships\n\n- **Other:** Listed on the London Stock Exchange AIM market (ticker KMK).\n\n## Recent news\n\n- **2026 (interim results, six months ended 31 October 2025)** - Kromek reported revenue of 15.0m pounds for the half year, with CBRN Detection revenue more than doubling to 4.3m pounds. [source](https://www.kromek.com/news/interim-results-25-26/)\n- **2025** - Kromek won its first 1.7m pound contract under the UK Government's Radiological Nuclear Detection Framework, supplying equipment and services for the Home Office. [source](https://www.kromek.com/news/kromek-wins-1-7m-contract-under-uk-government-framework/)\n- **2025** - Kromek received a new biosecurity award from the UK Ministry of Defence. [source](https://www.kromek.com/news/new-biosecurity-award-from-uk-mod/)\n\n## Links\n\n- Website: https://www.kromek.com\n- LinkedIn: https://www.linkedin.com/company/kromek\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (kromek.com about, detection and news pages), London Stock Exchange AIM listing (KMK). Founded approximately 2004 per the company's stated 20-year history; exact Companies House number not confirmed in this pass."}, {"name": "Kvertus", "website": "https://kvertus.ua/en/", "linkedin": "https://www.linkedin.com/company/kvertus", "hq": "Kyiv, Ukraine", "region": "", "size": "medium", "headcount": "", "founded": "2017", "tags": ["defence", "ew", "counter-uas", "uas", "drones", "rf", "isr", "sensors", "manufacturing", "hardware", "size-medium", "type-manufacturer", "owned-foreign", "mbr-naudi"], "summary": "Ukrainian developer and manufacturer of electronic warfare, SIGINT and counter-UAS systems.", "body": "# Kvertus\n\n> Ukrainian developer and manufacturer of electronic warfare, SIGINT and counter-UAS systems.\n\n## What they do\n\nKvertus is a Ukrainian product company specialising in the development and manufacture of signals intelligence and electronic warfare systems designed for UAV detection and suppression. Its products are in service with the Ministry of Defence of Ukraine and are codified to NATO standards. Since the start of the full-scale invasion the company has manufactured over 20,000 EW units deployed across the Ukrainian Defence Forces.\n\n## Products and solutions\n\n- **Atlas** - integrated SIGINT and electronic warfare complex; detects fixed-wing UAVs to around 115 km and neutralises targets to around 30 km. Basis of the \"anti-drone wall\" concept developed with Brave1.\n- **AD Berserk** - mobile EW system on a ground robotic platform; entered serial production July 2025.\n- **AD Cerberus** - modular vehicle-mounted EW system protecting vehicles from radio-controlled UAVs.\n- **AD Counter FPV** - single-band FPV-drone jammers, including a backpack variant.\n- **AD G-6+** - handheld anti-drone jamming gun.\n- **MS Azimuth and Aero Azimuth** - electronic intelligence systems locating enemy drone crews, including an airborne variant.\n- **LTEJ Mirage** - next-generation EW system presented May 2025.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** products codified to NATO standards and in service with the Ukrainian Ministry of Defence.\n- **Memberships:** National Defence Industry Association of Ukraine (NAUDI).\n\n## Recent news\n\n- **2025-07-28** - New AD Berserk robotic EW platform enters production. [source](https://thedefensepost.com/2025/07/25/ukrainian-firm-robotic-vehicle/)\n- **2025-07-10** - Atlas system linking thousands of EW units against drones unveiled. [source](https://thedefensepost.com/2025/07/10/ukraine-system-ew-drones/)\n\n## Links\n\n- Website: https://kvertus.ua/en/\n- LinkedIn: https://www.linkedin.com/company/kvertus\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (kvertus.ua, kvertus.com), LinkedIn company page, Wikipedia, The Defense Post, The Defender, TechUkraine."}, {"name": "L7 Simulators", "website": "https://www.l7simulators.com/en", "linkedin": "https://www.linkedin.com/company/pss-by-logics-7", "hq": "Kyiv, Ukraine", "region": "", "size": "small", "headcount": "", "founded": "2019", "tags": ["defence", "simulation", "training", "drones", "uas", "counter-uas", "software", "air", "land", "size-small", "type-manufacturer", "owned-foreign", "mbr-naudi"], "summary": "Ukrainian developer of laser- and VR-based combat training simulators for military forces.", "body": "# L7 Simulators\n\n> Ukrainian developer of laser- and VR-based combat training simulators for military forces.\n\n## What they do\n\nSince 2019 L7 has built combat training simulators for the Armed Forces of Ukraine, the National Guard of Ukraine and other security forces. The company develops the full simulator development cycle, from concept and software through to physical modelling of combat scenarios. Using laser and VR technologies it simulates a range of combat scenarios in mobile, compact systems deployable at unit locations. The brand wa
