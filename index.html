assurance (DO178C and DO254), reliability, availability and maintainability (RAMS), integrated logistic support, and safety management systems. It supports certification for aircraft manufacturers and equipment suppliers across civil (FAA, EASA) and military environments.\n\nThe UK entity is registered at Companies House under company number 07541925; that registration is now recorded under the name Airbus Protect Limited, while the ADS membership and prior public profile use the APSYS Risk Engineering name. The UK operation has worked from Bristol and Aberdeen.\n\n## Products and solutions\n\n- **Systems safety and certification** - safety analysis and certification support for aerospace and defence systems.\n- **Process assurance** - DO178C and DO254 compliance support.\n- **RAMS and ILS** - reliability, availability and maintainability analysis and integrated logistic support.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: http://www.apsys.eads.net\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: Companies House (company 07541925, now recorded as Airbus Protect Limited), ADS members directory, industry directories (Railway Technology, Offshore Technology)."}, {"name": "Aptilium Ltd", "website": "https://aptilium.com", "linkedin": "https://www.linkedin.com/company/aptilium", "hq": "Billingshurst, United Kingdom", "region": "South East England", "size": "micro", "headcount": "", "founded": "2019", "tags": ["defence", "manufacturing", "hardware", "test-evaluation", "size-micro", "type-sme", "accr-iso9001", "mbr-ads"], "summary": "Precision engineering and technical services across the automotive, aerospace, marine and defence sectors.", "body": "# Aptilium\n\n> Precision engineering and technical services across the automotive, aerospace, marine and defence sectors.\n\n## What they do\n\nAptilium provides precision-engineered systems and engineering services from concept to turnkey delivery. The company has its roots in Formula 1 and high-performance engineering, and manages the project lifecycle across engineering, logistics, supply chain, quality assurance and low-volume production. It works across the automotive, aerospace, marine and defence sectors.\n\n## Products and solutions\n\n- **Engineering and turnkey delivery** - design, prototyping, testing and low-volume production of precision-engineered and electromechanical systems.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://aptilium.com\n- LinkedIn: https://www.linkedin.com/company/aptilium\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (aptilium.com); ADS Group members directory (adsgroup.org.uk); Companies House (company 12370032)."}, {"name": "AQ Wiring Systems Rockford Ltd", "website": "https://www.rockford.co.uk", "linkedin": "https://www.linkedin.com/company/aq-rockford", "hq": "Vasteras, Sweden", "region": "East of England", "size": "medium", "headcount": "112", "founded": "1978", "tags": ["defence", "air", "land", "maritime", "hardware", "manufacturing", "size-medium", "type-manufacturer", "owned-foreign", "accr-iso9001", "accr-ce-plus", "mbr-ads"], "summary": "Manufacturer of cable assemblies, wiring harnesses and system-level electrical equipment for the aerospace, defence and industrial markets.", "body": "# AQ Wiring Systems Rockford\n\n> Manufacturer of cable assemblies, wiring harnesses and system-level electrical equipment for the aerospace, defence and industrial markets.\n\n## What they do\n\nAQ Wiring Systems Rockford designs, manufactures, tests and delivers system-level electrical equipment, from wiring harnesses and electro-mechanical sub-assemblies through to complete systems. It describes itself as the UK's largest independent provider of wiring, interconnect and system solutions for the aerospace, defence and industrial markets. The business has operated since 1978 and runs sites at Rendlesham, Worksop and Salisbury. It was formerly Rockford Components Limited and was acquired by the Swedish AQ Group AB in July 2024.\n\n## Products and solutions\n\n- **Cable assemblies and wiring harnesses** - including hermetically sealed and over-braided harnesses, over-moulded connectors and high-speed USB and ethernet.\n- **System-level electricals** - looms, box builds, control panels, racks and electro-mechanical assemblies.\n- **Lifecycle services** - design, rapid prototyping, on-site installation, production, logistics, spares and obsolescence management.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS/EN/JISQ 9100, ISO 9001, Cyber Essentials, Cyber Essentials Plus, SC21 OE\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2024-07-10** - AQ Group AB acquired 100% of Rockford Components Limited, which was renamed AQ Wiring Systems Rockford. [source](https://evertiq.com/news/56045)\n\n## Links\n\n- Website: https://www.rockford.co.uk\n- LinkedIn: https://www.linkedin.com/company/aq-rockford\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (rockford.co.uk); AQ Group website (aqgroup.com); ADS Group members directory (adsgroup.org.uk); Companies House (company 01838700); AQ Group acquisition announcement (Cision, Evertiq, Airframer)."}, {"name": "Aquark Technologies Limited", "website": "https://www.aquarktechnologies.com/", "linkedin": "https://www.linkedin.com/company/aquark-technologies", "hq": "Southampton, United Kingdom", "region": "South East", "size": "small", "headcount": "", "founded": "2021", "tags": ["defence", "quantum", "sensors", "hardware", "maritime", "space", "type-startup", "type-academia", "size-small", "owned-uk"], "summary": "Southampton quantum-technology company building miniaturised, deployable cold-atom hardware.", "body": "# Aquark Technologies\n\n> Southampton quantum-technology company building miniaturised, deployable cold-atom hardware.\n\n## What they do\n\nAquark Technologies, a spin-out associated with the University of Southampton, develops miniaturised cold-atom quantum hardware for sensing and timing. Its technology laser-cools atoms to near absolute zero, packaged small enough to be portable and deployable. The company targets accuracy, precision and stability for critical operations across defence and industry.\n\n## Products and solutions\n\n- **AQlock** - described by the company as the first commercially available cold-atom atomic clock designed and built in the UK.\n- **Cold-atom quantum sensing hardware** - deployable cold-atom systems for navigation, timing and sensing applications.\n\n## Frameworks, accreditations and memberships\n\n- **Programmes:** awarded an Innovate UK contract to develop a high-performance cold atom clock.\n\n## Recent news\n\n- **2025-04** - Aquark deployed cold-atom quantum technology underwater, trapping ultra-cold atoms during a trial aboard the National Oceanography Centre autonomous submersible Boaty McBoatface. [source](https://thequantuminsider.com/2025/04/23/quantum-mcquantumface-aquark-deploys-cold-atom-quantum-tech-underwater-in-boaty-mcboatface-test/)\n- **2024-11** - Aquark trialled cold-atom technology with the Royal Navy for covert monitoring at sea aboard HMS Pursuer. [source](https://www.uktech.news/quantum/southampton-startup-trials-quantum-technology-with-royal-navy-20241101)\n\n## Links\n\n- Website: https://www.aquarktechnologies.com/\n- LinkedIn: https://www.linkedin.com/company/aquark-technologies\n\n## Sources\n\nPublic information verified 2026-06-29. Aquark Technologies website, LinkedIn company page, Companies House, Optica, The Quantum Insider, UKTN."}, {"name": "Aragorn Systems Ltd", "website": "https://aragornsys.org", "linkedin": "", "hq": "Southend-on-Sea, United Kingdom", "region": "East of England", "size": "micro", "headcount": "", "founded": "2023", "tags": ["defence", "cyber", "data", "size-micro", "type-sme", "type-consultancy", "owned-veteran", "accr-iso9001", "accr-iso14001", "mbr-ads"], "summary": "Resilience solutions for defence and security clients, focused on infrastructure security and resilience decision-making.", "body": "# Aragorn Systems\n\n> Resilience solutions for defence and security clients, focused on infrastructure security and resilience decision-making.\n\n## What they do\n\nAragorn Systems is a UK registered, veteran-owned small and medium enterprise providing end-to-end resilience solutions for defence and security clients operating in conventional, asymmetric and multi-domain environments. Its focus is on offensive, protective security and resilience decision-making involving infrastructure, helping clients understand, exploit and protect critical system vulnerabilities. The company is recognised under the UK Armed Forces Covenant.\n\n## Products and solutions\n\n- **Infrastructure system-of-systems analysis** - data capture, analysis and visualisation of different infrastructure types to support offensive and protective security decision-making, including digitisation.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, ISO 14001, ISO 22301, ISO 41000\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://aragornsys.org\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (aragornsys.org); ADS Group members directory (adsgroup.org.uk); Companies House (company 14854944); GOV.UK Armed Forces Covenant signatory listing."}, {"name": "Araldo Limited", "website": "https://araldo.co.uk", "linkedin": "", "hq": "Alton, United Kingdom", "region": "South East England", "size": "micro", "headcount": "", "founded": "2008", "tags": ["defence", "land", "size-micro", "type-sme", "type-consultancy", "mbr-ads"], "summary": "Defence consultancy providing capability strategy and customer engagement for the defence market.", "body": "# Araldo\n\n> Defence consultancy providing capability strategy and customer engagement for the defence market.\n\n## What they do\n\nAraldo is a defence consultancy practice specialising in defence customer engagement and the delivery of change. It supports businesses in developing strategy for the defence market in the UK and internationally, and supports government in maximising value for money in the management of defence capability through planning frameworks, analysis, options and implementation plans. The practice has worked on UK protected mobility vehicles and vehicle and individual armour systems.\n\n## Products and solutions\n\n- **Capability and market strategy** - business and capability strategy development for the defence market.\n- **Customer engagement** - engaging the defence customer on behalf of businesses to build relationships and traction for products and services.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://araldo.co.uk\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (araldo.co.uk); ADS Group members directory (adsgroup.org.uk); Defence Online supplier directory; Companies House (company 06634009)."}, {"name": "Arc Additive Limited", "website": "https://arcadditive.com/", "linkedin": "https://uk.linkedin.com/company/arc-additive", "hq": "Livingston, Scotland", "region": "Scotland", "size": "small", "headcount": "", "founded": "", "tags": ["defence", "manufacturing", "hardware", "air", "size-small", "type-sme", "type-manufacturer", "owned-uk", "mbr-ads"], "summary": "Scottish supplier of large-scale wire-arc additive manufacturing (WAAM) for metal parts, including aerospace and defence applications.", "body": "# Arc Additive\n\n> Scottish supplier of large-scale wire-arc additive manufacturing (WAAM) for metal parts, including aerospace and defence applications.\n\n## What they do\n\nArc Additive industrialises large-scale metal 3D printing using wire-arc additive manufacturing (WAAM). The company runs a factory in Livingston, West Lothian, and prints in superalloys and critical metals including titanium, Inconels, stainless steels and aluminium. Its stated focus is certified metal part production that reduces lead times and reliance on global supply chains in sectors including aerospace and defence.\n\n## Products and solutions\n\n- **WAAM part production** - large-scale directed-energy-deposition (DED) wire-arc additive manufacture of metal components.\n- **AML3D ARCEMY distribution** - appointed in 2025 as a non-exclusive UK and Europe distributor for AML3D's ARCEMY wire-arc metal additive manufacturing systems.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025** - AML3D appointed Arc Additive as its non-exclusive UK and Europe distribution partner for ARCEMY systems, under a two-year agreement. [source](https://www.voxelmatters.com/aml3d-and-arc-additive-limited-enter-distribution-partnership/)\n\n## Links\n\n- Website: https://arcadditive.com/\n- LinkedIn: https://uk.linkedin.com/company/arc-additive\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory (adsgroup.org.uk), Companies House (SC794912), the company website (arcadditive.com), and trade press coverage of the AML3D distribution partnership (voxelmatters.com, 3dprintingindustry.com)."}, {"name": "Archer Aviation UK Limited", "website": "https://www.archer.com/", "linkedin": "", "hq": "San Jose, United States", "region": "South West England", "size": "small", "headcount": "", "founded": "2025", "tags": ["defence", "air", "autonomy", "size-small", "type-sme", "owned-foreign", "listed", "mbr-ads"], "summary": "UK subsidiary of US electric vertical take-off and landing (eVTOL) developer Archer Aviation, set up to support an engineering hub and the company's UK defence work.", "body": "# Archer Aviation UK\n\n> UK subsidiary of US electric vertical take-off and landing (eVTOL) developer Archer Aviation, set up to support an engineering hub and the company's UK defence work.\n\n## What they do\n\nArcher Aviation UK Limited is the UK arm of Archer Aviation, a US-headquartered developer of eVTOL aircraft listed on the New York Stock Exchange (ACHR). The UK entity was incorporated in December 2025 to support an engineering hub in South West England, building a local engineering team for Archer's UK and international work. Archer's defence activity in the UK centres on eVTOL aircraft development and hybrid propulsion.\n\n## Products and solutions\n\n- **eVTOL aircraft** - electric vertical take-off and landing aircraft development, with a dual-use strategy spanning civil and defence applications.\n- **Project NYX teaming** - part of a teaming agreement with Anduril UK and GKN Aerospace supporting the British Army's Project NYX and the Ministry of Defence's Land Autonomous Collaborative Platform programme.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-12** - Archer announced plans for a UK engineering hub in South West England and the formation of its UK subsidiary. [source](https://investors.archer.com/news/news-details/2025/Archer-Announces-Plans-for-UK-Engineering-Hub-Hires-Veteran-British-eVTOL-Engineering-Leader/default.aspx)\n- **2025-12** - Anduril UK, Archer and GKN Aerospace entered a teaming agreement in support of the British Army's Project NYX and the MoD's Land Autonomous Collaborative Platform programme. [source](https://www.flightglobal.com/defence/evtol-developer-archer-sets-up-uk-subsidiary-to-target-defence-market/165714.article)\n\n## Links\n\n- Website: https://www.archer.com/\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory (adsgroup.org.uk), Companies House (16896066), Archer Aviation investor relations (investors.archer.com), and trade press coverage (FlightGlobal, ZAG Daily)."}, {"name": "Arista Networks UK Ltd", "website": "https://www.arista.com/", "linkedin": "https://www.linkedin.com/company/arista-networks-uk-ltd", "hq": "Santa Clara, United States", "region": "London", "size": "large", "headcount": "", "founded": "2009", "tags": ["defence", "comms", "data", "cyber", "software", "size-large", "type-manufacturer", "owned-foreign", "listed", "accr-iso27001", "mbr-ads"], "summary": "UK arm of the US networking firm Arista, supplying high-performance data centre and cloud networking platforms.", "body": "# Arista Networks UK\n\n> UK arm of the US networking firm Arista, supplying high-performance data centre and cloud networking platforms.\n\n## What they do\n\nArista Networks builds data-driven networking for data centre, cloud and campus environments, based on its Extensible Operating System (EOS). Arista Networks UK Ltd is the company's UK-registered entity, incorporated in 2009 and based in London. The parent group serves cloud providers, enterprises and government and intelligence customers, and is an ADS Group member through its UK entity.\n\n## Products and solutions\n\n- **EOS (Extensible Operating System)** - the single network operating system across Arista's switching and routing platforms.\n- **Data centre and cloud switching** - high-throughput Ethernet switches for data centre and AI infrastructure.\n- **R Series routing platforms** - routed backbone and data centre platforms, including the R4 Series announced in 2025.\n- **CloudVision** - network management, telemetry and automation.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 27001 (group)\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-10-29** - Arista unveiled its next generation data and AI centre platforms, including the R4 Series. [source](https://www.arista.com/en/company/news/press-release/22541-pr-10292025)\n\n## Links\n\n- Website: https://www.arista.com/\n- LinkedIn: https://www.linkedin.com/company/arista-networks-uk-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group members directory, Companies House (07003500), Arista corporate website and press releases."}, {"name": "Ark Data Centres Limited", "website": "https://www.ark-d-c.com/", "linkedin": "https://www.linkedin.com/company/ark-continuity", "hq": "Corsham, United Kingdom", "region": "South West", "size": "medium", "headcount": "51-200", "founded": "2005", "tags": ["defence", "data", "cyber", "hardware", "size-medium", "type-sme", "owned-uk", "accr-iso27001", "mbr-ads"], "summary": "UK operator of secure colocation data centres serving government, defence and enterprise customers.", "body": "# Ark Data Centres\n\n> UK operator of secure colocation data centres serving government, defence and enterprise customers.\n\n## What they do\n\nArk Data Centres operates secure, energy-efficient colocation campuses across the UK, with sites including Corsham in Wiltshire and Longcross in Surrey. It is the joint venture partner with the Cabinet Office in Crown Hosting Data Centres, which hosts public sector workloads. Ark facilities used for government and defence work are built to physical security and ISO 27001 information security standards. Ark is an ADS Group member.\n\n## Products and solutions\n\n- **Colocation** - secure rack and hall colocation across UK campuses.\n- **Crown Hosting** - joint venture with the Cabinet Office providing colocation to the UK public sector.\n- **High-density and AI-ready capacity** - campus expansions configured for higher-density and AI workloads.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 27001\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2026-06-09** - Ark announced a new building at its Longcross data centre campus in Surrey. [source](https://www.datacenterdynamics.com/en/news/ark-dc-to-add-new-building-to-longcross-data-center-campus-outside-london-uk/)\n- **2026-02-10** - Ark's Wiltshire campus extension was approved by local authorities. [source](https://bebeez.eu/2026/02/10/ark-data-centres-campus-extension-approved-by-local-authorities-in-wiltshire-uk/)\n\n## Links\n\n- Website: https://www.ark-d-c.com/\n- LinkedIn: https://www.linkedin.com/company/ark-continuity\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group members directory, Companies House (05656968), Ark Data Centres website, Crown Hosting Data Centres, Data Center Dynamics, Computer Weekly."}, {"name": "ARK Group DMCC", "website": "http://www.ark.international", "linkedin": "https://www.linkedin.com/company/ark-group-dmcc", "hq": "Dubai, United Arab Emirates", "region": "London", "size": "medium", "headcount": "", "founded": "", "tags": ["defence", "training", "isr", "size-medium", "type-consultancy", "owned-foreign", "accr-iso27001", "mbr-ads"], "summary": "Social enterprise delivering stabilisation, security and capacity-building programmes in fragile and conflict-affected states.", "body": "# ARK Group DMCC\n\n> Social enterprise delivering stabilisation, security and capacity-building programmes in fragile and conflict-affected states.\n\n## What they do\n\nARK Group is a social enterprise working at the intersection of governance, security and community resilience, delivering stabilisation, development and capacity-building programmes in fragile and conflict-affected states. Its work covers research and analysis, programme design and management, capacity development, and monitoring and evaluation for governments, donors and local partners, with delivery from Haiti and Lebanon to Syria, Yemen and Nigeria. ARK is headquartered in Dubai; the UK entity (registered as a foreign company, FC035638) supports UK-based staff and client compliance. ARK is an ADS Group member, listing defence consultancy, counter-terrorism and intelligence, security consultancy, surveillance and tactical training among its capabilities.\n\n## Products and solutions\n\n- **Stabilisation and capacity building** - programme design and delivery in fragile and conflict-affected states.\n- **Defence and security consultancy** - defence consultancy, counter-terrorism and intelligence, and security consultancy services.\n- **Training** - covert and counter-terror, security, systems and tactical training.\n- **Research, monitoring and evaluation** - research and analysis and programme monitoring and evaluation.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 27001:2022\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: http://www.ark.international\n- LinkedIn: https://www.linkedin.com/company/ark-group-dmcc\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group members directory, Companies House (FC035638), ARK Group corporate website."}, {"name": "Ark Integrated Solutions Ltd", "website": "https://arkcrs.com/", "linkedin": "https://www.linkedin.com/company/ark-integrated-solutions-ltd", "hq": "Ballynahinch, United Kingdom", "region": "Northern Ireland", "size": "micro", "headcount": "", "founded": "2017", "tags": ["defence", "cyber", "sensors", "hardware", "size-micro", "type-sme", "type-integrator", "owned-uk", "accr-ce", "accr-ce-plus", "mbr-ads"], "summary": "Northern Ireland systems integrator providing engineered solutions to the security and defence sectors.", "body": "# Ark Integrated Solutions\n\n> Northern Ireland systems integrator providing engineered solutions to the security and defence sectors.\n\n## What they do\n\nArk Integrated Solutions provides engineered solutions to the security and defence sectors, with a main focus on personnel protection systems in custodial environments. It delivers and supports passive cyber security monitoring systems for IP and legacy serial networks across OT and IT, and provides IoT edge monitoring to a secure platform for environmental monitoring and location services. System integration forms a large part of its delivery, working with end clients on bespoke systems. The company is based in Ballynahinch, Northern Ireland, and is an ADS Group member.\n\n## Products and solutions\n\n- **Personnel protection systems** - protection systems for custodial and secure environments.\n- **Passive cyber security monitoring** - monitoring for IP and legacy serial networks across OT and IT.\n- **IoT edge monitoring** - edge devices feeding a secure platform for environmental monitoring and location services.\n- **Systems integration** - bespoke integration of security and building systems.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Cyber Essentials, Cyber Essentials Plus\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://arkcrs.com/\n- LinkedIn: https://www.linkedin.com/company/ark-integrated-solutions-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group members directory, Companies House (NI645706), Security & Policing 2025 exhibitor listing, Ark Integrated Solutions website (arkcrs.com)."}, {"name": "Arke Ltd", "website": "https://www.arkeltd.co.uk/", "linkedin": "https://uk.linkedin.com/company/arke-ltd", "hq": "Westbury, United Kingdom", "region": "South West", "size": "small", "headcount": "", "founded": "2006", "tags": ["defence", "simulation", "data", "test-evaluation", "type-sme", "type-consultancy", "size-small", "owned-uk", "fw-joscar", "accr-iso9001", "accr-iso14001", "accr-ce-plus", "mbr-ads"], "summary": "Wiltshire consultancy providing cost engineering, decision support and analysis to UK defence and the wider public sector.", "body": "# Arke\n\n> Wiltshire consultancy providing cost engineering, decision support and analysis to UK defence and the wider public sector.\n\n## What they do\n\nArke is an independent SME consultancy based in Westbury, Wiltshire, working with UK and international public and private sector organisations. It built its reputation in defence cost engineering and evidence-based decision support, and has expanded into business analysis, programme and project management, modelling and simulation, and technology and futures work. The company supports clients across government departments and agencies operating in highly regulated sectors.\n\n## Products and solutions\n\n- **Cost engineering and decision support** - independent cost analysis and evidence-based advice for complex defence and technology decisions.\n- **Modelling and simulation** - analytical modelling to support strategic options and capability choices.\n- **Business analysis and P3M** - portfolio, programme and project management support.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR registered.\n- **Accreditations:** ISO 9001, ISO 14001, Cyber Essentials Plus.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.arkeltd.co.uk/\n- LinkedIn: https://uk.linkedin.com/company/arke-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Arke Ltd website, LinkedIn company page, ADS members directory, Companies House (05715322)."}, {"name": "Arktis Endurance Textiles Ltd", "website": "https://www.arktisltd.co.uk/", "linkedin": "https://uk.linkedin.com/company/arktis-endurance-textiles-ltd", "hq": "Exeter, United Kingdom", "region": "South West", "size": "medium", "headcount": "11-50", "founded": "1985", "tags": ["defence", "land", "manufacturing", "type-sme", "type-manufacturer", "size-medium", "owned-uk", "mbr-ads"], "summary": "Exeter manufacturer of military and police clothing, tactical vests and load-carrying equipment.", "body": "# Arktis Endurance Textiles\n\n> Exeter manufacturer of military and police clothing, tactical vests and load-carrying equipment.\n\n## What they do\n\nArktis Endurance Textiles manufactures and supplies clothing and equipment for military, police and emergency services from its factory in Exeter, Devon. The Arktis brand was created in 1985 by a former Royal Marine to improve on standard-issue combat uniform. In 2017 the brand was acquired by the directors of County Antrim textiles firm Francis Dinsmore Ltd, who formed Arktis Endurance Textiles Ltd to continue trading from the original Exeter site. The company designs camouflage patterns in-house and counts special forces among its customers.\n\n## Products and solutions\n\n- **Smocks and jackets** - field and combat outer garments.\n- **Tactical vests and chest rigs** - load-carrying equipment and MOLLE systems.\n- **Trousers, bags and webbing** - clothing and equipment for military and police use.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.arktisltd.co.uk/\n- LinkedIn: https://uk.linkedin.com/company/arktis-endurance-textiles-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Arktis Endurance Textiles website, LinkedIn company page, ADS members directory, Companies House (NI649310), Joint Forces News."}, {"name": "Arqit Quantum Inc", "website": "https://arqitgroup.com/", "linkedin": "https://www.linkedin.com/company/arqit", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "", "founded": "2017", "tags": ["defence", "cyber", "quantum", "comms", "software", "type-scaleup", "size-small", "listed", "mbr-ads"], "summary": "London quantum-safe encryption company providing symmetric key agreement technology for government, defence and telecoms.", "body": "# Arqit\n\n> London quantum-safe encryption company providing symmetric key agreement technology for government, defence and telecoms.\n\n## What they do\n\nArqit develops symmetric key agreement (SKA) technology for quantum-safe encryption, serving telecoms, government and defence customers. Its software lets a device download a lightweight agent that generates encryption keys locally with any number of other devices, avoiding the size, weight and power limitations of hardware encryption. The parent company, Arqit Quantum Inc, is registered in the UK and listed on NASDAQ under the ticker ARQQ.\n\n## Products and solutions\n\n- **SKA-Platform** - software platform for quantum-safe symmetric key agreement across devices and cloud.\n- **SKA Edge Controller (SKA-EC)** - ruggedised, quantum-safe communications platform for forward-deployed operations, supporting secure command and control in contested and disconnected environments.\n- **Encryption Intelligence (EI)** - automated cryptographic discovery to support post-quantum migration.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-01-22** - Arqit fully launched its Encryption Intelligence product for automated cryptographic discovery ahead of post-quantum migration. [source](https://arqitgroup.com/)\n- **2025-09** - The UK National Cyber Security Centre selected Arqit to support UK post-quantum cryptography migrations. [source](https://ir.arqit.uk/)\n\n## Links\n\n- Website: https://arqitgroup.com/\n- LinkedIn: https://www.linkedin.com/company/arqit\n\n## Sources\n\nPublic information verified 2026-06-29. Arqit website, investor relations site, LinkedIn company page, ADS members directory."}, {"name": "ARRK Europe Limited", "website": "https://uk.arrk.com/", "linkedin": "", "hq": "Osaka, Japan", "region": "South West", "size": "medium", "headcount": "", "founded": "1997", "tags": ["defence", "air", "manufacturing", "hardware", "test-evaluation", "type-manufacturer", "size-medium", "owned-foreign", "fw-joscar", "accr-iso9001", "accr-iso14001", "accr-ce-plus", "mbr-ads", "mbr-makeuk-defence"], "summary": "UK product development and manufacturing specialist providing prototyping, tooling and composites to aerospace, defence and other sectors.", "body": "# ARRK Europe\n\n> UK product development and manufacturing specialist providing prototyping, tooling and composites to aerospace, defence and other sectors.\n\n## What they do\n\nARRK Europe provides product development and manufacturing services from sites at Gloucester and Nuneaton, with capabilities spanning additive manufacturing, vacuum casting, CNC machining, composites, precision engineering, tooling and injection moulding. Its Nuneaton technical centre supplies engineering, tooling and composite solutions to aerospace, automotive, motorsport and defence customers. ARRK Europe Limited is the UK operating company within the wider ARRK group, whose ultimate parent is ARRK Corporation of Japan.\n\n## Products and solutions\n\n- **Prototyping and rapid tooling** - 3D printing, vacuum casting, mock-ups and low-volume manufacturing.\n- **Composites, engineering and manufacturing** - composite components and precision-engineered parts for aerospace and defence supply chains.\n- **CNC machining and tooling** - machining, moulding and finishing services.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR registered.\n- **Accreditations:** ISO 9001, ISO 14001, Cyber Essentials Plus.\n- **Memberships:** ADS Group, Make UK Defence.\n\n## Links\n\n- Website: https://uk.arrk.com/\n\n## Sources\n\nPublic information verified 2026-06-29. ARRK Europe website, ARRK Corporation corporate site, ADS members directory, Companies House (03418673). UK operating company of the Japan-headquartered ARRK group."}, {"name": "Artemis Technologies Ltd", "website": "https://www.artemistechnologies.co.uk/", "linkedin": "https://www.linkedin.com/company/artemis-technologies-ltd", "hq": "Belfast, United Kingdom", "region": "Northern Ireland", "size": "medium", "headcount": "", "founded": "2017", "tags": ["defence", "maritime", "autonomy", "simulation", "manufacturing", "type-scaleup", "size-medium", "owned-uk", "mbr-ads"], "summary": "Belfast maritime design and applied-technologies company developing electric hydrofoil vessels, including patrol and coastal-security variants.", "body": "# Artemis Technologies\n\n> Belfast maritime design and applied-technologies company developing electric hydrofoil vessels, including patrol and coastal-security variants.\n\n## What they do\n\nArtemis Technologies is a high-performance maritime design and applied-technologies company based in Belfast, spun out from the Artemis Racing America's Cup team in 2017 to commercialise its hydrofoiling and autonomy intellectual property. Its patented eFoiler system combines a high-power-density electric drivetrain with an autonomously controlled hydrofoil, lifting the hull clear of the water at speed to cut drag. The company also provides engineering services and develops maritime simulators. A Belfast Maritime Consortium led by Artemis won a UK government grant to develop the technology.\n\n## Products and solutions\n\n- **eFoiler system** - electric drivetrain integrated with an autonomously controlled hydrofoil.\n- **EF-12 Patrol** - electric hydrofoil vessel for coastal security, with a top speed of 30 knots and an optional diesel hybrid range extender.\n- **EF-12 Pilot** - electric hydrofoil pilot boat for transferring ships' pilots.\n- **Maritime simulators** - simulation tools for high-performance vessel design and operation.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2024** - Artemis Technologies opened a new manufacturing facility in Belfast. [source](https://insidemarine.com/artemis-technologies-opens-new-manufacturing-facility-in-belfast/)\n\n## Links\n\n- Website: https://www.artemistechnologies.co.uk/\n- LinkedIn: https://www.linkedin.com/company/artemis-technologies-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Artemis Technologies website, LinkedIn company page, ADS members directory, Companies House (09412785), Belfast Maritime Consortium, Workboat365."}, {"name": "ARX Robotics UK Ltd", "website": "https://www.arx-robotics.com/", "linkedin": "https://www.linkedin.com/company/arx-robotics", "hq": "London, United Kingdom", "region": "London", "size": "medium", "headcount": "", "founded": "2025", "tags": ["defence", "robotics", "autonomy", "land", "isr", "logistics", "software", "hardware", "manufacturing", "type-manufacturer", "size-medium", "mbr-ads"], "summary": "UK arm of European defence-technology firm ARX Robotics, building software-defined uncrewed ground vehicles.", "body": "# ARX Robotics UK Ltd\n\n> UK arm of European defence-technology firm ARX Robotics, building software-defined uncrewed ground vehicles.\n\n## What they do\n\nARX Robotics develops software-defined uncrewed ground vehicles (UGVs) and the operating software that runs them. ARX Robotics UK Ltd is the UK entity, incorporated in 2025, established to manufacture autonomous ground systems in the United Kingdom with a London headquarters and a production facility in south-west England. The wider group describes its platforms as modular and mission-ready, designed to integrate with existing military systems.\n\n## Products and solutions\n\n- **GEREON uncrewed ground vehicle** - modular UGV manufactured in the UK, configurable for reconnaissance, logistics support, route clearance, casualty evacuation and force protection, and able to carry intelligence, surveillance and reconnaissance payloads.\n- **Mithra OS** - the company's operating software for managing and integrating uncrewed systems.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-04** - ARX Robotics began UK manufacturing of uncrewed ground vehicles after securing its first British Army contract, with a stated investment of around 45 million pounds to support UK production capacity. [source](https://euro-sd.com/2026/04/news/land/50496/arx-robotics-begins-uk-manufacturing/)\n\n## Links\n\n- Website: https://www.arx-robotics.com/\n- LinkedIn: https://www.linkedin.com/company/arx-robotics\n\n## Sources\n\nPublic information verified 2026-06-29. ARX Robotics website, ADS Group members directory, Companies House, European Security & Defence, Forces News."}, {"name": "Ascent Aerospace", "website": "https://ascentaerospace.com", "linkedin": "https://www.linkedin.com/company/ascentaerospace", "hq": "Macomb, United States", "region": "", "size": "large", "headcount": "800+", "founded": "2012", "tags": ["defence", "air", "space", "manufacturing", "test-evaluation", "size-large", "type-manufacturer", "type-integrator", "owned-foreign", "backed-pe", "mbr-ads"], "summary": "Provider of tooling, assembly systems and factory automation for the aerospace, defence and space industries.", "body": "# Ascent Aerospace\n\n> Provider of tooling, assembly systems and factory automation for the aerospace, defence and space industries.\n\n## What they do\n\nAscent Aerospace supplies production tooling and automated assembly systems for aircraft manufacturing, serving commercial aerospace, defence, military and space customers. It produces mould and assembly tooling and works with airframers from process engineering through to build and installation. The company is part of the wider AIP Aerospace group, backed by American Industrial Partners.\n\n## Products and solutions\n\n- **Tooling** - mould and assembly tooling, including layup moulds, masters, and trimming and drilling fixtures.\n- **Automation and assembly systems** - factory automation and assembly line integration for airframe production.\n- **Additive manufacturing** - large-scale additive production of tooling components.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS9100, ISO 9001.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://ascentaerospace.com\n- LinkedIn: https://www.linkedin.com/company/ascentaerospace\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory (adsgroup.org.uk/members/ascent-aerospace-2), company website (ascentaerospace.com), company LinkedIn page, American Industrial Partners portfolio page. Ascent Aerospace is headquartered in Macomb, Michigan in the United States and is an ADS member with a UK presence."}, {"name": "ASCO UK Limited", "website": "https://ascoworld.com", "linkedin": "", "hq": "Aberdeen, United Kingdom", "region": "Scotland", "size": "large", "headcount": "900+", "founded": "1954", "tags": ["defence", "logistics", "size-large", "type-sme", "owned-foreign", "accr-iso9001", "accr-iso14001", "accr-ce", "fw-joscar", "mbr-ads"], "summary": "Logistics, materials management and supply chain services for energy, defence and other critical industries.", "body": "# ASCO UK\n\n> Logistics, materials management and supply chain services for energy, defence and other critical industries.\n\n## What they do\n\nASCO advises and operates logistics and materials management for customers across energy, utilities, metals and defence. Its services cover supply base operations, warehousing, freight forwarding, project cargo and customs handling. The company runs a network of control centres, fleet and facilities across multiple UK and international sites.\n\n## Products and solutions\n\n- **Supply base operations** - operation and development of supply bases for high-consequence operations.\n- **Materials management and warehousing** - inventory and warehousing services for high-value builds.\n- **Global freight services** - specialist cargo transport, freight forwarding, project cargo and customs handling.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR.\n- **Accreditations:** ISO 9001, ISO 14001, ISO 45001, Cyber Essentials.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://ascoworld.com\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory (adsgroup.org.uk/members/asco-uk-ltd-1), company website (ascoworld.com), Companies House (company SC029934). ASCO UK Limited is registered in Scotland and headquartered in Aberdeen; defence is listed among the industries it serves."}, {"name": "ASD Limited", "website": "https://asd.ltd", "linkedin": "https://www.linkedin.com/company/asd-metal-services", "hq": "Leeds, United Kingdom", "region": "Yorkshire and the Humber", "size": "large", "headcount": "250+", "founded": "1978", "tags": ["defence", "manufacturing", "logistics", "size-large", "type-manufacturer", "owned-foreign", "accr-iso9001", "mbr-ads"], "summary": "Metal stockholder and processing supplier to high-integrity sectors including defence.", "body": "# ASD\n\n> Metal stockholder and processing supplier to high-integrity sectors including defence.\n\n## What they do\n\nASD is a UK metal stockholder and processing supplier serving high-integrity sectors such as defence, marine and nuclear. It sources and supplies a range of alloys to project specifications and provides in-house processing. The company is part of the MOD supply chain and is a member of the Hierros Anon Group.\n\n## Products and solutions\n\n- **Metal products** - carbon steel, stainless steel, aluminium products, Alucore panels, bi-metallic products and armour plates.\n- **Processing** - laser and water jet cutting, plasma and oxy-fuel profiling, press brake bending, and precision sawing and drilling.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001:2015, NHSS3B, UKCA and CE (BS EN 1090-1 and EN 1090-2), Fit For Nuclear.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://asd.ltd\n- LinkedIn: https://www.linkedin.com/company/asd-metal-services\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory (adsgroup.org.uk/members/asd-2), company website (asd.ltd), Companies House (company 01370600). ASD Limited is headquartered in Leeds and is part of the Spanish-owned Hierros Anon Group."}, {"name": "Assaye Defence Consultancy Ltd", "website": "", "linkedin": "", "hq": "Wool, England", "region": "South West England", "size": "micro", "headcount": "", "founded": "2018", "tags": ["defence", "software", "size-micro", "type-consultancy"], "summary": "A UK management and defence consultancy registered in Dorset.", "body": "# Assaye Defence Consultancy Ltd\n\n> A UK management and defence consultancy registered in Dorset.\n\n## What they do\n\nAssaye Defence Consultancy Ltd is a private limited company registered in Wool, Dorset. Companies House records its nature of business under SIC codes 70229 (management consultancy activities other than financial management) and 84220 (defence activities). The company has no public website or self-description, so the detail of its services cannot be confirmed from public sources.\n\n## Frameworks, accreditations and memberships\n\nNone publicly evidenced.\n\n## Links\n\n- Companies House: https://find-and-update.company-information.service.gov.uk/company/11680797\n\n## Sources\n\nPublic information verified 2026-06-29. Companies House (company number 11680797, status Active, incorporated 16 November 2018, registered office Wool, Wareham, Dorset). No company website, LinkedIn company page, services list, accreditations or recent news could be confirmed from public sources, so those fields are omitted rather than guessed. Note: several unrelated \"Assaye\" companies exist (Assaye Risk Limited 08290331, Assaye Elite Security Ltd SC791909, Assaye Technologies Limited SC673183); this entry covers only Assaye Defence Consultancy Ltd."}, {"name": "Astra Terra Ltd", "website": "https://astra-terra.com", "linkedin": "https://www.linkedin.com/company/astraterra", "hq": "London, United Kingdom", "region": "London", "size": "micro", "headcount": "2-10", "founded": "2013", "tags": ["defence", "space", "gis", "isr", "cyber", "ai", "size-micro", "type-sme", "type-consultancy", "owned-uk", "mbr-ads"], "summary": "London consultancy in positioning, navigation and timing, space situational awareness and earth observation.", "body": "# Astra Terra\n\n> London consultancy in positioning, navigation and timing, space situational awareness and earth observation.\n\n## What they do\n\nAstra Terra works with industry, governments and non-governmental organisations on positioning, navigation and timing (PNT), space applications, geospatial science and earth observation, and security and resilience. Its PNT work covers high-accuracy, high-integrity positioning in urban environments. Its space work covers space safety, satellite tracking, space situational awareness and space traffic management.\n\n## Products and solutions\n\n- **PNT solutions** - high-accuracy positioning for smart mobility, cities and space-based applications.\n- **Space situational awareness** - satellite tracking, space safety and space traffic management.\n- **Geospatial and earth observation** - geospatial science and asset management.\n- **Security and resilience** - resilience architecture assessment and cyber security.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group, UKspace.\n\n## Links\n\n- Website: https://astra-terra.com\n- LinkedIn: https://www.linkedin.com/company/astraterra\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory (adsgroup.org.uk/members/astra-terra-ltd-1), company website (astra-terra.com), Companies House (company 08801839), UKspace SME members directory. Astra Terra Ltd is headquartered in London."}, {"name": "Astroscale Ltd", "website": "https://www.astroscale.com/en", "linkedin": "https://www.linkedin.com/company/astroscale", "hq": "Tokyo, Japan", "region": "South East", "size": "large", "headcount": "250+", "founded": "2017", "tags": ["defence", "space", "robotics", "autonomy", "isr", "size-large", "type-scaleup", "owned-foreign", "mbr-ads"], "summary": "In-orbit servicing and active debris removal, delivered from the company's UK and European base at Harwell.", "body": "# Astroscale\n\n> In-orbit servicing and active debris removal, delivered from the company's UK and European base at Harwell.\n\n## What they do\n\nAstroscale develops in-orbit servicing solutions, including active debris removal, end-of-life services, life extension and in-situ space situational awareness. Astroscale Ltd is the UK and European subsidiary of Astroscale Holdings Inc., which is headquartered in Tokyo, Japan. The UK operation runs offices, satellite servicer manufacturing facilities and a Mission Control Centre at the Zeus building on Harwell Science and Innovation Campus, Oxfordshire.\n\n## Products and solutions\n\n- **COSMIC** - the Cleaning Outer Space Mission through Innovative Capture spacecraft, a UK-led active debris removal mission to remove two inactive UK satellites from orbit.\n- **ELSA-M** - a commercial end-of-life service designed to remove prepared satellites from orbit.\n- **Docking plates** - hardware fitted to client satellites to enable later capture and removal.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group; UKspace.\n\n## Recent news\n\n- **2025-06** - Astroscale completed the Critical Design Review for the ELSA-M debris removal mission. [source](https://www.electronicsweekly.com/news/astroscale-completes-cdr-for-elsa-m-space-debris-removal-mission-2025-06/)\n- **2025-03** - Airbus Defence and Space placed a commercial order for more than 100 of Astroscale UK's second-generation docking plates. [source](https://www.astroscale.com/en/news/from-docking-plates-to-debris-removal-astroscale-uks-year-in-review)\n- **2024-09** - Astroscale UK awarded a £1.95 million UK Space Agency contract for Phase 2 development of COSMIC. [source](https://www.astroscale.com/en/missions/cosmic)\n\n## Links\n\n- Website: https://www.astroscale.com/en\n- LinkedIn: https://www.linkedin.com/company/astroscale\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, Astroscale LinkedIn company page, ADS members directory (adsgroup.org.uk), Companies House (company 10689249), UK Space Agency contract reporting and Electronics Weekly."}, {"name": "Astute Electronics Limited", "website": "https://www.astutegroup.com/", "linkedin": "https://www.linkedin.com/company/astute-electronics-ltd", "hq": "Stevenage, England", "region": "East of England", "size": "medium", "headcount": "", "founded": "1988", "tags": ["defence", "hardware", "sensors", "manufacturing", "size-medium", "type-sme", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Franchised high-reliability electronic component distribution and supply-chain management for the defence and aerospace markets.", "body": "# Astute Electronics\n\n> Franchised high-reliability electronic component distribution and supply-chain management for the defence and aerospace markets.\n\n## What they do\n\nAstute Electronics, trading as Astute Group, distributes franchised electronic components and provides global procurement, component engineering, managed supply chains and anti-counterfeit testing. The company traces its work with the defence industry to 1989 and supports defence, aerospace and other mission-critical sectors. It is headquartered in the UK with offices across five continents.\n\n## Products and solutions\n\n- **Franchised component distribution** - connectors, semiconductors, passives, power and electromechanical lines from manufacturers serving defence and aerospace.\n- **Supply-chain management** - cradle-to-grave component support across the product life cycle, including obsolescence management.\n- **Counterfeit detection** - component testing through AS6171-certified laboratories.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS6171-certified component test laboratories; ISO 9001.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025** - Astute's North American team, Astute Inc, received BAE Systems' Silver Award at the Supplier Symposium for performance in the aerospace and defence supply chain. [source](https://www.astutegroup.com/news/defence/astute-group-honoured-with-bae-systems-silver-award-for-excellence/)\n- **2025** - Astute Group and Redler Technologies announced a strategic distribution partnership for power management and motion control technologies across the UK and Europe. [source](https://www.astutegroup.com/news/general/astute-group-and-redler-technologies-announce-strategic-distribution-partnership-for-uk-and-europe/)\n\n## Links\n\n- Website: https://www.astutegroup.com/\n- LinkedIn: https://www.linkedin.com/company/astute-electronics-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (astutegroup.com), Astute LinkedIn company page, ADS members directory (adsgroup.org.uk), Companies House (company 02326213)."}, {"name": "AtkinsRéalis UK Limited", "website": "https://www.atkinsrealis.com/en", "linkedin": "https://www.linkedin.com/company/atkinsrealis", "hq": "Montreal, Canada", "region": "South East", "size": "large", "headcount": "250+", "founded": "1961", "tags": ["defence", "maritime", "cyber", "data", "test-evaluation", "size-large", "type-consultancy", "owned-foreign", "mbr-ads"], "summary": "Engineering and project-management services across UK defence programmes, including nuclear propulsion and naval support.", "body": "# AtkinsRéalis\n\n> Engineering and project-management services across UK defence programmes, including nuclear propulsion and naval support.\n\n## What they do\n\nAtkinsRéalis is a professional services and project-management company. Its UK defence work spans nuclear propulsion, safety assurance, systems engineering, programme delivery, cyber resilience and reactor substantiation. The UK entity, AtkinsRéalis UK Limited, is registered at Epsom, Surrey; the wider group is headquartered in Montreal, Canada following SNC-Lavalin's 2017 acquisition of Atkins and the group's renaming in 2023.\n\n## Products and solutions\n\n- **Nuclear propulsion support** - specialist engineering and design support to Rolls-Royce Submarines, including a fissile design partner role.\n- **Defence engineering delivery** - an Engineering Delivery Partner to the Ministry of Defence's Defence Equipment & Support organisation, supporting programmes across land, maritime and air.\n- **Naval base and dockyard services** - support to Babcock at Devonport, HMNB Clyde and Rosyth.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** MOD Defence Equipment & Support Engineering Delivery Partner.\n- **Memberships:** ADS Group; Management Consultancies Association.\n\n## Recent news\n\n- **2025-12** - AtkinsRéalis secured a multi-year nuclear partnership with Rolls-Royce Submarines, part of a framework valued at up to £400 million over five years. [source](https://www.atkinsrealis.com/en/media/press-releases/2025/2025-12-05)\n- **2025-01** - AtkinsRéalis and Mott MacDonald appointed as fissile design partner to Rolls-Royce Submarines. [source](https://www.atkinsrealis.com/en/media/press-releases/2025/2025-01-13)\n\n## Links\n\n- Website: https://www.atkinsrealis.com/en\n- LinkedIn: https://www.linkedin.com/company/atkinsrealis\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (atkinsrealis.com), AtkinsRéalis LinkedIn company page, ADS members directory (adsgroup.org.uk), Companies House (company 00688424), Rolls-Royce and trade press reporting."}, {"name": "ATL Europe (UK) Limited", "website": "https://atleurope.aero", "linkedin": "https://www.linkedin.com/company/atleurope", "hq": "Christchurch, England", "region": "South West", "size": "small", "headcount": "", "founded": "", "tags": ["defence", "air", "test-evaluation", "size-small", "type-sme", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Aircraft design and certification, including modifications and repairs for military and civil aircraft.", "body": "# ATL Europe\n\n> Aircraft design and certification, including modifications and repairs for military and civil aircraft.\n\n## What they do\n\nATL Europe is an aircraft design and certification provider. It holds EASA Part 21 Subpart J Design Organisation Approval and UK Military Aviation Authority DAOS approval, with a scope covering aircraft structural, cabin interior, electrical and avionics design. Its design approval certification extends to military aircraft and airborne equipment, and to modifications and repairs for fixed and rotary wing aircraft. The company is registered at Bournemouth Airport, Christchurch, Dorset, and is part of the KDC Group following an acquisition in late 2022.\n\n## Products and solutions\n\n- **Design modifications** - changes to aircraft, systems and equipment in avionic, hydro-mechanical and structural fields, including TCAS, EGPWS and RVSM installations.\n- **Certification and approvals** - management of certification processes under EASA Part 21J, UK MOD DAOS and ISO 9001:2015, with a catalogue of ready-to-implement DOA solutions and Supplemental Type Certificates.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** EASA Part 21 Subpart J Design Organisation Approval; UK MAA DAOS; ISO 9001:2015.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://atleurope.aero\n- LinkedIn: https://www.linkedin.com/company/atleurope\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (atleurope.aero), ATL Europe LinkedIn company page, ADS members directory (adsgroup.org.uk), Companies House (company 11888254)."}, {"name": "ATL Transformers Limited", "website": "https://atltransformers.uk", "linkedin": "https://www.linkedin.com/company/atl-transformers-ltd", "hq": "Manchester, England", "region": "North West", "size": "small", "headcount": "", "founded": "1981", "tags": ["defence", "hardware", "manufacturing", "size-small", "type-manufacturer", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Designer and manufacturer of small to medium magnetics and wound products, including for military applications.", "body": "# ATL Transformers\n\n> Designer and manufacturer of small to medium magnetics and wound products, including for military applications.\n\n## What they do\n\nATL Transformers designs and manufactures small to medium magnetics. The company was established as a family business in Greater Manchester by the Haide family in the early 1970s and is registered at Middleton, Manchester. Its products serve rail signalling, underground, marine, military, power generation and machine-building sectors.\n\n## Products and solutions\n\n- **Transformers** - single and three-phase isolation transformers and specialist wound products up to 900kVA.\n- **Reactors and inductors** - AC reactors, DC chokes and air-cored inductors.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001:2015 (assessed by BSI); RISQS qualified; Achilles Link-up approved supplier to the railways.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://atltransformers.uk\n- LinkedIn: https://www.linkedin.com/company/atl-transformers-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (atltransformers.uk), ATL Transformers LinkedIn company page, ADS members directory (adsgroup.org.uk), Companies House (company 01557288)."}, {"name": "ATL Turbine Services", "website": "https://atlturbineservices.co.uk/", "linkedin": "https://www.linkedin.com/company/atl-turbine-services", "hq": "Dundee, Scotland", "region": "Scotland", "size": "medium", "headcount": "~78", "founded": "2008", "tags": ["defence", "air", "maritime", "manufacturing", "test-evaluation", "size-medium", "type-sme", "type-manufacturer", "owned-uk", "backed-pe", "accr-iso9001", "mbr-ads"], "summary": "Independent gas turbine component repair, overhaul and coating specialist serving civil aerospace, defence aerospace, marine and industrial turbine sectors.", "body": "# ATL Turbine Services\n\n> Independent gas turbine component repair, overhaul and coating specialist serving civil aerospace, defence aerospace, marine and industrial turbine sectors.\n\n## What they do\n\nATL Turbine Services is one of the UK's independent gas turbine component repair organisations, specialising in the refurbishment and repair of hot-section gas turbine components and the application of high-temperature coatings. It delivers bespoke engineering and repair solutions across the industrial, civil aerospace, defence aerospace and marine turbine sectors, operating around the clock. The company describes itself as a specialist in late-lifecycle turbines.\n\n## Products and solutions\n\n- **Component repair and overhaul** - repair of rotary and static hot-section gas turbine parts in super-alloy materials to OEM specification.\n- **Coatings** - thermal spray, gas-phase aluminizing and high-temperature protective coatings; investment in an Oerlikon Metco Surface Two thermal spray system.\n- **Defence aerospace MRO** - repair of the RB199 engine (Panavia Tornado) and support for the EJ200 engine (Eurofighter Typhoon).\n- **Defence marine** - support for the Rolls-Royce WR-21 gas turbine powering the Royal Navy's Type 45 destroyers.\n- **Laboratory, NDT and engineering services** - assessment, non-destructive testing, ultrasonic cleaning and laser powder fusion.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** EASA/FAA Part 145, AS 9110C, ISO 9001, NADCAP (NDT); Rolls-Royce approved special processes (SABRe 3).\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-10-14** - Invested around £1m, with Scottish Enterprise support, in an Oerlikon Metco Surface Two thermal spray system to expand coating capability. [source](https://www.oerlikon.com/en/about-us/media/press-releases/-atl-turbine-services-invests-in-surface-two%E2%84%A2-to-expand-thermal-spray-capabilities-and-drive-process-excellence/)\n- **2024-10-28** - Multi-year contract extension agreed with Sulzer. [source](https://atlturbineservices.co.uk/all-news/)\n\n## Links\n\n- Website: https://atlturbineservices.co.uk/\n- LinkedIn: https://www.linkedin.com/company/atl-turbine-services\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (atlturbineservices.co.uk), ADS Group member profile (adsgroup.org.uk/members/atl-turbine-services-2), Companies House, Oerlikon press release."}, {"name": "Atlantic + Limited", "website": "https://atlantic-plus.co.uk/", "linkedin": "", "hq": "Cheltenham, England", "region": "South West England", "size": "small", "headcount": "", "founded": "2019", "tags": ["defence", "cyber", "size-small", "type-sme", "type-consultancy", "owned-uk", "mbr-ads"], "summary": "Defence cyber advisory, consultancy and integration firm supporting UK Government and Defence in the cyber domain.", "body": "# Atlantic Plus\n\n> Defence cyber advisory, consultancy and integration firm supporting UK Government and Defence in the cyber domain.\n\n## What they do\n\nAtlantic+ was founded in 2019 and provides specialist knowledge, skills and experience aimed at helping UK Government and Defence realise their ambition in the cyber domain. It positions itself as an advisory and integration firm, providing domain-specialist advisors and coordinating technology to deliver operational outcomes.\n\n## Products and solutions\n\n- **Domain-specialist advisors** - strategic insight, operational guidance, technical expertise and hands-on support.\n- **Technology coordination and integration** - applying and integrating technology to deliver operational outcomes.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group; Armed Forces Covenant signatory.\n\n## Links\n\n- Website: https://atlantic-plus.co.uk/\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (atlantic-plus.co.uk), ADS Group member profile (adsgroup.org.uk/members/atlantic-ltd-1), Companies House (company 12435769), Armed Forces Covenant business listing (gov.uk)."}, {"name": "Atlantic Precision Engineering Limited", "website": "https://www.atlantic-precision.co.uk/", "linkedin": "https://www.linkedin.com/company/atlantic-precision-engineering-ltd", "hq": "Yateley, England", "region": "South East England", "size": "small", "headcount": "11-50", "founded": "1989", "tags": ["defence", "air", "manufacturing", "hardware", "size-small", "type-sme", "type-manufacturer", "owned-uk", "accr-iso9001", "accr-ce", "mbr-ads"], "summary": "Precision machining and assembly supplier producing close-toleranced components for the aerospace and defence industry.", "body": "# Atlantic Precision Engineering\n\n> Precision machining and assembly supplier producing close-toleranced components for the aerospace and defence industry.\n\n## What they do\n\nAtlantic Precision Engineering manufactures high-precision, close-toleranced machined components and assemblies in metals, plastics and composite materials for the aerospace and defence industry. It provides CNC machining, including 5-axis work, and mechanical and bonded assembly, holding approvals from major aerospace and defence contractors.\n\n## Products and solutions\n\n- **5-axis CNC machining** - machining of metallic, plastic and composite components on palletised 5-axis cells.\n- **CNC milling and turning** - high-speed milling and turning.\n- **Plastics and composites machining** - a dedicated CNC cell for plastic and composite parts.\n- **Assembly** - mechanical and bonded assembly of components and sub-assemblies, including Airbus assembly approval.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** BS EN ISO 9001, AS9100, Cyber Essentials.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.atlantic-precision.co.uk/\n- LinkedIn: https://www.linkedin.com/company/atlantic-precision-engineering-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (atlantic-precision.co.uk), ADS Group member profile (adsgroup.org.uk/members/atlantic-precision-engineering-ltd), Companies House (company 02448830), Airframer directory."}, {"name": "Atlantic Technology Limited", "website": "https://www.atlantictechnology.co.uk", "linkedin": "https://www.linkedin.com/company/atlantic-technology", "hq": "Godalming, England", "region": "South East England", "size": "micro", "headcount": "~6", "founded": "2016", "tags": ["defence", "cyber", "rf", "hardware", "sensors", "size-micro", "type-sme", "owned-uk", "mbr-ads"], "summary": "UK electronics design house developing operational security and Tech Ops products for the law enforcement, national security and defence communities.", "body": "# Atlantic Technology\n\n> UK electronics design house developing operational security and Tech Ops products for the law enforcement, national security and defence communities.\n\n## What they do\n\nAtlantic Technology specialises in the development of operational security products, ranging from high-performance network data processing to small, low-power data recorders. It provides commissioned product development services covering design, prototyping, manufacturing and support to the international law enforcement, national security and defence communities. It also develops hardware-enforced cyber security products.\n\n## Products and solutions\n\n- **Tech Ops electronics** - small form-factor, low-power equipment, including covert data recorders and a modular data record and egress product family.\n- **Network processing and SDR** - high-speed network data processing and Software Defined Radio for data transfer in harsh RF environments.\n- **Hardware-enforced cyber security products.**\n- **Development services** - PCB design and manufacture, FPGA development, embedded software, mechanical design and in-service support.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.atlantictechnology.co.uk\n- LinkedIn: https://www.linkedin.com/company/atlantic-technology\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (atlantictechnology.co.uk), ADS Group member profile (adsgroup.org.uk/members/atlantic-technology-ltd-2), Companies House (company 09998409)."}, {"name": "ATS Applied Tech Systems Ltd", "website": "https://www.ats-global.com", "linkedin": "https://www.linkedin.com/company/ats-global", "hq": "Haarlem, Netherlands", "region": "West Midlands", "size": "medium", "headcount": "51-200", "founded": "1991", "tags": ["defence", "air", "software", "manufacturing", "data", "ai", "size-medium", "type-sme", "type-integrator", "type-consultancy", "owned-foreign", "mbr-ads"], "summary": "System integrator delivering smart manufacturing, automation and quality software, with a dedicated aerospace and defence practice.", "body": "# ATS Applied Tech Systems\n\n> System integrator delivering smart manufacturing, automation and quality software, with a dedicated aerospace and defence practice.\n\n## What they do\n\nATS Applied Tech Systems is the UK operating entity of the ATS Global group, an independent solution provider for digital transformation in manufacturing. It provides products, solutions and services across the automation pyramid, covering control, execution and information layers. The group dates to 1986 and supports manufacturers across aerospace, defence and other sectors with automation, IT/OT integration, manufacturing execution and quality management.\n\nThe UK company is based in Nuneaton, Warwickshire; the ATS Global group is headquartered in Haarlem, Netherlands, with offices across multiple countries.\n\n## Products and solutions\n\n- **Manufacturing Execution Systems (MES/MOM)** - execution-layer manufacturing software and operations management.\n- **Automation and IT** - industrial automation and IT/OT convergence, including equipment connectivity.\n- **Smart manufacturing and Industry 4.0** - IoT, location-awareness devices and predictive data analytics.\n- **PLM and quality management** - product lifecycle management integration and quality management systems.\n- **Supply chain management** - advanced planning and scheduling.\n- **Aerospace and defence practice** - digital transformation solutions for aerospace and defence OEMs and tier suppliers.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group; Midlands Aerospace Alliance.\n\n## Recent news\n\n- **2026-01** - Partnership combining ATS Global's industrial consulting and implementation with SORBA.ai's no-code industrial AI platform. [source](https://www.ats-global.com/resources/news/)\n- **2025** - Certified as a Great Place to Work across 12 countries. [source](https://www.ats-global.com/resources/news/ats-global-is-a-great-place-to-work-certified/)\n\n## Links\n\n- Website: https://www.ats-global.com\n- LinkedIn: https://www.linkedin.com/company/ats-global\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (ats-global.com), ADS Group member profile (adsgroup.org.uk/members/ats-applied-tech-systems-ltd-1), Companies House (company 02601465), Midlands Aerospace Alliance member listing."}, {"name": "Audere Group Limited", "website": "https://auderegroup.com/", "linkedin": "https://www.linkedin.com/company/audere-international", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "30-50", "founded": "2015", "tags": ["defence", "isr", "data", "size-small", "type-consultancy", "type-sme", "mbr-ads"], "summary": "London intelligence-led security, commercial intelligence and investigations group serving government, defence and corporate clients.", "body": "# Audere Group Limited\n\n> London intelligence-led security, commercial intelligence and investigations group serving government, defence and corporate clients.\n\n## What they do\n\nAudere provides intelligence-led security, commercial intelligence, investigations and risk advisory services, with origins in foreign direct investment, reconstruction and security work in conflict-affected regions. The group comprises Audere International, which specialises in commercial intelligence and investigations, and Audere Securus, an intelligence-led security company. It has a global footprint across North America, the Asia-Pacific region, the Middle East, Central and Eastern Europe and Ukraine, and has taken part in UK defence industry trade missions.\n\n## Products and solutions\n\n- **Audere International** - commercial intelligence, due diligence and investigations.\n- **Audere Securus** - intelligence-led security services, including operations expanded in Ukraine.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group; Armed Forces Covenant signatory\n\n## Links\n\n- Website: https://auderegroup.com/\n- LinkedIn: https://www.linkedin.com/company/audere-international\n\n## Sources\n\nPublic information verified 2026-06-29. Company websites (auderegroup.com, audereinternational.com), ADS members directory, Companies House (15034255; trading entity Audere International Limited 08869591), GOV.UK Armed Forces Covenant business list."}, {"name": "Auterion UK Ltd", "website": "https://auterion.com/", "linkedin": "https://www.linkedin.com/company/auterion", "hq": "Arlington, Virginia, United States", "region": "", "size": "medium", "headcount": "", "founded": "2017", "tags": ["defence", "drones", "uas", "autonomy", "software", "ai", "robotics", "size-medium", "type-scaleup", "owned-foreign", "backed-vc", "mbr-ads"], "summary": "UK entity of Auterion, a developer of operating-system software for autonomous drones and robotic systems used in defence.", "body": "# Auterion UK Ltd\n\n> UK entity of Auterion, a developer of operating-system software for autonomous drones and robotic systems used in defence.\n\n## What they do\n\nAuterion develops a common operating system and software applications for autonomous systems, focused on the defence and enterprise sectors. AuterionOS coordinates drones across air, land and sea, and the company's hardware modules integrate autopilot, mission computing, AI autonomy, secure communications and edge computing. Auterion UK Ltd is the company's UK-registered entity; the wider group is headquartered in Arlington, Virginia, with a software hub in Munich and origins in Zurich, where it was founded in 2017.\n\n## Products and solutions\n\n- **AuterionOS** - an operating system for coordinated, large-scale autonomous drone operations across air, land and sea.\n- **Skynode X** - an integrated module combining autopilot, mission computer, AI autonomy, secure communications and edge computing, designed to operate under GPS and video jamming.\n- **Nemyx** - a defence system for turning autonomous drones into coordinated forces.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-09-23** - Auterion closed a 130 million US dollar Series B round led by Bessemer Venture Partners to scale its defence software. [source](https://dronelife.com/2025/09/23/auterion-secures-130-million-series-b-to-scale-defense-software/)\n\n## Links\n\n- Website: https://auterion.com/\n- LinkedIn: https://www.linkedin.com/company/auterion\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (auterion.com), ADS members directory, Companies House (16200514, incorporated 22 January 2025), Wikipedia, DroneLife, Bessemer Venture Partners."}, {"name": "Avanti Communications Group plc", "website": "https://www.avanti.space/", "linkedin": "https://www.linkedin.com/company/avanticommunications", "hq": "London, United Kingdom", "region": "London", "size": "medium", "headcount": "", "founded": "", "tags": ["defence", "comms", "space", "sensors", "size-medium", "type-sme", "listed", "accr-iso27001", "mbr-ads"], "summary": "UK satellite operator providing Ka-band connectivity to government, defence, enterprise and carrier customers.", "body": "# Avanti Communications Group plc\n\n> UK satellite operator providing Ka-band connectivity to government, defence, enterprise and carrier customers.\n\n## What they do\n\nAvanti Communications is a satellite operator selling wholesale satellite broadband and connectivity to internet service providers, mobile network operators, enterprises, governments and other satellite operators. It operates a fleet of high throughput satellites alongside an international fibre network connecting its gateways and data centres. Its government and defence services cover remote bases, border security and disaster recovery using secure Ka-band communications.\n\n## Products and solutions\n\n- **HYLAS satellite fleet** - high throughput Ka-band satellites (HYLAS 1 and HYLAS 2) providing broadband connectivity across EMEA.\n- **ARTEMIS** - a multiband satellite within the Avanti fleet.\n- **Government and defence connectivity** - secure, resilient Ka-band services for military bases, outposts, border security and disaster recovery.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 27001\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-11-11** - Avanti announced a strategic partnership with Turksat to address connectivity gaps in South Africa. [source](https://www.asdnews.com/news/defense/2025/11/11/avanti-communications-announces-strategic-partnership-with-turksat-bridge-connectivity-gaps-south-africa)\n- **2025** - Avanti and Global RadioData Communications agreed a multi-year, multi-region contract to deliver Ka-band connectivity to government, defence and emergency service customers. [source](https://www.avanti.space/news/avanti-communications-and-grc-agree-multi-year-multi-region-contract/)\n\n## Links\n\n- Website: https://www.avanti.space/\n- LinkedIn: https://www.linkedin.com/company/avanticommunications\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (avanti.space), ADS members directory, Companies House (06133927), Wikipedia, ASD News, Avanti news releases."}, {"name": "Avantis Performance Ltd", "website": "https://avantisperformance.com/", "linkedin": "", "hq": "Cirencester, United Kingdom", "region": "South West", "size": "small", "headcount": "", "founded": "2023", "tags": ["defence", "data", "test-evaluation", "size-small", "type-consultancy", "type-sme", "mbr-ads"], "summary": "Defence-focused consultancy in digital transformation, capability delivery and workforce scaling for secure and public sector organisations.", "body": "# Avantis Performance Ltd\n\n> Defence-focused consultancy in digital transformation, capability delivery and workforce scaling for secure and public sector organisations.\n\n## What they do\n\nAvantis Performance is a consultancy supporting digital transformation, capability delivery and workforce scaling for secure and public sector organisations. Its specialisms include requirements management, cost modelling, and project and programme controls and management. The team has combined experience in the defence sector working with digital technology and engineering organisations, SMEs, large technology firms and the public sector.\n\n## Products and solutions\n\n- **Project and programme controls** - controls, transformation and project management for defence and secure-sector programmes.\n- **Requirements management and cost modelling** - support across the procurement cycle.\n- **Test and user trials** - capability delivery support.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://avantisperformance.com/\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (avantisperformance.com), ADS members directory, Companies House (14688080, incorporated 24 February 2023)."}, {"name": "AVD Fire Limited", "website": "https://www.avdfire.com", "linkedin": "https://www.linkedin.com/company/avdfire", "hq": "Stoke-on-Trent, United Kingdom", "region": "West Midlands", "size": "small", "headcount": "", "founded": "2023", "tags": ["defence", "hardware", "manufacturing", "size-small", "type-sme", "type-manufacturer", "owned-uk", "mbr-ads"], "summary": "UK manufacturer of lithium-ion battery fire containment and suppression products.", "body": "# AVD Fire\n\n> UK manufacturer of lithium-ion battery fire containment and suppression products.\n\n## What they do\n\nAVD Fire develops and produces active and passive safety products to control and extinguish lithium-ion battery fires. The company uses Aqueous Vermiculite Dispersion (AVD), an extinguishing agent that cools, contains and extinguishes lithium battery fires. It is a subsidiary o
