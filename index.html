system monitoring, simulation and modelling, and has worked on over 70 different aircraft types. The company has a long heritage in submarine control systems and marine consultancy. It has been part of the Expleo Group since 2018.\n\n## Products and solutions\n\n- **Submarine Control Systems** - course autopilot and hover control systems for submarine platforms.\n- **Aircraft Simulator Controls** - fixed-wing, rotary-wing, type-specific and eVTOL/AAM control loading and pilot controls.\n- **Airworthy Controls and Equipment** - flight-rated cockpit controls and equipment design.\n- **Engineering services** - aircraft development, modifications, landing gear systems, marine propulsion, computational fluid dynamics and design organisation approval support.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group (South West region).\n\n## Recent news\n\n- **2026-04-16** - Published an insight on project management at Stirling Dynamics. [source](https://www.stirling-dynamics.com/news/life-at-stirling-dynamics-project-management)\n\n## Links\n\n- Website: https://www.stirling-dynamics.com\n- LinkedIn: https://www.linkedin.com/company/stirling-dynamics\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, ADS members directory, Companies House."}, {"name": "SubSea Craft", "website": "https://subseacraft.com/", "linkedin": "https://www.linkedin.com/company/subseacraft-limited", "hq": "Portsmouth, England", "region": "South East England", "size": "medium", "headcount": "", "founded": "2014", "tags": ["defence", "maritime", "autonomy", "robotics", "uas", "drones", "isr", "manufacturing", "hardware", "test-evaluation", "size-medium", "type-manufacturer", "owned-uk", "mbr-ads"], "summary": "British advanced maritime-technology company designing, testing and manufacturing high-speed surface and sub-surface and uncrewed platforms for special-forces and naval defence customers.", "body": "# SubSea Craft\n\n> British advanced maritime-technology company designing, testing and manufacturing high-speed surface and sub-surface and uncrewed platforms for special-forces and naval defence customers.\n\n## What they do\n\nSubSea Craft is a UK specialist maritime-technology manufacturer that designs, tests and builds advanced maritime platforms at pace, working with military partners to equip operators with the latest technology. Its flagship is VICTA, a dual-domain craft that transits at high speed on the surface then submerges to covertly insert and recover divers and payloads. It operates an integrated design, prototype, test and build facility at The Camber in Old Portsmouth.\n\n## Products and solutions\n\n- **VICTA** - flagship diver delivery unit. An optionally-manned carbon-fibre craft that runs at 40-plus knots on the surface then floods ballast tanks to submerge for covert insertion and recovery of divers and payloads in contested environments. Can be helm, umbilical or autonomously operated.\n- **MARS (Maritime Autonomy Reconnaissance System)** - a compact, modular, multi-role uncrewed surface vessel for offensive operations, ISR and logistics; low-signature and mission-configurable.\n- **CADDIS** - a marinised uncrewed aerial vehicle launchable underwater from a submerged VICTA or by a diver, transitioning to flight to deliver ISR and targeting information.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group member; Armed Forces Covenant signatory.\n\n## Recent news\n\n- **2026-05-21** - Announced US expansion, selecting Virginia Beach as its US hub. [source](https://thedefensepost.com/2026/05/21/subsea-craft-us-expansion/)\n- **2026-05** - MARS USV entered production, with an upgraded variant in advanced testing against a customer contract. [source](https://www.navalnews.com/naval-news/2026/05/subsea-craft-advances-mars-usv-as-production-begins/)\n- **2025-01-29** - Appointed the Rt Hon Penny Mordaunt as Chair of the Board. [source](https://subseacraft.com/subsea-c ents Ltd.\n\n## Products and solutions\n\n- **Radar Warning Receivers (RWR)** - threat-warning receiver systems.\n- **ELINT and ESM receivers** - electronic intelligence and electronic support measures receivers, including the Phobos radar ESM system offering 360 degree passive detection.\n- **Multi-function assemblies** - DIFM, DLVA, channelisers, converters, synthesisers and switch multiplexers.\n- **Filters and components** - bandpass, suspended substrate stripline, tunable, combline filters and multiplexers.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** describes products as ITAR-free and ITAR-compliant. Holder of the Queen's Award for Enterprise 2019 (International Trade) and 2020 (Innovation).\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.teledynedefence.co.uk\n- LinkedIn: https://www.linkedin.com/company/teledyne-defence-and-space\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, ADS members directory."}, {"name": "Telesoft Technologies", "website": "https://www.telesoft-technologies.com/", "linkedin": "https://www.linkedin.com/company/telesoft-technologies", "hq": "Blandford Forum, United Kingdom", "region": "South West", "size": "medium", "headcount": "~94", "founded": "1989", "tags": ["defence", "cyber", "ai", "data", "software", "hardware", "size-medium", "type-vendor"], "summary": "UK cyber security and telecoms network monitoring company building high-performance network visibility and threat detection systems.", "body": "# Telesoft Technologies\n\n> UK cyber security and telecoms network monitoring company building high-performance network visibility and threat detection systems.\n\n## What they do\n\nTelesoft designs high-performance data communications technologies and systems that let communications service providers, network security organisations and large enterprises monitor, analyse and protect their networks. The company is engineering-led and describes its products as c k Group\n\n> Designer and manufacturer of mine clearance systems and protected mobility vehicles.\n\n## What they do\n\nThe Aardvark Group has been designing and manufacturing mine clearance systems since 1982, with in-house design and testing capabilities. Its work covers protected mobility and the clearance of explosive ordnance. Aardvark machines have been used by armed forces, the United Nations, non-governmental organisations and charities for humanitarian mine clearance in Europe, Africa, the Middle East and the Far East. The company is based in Dumfries, Scotland.\n\n## Products and solutions\n\n- **AMCS mine flail system** - armoured flail vehicle for landmine clearance, in production since 1984 and used in more than 30 countries.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://aardvark.group/\n- LinkedIn: https://uk.linkedin.com/company/aardvark-clearmine-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Aardvark Group website, Aardvark Group LinkedIn company page, Wikipedia (Aardvark JSFU)."}, {"name": "Tiberius Aerospace", "website": "https://www.tiberius.com/", "linkedin": "https://www.linkedin.com/company/tiberius-aerospace", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "", "founded": "2022", "tags": ["defence", "munitions", "autonomy", "ai", "land", "size-small", "type-manufacturer", "owned-foreign", "mbr-ads"], "summary": "Defence technology company developing the Sceptre extended-range precision-guided 155mm ramjet artillery munition, with the UK MoD as launch customer.", "body": "# Tiberius Aerospace\n\n> Defence technology company developing the Sceptre extended-range precision-guided 155mm ramjet artillery munition, with the UK MoD as launch customer.\n\n## What they do\n\nTiberius Aerospace develops next-generation precision weapons, missile systems, autonomous platforms and AI-enabled defence capabilitie om", "linkedin": "https://www.linkedin.com/company/tlmnexus", "hq": "Brighton, UK", "region": "South East", "size": "medium", "headcount": "51-200", "founded": "2000", "tags": ["defence", "software", "data", "air", "size-medium", "type-sme", "fw-gcloud", "fw-dos", "fw-joscar", "fw-ccs", "accr-iso9001", "accr-iso27001", "accr-ce-plus", "mbr-ads", "mbr-techuk"], "summary": "Defence and security software house specialising in through-life equipment management, airworthiness and asset management.", "body": "# tlmNexus Ltd\n\n> Defence and security software house specialising in through-life equipment management, airworthiness and asset management.\n\n## What they do\n\ntlmNexus designs and operates digital representations of complex, high-value defence and security equipment, enabling maintenance and operational management decisions based on accurate, real-time data. The company solves through-life acquisition and support management issues for the defence sector, combining expertise-led consultancy with software development. It has supported the UK MOD Typhoon platform since 2007 and its airworthiness software is used across the majority of the UK's military registered aircraft, including fixed-wing, rotary-wing and uncrewed air systems.\n\n## Products and solutions\n\n- **Resolve** - secure airworthiness and issue management application used to track and manage airworthiness-related issues across UK military registered aircraft.\n- **Derive** - requirements management.\n- **Approve and Foresight** - financial planning and budgeting.\n- **DaRT** - Damage and Repair Tracker.\n- **Observe** - post-mission data capture.\n- **Evidence Document Builder (EDB)** - structured evidence assembly.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** Crown Commercial Service supplier, including G-Cloud and Digital Outcomes; JOSCAR registered.\n- **Accreditations:** ISO 9001, ISO 27001, Cyber Essentials Plus. Armed Forces Covenant Employer Recognition Scheme Silver d by the UK MoD to support the UK armed forces in 2020.\n- **Unmanned aerial and ground systems** - a range of UAS and UGV platforms operated through a single controller and common operating system across the fleet.\n\n## Recent news\n\n- **2020-12** - Unveiled the nano Bug drone developed in collaboration with BAE Systems. [source](https://www.baesystems.com/en-uk/article/collaborating-with-uavtek-to-develop----to-develop-non--bug--drone-)\n\n## Links\n\n- Website: https://www.uavtek.com/\n- LinkedIn: https://www.linkedin.com/company/uavtek\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (uavtek.com), UAVTEK LinkedIn company page, Companies House (UAVTEK Limited, number 10445956, registered office Harvest Barn Farm, Aldsworth, Cheltenham GL54 3QR), BAE Systems, Army Technology."}, {"name": "Ultra Maritime", "website": "https://umaritime.com/", "linkedin": "https://www.linkedin.com/company/ultramaritime", "hq": "Greenford, United Kingdom", "region": "London", "size": "large", "headcount": "~2000 (global)", "founded": "", "tags": ["defence", "maritime", "sensors", "isr", "hardware", "manufacturing", "size-large", "type-manufacturer", "backed-pe"], "summary": "Undersea warfare specialist supplying sonar, sonobuoys, countermeasures and anti-submarine warfare systems to allied navies. Part of the Cobham Ultra group.", "body": "# Ultra Maritime\n\n> Undersea warfare specialist supplying sonar, sonobuoys, countermeasures and anti-submarine warfare systems to allied navies. Part of the Cobham Ultra group.\n\n## What they do\n\nUltra Maritime is a defence technology business supplying advanced sonar and maritime systems for anti-submarine warfare from the air, surface and undersea. Its products include sonobuoys, countermeasures, towed arrays and transducers used by navies across NATO and allied nations. The business is part of the Cobham Ultra group, owned by private equity firm Advent International following the 2022 acquisition of Ultra Electronics; tagged backed-pe on that basis. It operates an integrated design and manufacturing centre in Greenford, west London, alongside operations across the Five Eyes nations.\n\n## Products and solutions\n\n- **Sonobuoys** - air-deployed acoustic sensors for submarine detection, including next-generation multistatic active receive variants.\n- **Anti-submarine warfare sonar** - towed arrays, transducers and sonar processing for surface, air and undersea ASW.\n- **Torpedo defence and countermeasures** - systems to protect naval platforms against torpedoes.\n\n## Frameworks, accreditations and memberships\n\n- **Ownership:** part of Cobham Ultra, owned by Advent International (Ultra Electronics acquired 2022).\n\n## Recent news\n\n- **2025-09** - Officially opened a new integrated design and manufacturing centre in Greenford, west London, backed by around £20 million of investment. [source](https://www.navalnews.com/naval-news/2026/01/ultra-maritime-looks-to-grow-uk-sonobuoy-production/)\n- **2025-02** - Announced an £18 million UK MoD contract to supply sonobuoys for the Royal Navy's Merlin maritime patrol helicopter. [source](https://www.prnewswire.com/news-releases/ultra-maritime-receives-18-million-contract-for-sonobuoys-from-the-uk-ministry-of-defence-302378405.html)\n\n## Links\n\n- Website: https://umaritime.com/\n- LinkedIn: https://www.linkedin.com/company/ultramaritime\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (umaritime.com), Ultra Maritime LinkedIn company page, Cobham Ultra site, PR Newswire, Naval News, Naval Technology, Wikipedia (Ultra Electronics ownership history)."}, {"name": "Vizgard", "website": "https://vizgard.com/", "linkedin": "https://www.linkedin.com/company/vizgard", "hq": "London, United Kingdom", "region": "London", "size": "micro", "headcount": "", "founded": "", "tags": ["defence", "ai", "counter-uas", "isr", "sensors", "software", "autonomy", "size-micro", "type-vendor", "backed-vc"], "summary": "London AI s  {key:'type',label:'Type',test:t=>t.startsWith('type-')},
 {key:'ownership',label:'Ownership & funding',test:t=>/^(owned-|backed-)/.test(t)||t==='listed'},
 {key:'frameworks',label:'Frameworks',test:t=>t.startsWith('fw-')},
 {key:'accreditations',label:'Accreditations',test:t=>t.startsWith('accr-')},
 {key:'programmes',label:'Programmes',test:t=>t.startsWith('prog-')},
 {key:'memberships',label:'Memberships',test:t=>t.startsWith('mbr-')},
];
const ACR={ce:'Cyber Essentials','ce-plus':'Cyber Essentials Plus',iso9001:'ISO 9001',iso27001:'ISO 27001',iso14001:'ISO 14001',listx:'List X',joscar:'JOSCAR',gcloud:'G-Cloud',dos:'DOS',ccs:'CCS',ads:'ADS Group',techuk:'techUK','makeuk-defence':'Make UK Defence',ndi:'NDI',scrdsc:'SCRDSC',swrdsc:'SWRDSC',dasa:'DASA',diana:'NATO DIANA',nssif:'NSSIF',uas:'UAS',isr:'ISR',rf:'RF',c2:'C2',ew:'EW',ai:'AI',gis:'GIS','counter-uas':'Counter-UAS','test-evaluation':'Test & evaluation'};
function pretty(tag){let v=tag.replace(/^(size-|type-|owned-|backed-|fw-|accr-|prog-|mbr-)/,'');if(ACR[v])return ACR[v];if(ACR[tag])return ACR[tag];return v.charAt(0).toUpperCase()+v.slice(1).replace(/-/g,' ');}
const state={sel:{},q:''};
try{const s=JSON.parse(localStorage.getItem('tally')||'{}');if(s.sel)state.sel=s.sel;if(s.q)state.q=s.q;}catch(e){}
function save(){try{localStorage.setItem('tally',JSON.stringify(state));}catch(e){}}
function groups(){return FACETS.map(f=>f.key).concat(['region']);}
function valsFor(rec,g){return g==='region'?(rec.region?[rec.region]:[]):rec.tags.filter(FACETS.find(f=>f.key===g).test);}
function passGroup(rec,g){const sel=state.sel[g];if(!sel||!sel.length)return true;return sel.some(v=>valsFor(rec,g).includes(v));}
function matchesText(rec){if(!state.q)return true;const q=state.q.toLowerCase();return (rec.name+' '+rec.summary+' '+rec.body).toLowerCase().includes(q);}
function anySel(){return groups().some(g=>state.sel[g]&&state.sel[g].length);}
function compute(){const ts=DATA.filter(matchesText);const gs=groups();const exact=ts.filter(r=>gs.every(g=>passGroup(r,g)));let partial=[];if(anySel()){const es=new Set(exact);partial=ts.filter(r=>!es.has(r)).map(r=>({r,n:gs.filter(g=>state.sel[g]&&state.sel[g].length&&passGroup(r,g)).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n||a.r.name.localeCompare(b.r.name)).map(x=>x.r);}return {exact,partial};}
function optionCounts(fk){const gs=groups().filter(g=>g!==fk);const pool=DATA.filter(matchesText).filter(r=>gs.every(g=>passGroup(r,g)));const c={};pool.forEach(r=>valsFor(r,fk).forEach(v=>c[v]=(c[v]||0)+1));return c;}
function allValues(fk){const set=new Set();DATA.forEach(r=>valsFor(r,fk).forEach(v=>set.add(v)));let arr=[...set];const f=FACETS.find(x=>x.key===fk);if(f&&f.order)arr.sort((a,b)=>(f.order.indexOf(a)+1||99)-(f.order.indexOf(b)+1||99));else arr.sort((a,b)=>pretty(a).localeCompare(pretty(b)));return arr;}
function renderFacets(){const host=document.getElementById('facets');const defs=FACETS.concat([{key:'region',label:'Region'}]);host.innerHTML=defs.map(def=>{const vals=allValues(def.key);if(!vals.length)return '';const counts=optionCounts(def.key);const sel=state.sel[def.key]||[];const opts=vals.map(v=>`<label class="opt${(counts[v]||0)?'':' zero'}"><input type="checkbox" data-g="${def.key}" value="${v}" ${sel.includes(v)?'checked':''}><span>${pretty(v)}</span><span class="cnt">${counts[v]||0}</span></label>`).join('');return `<details class="facet"${sel.length?' open':''}><summary>${def.label}<span class="chev">▾</span></summary>${opts}</details>`;}).join('');host.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.addEventListener('change',()=>{const g=cb.dataset.g;state.sel[g]=state.sel[g]||[];if(cb.checked){if(!state.sel[g].includes(cb.value))state.sel[g].push(cb.value);}else state.sel[g]=state.sel[g].filter(x=>x!==cb.value);save();render();}));}
function card(rec){const caps=rec.tags.filter(t=>FACETS[0].test(t)).slice(0,5).map(t=>`<span class="badge cap">${pretty(t)}</span>`).join('');const size=rec.size?`<span class="badge size">${rec.size}</span>`:'';const region=rec.region?`<span class="badge region">${rec.region}</span>`:'';return `<div class="card" data-name="${encodeURIComponent(rec.name)}"><h3>${rec.name}</h3><p class="blurb">${rec.summary||''}</p><div class="badges">${size}${region}${caps}</div></div>`;}
function mdToHtml(md){const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');const inline=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');const lines=md.split('\n');let out=[],inList=false;for(let raw of lines){let line=raw.replace(/\r$/,'');if(/^#{1,6}\s/.test(line)){if(inList){out.push('</ul>');inList=false;}const lvl=line.match(/^#+/)[0].length;out.push(`<h${lvl}>${inline(line.replace(/^#+\s/,''))}</h${lvl}>`);continue;}if(/^>\s?/.test(line)){if(inList){out.push('</ul>');inList=false;}out.push(`<blockquote>${inline(line.replace(/^>\s?/,''))}</blockquote>`);continue;}if(/^[-*]\s/.test(line)){if(!inList){out.push('<ul>');inList=true;}out.push(`<li>${inline(line.replace(/^[-*]\s/,''))}</li>`);continue;}if(line.trim()===''){if(inList){out.push('</ul>');inList=false;}continue;}if(inList){out.push('</ul>');inList=false;}out.push(`<p>${inline(line)}</p>`);}if(inList)out.push('</ul>');return out.join('\n');}
function openDetail(rec){const links=[];if(rec.website)links.push(`<a href="${rec.website}" target="_blank" rel="noopener">Website</a>`);if(rec.linkedin)links.push(`<a href="${rec.linkedin}" target="_blank" rel="noopener">LinkedIn</a>`);const sub=[rec.hq,rec.size&&('size: '+rec.size),rec.headcount&&('~'+rec.headcount)].filter(Boolean).join('  ·  ');document.getElementById('panel').innerHTML=`<button class="close" id="closeBtn">×</button><h2>${rec.name}</h2><div class="meta">${sub||''}</div><div class="links">${links.join('')}</div><div class="alltags">${rec.tags.map(t=>`<span class="badge">${pretty(t)}</span>`).join('')}</div><div class="md">${mdToHtml(rec.body)}</div>`;document.getElementById('overlay').classList.add('open');document.getElementById('closeBtn').onclick=closeDetail;}
function closeDetail(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeDetail();});
function render(){if(!DATA.length)return;renderFacets();const {exact,partial}=compute();const res=document.getElementById('results');const byName=(a,b)=>a.name.localeCompare(b.name);let html='';if(!exact.length&&!partial.length){html='<div class="empty">No companies match these filters.</div>';}else{html+=exact.slice().sort(byName).map(card).join('');if(partial.length)html+=`<div class="section-label">Partial matches — meet some of your criteria</div>`+partial.map(card).join('');}res.innerHTML=html;res.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>openDetail(DATA.find(r=>r.name===decodeURIComponent(c.dataset.name)))));document.getElementById('count').textContent=`${exact.length} match${exact.length===1?'':'es'}${partial.length?`, ${partial.length} partial`:''} · ${DATA.length} companies`;}
document.getElementById('q').value=state.q;
document.getElementById('q').addEventListener('input',e=>{state.q=e.target.value;save();render();});
document.getElementById('clearAll').addEventListener('click',()=>{state.sel={};state.q='';document.getElementById('q').value='';save();render();});
document.getElementById('reloadBtn').addEventListener('click',()=>load(true));
function setLive(label,gen,n){document.getElementById('live').textContent=label+(gen?(' · updated '+gen):'')+' · '+n+' companies';}
async function load(bust){
 document.getElementById('count').textContent='Loading directory…';
 for(const src of SOURCES){
  try{const r=await fetch(src+(bust?('?t='+Date.now()):''),{cache:bust?'reload':'default'});if(!r.ok)continue;const j=await r.json();DATA=(j.companies||j);setLive('Live from GitHub',j.generated||GENERATED,DATA.length);render();return;}catch(e){}
 }
 if(FALLBACK&&FALLBACK.length){DATA=FALLBACK;setLive('Offline snapshot',GENERATED,DATA.length);render();return;}
 document.getElementById('count').textContent='Could not load the directory. Check your connection, or browse the company pages on GitHub.';
}
load(false);
</script>
</body>
</html>
