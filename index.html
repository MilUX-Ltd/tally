s renamed from PSS by Logics7 to L7 Simulators in June 2025.\n\n## Products and solutions\n\n- **UNITS ecosystem** - combat training platform with 50+ modules simulating weapons in service, supporting individual and multi-group training across small arms, grenade launchers, MANPADS and anti-tank weapons.\n- **LT Laser Simulator** - laser-based live firing simulator.\n- **Complex UNITS VR** - VR training complex.\n- **Vartovyi (Watchmen)** - training simulator for interceptor drone crews; interface mimics standard ground control stations.\n- **Dronobii and Dvobiy** - FPV drone shooting and training simulators.\n- **Citadele** - multimedia classroom training system.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** products carry NATO codification.\n- **Memberships:** National Association of Defence Industry Enterprises of Ukraine (NAUDI).\n\n## Recent news\n\n- **2025-10-21** - Unveils Vartovyi interceptor-drone-crew training simulator. [source](https://www.pravda.com.ua/eng/news/2025/10/21/8003762/)\n- **2025-09-06** - Exhibited at MSPO 2025 in Kielce, Poland, within the NAUDI pavilion. [source](https://www.l7simulators.com/en/articles/l7-predstavila-svoyi-rozrobki-na-mspo-2025-u-polshchi)\n- **2025-06-09** - Rebrand from PSS by Logics7 to L7 Simulators. [source](https://dev.ua/en/news/l7-rename-1749622494)\n\n## Links\n\n- Website: https://www.l7simulators.com/en\n- LinkedIn: https://www.linkedin.com/company/pss-by-logics-7\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, LinkedIn company page, NAUDI partner listing, Ukrainska Pravda, dev.ua. Ukrainian company; LinkedIn page retains the legacy slug from the former PSS by Logics7 brand."}, {"name": "Logically", "website": "https://logically.ai/", "linkedin": "https://www.linkedin.com/company/logicallyai", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "", "founded": "2017", "tags": ["defence", "ai", "isr", "data", "software", "cyber", "size-small", "type-sme", "owned-uk"], "summary": "AI company providing narrative and threat intelligence to detect and counter mis- and disinformation for government, defence and enterprise.", "body": "# Logically\n\n> AI company providing narrative and threat intelligence to detect and counter mis- and disinformation for government, defence and enterprise.\n\n> [!warning] Status\n> The original UK legal entity (THELOGICALLY LTD, Companies House 10850644) entered administration on 2025-06-27. Its assets, brand and core technology were sold in a pre-pack administration deal to Kreatur Ltd in July 2025, preserving around 50 roles. The Logically brand continues to trade under the new owner.\n\n## What they do\n\nLogically provides narrative decision intelligence for government and enterprise. It combines AI with human analysis to monitor the online information environment, detect and cluster harmful narratives and disinformation, and deliver alerts, reporting and decision support. The platform is positioned for national security, defence, public safety and government missions, with enterprise risk and communications use cases second.\n\n## Products and solutions\n\n- **Logically Intelligence** - threat-detection platform that monitors public and open-source information, uses machine learning to assess source and content credibility, detects propaganda, and clusters emerging narratives with alerts and reporting.\n- **PRISM** - scoped intelligence system offering simulation, action support and integration with customer workflows for missions beyond standard monitoring.\n\n## Recent news\n\n- **2025-07-04** - Assets, brand and core technology sold in a pre-pack administration deal to Kreatur Ltd, preserving around 50 roles. [source](https://www.uktech.news/ai/ai-fact-checker-logically-sold-off-in-administration-deal-20250707)\n- **2025-06-27** - THELOGICALLY LTD enters administration. [source](https://find-and-update.company-information.service.gov.uk/company/10850644/insolvency)\n- **2025-03-12** - Partners with Databricks to forecast online narrative risk for governments and enterprises. [source](https://www.databricks.com/customers/logically)\n\n## Links\n\n- Website: https://logically.ai/\n- LinkedIn: https://www.linkedin.com/company/logicallyai\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, LinkedIn company page, Companies House (10850644 including insolvency record), Wikipedia, Sifted, UKTN, BusinessCloud, Databricks customer page."}, {"name": "MacTaggart, Scott & Company Ltd", "website": "https://www.mactag.com/", "linkedin": "https://uk.linkedin.com/company/mactaggart-scott", "hq": "Loanhead, United Kingdom", "region": "Scotland", "size": "large", "headcount": "350", "founded": "1898", "tags": ["defence", "maritime", "hardware", "manufacturing", "type-manufacturer", "size-large", "owned-uk", "mbr-ads"], "summary": "Scottish naval engineering company making mechanical handling and motion systems for submarines and ships.", "body": "# MacTaggart Scott\n\n> Scottish naval engineering company making mechanical handling and motion systems for submarines and ships.\n\n## What they do\n\nMacTaggart, Scott & Company is a privately owned Scottish engineering company, founded in 1898 and based in Loanhead near Edinburgh. It specialises in naval mechanical handling equipment, designing and manufacturing systems for surface ships and submarines for navies worldwide. The company supports demanding maritime environments with a long-standing reputation for quality and reliability.\n\n## Products and solutions\n\n- **Aircraft elevators and lifts** - deck lifts for aircraft carriers and ships.\n- **Helicopter handling systems** - flight-deck handling and traversing gear.\n- **Arresting gear** - a dedicated naval product line.\n- **Submarine mast systems** - hoistable and mast-raising systems, including the Quiet Modular Mast.\n- **Towed-array handling systems** and **emergency propulsion units** for submarines.\n- **Hydraulic power units, pumps and actuators** for surface ships and submarines.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group, National Maritime.\n\n## Recent news\n\n_No public news with a verifiable date in the last ~12 months was confirmed at the time of writing._\n\n## Links\n\n- Website: https://www.mactag.com/\n- LinkedIn: https://uk.linkedin.com/company/mactaggart-scott\n\n## Sources\n\nPublic information verified 2026-06-29. MacTaggart Scott website, LinkedIn company page, ADS members directory (adsgroup.org.uk/members/mactaggart-scott-company-limited), Companies House (SC055532), Navy Leaders exhibitor profile."}, {"name": "Malloy Aeronautics Ltd", "website": "https://www.malloyaeronautics.com", "linkedin": "https://www.linkedin.com/company/malloy-aeronautics-ltd", "hq": "Maidenhead, United Kingdom", "region": "South East England", "size": "small", "headcount": "", "founded": "2012", "tags": ["defence", "uas", "drones", "logistics", "air", "manufacturing", "size-small", "type-manufacturer", "owned-uk"], "summary": "UK designer of all-electric heavy-lift uncrewed aircraft systems for military and commercial logistics.", "body": "# Malloy Aeronautics Ltd\n\n> UK designer of all-electric heavy-lift uncrewed aircraft systems for military and commercial logistics.\n\n## What they do\n\nMalloy Aeronautics designs and supplies all-electric uncrewed aircraft systems for civil and military customers. Its heavy-lift quadcopters carry payloads from around 68 kg to several hundred kilograms over short to medium-range missions, with zero-emission operation at point of use. The company is based in Berkshire and is a BAE Systems owned entity within BAE's FalconWorks research and development division.\n\n## Products and solutions\n\n- **T-150** - heavy-lift drone with around 68 kg maximum payload, in service with the UK Royal Navy, Royal Marines and US Marine Corps.\n- **T-400** - heavy-lift platform with around 165 kg maximum payload and extended range.\n- **T-650** - next-generation aircraft under development for requirement-led concepts.\n- **TRV-150** - trials variant of the T-150 used in capability demonstrations.\n\n## Frameworks, accreditations and memberships\n\n- **Ownership:** BAE Systems owned entity, part of the FalconWorks research and development division within the Air sector.\n\n## Recent news\n\n- **2026-04-10** - UK Royal Marines achieved a number of firsts using the T-150 on Arctic missions. [source](https://www.malloyaeronautics.com/article/royal-marines-accomplish-number-of-firsts-in-arctic-missions-with-t150)\n- **2025-10-07** - The Royal Navy and US Army demonstrated T-150 frontline supply delivery in trials in South Korea. [source](https://www.malloyaeronautics.com/article/royal-navy-and-us-army-show-how-t150-could-deliver-supplies-to-the-frontline)\n- **2025-09-12** - The Royal Navy declared the T-150 ready for front-line operations. [source](https://www.malloyaeronautics.com/article/royal-navy-declares-t150-ready-for-operations-1757675439947)\n\n## Links\n\n- Website: https://www.malloyaeronautics.com\n- LinkedIn: https://www.linkedin.com/company/malloy-aeronautics-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (malloyaeronautics.com about and articles), LinkedIn company page. Now BAE Systems owned (UK-headquartered parent); the company website states it forms part of BAE's FalconWorks division."}, {"name": "Marble Aerospace", "website": "https://www.marble.aero/", "linkedin": "https://www.linkedin.com/company/marble-aerospace", "hq": "Chippenham, United Kingdom", "region": "South West England", "size": "micro", "headcount": "", "founded": "2016", "tags": ["defence", "drones", "uas", "autonomy", "isr", "ai", "sensors", "optronics", "maritime", "air", "manufacturing", "software", "hardware", "data", "size-micro", "type-startup", "owned-uk", "mbr-ads", "prog-diana"], "summary": "Designs, builds and operates fleets of high-speed VTOL drones with AI vessel detection for maritime surveillance, delivered as an end-to-end service.", "body": "# Marble Aerospace\n\n> Designs, builds and operates fleets of high-speed VTOL drones with AI vessel detection for maritime surveillance, delivered as an end-to-end service.\n\n## What they do\n\nMarble builds hardware and software to protect maritime environments. It designs, manufactures and operates its own fleet of high-speed vertical take-off and landing drones, paired with computer-vision sensors and AI-assisted vessel detection, and manages the full deployment chain including beyond visual line of sight regulatory approvals, planning and operations. Clients include government agencies, coast guards, maritime police and environmental organisations, with applications across fisheries protection, anti-piracy and drug-trafficking surveillance, infrastructure protection and environmental and ice monitoring.\n\n## Products and solutions\n\n- **MRB5** - fifth-generation proprietary drone. Fixed-wing VTOL lift-and-cruise design with four lift rotors and a single pusher propeller, built for harsh maritime environments and able to break down to fit in regular airline luggage for rapid deployment.\n- **Surveillance as a service** - end-to-end managed maritime monitoring offering, covering deployment, BVLOS approvals, AI vessel detection and real-time intelligence.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n- **Programmes:** NATO DIANA (Defence Innovation Accelerator for the North Atlantic) participant.\n\n## Recent news\n\n- **2024-05** - FlightGlobal feature on the company's growth and future development plans. [source](https://www.flightglobal.com/military-uavs/2024/05/marble-on-a-roll-as-uav-maker-looks-towards-future-developments/)\n- Greenland ice-monitoring operations capturing daily high-resolution data over the Ilulissat Icefjord, delivered through an ESA Space Solutions project. [source](https://business.esa.int/projects/expanding-ocean-monitoring-high-speed-uavs)\n\n## Links\n\n- Website: https://www.marble.aero/\n- LinkedIn: https://www.linkedin.com/company/marble-aerospace\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, LinkedIn company page, Companies House (10183391), ADS Group member listing, FlightGlobal, ESA Space Solutions."}, {"name": "METCLOUD", "website": "https://www.metcloud.com/", "linkedin": "https://uk.linkedin.com/company/metcloud", "hq": "Birmingham, United Kingdom", "region": "West Midlands", "size": "small", "headcount": "", "founded": "1998", "tags": ["defence", "cyber", "cloud", "software", "ai", "size-small", "type-vendor", "ownership-private"], "summary": "Sovereign cloud, cyber security and managed services for regulated and defence-sector organisations.", "body": "# METCLOUD\n\n> Sovereign cloud, cyber security and managed services for regulated and defence-sector organisations.\n\n## What they do\n\nMETCLOUD provides sovereign cloud, cyber security and managed services built around high-assurance security technologies. Its hybrid cloud platform combines cyber defence, surveillance and AI and machine learning capabilities. METCLOUD Defence delivers secure, sovereign cloud services positioned for the UK defence sector.\n\n## Products and solutions\n\n- **Sovereign cloud platform** - hybrid cloud built around high-assurance security controls, with enterprise servers and storage.\n- **Managed cyber security services** - next generation firewall, SIEM, endpoint protection, network access control, automated patch management and backup, plus 24/7 monitoring and surveillance.\n- **METCLOUD Defence** - secure, sovereign cloud services tailored to the UK defence sector.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** Fire Industry Association (FIA) listed partner.\n\n## Recent news\n\n- **2025-11** - METCLOUD Defence awarded \"highly commended\" for Defence Innovator of the Year at The Innovation Awards. [source](https://www.metcloud.com/about/success/)\n\n## Links\n\n- Website: https://www.metcloud.com/\n- LinkedIn: https://uk.linkedin.com/company/metcloud\n\n## Sources\n\nPublic information verified 2026-06-29. METCLOUD website (metcloud.com), METCLOUD LinkedIn company page, Companies House (company 03594373), FIA membership listing."}, {"name": "Milanion Group Ltd", "website": "https://milaniongroup.com/", "linkedin": "https://www.linkedin.com/company/milaniongroup", "hq": "Abu Dhabi, United Arab Emirates", "region": "", "size": "micro", "headcount": "", "founded": "2020", "tags": ["defence", "autonomy", "robotics", "uas", "isr", "munitions", "land", "maritime", "manufacturing", "type-manufacturer", "size-micro", "owned-foreign", "mbr-ads"], "summary": "Defence company developing uncrewed ground and surface systems, ISR and loitering munitions.", "body": "# Milanion\n\n> Defence company developing uncrewed ground and surface systems, ISR and loitering munitions.\n\n## What they do\n\nMilanion Group is a vertically integrated defence company that designs, integrates and manufactures autonomous and robotic systems for the tri-service defence and security sectors. Its operating and manufacturing base is in Abu Dhabi, and the group now markets a UK headquarters with a UK registered entity (Milanion Group Ltd) and a London presence. It works across land, maritime, air, communications and munitions, combining autonomy, secure communications and precision effects.\n\n## Products and solutions\n\n- **AGEMA UGV** - modular, multi-mission, amphibious unmanned ground vehicle, with ISR payloads and weaponised or munitions-launcher variants.\n- **Unmanned surface vessels** - an Advanced Autonomous Conversion System that converts manned platforms such as fast attack craft to unmanned operation.\n- **MSP Warblefly** - precision loitering munition, including a launcher integrated onto the AGEMA UGV.\n- **Mortar and indirect fire systems** - mobile mortar carrier and indirect-fire systems (Milanion NTGS), plus remote weapon stations.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-06-19** - Signed an agreement with RPAL/Republikorp at Eurosatory 2026 to expand the Indonesian Navy USV programme. [source](https://milaniongroup.com/press-release/milanion-rpal-usv-programme/)\n- **2026-02-17** - Signed MoUs with Elistair and NovAtel at World Defence Show 2026 to enhance persistent ISR and assured navigation. [source](https://www.adsadvance.co.uk/milanion-signs-partnership-agreements-at-wds-2026.html)\n\n## Links\n\n- Website: https://milaniongroup.com/\n- LinkedIn: https://www.linkedin.com/company/milaniongroup\n\n## Sources\n\nPublic information verified 2026-06-29. Milanion Group website, LinkedIn company page, ADS members directory (adsgroup.org.uk/members/milanion-ltd-2), Companies House (12951650), Army Recognition, Janes, Defense Arabia, ADS Advance."}, {"name": "MilDef Group AB", "website": "https://mildef.com/", "linkedin": "https://www.linkedin.com/company/mildef-group", "hq": "Helsingborg, Sweden", "region": "", "size": "large", "headcount": "514", "founded": "1997", "tags": ["defence", "hardware", "software", "c2", "manufacturing", "land", "air", "maritime", "size-large", "type-vendor", "ownership-listed", "owned-foreign"], "summary": "Rugged IT systems integrator and full-spectrum provider for defence, government and critical infrastructure.", "body": "# MilDef Group AB\n\n> Rugged IT systems integrator and full-spectrum provider for defence, government and critical infrastructure.\n\n## What they do\n\nMilDef is a systems integrator and full-spectrum provider specialising in rugged IT for military, government and critical infrastructure sectors. Since 1997 it has designed, tested, qualified, manufactured, sold and supported rugged computing products for military applications in harsh environments. It supplies hardware, software and services across multiple countries including Sweden, Norway, Finland, Denmark, the United Kingdom, Germany, Switzerland, the United States and Australia. MilDef Group AB has been listed on Nasdaq Stockholm since 2021.\n\n## Products and solutions\n\n- **Rugged computers and electronics** - small form factor computers, mobile computers, displays, panel PCs and special electronics for the harshest conditions.\n- **19\"/2 rugged IT platform** - rack-mounted rugged computing supporting modular defence systems.\n- **Command and Control (C2) software** - C2 systems delivered to defence customers including the Swedish Navy.\n- **Integration services** - system design and implementation alongside hardware delivery.\n\n## Recent news\n\n- **2025-07** - Kongsberg Defence & Aerospace ordered MilDef rugged IT equipment worth SEK 225 million, MilDef's largest order in the Norwegian market, with deliveries beginning in 2026. [source](https://mildef.com/news/kongsberg-defence-aerospace-orders-mildefs-ruggedized-it-equipment-worth-225-msek/)\n- **2025-03** - MilDef completed the acquisition of roda computer GmbH, expanding its European footprint. [source](https://view.news.eu.nasdaq.com/view?id=bfb62e20f1026fe4833ce5a698e6b886f&lang=en)\n\n## Links\n\n- Website: https://mildef.com/\n- LinkedIn: https://www.linkedin.com/company/mildef-group\n\n## Sources\n\nPublic information verified 2026-06-29. MilDef website (mildef.com), MilDef investor relations (investors.mildef.com), MilDef LinkedIn company page, Nasdaq Stockholm company announcements, Cision press releases."}, {"name": "Mind Foundry", "website": "https://www.mindfoundry.ai", "linkedin": "https://www.linkedin.com/company/mind-foundry", "hq": "Oxford, United Kingdom", "region": "South East England", "size": "medium", "headcount": "", "founded": "2016", "tags": ["defence", "ai", "data", "software", "isr", "sensors", "maritime", "size-medium", "type-software", "owned-uk", "accr-iso27001", "accr-ce-plus", "accr-joscar", "mbr-ads"], "summary": "Oxford-spinout applied machine learning company building responsible AI for defence and national security.", "body": "# Mind Foundry\n\n> Oxford-spinout applied machine learning company building responsible AI for defence and national security.\n\n## What they do\n\nMind Foundry develops responsible AI and machine learning solutions for high-stakes applications in defence and national security. It was spun out of the University of Oxford and turns complex, multi-modal sensor data into trusted insight, supporting human operators while preserving human autonomy in mission-critical environments. The company is based in Oxford.\n\n## Products and solutions\n\n- **Sentry: Sensor Fusion** - real-time fusion of data from multiple sensors into a single evolving picture for situational awareness, making existing hardware and command-and-control software smarter.\n- **Nightingale: ASW** - acoustic software for anti-submarine warfare, delivering automated tonal analysis and classification to turn maritime sound into actionable intelligence.\n- **Continuous Metalearning** - platform approach in which AI adapts its own learning to real-world change.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 27001, Cyber Essentials Plus, JOSCAR registered.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2024-10-08** - Mind Foundry awarded Defence Technology Exploitation Programme (DTEP) funding to develop a unified operating picture capability with BAE Systems. [source](https://www.gov.uk/government/news/dtep-funding-announced-for-three-more-uk-smes)\n- **2024-01-24** - Saab UK awarded the LookOut Phase 3 contract in collaboration with Mind Foundry to develop maritime early warning for the Royal Navy, funded through DASA. [source](https://www.saab.com/markets/united-kingdom/stories/saab-uk-awarded-lookout-phase-3-contract)\n\n## Links\n\n- Website: https://www.mindfoundry.ai\n- LinkedIn: https://www.linkedin.com/company/mind-foundry\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (mindfoundry.ai), Companies House (Mind Foundry Limited, company number 09882159, incorporated 20 November 2015), ADS Group members directory, Oxford Science Enterprises portfolio (investor), and reputable news. Backed by Oxford Science Enterprises and Parkwalk Advisors."}, {"name": "MindLink Software", "website": "https://www.mindlinksoft.com/", "linkedin": "https://uk.linkedin.com/company/mindlink", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "", "founded": "2011", "tags": ["defence", "software", "comms", "cyber", "size-small", "type-vendor", "ownership-private", "accr-ce-plus"], "summary": "Ultra-secure chat and messaging platform for classified communication in national security and defence.", "body": "# MindLink Software\n\n> Ultra-secure chat and messaging platform for classified communication in national security and defence.\n\n## What they do\n\nMindLink provides a secure mission information-sharing platform that lets organisations and their mission partners establish a global communication backbone for mission execution. It offers encrypted, real-time chat using data classification and user entitlements to restrict access on a need-to-know basis. The platform uses a data-centric, end-to-end encryption approach with attribute-based access control, and is deployed at scale in air-gapped environments. The company is based in London.\n\n## Products and solutions\n\n- **MindLink Platform** - ultra-secure chat and messaging for international and inter-agency mission operations across defence and intelligence.\n- **Data-centric security engine** - multi-layered access control based on secret attributes, roles and security clearances.\n- **FRNIX federation protocol** - federation protocol designed to share classified information only with those holding the appropriate need-to-know.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Cyber Essentials Plus.\n\n## Recent news\n\n- **2024** - MindLink achieved Cyber Essentials Plus certification. [source](https://www.mindlinksoft.com/blog/demonstrating-security-in-practice-mindlink-achieves-cyber-essentials-plus)\n\n## Links\n\n- Website: https://www.mindlinksoft.com/\n- LinkedIn: https://uk.linkedin.com/company/mindlink\n\n## Sources\n\nPublic information verified 2026-06-29. MindLink website (mindlinksoft.com), MindLink LinkedIn company page, Companies House (company 07578750), MindLink blog."}, {"name": "Moog Fernau Ltd", "website": "https://www.moog.com/markets/air-traffic-management/", "linkedin": "https://www.linkedin.com/company/moog-fernau", "hq": "Luton, United Kingdom", "region": "East of England", "size": "medium", "headcount": "", "founded": "1970", "tags": ["defence", "comms", "sensors", "rf", "air", "hardware", "manufacturing", "size-medium", "type-manufacturer", "owned-foreign", "mbr-ads"], "summary": "UK supplier of ground-based navigation aids and defence communications and datalink systems, part of Moog Inc.", "body": "# Moog Fernau Ltd\n\n> UK supplier of ground-based navigation aids and defence communications and datalink systems, part of Moog Inc.\n\n## What they do\n\nMoog Fernau, based in Luton, is a supplier of ground-based navigation aids with experience across all aspects of navigation. Its products and systems have been installed for civil aviation, maritime authorities and military forces worldwide, with stated customers including the US Navy, UK MOD, US Air Force and US Marine Corps. Trading as part of Moog Inc, the business descends from Fernau Avionics, which became part of Moog in 2009.\n\n## Products and solutions\n\n- **DME** - distance measuring equipment, a ground-based navigation aid.\n- **VHF/UHF DF and Naval DF** - direction-finding systems for aviation and maritime use.\n- **Auto-Triangulation (Auto-T)** - automatic triangulation for locating transmissions.\n- **TACAN** - fixed tactical air navigation, with man-portable, mobile and deployable variants.\n- **Mode-S radar transmitters** - secondary surveillance radar transmitters.\n- **Tarsier** - automatic foreign object debris (FOD) detection system for civil and military airfields.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group; British Aviation Group.\n\n## Recent news\n\n- No company-specific news for Moog Fernau Ltd confirmed in the last 12 months from public sources.\n\n## Links\n\n- Website: https://www.moog.com/markets/air-traffic-management/\n- LinkedIn: https://www.linkedin.com/company/moog-fernau\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS Group member profile (adsgroup.org.uk/members/moog-fernau-limited), Moog air traffic management product page (moog.com), Companies House (company 00989895), British Aviation Group member directory, ATC Network and Aviation Week Marketplace listings. Note: the registered entity Moog Fernau Limited files dormant accounts and is controlled by Moog Controls Limited; the navaids activity is branded under the wider Moog group. Headcount is not confirmed from a primary source; the medium band is indicative only."}, {"name": "MSI-Defence Systems Ltd", "website": "https://www.msi-dsl.com/", "linkedin": "https://uk.linkedin.com/company/msi-defence-systems-ltd", "hq": "Norwich, United Kingdom", "region": "East of England", "size": "medium", "headcount": "", "founded": "", "tags": ["defence", "maritime", "land", "munitions", "manufacturing", "hardware", "counter-uas", "size-medium", "type-manufacturer", "ownership-private", "mbr-ads"], "summary": "UK land and naval weapon systems specialist, the only UK-based medium calibre naval gun system manufacturer.", "body": "# MSI-Defence Systems Ltd\n\n> UK land and naval weapon systems specialist, the only UK-based medium calibre naval gun system manufacturer.\n\n## What they do\n\nMSI-Defence Systems (MSI-DS) is a UK-based land and naval weapon systems specialist and a world leader in small and medium calibre naval gun systems. It is the only UK-based medium calibre system manufacturer. The company supplies lightweight automated weapon mounts to the Royal Navy and to over 40 armed forces worldwide, and traces its engineering heritage back more than a century.\n\n## Products and solutions\n\n- **SEAHAWK** - multi-role naval weapon system available as the DS 25/30mm mounting and the lightweight LW 20mm mounting, in service with numerous navies.\n- **DS30M Mark 2** - 30mm automated small calibre gun mounting in service with the Royal Navy.\n- **TERRAHAWK** - land-based VSHORAD (very short range air defence) system.\n- **Stabilised systems** - stabilised mounts and radar mast systems.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-08** - MSI-DS and Kraken Technology Group agreed to integrate the SEAHAWK Compact Weapon Station (CWS30) and LMM launcher into the K5 KRAKEN maritime precision engagement vessel. [source](https://www.krakentechnology.com/into-kraken/wimuh8qax41w6iefzr0l7fp8h86hi9-djbda)\n- **2025-09** - MSI-DS showcased the TERRAHAWK VSHORAD at DSEI 2025 in London. [source](https://www.msi-dsl.com/)\n\n## Links\n\n- Website: https://www.msi-dsl.com/\n- LinkedIn: https://uk.linkedin.com/company/msi-defence-systems-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. MSI-Defence Systems website (msi-dsl.com), MSI-Defence Systems LinkedIn company page, Companies House (company 00954839), ADS Group members directory, Navy Lookout, Kraken Technology Group."}, {"name": "Neros Technologies", "website": "https://www.neros.tech/", "linkedin": "https://www.linkedin.com/company/neros-tech", "hq": "El Segundo, United States", "region": "", "size": "medium", "headcount": "", "founded": "2023", "tags": ["defence", "drones", "uas", "munitions", "autonomy", "manufacturing", "hardware", "size-medium", "type-manufacturer", "owned-foreign", "backed-vc"], "summary": "US drone manufacturer building tactical, attritable one-way attack drones for Western military forces, with a new UK subsidiary.", "body": "# Neros Technologies\n\n> US drone manufacturer building tactical, attritable one-way attack drones for Western military forces, with a new UK subsidiary.\n\n## What they do\n\nNeros makes tactical, attritable, one-way drones intended to give Western military forces an asymmetric advantage. The company says it was founded to onshore the manufacturing of drones critical to a modern arsenal, building first-person-view (FPV) systems and AI-enabled mission software with a secure supply chain free of critical Chinese components. It is headquartered in El Segundo, California, with manufacturing in California and additional offices including a UK subsidiary.\n\n## Products and solutions\n\n- **Archer** - mass-produced FPV drone built for modular payloads and resilient communications, with an NDAA-compliant supply chain; selected for the US Defense Innovation Unit's Blue UAS list.\n- **Archer Strike** - kinetic-enabled FPV variant for lethal effects at range in contested environments.\n- **Archer Fiber** - fibre-optic-controlled FPV drone, jam-resistant with no radio-frequency signature, launched with partner Kela Technologies and marketed as an NDAA-compliant fibre-optic FPV drone.\n- **Crossbow** - tactical ground control station with electronic-warfare resistance at range.\n- **Flatbow** - ground control system named alongside Archer in the US Army Purpose-Built Attritable Systems selection.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Blue UAS listed (US Defense Innovation Unit); NDAA-compliant supply chain.\n\n## Recent news\n\n- **2026-03-03** - Launched a UK subsidiary, Neros Technologies UK Ltd, with up to £10m investment over five years and a Swindon headquarters. [source](https://www.neros.tech/articles/neros-launches-uk-subsidiary-with-up-to-ps10m-investment-into-british-defence)\n- **2025-12-11** - Unveiled Archer Fiber, an NDAA-compliant fibre-optic FPV drone, with partner Kela Technologies. [source](https://www.unmannedsystemstechnology.com/2025/12/neros-kela-technologies-unveil-ndaa-compliant-fiber-optic-fpv-drone/)\n- **2025-11-07** - Closed a $75M Series B led by Sequoia Capital, taking total raised above $120M. [source](https://www.finsmes.com/2025/11/neros-raises-75m-in-series-b-funding.html)\n- **2025-11-06** - US Army selected the Neros Archer FPV drone for the Purpose-Built Attritable Systems (PBAS) programme. [source](https://www.businesswire.com/news/home/20251106525503/en/)\n- **2025-11-03** - Secured a multi-million-dollar US Marine Corps contract for Archer Strike FPV drones. [source](https://www.neros.tech/articles/neros-secures-multi-million-marine-corps-contract-for-archer-strike-fpv-drones)\n\n## Links\n\n- Website: https://www.neros.tech/\n- LinkedIn: https://www.linkedin.com/company/neros-tech\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (neros.tech), LinkedIn company page, BusinessWire and FinSMEs funding coverage, Unmanned Systems Technology, Army Technology, and ADS Advance. Headcount not published by the company; the medium band is an estimate from third-party aggregators (PitchBook, Wikipedia) and the firm is scaling rapidly. Founded 2023. Primary HQ El Segundo, California; UK subsidiary based in Swindon."}, {"name": "Nexor Limited", "website": "https://www.nexor.com/", "linkedin": "https://uk.linkedin.com/company/nexor", "hq": "Nottingham, United Kingdom", "region": "East Midlands", "size": "small", "headcount": "", "founded": "", "tags": ["defence", "cyber", "software", "data", "size-small", "type-vendor", "ownership-private"], "summary": "UK cyber security company specialising in secure information exchange and cross-domain solutions.", "body": "# Nexor Limited\n\n> UK cyber security company specialising in secure information exchange and cross-domain solutions.\n\n## What they do\n\nNexor is a privately held UK cyber security company based in Nottingham, providing products and services to safeguard government, defence and critical national infrastructure systems. It specialises in secure information exchange, or cross-domain, solutions that enforce the controlled flow of data between separate security domains, applying data validation, sanitisation and policy enforcement so only authorised, clean information is exchanged. Nexor states more than 30 years of work alongside the UK MOD and NATO; the company traces its origins to X-Tel Services Limited, founded in 1989, later renamed Nexor.\n\n## Products and solutions\n\n- **Nexor GuarDiode** - secure, uni-directional data transfer to safely import and filter data from untrusted networks.\n- **Nexor Guardian** - reduces risk of malware attacks and data loss across domains.\n- **Nexor Data Diode** - hardware-enforced one-way transfer preventing data leaking back to an untrusted network.\n- **Nexor Sentinel** - prevents information loss via email and reduces malware risk.\n\n## Recent news\n\n- **2024-07** - SInfoE, developed by Nexor for the UK MOD, was tested during the Acheron trials integrating Royal Navy, British Army and Royal Air Force units with industry unmanned systems. [source](https://www.nexor.com/blog/enabling-the-future-of-uk-defence)\n- **2025** - Nexor highlighted its cross-domain and secure information sharing work in the context of the UK Strategic Defence Review 2025. [source](https://www.nexor.com/blog/inside-the-2025-strategic-defence-review)\n\n## Links\n\n- Website: https://www.nexor.com/\n- LinkedIn: https://uk.linkedin.com/company/nexor\n\n## Sources\n\nPublic information verified 2026-06-29. Nexor website (nexor.com), Nexor LinkedIn company page, Companies House (company 05152465), Nexor blog, Wikipedia (Nexor)."}, {"name": "NightSearcher Ltd", "website": "https://nightsearcher.co.uk", "linkedin": "https://www.linkedin.com/company/nightsearcher-limited", "hq": "Portsmouth, UK", "region": "South East", "size": "small", "headcount": "", "founded": "1989", "tags": ["defence", "hardware", "manufacturing", "land", "size-small", "type-manufacturer", "owned-uk", "mbr-ads"], "summary": "British designer and manufacturer of portable rechargeable LED lighting and portable power, supplied to the armed forces among other professional users.", "body": "# NightSearcher Ltd\n\n> British designer and manufacturer of portable rechargeable LED lighting and portable power, supplied to the armed forces among other professional users.\n\n## What they do\n\nNightSearcher designs and manufactures premium rechargeable and portable LED lighting and portable power solutions. Its floodlights, worklights, searchlights, flashlights, head torches and inspection lamps are used by the armed forces, police, fire and rescue, construction, oil and gas, and rail sectors worldwide. The company also produces ATEX-certified intrinsically safe lighting and battery-powered portable power stations as an alternative to fuel generators.\n\n## Products and solutions\n\n- **StratoStar** - rechargeable multi-directional tower floodlight with four light-heads and 360 degree adjustable illumination, marketed for sectors including military operations.\n- **Sigma ATEX range** - intrinsically safe flashlights, head torches, hand lamps and floodlights for hazardous environments.\n- **GenZero** - rechargeable portable power stations for off-grid and remote power.\n- **Flashlights, head torches and searchlights** - rechargeable LED hand-held and head-worn lighting.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026** - Published its 2026 lighting catalogue covering the current product range. [source](https://cdn.shopify.com/s/files/1/0780/6038/8696/files/NightSearcher_lighting_catalogue_2026.pdf)\n\n## Links\n\n- Website: https://nightsearcher.co.uk\n- LinkedIn: https://www.linkedin.com/company/nightsearcher-limited\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, ADS members directory, Companies House."}, {"name": "Nominal", "website": "https://nominal.io/", "linkedin": "https://www.linkedin.com/company/nominal-inc", "hq": "Los Angeles, United States", "region": "", "size": "medium", "headcount": "", "founded": "2022", "tags": ["defence", "software", "data", "test-evaluation", "ai", "aerospace", "size-medium", "type-software", "owned-foreign", "backed-vc"], "summary": "US software company building a unified test and mission data platform for defence, aerospace and other complex hardware programmes.", "body": "# Nominal\n\n> US software company building a unified test and mission data platform for defence, aerospace and other complex hardware programmes.\n\n## What they do\n\nNominal builds a unified software stack for hardware engineering teams, letting them test and iterate on physical systems as quickly as software teams ship code. Its platform captures, organises, monitors, visualises and securely shares high-rate test and operational data from complex hardware including aircraft, hypersonics, satellites and autonomous vehicles. The company has roots in aerospace and defence, founded by engineers from Anduril, Lockheed Martin and Palantir, and is headquartered in Los Angeles with offices including London.\n\n## Products and solutions\n\n- **Nominal Core** - secure cloud workbench for managing, monitoring and analysing high-rate sensor data, logs, video, simulation results and procedures in one time-aligned, collaborative view, with trend analysis, anomaly detection and synchronised post-test replay.\n- **Nominal Connect** - Python-first edge platform for building custom hardware-in-the-loop applications, handling sensor streams at kilohertz rates and streaming large volumes of test and video data from a test bench into Nominal.\n\n## Recent news\n\n- **2026-04-30** - Acquired Fid Labs to bring AI agents to the full hardware engineering lifecycle. [source](https://www.globenewswire.com/news-release/2026/04/30/3284606/0/en/nominal-acquires-fid-labs-to-bring-ai-to-the-full-hardware-engineering-lifecycle.html)\n- **2026-03-05** - Reached a $1bn valuation in an $80M round led by Founders Fund, taking total raised to $155M in 10 months, with international expansion including a London office. [source](https://techcrunch.com/2026/03/05/hardware-testing-startup-nominal-hits-1b-valuation-raises-155m-in-10-months/)\n- **2025-06-25** - Raised a $75M Series B led by Sequoia Capital to modernise hardware testing. [source](https://www.prnewswire.com/news-releases/nominal-raises-75-million-led-by-sequoia-capital-to-modernize-hardware-testing-302479991.html)\n\n## Links\n\n- Website: https://nominal.io/\n- LinkedIn: https://www.linkedin.com/company/nominal-inc\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (nominal.io), LinkedIn company page, TechCrunch, GlobeNewswire, PR Newswire and MIT News. Legal entity Nominal, Inc.; founded 2022. Headcount not published; the medium band is an estimate from public indicators (Series B-stage, 60-plus customer organisations, four offices). Named public customers include Anduril, Shield AI and the US Air Force."}, {"name": "Northrop Grumman Corporation", "website": "https://www.northropgrumman.com/", "linkedin": "https://www.linkedin.com/company/northrop-grumman-corporation", "hq": "Falls Church, United States", "region": "", "size": "large", "headcount": "~95000", "founded": "1994", "tags": ["defence", "air", "space", "isr", "c2", "ew", "sensors", "cyber", "munitions", "autonomy", "manufacturing", "size-large", "type-prime", "owned-foreign", "listed", "mbr-ads"], "summary": "Global US aerospace and defence prime operating across air, space, defence and cyberspace, with established UK operations.", "body": "# Northrop Grumman Corporation\n\n> Global US aerospace and defence prime operating across air, space, defence and cyberspace, with established UK operations.\n\n## What they do\n\nNorthrop Grumman is a global aerospace and defence technology company working across space, aeronautics, defence and cyberspace. It designs, develops and manufactures systems for national security and commercial customers across the air, land, sea, space and cyber domains, and is one of the largest contractors to the US federal government. It is listed on the New York Stock Exchange under ticker NOC, headquartered in Falls Church, Virginia, and maintains UK operations through Northrop Grumman UK Limited.\n\n## Products and solutions\n\n- **Aeronautics Systems** - manned and unmanned air systems, including military aircraft, autonomous systems and aerospace structures; lead contractor for the B-21 Raider next-generation stealth bomber.\n- **Defense Systems** - modernisation and sustainment, battle command systems, directed energy, tactical weapons and armaments.\n- **Mission Systems** - cyber-secure, software-defined systems including sensors, radars, electronic warfare and C4ISR.\n- **Space Systems** - space and launch systems for national security, civil and commercial customers.\n- **UK operations** - cyber and technology facilities in Cheltenham, London, Manchester and New Malden; the New Malden site specialises in marine navigation systems, radars, integrated bridge systems and integrated platform management systems.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group member; UKspace member.\n\n## Recent news\n\n- **2026-06-22** - Awarded a five-year US Army contract to produce the M1147 Advanced Multi-Purpose (AMP) tank ammunition round. [source](https://news.northropgrumman.com/armaments/northrop-grumman-awarded-multiple-year-contract-to-produce-advanced-multi-purpose-tank-ammunition-round)\n- **2026-04-29** - Won a $488M sole-source contract for global F-16 radar support. [source](https://news.clearancejobs.com/2026/04/29/northrop-grumman-wins-488m-sole-source-contract-for-global-f-16-radar-support/)\n- **2026-03-30** - Awarded a US Navy contract modification for the SEWIP Block 3 maritime electronic attack system. [source](https://news.northropgrumman.com/electronic-warfare/northrop-grumman-awarded-contract-modification-for-sewip-block-3-maritime-electronic-attack-system)\n\n## Links\n\n- Website: https://www.northropgrumman.com/\n- LinkedIn: https://www.linkedin.com/company/northrop-grumman-corporation\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (northropgrumman.com) and UK presence page, LinkedIn company page, Northrop Grumman newsroom, ClearanceJobs, ADS Group members directory and UKspace. Companies House (Northrop Grumman UK Limited, company number 05989428, incorporated 6 November 2006; registered office 26-27 Oxendon Street, London SW1Y 4EL). Global HQ Falls Church, Virginia; formed 1994 from the merger of Northrop and Grumman; NYSE ticker NOC. Global headcount approximately 95,000 per public figures."}, {"name": "Nova Systems", "website": "https://www.novasystems.com/", "linkedin": "https://www.linkedin.com/company/nova-systems-international", "hq": "Adelaide, Australia", "region": "South West England", "size": "large", "headcount": "1000+", "founded": "2000", "tags": ["defence", "test-evaluation", "software", "data", "air", "maritime", "cyber", "training", "simulation", "uas", "size-large", "type-consultancy", "owned-uk", "owned-foreign", "mbr-ads"], "summary": "One of the largest Australian-owned defence and security companies, a global provider of capability assurance, test and evaluation and systems integration, with a UK arm based in Bristol.", "body": "# Nova Systems\n\n> One of the largest Australian-owned defence and security companies, a global provider of capability assurance, test and evaluation and systems integration, with a UK arm based in Bristol.\n\n> Australian-owned. Global HQ in Adelaide, South Australia. The UK arm is Nova Systems (International) Ltd, registered at Filton, Bristol (Companies House 03752187).\n\n## What they do\n\nNova Systems is a 100% Australian-owned engineering services and technology solutions company partnering with clients in national defence, essential services, border control, cyber security and civil aerospace. It is a provider of test and evaluation, certification and systems assurance, and delivers specialist systems engineering advice alongside digital technology, software and systems integration. It operates from offices across Australia, New Zealand, the UK, Ireland, Singapore and Norway.\n\n## Products and solutions\n\n- **Test and evaluation** - certification, systems assurance and a Test and Evaluation Centre of Excellence bringing together defence, industry and academia.\n- **Systems integration** - integration of complex platforms and systems.\n- **Software and digital solutions** - digital technology and software delivery.\n- **Aircraft modifications** - including special-mission aircraft integration.\n- **Advanced training** - training services.\n- **Advisory and engineering services** - specialist systems engineering advice and professional services.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group member.\n\n## Recent news\n\n- **2025-11** - Announced its first European Completion Centre via an agreement with AIR LLOYD Aerotechnics (Germany) for integration and delivery of special-mission aircraft. [source](https://www.rotorhub.com/nova-systems/)\n- **2025-10** - Reported continued collaboration with the UK Ministry of Defence to advance experimentation and capability development. [source](https://www.novasystems.com/int/news/mod-synthetics)\n- **2025-09** - Exhibited group-wide capabilities at DSEI UK 2025 as part of the Team Defence Australia pavilion. [source](https://uk.linkedin.com/company/nova-systems-international)\n\n## Links\n\n- Website: https://www.novasystems.com/\n- LinkedIn: https://www.linkedin.com/company/nova-systems-international\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (novasystems.com), LinkedIn company page, Companies House (03752187), ADS member directory, and defence trade press. Global headcount of more than 1,000 stated publicly; a discrete UK-only figure was not found. Recent news dates are month-level where the underlying source did not state a precise day."}, {"name": "NP Aerospace", "website": "https://npaerospace.com/", "linkedin": "https://www.linkedin.com/company/npaerospace", "hq": "Coventry, England", "region": "West Midlands", "size": "large", "headcount": "~350", "founded": "1926", "tags": ["defence", "land", "manufacturing", "hardware", "test-evaluation", "logistics", "size-large", "type-manufacturer", "owned-uk", "mbr-ads"], "summary": "Coventry-headquartered armour manufacturer and military vehicle integrator delivering survivability and protection solutions for defence and security customers worldwide.", "body": "# NP Aerospace\n\n> Coventry-headquartered armour manufacturer and military vehicle integrator delivering survivability and protection solutions for defence and security customers worldwide.\n\n## What they do\n\nNP Aerospace describes itself as a world-leading armour manufacturer and vehicle integrator delivering high-performance defence and security solutions and engineering services, drawing on close to 100 years of experience producing lightweight survivability solutions from advanced materials. Its Coventry Advanced Armour Systems facility houses engineering, design, composites and armour manufacturing alongside a UKAS-accredited Ballistics Centre of Excellence. Its vehicle systems team handles full military vehicle integration, through-life support, repairs and refurbishment, and acts as Engineering Authority for the UK MoD's Protected Mobility fleet.\n\n## Products and solutions\n\n- **Composite vehicle armour systems** - lightweight add-on and integrated armour for military vehicles.\n- **Vehicle integration and through-life support** - full military vehicle integration, repairs, refurbishment and spares; Engineering Authority for the UK MoD Protected Mobility fleet.\n- **Ballistic helmets and shields** - personal protection products.\n- **Explosive Ordnance Disposal (EOD) suits** - protective equipment for ordnance disposal.\n- **Body armour plates** - personal survivability systems.\n- **LC300 armoured vehicle** - upgraded armoured platform; entered full-rate production from January 2026.\n- **Ballistics testing services** - independently UKAS ISO/IEC 17025 accredited laboratory.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001 and ISO 14001 (Coventry Advanced Armour Systems facility); UKAS ISO/IEC 17025 accredited Ballistics Centre of Excellence.\n- **Memberships:** ADS Group member.\n\n## Recent news\n\n- **2026-06-23** - Announced a definitive agreement to acquire US-based Iten Defense, expanding into the US market, subject to regulatory approvals. [source](https://npaerospace.com/np-aerospace-to-acquire-iten-defense-and-expand-into-the-us-market/)\n- **2025-05-20** - Opened a new military vehicle armour complex in England. [source](https://thedefensepost.com/2025/05/20/np-aerospace-armor-complex/)\n- **2025-05** - Awarded a multi-year add-on armour contract from General Dynamics Land Systems-Canada for a LAV international order. [source](https://www.edrmagazine.eu/%E2%96%BA-np-aerospace-canada-receives-multi-year-contract-from-general-dynamics-land-systems-for-add-on-armour-systems)\n\n## Links\n\n- Website: https://npaerospace.com/\n- LinkedIn: https://www.linkedin.com/company/npaerospace\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (npaerospace.com), LinkedIn company page, Companies House (03472480), ADS member directory, and reputable defence press (The Defense Post, EDR Magazine, Soldier Systems). Heritage founding date 1926 per company history page; the current limited company entity was incorporated later. Headcount of approximately 350 reported in trade press (March 2025); third-party aggregators give lower, older figures."}, {"name": "NquiringMinds", "website": "https://nquiringminds.com/", "linkedin": "https://www.linkedin.com/company/nquiringminds", "hq": "Southampton, United Kingdom", "region": "South East England", "size": "small", "headcount": "11-50", "founded": "2010", "tags": ["defence", "cyber", "ai", "data", "software", "size-small", "type-software", "owned-uk"], "summary": "Southampton-based trusted AI and cyber security company building secure data-sharing and analytics for defence, government and industry.", "body": "# NquiringMinds\n\n> Southampton-based trusted AI and cyber security company building secure data-sharing and analytics for defence, government and industry.\n\n## What they do\n\nNquiringMinds describes itself as a trusted AI company building advanced analytics on top of solid cyber security principles. Founded in 2010 by AI and cyber security experts from the mobile and defence research industries, it builds secure data-sharing solutions for central government, the wider public sector, and industrial manufacturing and agriculture. Its stated areas of expertise are AI-powered data analytics, secure data sharing and cyber-resilient Internet of Things, with customers across smart cities, Industry 4.0, defence, agriculture, telecoms and health and social care.\n\n## Products and solutions\n\n- **TDX (Trusted Data Exchange)** - cloud-based secure data-sharing and AI-powered analytics platform built for security and scale, handling large-scale and real-time IoT data with owner-controlled access and selective sharing.\n- **InterliNQ** - secure IoT hub technology for small, low-power devices, providing security from hardware through to a PKI certificate-based application layer using a peer-to-peer cryptographic model.\n\nRelated consortium initiatives include TAIBOM (a trustable AI bill of materials, led by NquiringMinds with partners including BAE Systems and BSI, funded by the UKRI Technology Missions Fund) and Secure Networking by Design work with TechWorks and the University of Oxford.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** Participant in the Defence and Security Accelerator (DASA) innovation programme; UKRI Technology Missions Fund (TAIBOM); research collaborations with the University of Oxford and TechWorks.\n\n## Recent news\n\n- **2025-04-29** - TAIBOM project entered its next phase with an invitation to contribute to the trustable AI bill of materials framework. [source](https://nquiringminds.com/news/taibom-launch/)\n- **2025-02-25** - Presented on engineering trustworthiness in AI systems at a TechWorks event at Bletchley Park. [source](https://nquiringminds.com/news/computing-breakthrough-and-cognitive-router-technology-promises-secure-networking-by-design/)\n\n## Links\n\n- Website: https://nquiringminds.com/\n- LinkedIn: https://www.linkedin.com/company/nquiringminds\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (nquiringminds.com), LinkedIn company page, Companies House (NQUIRINGMINDS LIMITED, company number 07452630, incorporated 26 November 2010), Southampton Science Park business directory, University of Southampton ECS, IoT Security Foundation and Land Mobile. Size band 11-50 per LinkedIn. No Cyber Essentials, ISO 27001, G-Cloud, techUK or ADS membership evidenced in public sources."}, {"name": "Ocean Infinity Group (UK) Ltd", "website": "https://oceaninfinity.com", "linkedin": "https://www.linkedin.com/company/ocean-infinity-llc", "hq": "Southampton, UK / Austin, USA", "region": "South East", "size": "large", "headcount": "~500", "founded": "2017", "tags": ["defence", "maritime", "robotics", "autonomy", "isr", "data", "size-large", "type-scaleup", "owned-foreign"], "summary": "Large-scale marine robotics company operating fleets of uncrewed surface and underwater vehicles for ocean data and maritime defence.", "body": "# Ocean Infinity Group (UK) Ltd\n\n> Large-scale marine robotics company operating fleets of uncrewed surface and underwater vehicles for ocean data and maritime defence.\n\n## What they do\n\nOcean Infinity deploys fleets of marine robots, operated remotely from onshore control centres via satellite, to capture ocean and seabed data and deliver maritime solutions. The company describes itself as a pioneer of large-scale marine robotic operations, working across survey, offshore energy and defence markets. Operations are run from control centres in Southampton and Austin.\n\n## Products and solutions\n\n- **Armada fleet** - robotic and optionally-crewed surface vessels (78-metre and 86-metre classes) operated remotely from shore.\n- **Infinity fleet** - autonomous underwater vehicles (AUVs) for deep-ocean data acquisition.\n- **NeedleFish USV** - 14-metre dual-hull uncrewed surface vessel for patrol, surveillance, mapping and survey.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** AUVSI (Association for Uncrewed Vehicle Systems International).\n\n## Recent news\n\n- **2025-04-29** - Joined a Helsing-led maritime partnership (with QinetiQ and others) to apply AI and autonomy to countering underwater threats and protecting undersea infrastructure. [source](https://www.navalnews.com/naval-news/2025/04/helsing-announces-international-industry-partnership-to-harness-ai-and-autonomy-in-countering-underwater-threats/)\n- **2025-07-03** - Launched the NeedleFish USV with the Kuwait Coast Guard for patrol and surveillance of territorial waters. [source](https://oceaninfinity.com/news/ocean-infinity-launches-needlefish-usv-in-kuwait/)\n- **2025-12-15** - Completed its Armada fleet milestone with delivery of the final vessel. [source](https://oceaninfinity.com/news/ocean-infinity-completes-armada-fleet-milestone-with-delivery-of-final-vessel/)\n\n## Links\n\n- Website: https://oceaninfinity.com\n- LinkedIn: https://www.linkedin.com/company/ocean-infinity-llc\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, LinkedIn company page, Companies House (03072527), Naval News, Naval Today, MarineLink."}, {"name": "OrbiSky Ltd", "website": "https://orbisky.com", "linkedin": "https://www.linkedin.com/company/orbisky", "hq": "London, UK", "region": "London", "size": "micro", "headcount": "", "founded": "2024", "tags": ["space", "software", "autonomy", "data", "size-micro", "type-startup", "owned-uk"], "summary": "London-based space technology startup building assurance, verification and evidence infrastructure for autonomous in-orbit operations.", "body": "# OrbiSky Ltd\n\n> London-based space technology startup building assurance, verification and evidence infrastructure for autonomous in-orbit operations.\n\n> Note: civil/commercial space company with dual-use potential. No confirmed defence contract, DASA funding or NATO DIANA participation found in public sources as of 2026-06-29. Included pending review of defence relevance.\n\n## What they do\n\nOrbiSky is a space technology company focused on secure autonomy, verification and assurance for space operations. It describes itself as building the evidence layer for autonomous in-orbit operations, turning mission and process telemetry into structured, auditable evidence packs for in-space manufacturing and in-orbit servicing, assembly and manufacturing (ISAM).\n\n## Products and solutions\n\n- **Mission evidence infrastructure** - converts process telemetry, logs and control actions into reviewable evidence packs.\n- **Anomaly-aware verification** - flags missing, delayed or off-nominal data with traceability to affected claims and decisions.\n- **SkyYield** - study to manufacture and process ZBLAN fluoride-glass optical fibre in microgravity, including process controls and verification.\n\n## Recent news\n\n- **2026-02-09** - Awarded £295,000 by the UK Space Agency for the SkyYield study into processing and verifying ZBLAN fluoride glass in microgravity. [source](https://www.gov.uk/government/news/new-studies-for-manufacturing-advanced-materials-in-orbit)\n\n## Links\n\n- Website: https://orbisky.com\n- LinkedIn: https://www.linkedin.com/company/orbisky\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, LinkedIn company page, Companies House (15750515), GOV.UK (UK Space Agency)."}, {"name": "Oxford Dynamics Limited", "website": "https://oxdynamics.com", "linkedin": "https://www.linkedin.com/company/oxford-dynamics", "hq": "Harwell, UK", "region": "South East", "size": "small", "headcount": "", "founded": "2020", "tags": ["defence", "ai", "robotics", "autonomy", "c2", "counter-uas", "software", "size-small", "type-sme", "owned-uk", "prog-dasa", "mbr-ads"], "summary": "UK sovereign AI defence company building multi-agent AI and robotics for sensing, sense-making and action at the tactical edge.", "body": "# Oxford Dynamics Limited\n\n> UK sovereign AI defence company building multi-agent AI and robotics for sensing, sense-making and action at the tactical edge.\n\n## What they do\n\nOxford Dynamics describes itself as a sovereign AI defence company building a unified system for sensing, sense-making and action, with AI and robotics at the edge and humans in control. It engineers autonomous systems, robotics and multi-agent AI for defence forces, with systems trained on real-world scenarios and engineered for regulated, contested domains. The company is based at Harwell Campus in Oxfordshire.\n\n## Products and solutions\n\n- **AVIS (A Very Intelligent System)** - flagship multi-agent AI engine; a modular, containerised data-interrogation and analytics platform providing explainable insights and command-and-control from tactical edge to command level in bandwidth-denied environments.\n- **SR-1** - multi-sensor robot for drone detection, fusing EO/IR, RF, LiDAR and radar for passive scouting and AI-directed investigation.\n- **STRIDER** - autonomous ground robotic platform for hazardous (CBRN, ordnance, logistics) environments with hot-swap payloads and beyond-line-of-sight tele-operation.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** UK MOD Digital Decision Accelerators for Defence (DDAD) Open Framework, Lot 2; UK MOD Enterprise Agreement LITE.\n- **Programmes:** DASA and Dstl funding history (first DASA contract 2020).\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-08-07** - BAE Systems made a strategic minority investment in Oxford Dynamics. [source](https://www.army-technology.com/news/bae-systems-oxford-dynamics-ai/)\n- **2026-02-17** - Secured a place on the UK MOD Digital Decision Accelerators for Defence (DDAD) Open Framework, the primary delivery route for the British Army's ASGARD programme. [source](https://oxdynamics.com/oxford-dynamics-secures-place-on-uk-ministry-of-defence-digital-decision-open-framework/)\n\n## Links\n\n- Website: https://oxdynamics.com\n- LinkedIn: https://www.linkedin.com/company/oxford-dynamics\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, LinkedIn company page, Companies House (12274185), ADS members directory, Army Technology, UK Defence Journal, Find a Tender."}, {"name": "QinetiQ Group plc", "website": "https://www.qinetiq.com", "linkedin": "https://uk.linkedin.com/company/qinetiq_2", "hq": "Farnborough, United Kingdom", "region": "South East", "size": "large", "headcount": "8,000+", "founded": "", "tags": ["defence", "test-evaluation", "training", "isr", "cyber", "sensors", "simulation", "software", "size-large", "type-prime", "listed", "owned-uk", "mbr-ads"], "summary": "A British defence technology company providing test and evaluation, training, and technical services across air, land, sea and cyber.", "body": "# QinetiQ\n\n> A British defence technology company providing test and evaluation, training, and technical services across air, land, sea and cyber.\n\n## What they do\n\nQinetiQ Group plc is a British defence technology company headquartered at Cody Technology Park, Farnborough. It operates primarily in the defence, security and critical national infrastructure markets, running test and evaluation capabilities for air, land, sea and target systems and providing technical support, training and know-how to customers in the UK and North America. The company employs more than 8,000 people.\n\n## Products and solutions\n\n- **Test and evaluation** - operation of UK MOD land, sea and air ranges and test facilities under the Long Term Partnering Agreement.\n- **Training and mission rehearsal** - simulation, synthetic training and operational support.\n- **Robotics and autonomy** - uncrewed systems and target systems.\n- **Cyber, information and intelligence** - technical services across defence and national security.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-05** - A five-year, GBP 1.54 billion extension to the Long Term Partnering Agreement was announced between QinetiQ and the MOD for test and evaluation services, supporting more than 1,200 UK jobs to 2033. [source](https://des.mod.uk/15-billion-contract-with-qinetiq-for-test-and-evaluation-services-secures-1-200plus-uk-jobs/)\n\n## Links\n\n- Website: https://www.qinetiq.com\n- LinkedIn: https://uk.linkedin.com/company/qinetiq_2\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (qinetiq.com), LinkedIn company page, Companies House, Wikipedia, UK Defence Equipment & Support, ADS Group."}, {"name": "Raptor Photonics Limited", "website": "https://www.raptorphotonics.com/", "linkedin": "https://www.linkedin.com/company/raptor-photonics-ltd/", "hq": "Larne, United Kingdom", "region": "Northern Ireland", "size": "small", "headcount": "11-50", "founded": "2006", "tags": ["defence", "sensors", "optronics", "isr", "space", "hardware", "manufacturing", "size-small", "type-manufacturer", "accr-iso9001", "accr-ce-plus", "mbr-ads"], "summary": "Northern Ireland manufacturer of high-performance, low-light digital cameras and sensor cores for surveillance, aerospace, space and scientific markets.", "body": "# Raptor Photonics\n\n> Northern Ireland manufacturer of high-performance, low-light digital cameras and sensor cores for surveillance, aerospace, space and scientific markets.\n\n## What they do\n\nRaptor Photonics designs, manufactures and sells high-performance, low-light-level digital cameras and camera core engines for surveillance, aerospace and space, scientific and industrial OEM markets. It supplies both off-the-shelf and custom solutions using CCD, EMCCD, CMOS and InGaAs sensors across UV, visible and SWIR wavebands, with cameras built to military specifications and optimised for size, weight and power in harsh environments. Its ISTAR camera systems are deployed on electro-optic platforms from the sea-bed to space, including gimbals and turrets on air, sea and land platforms and payloads on low Earth orbit missions.\n\n## Products and solutions\n\n- **Eagle** - deep-cooled scientific CCD cameras.\n- **Hawk** - compact, rugged CMOS cameras for electro-optic integration.\n- **Owl** - SWIR and Vis-SWIR InGaAs cameras for night vision and surveillance.\n- **Ninox** - cooled SWIR and Vis-SWIR InGaAs cameras.\n- **Kestrel 640 eSWIR** - extended-SWIR camera with IRNova T2SL sensor, Stirling-cooled to 170K.\n- **Eagle XV / Eagle XO** - X-ray cameras.\n- **OEM solutions** - block cores for gimbals and EO turrets, flight-ready camera cores for space, hyperspectral and spectroscopy cores.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001:2015; IPC-A-610 Class 3; Cyber Essentials and Cyber Essentials PLUS. Cameras designed to MIL-STD-810F and MIL-STD-704F.\n- **Memberships:** ADS Group; Northern Ireland Photonics (NI-PIC).\n\n## Recent news\n\n- **2026-04-16** - Introduced the Kestrel 640 eSWIR extended-SWIR camera (originally announced as the Owl eSWIR 640). [source](https://www.raptorphotonics.com/raptor-continues-to-innovate-with-the-owl-eswir-640/)\n- **2026-04** - Launched a new 5.2MP stabilised Vis-SWIR camera (Owl 2560 family). [source](https://www.edrmagazine.eu/raptor-photonics-launches-new-5-2mp-stabilised-vis-swir-camera)\n\n## Links\n\n- Website: https://www.raptorphotonics.com/\n- LinkedIn: https://www.linkedin.com/company/raptor-photonics-ltd/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (raptorphotonics.com), ADS Group member profile (adsgroup.org.uk/members/raptor-photonics-ltd-2), Companies House (company NI060799), EDR Magazine, Northern Ireland Photonics member directory."}, {"name": "Roke", "website": "https://www.roke.co.uk/", "linkedin": "https://www.linkedin.com/company/roke-manor-research", "hq": "Romsey, England", "region": "South East England", "size": "large", "headcount": "", "founded": "1956", "tags": ["defence", "ai", "cyber", "comms", "isr", "ew", "sensors", "rf", "counter-uas", "autonomy", "gis", "test-evaluation", "size-large", "type-consultancy", "owned-uk", "mbr-ads"], "summary": "British defence and national-security technology and engineering company specialising in sensors, communications, electromagnetic warfare, cyber, AI and autonomy, part of Chemring Group.", "body": "# Roke\n\n> British defence and national-security technology and engineering company specialising in sensors, communications, electromagnetic warfare, cyber, AI and autonomy, part of Chemring Group.\n\n## What they do\n\nRoke integrates physical and digital systems to solve complex challenges across communications, sensors, cyber security, artificial intelligence and autonomy. It operates in the defence, national security and geospatial intelligence sectors for public and private clients, delivering advanced research and development, services and technologies. It is also a recognised crypto test house for UK Government.\n\n## Products and solutions\n\n- **CORTEXA GUARDIAN** - modular, mast-mounted system combining RADAR and PTZ sensor inputs for autonomous detect, track and identify, enhancing counter-UAS.\n- **EM-Vis Deceive** - electromagnetic attack system.\n- **EM-Vis Resolve** - electromagnetic warfare system for interception and location of radio communications signals.\n- **Pattern of Life** - cyber-range solution providing realistic user emulation to test security teams and optimise cyber ranges.\n- **Tactical wideband EW sensor** - adaptive beamforming and direction finding for electromagnetic awareness in contested environments.\n- **Dismounted EW sensor** - field-proven find, fix and intercept against peer threats.\n- **Acoustic sensor system** - detection and geolocation of artillery fire.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Recognised UK Government crypto test house.\n- **Memberships:** ADS Group member; Counter-EO UK member.\n\n## Recent news\n\n- **2026-04-30** - Launched the \"Works with Roke\" defence partner scheme, an integration framework giving an interoperability badge to tested partner products. [source](https://thedefensepost.com/2026/04/30/roke-integration-defense-partners/)\n- **2025-04** - Won a UK MoD missile-defence research contract worth up to £251m, becoming delivery lead for Project STORM at the MoD Missile Defence Centre. [source](https://thedefensepost.com/2025/04/18/roke-uk-missile-defense/)\n- **2025-01-14** - Announced a strategic supply agreement with a major US prime contractor. [source](https://www.chemring.com/media/press-releases/2025/14-01-2025)\n\n## Links\n\n- Website: https://www.roke.co.uk/\n- LinkedIn: https://www.linkedin.com/company/roke-manor-research\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (roke.co.uk), LinkedIn company page, Companies House (00267550), ADS member directory, Chemring Group press releases, and reputable defence press (The Defense Post, Army Technology, Janes). Legal entity is Roke Manor Research Limited; founded 1956 as Plessey Research Roke Manor. Current owner is Chemring Group PLC (since 2010). Public headcount figures vary between approximately 350 (engineers and scientists) and approximately 1,000 (total, per filings); both place it in the large band."}, {"name": "Sagentia Defence", "website": "https://sagentia.com/defence/", "linkedin": "https://www.linkedin.com/company/sagentiadefence", "hq": "Bristol, United Kingdom", "region": "South West England", "size": "large", "headcount": "", "founded": "", "tags": ["defence", "simulation", "c2", "maritime", "air", "land", "space", "data", "software", "size-large", "type-consultancy", "listed", "accr-iso27001", "accr-ce-plus", "mbr-ads"], "summary": "Defence science and technology consultancy, formerly TP Group, part of Science Group plc.", "body": "# Sagentia Defence\n\n> Defence science and technology consultancy, formerly TP Group, part of Science Group plc.\n\n## What they do\n\nSagentia Defence, formerly TP Group, provides science and technology consultancy on mission-critical defence programmes. It positions itself as an independent, agnostic adviser and a trusted customer friend to the MOD, with defence experience spanning over 60 years. It works with national government bodies, international institutions and global prime contractors on systems engineering, feasibility analysis, enterprise transformation and programme delivery across the science and technology, maritime, air, land, joint, space and defence digital domains, across the full CADMID lifecycle. It is part of Science Group plc, an LSE-listed science and technology group headquartered near Cambridge that consolidated several consultancies under the Sagentia brand in 2025.\n\n## Products and solutions\n\n- **Operational analysis** - technology analysis, roadmapping, modelling and simulation, requirements and decision analysis.\n- **Cost engineering** - independent cost modelling, estimating and risk analysis.\n- **Project, programme and portfolio management (P3M)** - managing complex defence programmes from inception to delivery.\n- **Safety assurance and certification** - through-life safety across civil and military domains.\n- **Supportability engineering** - integrated logistics support and supply chain management against MOD standards.\n- **Systems engineering** - full lifecycle, applying ISO 15288.\n- **Analysis and innovation** - pre-concept analysis, rapid concept generation and prototyping.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001; ISO/IEC 27001:2022; Cyber Essentials; Cyber Essentials PLUS; JOSCAR registered.\n- **Memberships:** ADS Group; INCOSE UK; APM; IET; IMechE; Operational Research Society; SCAF.\n\n## Recent news\n\n- **2025-03-17** - Launched the Sagentia Defence brand, replacing TP Group and integrating more than 300 consultants. [source](https://sagentia.com/news/sagentia-defence-a-new-era-for-the-former-tp-group/)\n- **2026** - Published an insight on defence readiness as the defining priority for 2026, tied to the 2025 Strategic Defence Review. [source](https://sagentia.com/insight/defence-in-2026-readiness-is-the-defining-priority/)\n\n## Links\n\n- Website: https://sagentia.com/defence/\n- LinkedIn: https://www.linkedin.com/company/sagentiadefence\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: Sagentia Defence website (sagentia.com/defence), ADS Group member profile (adsgroup.org.uk/members/sagentia-defence-1), Science Group plc (sciencegroup.com), Companies House. Note: Sagentia Defence is a practice brand of Science Group plc (formerly TP Group, acquired January 2023); a single definitive legal entity name and registration number for the defence brand is not cleanly confirmable on the public register, so omitted. The large size band reflects the Science Group total of around 540 employees; standalone defence headcount is not public. The defence practice is Bristol-centred; the group is headquartered at Harston, near Cambridge."}, {"name": "Sintela Limited", "website": "https://sintela.com/", "linkedin": "https://www.linkedin.com/company/sintela", "hq": "Bristol, United Kingdom", "region": "South West England", "size": "small", "headcount": "", "founded": "2017", "tags": ["defence", "sensors", "isr", "ai", "data", "hardware", "manufacturing", "size-small", "type-manufacturer", "mbr-ads"], "summary": "Bristol manufacturer of distributed fibre-optic sensing systems for security, perimeter and infrastructure monitoring.", "body": "# Sintela\n\n> Bristol manufacturer of distributed fibre-optic sensing systems for security, perimeter and infrastructure monitoring.\n\n## What they do\n\nSintela designs, manufactures and field-supports distributed fibre-optic sensing (DFOS) systems, with particular expertise in distributed acoustic sensing (DAS). Its ONYX systems turn existing fibre-optic cable into a long-range sensing platform that detects strain, temperature and acoustic changes for security, perimeter intrusion detection and infrastructure monitoring. Applications span pipelines, telecoms and power cables, railways, highways, mining, subsea cables, geophysical monitoring and border surveillance.\n\n## Products and solutions\n\n- **ONYX nano** - short-range DAS interrogator (1 to under 20 km) for small sites.\n- **ONYX peta** - standard-range DAS interrogator (around 20 to 75 km per fibre) for medium sites.\n- **ONYX peta EX** - long-range DAS interrogator (around 75 to 200 km per fibre) for large sites.\n- **Operating System Software (OSS)** - core firmware with REST API, Modbus and SNMP integration.\n- **Industry Application Software (IAS)** - bespoke application-specific user interfaces, with AI detection and classification.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ONYX conforms with FCC, CE and RoHS; tested against the Center for Internet Security (CIS) Benchmarks; reliability calculated per Telcordia SR-332.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-04-01** - Press coverage of a US border security contract with a ceiling increased to $200m, using fibre-optic AI sensing for US Customs and Border Protection. [source](https://businesscircle.co/2026/04/01/uk-firm-sintela-wins-200m-us-border-contract-using-fibre-optic-ai-sensing/)\n- **2026-05-15** - Exhibited at the 27th World Mining Congress 2026. [source](https://sintela.com/sintela-at-27th-world-mining-congress-2026/)\n- **2026-03-26** - Shortlisted for a 2026 British Business Award in the Growth Strategy of the Year category. [source](https://sintela.com/sintela-shortlisted-for-a-2026-british-business-award/)\n\n## Links\n\n- Website: https://sintela.com/\n- LinkedIn: https://www.linkedin.com/company/sintela\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (sintela.com), ADS Group member profile (adsgroup.org.uk/members/sintela-ltd-2), Companies House (company 11015440), Business Circle, Western Morning News. Note: exact headcount is not publicly confirmed; ADS describes Sintela as an SME and 2026 press reported recruitment in the dozens, supporting the small band. The website footer carries an ISO logo but the specific standard is not named publicly, so omitted."}, {"name": "Stirling Dynamics Ltd", "website": "https://www.stirling-dynamics.com", "linkedin": "https://www.linkedin.com/company/stirling-dynamics", "hq": "Bristol, UK", "region": "South West", "size": "medium", "headcount": "110+", "founded": "1987", "tags": ["defence", "air", "maritime", "simulation", "software", "hardware", "size-medium", "type-consultancy", "owned-foreign", "mbr-ads"], "summary": "Advanced engineering consultancy delivering control systems, simulation and technical services across aerospace and marine, part of the Expleo Group.", "body": "# Stirling Dynamics Ltd\n\n> Advanced engineering consultancy delivering control systems, simulation and technical services across aerospace and marine, part of the Expleo Group.\n\n## What they do\n\nStirling Dynamics is an advanced engineering company providing high-end engineering products and services to civil and military aerospace and marine programmes worldwide. It specialises in active control technologies,
