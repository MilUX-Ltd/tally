const FALLBACK=[{"name": "2iC Limited", "website": "https://2icworld.com", "linkedin": "https://www.linkedin.com/company/2icworld", "hq": "Southampton, UK", "region": "South East", "size": "small", "headcount": "", "founded": "2010", "tags": ["defence", "software", "c2", "comms", "autonomy", "uas", "data", "size-small", "type-sme", "mbr-ads"], "summary": "UK software company providing digital interoperability across disparate devices, platforms and systems in the battlespace.", "body": "# 2iC Limited\n\n> UK software company providing digital interoperability across disparate devices, platforms and systems in the battlespace.\n\n## What they do\n\n2iC develops off-the-shelf software that connects users to a growing inventory of disparate devices, platforms and systems, creating a responsive and resilient network with real-time access to sensors, effectors and intelligence products. The company is the inventor of the Lean Services Architecture, a modular and open architecture standard for the battlespace tested and published by the UK Ministry of Defence. It states its software is designed for tactical and DDIL (denied, degraded, intermittent and limited bandwidth) environments.\n\n## Products and solutions\n\n- **2iC NODE** - enterprise licence software suite providing the digital backbone, service discovery and automation across systems and devices.\n- **2iC CONNECT** - software connecting disparate devices and systems, including out-of-the-box solutions 2iC CONNECT:UNCREWED (for autonomous and uncrewed systems) and 2iC CONNECT:TAK (for TAK ecosystems).\n- **2iC TRUST** - secure and flexible interoperability across different trust domains (classification, nationality or organisation).\n- **2iC TOOLKIT** - software for engineers to research, develop and test modular, open and interoperable systems.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** JOSCAR.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-10-10** - Spectra Group and 2iC announced a MANET-to-satellite (GENSS) tactical data bridging solution using 2iC software. [source](https://www.2icworld.com/spectra-group-and-2ic-deliver-breakthrough-manet-to-satellite-connectivity/)\n- **2025** - 2iC named as part of SCEPTRE, a sovereign UK technology stack of British SMEs, providing the digital backbone. [source](https://sceptre.org.uk/news/uk-smes-unite-to-launch-sceptre-a-next-gen-sovereign-stack/)\n\n## Links\n\n- Website: https://2icworld.com\n- LinkedIn: https://www.linkedin.com/company/2icworld\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, Companies House, ADS members directory, SCEPTRE and Spectra Group public announcements."}, {"name": "4C Strategies", "website": "https://www.4cstrategies.com/", "linkedin": "https://www.linkedin.com/company/4c-strategies", "hq": "Stockholm, Sweden", "region": "", "size": "medium", "headcount": "", "founded": "2000", "tags": ["defence", "software", "simulation", "training", "c2", "size-medium", "type-sme", "owned-foreign", "listed"], "summary": "Resilience, training and exercise management software and advisory services, with a defence customer base across NATO allied armed forces.", "body": "# 4C Strategies\n\n> Resilience, training and exercise management software and advisory services, with a defence customer base across NATO allied armed forces.\n\n## What they do\n\n4C Strategies provides organisational readiness, training and exercise management solutions built around its Exonaut software platform, alongside expert advisory and software-related services. The company works across the military, finance, public sector, healthcare and utilities. It supports more than 150 customers, including several NATO allied armed forces, and operates the brand within 4C Group AB (publ), which is listed on the Nasdaq First North Premier Growth Market.\n\n## Products and solutions\n\n- **Exonaut** - software platform for designing, delivering and evaluating training and exercises, with planning tools, scenario generation, MEL/MIL generation, data synchronisation and integrated assessment.\n- **Exercise Manager** - software for organisations to design, deliver and evaluate exercises that test resilience and preparedness across scenarios such as fire, cyber attack or crisis.\n- **Resilience Platform** - integrated solutions for risk, business continuity, and incident and crisis management, plus training and exercising.\n\n## Frameworks, accreditations and memberships\n\n- **Listing:** parent 4C Group AB (publ) listed on Nasdaq First North Premier Growth Market.\n\n## Recent news\n\n- **2025-09** - Australian Department of Home Affairs selected Exonaut to provide the Common Counter Terrorism Exercise Management System (CCTEMS). [source](https://www.cubic.com/news-events/news/cubic-and-4c-strategies-provide-common-counter-terrorism-exercise-management)\n- **2025-12** - At I/ITSEC 2025 in Orlando, 4C Strategies showcased Exonaut at a federated simulation event with partners including BAE Systems, MASA Group, PLEXSYS and others, and highlighted new contracts. [source](https://www.janes.com/osint-insights/defence-news/defence/iitsec-25-4c-strategies-expands-exonaut-usage-highlights-new-contracts)\n\n## Links\n\n- Website: https://www.4cstrategies.com/\n- LinkedIn: https://www.linkedin.com/company/4c-strategies\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (4cstrategies.com), LinkedIn company page, Janes, Cubic press release."}, {"name": "4GD Ltd", "website": "https://www.4gd.co.uk", "linkedin": "https://www.linkedin.com/company/4gd", "hq": "London, UK", "region": "London", "size": "small", "headcount": "~50", "founded": "2016", "tags": ["defence", "simulation", "training", "uas", "size-small", "type-sme", "owned-veteran", "mbr-ads"], "summary": "Veteran-owned close-combat immersive training company specialising in urban warfare training technology.", "body": "# 4GD Ltd\n\n> Veteran-owned close-combat immersive training company specialising in urban warfare training technology.\n\n## What they do\n\n4GD builds instrumented, data-focused immersive training environments for close-combat and urban warfare. Their stated mission is to provide technology for training that is otherwise too dangerous, difficult or expensive.\n\n## Products and solutions\n\n- **SmartFacility** - a five-level immersive training environment, from the reconfigurable SimWall panel system up to the ACIES synthetic wrap.\n- **UAS Simulation** - synthetic drone training inside SmartFacility environments.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group (London region).\n\n## Recent news\n\n- **2025-09** - Announced digitisation of the British Army urban training village at Copehill Down (DSEI 2025).\n\n## Links\n\n- Website: https://www.4gd.co.uk\n- LinkedIn: https://www.linkedin.com/company/4gd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, ADS members directory."}, {"name": "AAG DS Ltd", "website": "https://www.atlanticaviation.ie/our-services/defence-services/", "linkedin": "https://uk.linkedin.com/company/aag-defence-services", "hq": "Shannon, Ireland", "region": "South East England", "size": "medium", "headcount": "100+", "founded": "2020", "tags": ["defence", "size-medium", "air", "logistics", "type-sme", "owned-foreign", "mbr-ads"], "summary": "Aircraft maintenance, repair and overhaul provider for the Royal Air Force A400M Atlas fleet, trading as AAG Defence Services.", "body": "# AAG DS\n\n> Aircraft maintenance, repair and overhaul provider for the Royal Air Force A400M Atlas fleet, trading as AAG Defence Services.\n\n## What they do\n\nAAG Defence Services is a Military Aviation Authority Part 145 Approved Maintenance Organisation based at RAF Brize Norton. It works in partnership with Airbus to supply maintenance, repair and overhaul services, including heavy and line maintenance, to the Royal Air Force fleet of A400M Atlas aircraft. The team operates
