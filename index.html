ce, defence and space.\n\n## What they do\n\nBelcan supplies design, software, manufacturing, supply chain, information technology and digital engineering services to the aerospace, defence, space and other markets. The UK entity, Belcan Engineering Services UK Limited, is registered in Scotland and operates from sites including Derby and Filton, Bristol. The group is headquartered in the United States and was acquired by Cognizant in August 2024.\n\n## Products and solutions\n\n- **Engineering design** - full-lifecycle design, component engineering and systems integration.\n- **Digital engineering** - embedded software, mechanical, electrical and systems engineering services.\n- **MRO support** - maintenance, repair and overhaul services.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2024-08-27** - Cognizant completed its acquisition of Belcan. [source](https://www.belcan.com/2024/08/27/cognizant-completes-acquisition-of-belcan/)\n\n## Links\n\n- Website: https://www.belcan.com/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (belcan.com), ADS members directory (adsgroup.org.uk), Companies House (company SC163213), Belcan and Cognizant acquisition announcements."}, {"name": "Bellstone Labs Limited", "website": "", "linkedin": "", "hq": "London, United Kingdom", "region": "London", "size": "micro", "headcount": "", "founded": "2024", "tags": ["defence", "munitions", "land", "manufacturing", "hardware", "size-micro", "type-sme", "type-manufacturer", "owned-foreign", "mbr-ads"], "summary": "UK subsidiary of the Bellstone Group, an energetics and armoured vehicle manufacturer, seeking UK partners in equipment, materials and expertise.", "body": "# Bellstone Labs UK\n\n> UK subsidiary of the Bellstone Group, an energetics and armoured vehicle manufacturer, seeking UK partners in equipment, materials and expertise.\n\n## What they do\n\nBellstone Labs is the UK subsidiary of the Bellstone Group, described by ADS as a Ukrainian manufacturer of energetics and infantry fighting vehicles and armoured personnel carriers (IFV/APC). In the UK the company states it is seeking to partner with producers of equipment, suppliers of materials and experts in those fields. The UK entity is registered in London.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: \n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory (Bellstone Labs UK), Companies House (company 15497457)."}, {"name": "Bellurgan Precision Engineering Ltd", "website": "https://www.bellurgan.com", "linkedin": "https://www.linkedin.com/company/bellurgan-precision-engineering", "hq": "Dundalk, Ireland", "region": "", "size": "medium", "headcount": "~54", "founded": "1978", "tags": ["defence", "air", "manufacturing", "hardware", "size-medium", "type-sme", "type-manufacturer", "owned-foreign", "accr-iso9001", "mbr-ads"], "summary": "Irish precision engineering firm machining high-tolerance components and electromechanical assemblies for aerospace, medical and electronics OEMs.", "body": "# Bellurgan Precision Engineering\n\n> Irish precision engineering firm machining high-tolerance components and electromechanical assemblies for aerospace, medical and electronics OEMs.\n\n## What they do\n\nBellurgan Precision Engineering is a contract manufacturer of precision turned and milled components and electromechanical assemblies, based in Dundalk, Co. Louth. Operating since 1978, it supplies global OEMs across medical device, aerospace and electronics sectors. The company has organised into three sector-specific entities for medical, aerospace and electronics work, with multi-axis milling and turning capability.\n\n## Products and solutions\n\n- **Precision machined components** - high-tolerance turned and milled parts for aerospace and other regulated sectors.\n- **Electromechanical assemblies** - assembled subsystems for OEM customers.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS9100, ISO 9001, ISO 13485\n- **Memberships:** ADS Group; SC21 participant\n\n## Links\n\n- Website: https://www.bellurgan.com\n- LinkedIn: https://www.linkedin.com/company/bellurgan-precision-engineering\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, ADS members directory (Bellurgan Precision Engineering Ltd), company LinkedIn page."}, {"name": "Bentley Systems (UK) Limited", "website": "https://www.bentley.com", "linkedin": "https://www.linkedin.com/company/bentley-systems", "hq": "Exton, Pennsylvania, United States", "region": "London", "size": "large", "headcount": "", "founded": "", "tags": ["defence", "software", "data", "gis", "simulation", "size-large", "type-prime", "owned-foreign", "listed", "fw-gcloud", "fw-ccs", "accr-ce-plus", "mbr-ads"], "summary": "UK entity of Bentley Systems, a US infrastructure engineering software company whose tools are used for the design, construction and operation of large built assets.", "body": "# Bentley Systems (UK)\n\n> UK entity of Bentley Systems, a US infrastructure engineering software company whose tools are used for the design, construction and operation of large built assets.\n\n## What they do\n\nBentley Systems (UK) Limited is the UK arm of Bentley Systems, Incorporated, a US-headquartered, listed infrastructure engineering software company. Its software is used to design, engineer, build and operate constructed assets including roads, railways, bridges, buildings, plants and utility networks. The UK entity holds a Crown Commercial Service framework agreement covering cloud software, and its products are used across UK government and defence estate and infrastructure programmes.\n\n## Products and solutions\n\n- **ProjectWise** - collaboration and common data environment for engineering project delivery.\n- **AssetWise** - asset lifecycle information management.\n- **iTwin** - digital twin platform for infrastructure assets.\n- **OpenGround** - geotechnical data management.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** Crown Commercial Service (G-Cloud and CCS cloud software agreement)\n- **Accreditations:** Cyber Essentials Plus; UK MOD Cyber Defence and Risk (CyDR) accreditation cited by the company\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.bentley.com\n- LinkedIn: https://www.linkedin.com/company/bentley-systems\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, ADS members directory (Bentley Systems (UK) Ltd), Companies House (company 02957722), Crown Commercial Service Digital Marketplace supplier listing."}, {"name": "Bertin Exensor Limited", "website": "https://www.exensor.com", "linkedin": "https://www.linkedin.com/company/exensor-technology", "hq": "Lund, Sweden", "region": "South East England", "size": "medium", "headcount": "", "founded": "1987", "tags": ["defence", "sensors", "isr", "c2", "comms", "land", "manufacturing", "hardware", "size-medium", "type-sme", "type-manufacturer", "owned-foreign", "mbr-ads"], "summary": "Designs and manufactures networked Unattended Ground Sensor (UGS) systems for military and security surveillance, with its production site in the UK.", "body": "# Bertin Exensor\n\n> Designs and manufactures networked Unattended Ground Sensor (UGS) systems for military and security surveillance, with its production site in the UK.\n\n## What they do\n\nBertin Exensor designs, develops and manufactures networked Unattended Ground Sensor (UGS) systems used for force protection, long-range surveillance, counter-mobility and asset protection. Founded in 1987, the company has its headquarters and main R&D centre in Lund, Sweden, a communications and network lab in Kalmar, and its production and manufacturing site near Basingstoke, UK. Since 2017 it has been a subsidiary of the French group Bertin Technologies. The UK entity, Bertin Exensor Limited, handles production, post-design services, product R&D and sales, including support to UK MOD contracts.\n\n## Products and solutions\n\n- **Flexnet** - wireless UGS platform combining seismic, acoustic, magnetic and thermal imaging sensors to detect, classify and report targets.\n- **UGS sensors** - the Mini Mk3, Scout Mk3, Surveyor, PIR and MicroRadar ground sensors.\n- **Flexnet Commander** - command and control software for the sensor network.\n- **Gateways and modems** - networking hardware linking sensors to the C2 system.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-11-20** - Awarded a 9-year EUR 45 million frame contract for Unmanned Unattended Ground Sensors, with a first call-off of nearly EUR 30 million for the Dutch Armed Forces. [source](https://www.exensor.com/bertin-exensor-has-been-awarded-the-frame-contract-for-the-delivery-of-unmanned-unattended-ground-sensors-uugs-commander-commit-admiral-jan-willem-hartman-and-vp-sales-director-of-bertin-exensor-mr/)\n- **2025-04-03** - Signed a framework agreement with the Swedish, Finnish, Danish and Norwegian defence procurement agencies for the supply of Flexnet UGS systems. [source](https://www.exensor.com/bertin-exensor-signs-framework-agreement-with-swedish-defence-materiel-administration-fmv-the-finnish-defence-forces-logistics-command-the-danish-ministry-of-defence-acquisition-and-logistics-orga/)\n\n## Links\n\n- Website: https://www.exensor.com\n- LinkedIn: https://www.linkedin.com/company/exensor-technology\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, ADS members directory (Bertin Exensor Limited), Companies House (company 02327794)."}, {"name": "Bertrandt UK Limited", "website": "https://www.bertrandt.com/en/", "linkedin": "https://www.linkedin.com/company/bertrandt-group", "hq": "Ehningen, Germany", "region": "West Midlands", "size": "medium", "headcount": "", "founded": "1995", "tags": ["defence", "air", "simulation", "software", "test-evaluation", "size-medium", "type-consultancy", "owned-foreign", "mbr-ads"], "summary": "UK entity of the German Bertrandt engineering group, which provides engineering and development services across automotive, aerospace and defence.", "body": "# Bertrandt UK\n\n> UK entity of the German Bertrandt engineering group, which provides engineering and development services across automotive, aerospace and defence.\n\n## What they do\n\nBertrandt UK Limited is the UK entity of the Bertrandt Group, a German engineering and development services company wholly owned by Bertrandt AG. The UK operation has a long-standing automotive engineering presence, including work as a Ford Tier 1 supplier from its Dunton site. At group level Bertrandt provides engineering and consultancy to the aerospace and defence sector, covering the lifecycle of military aircraft systems from analysis and design through development, verification and in-service support, plus structural design and safety-critical software development to standards such as RTCA DO-178C.\n\n## Products and solutions\n\n- **Aerospace and defence engineering services** - system development and integration, structural design and physical engineering for military aircraft platforms.\n- **Safety-critical software engineering** - development to aerospace and functional-safety standards including DO-178C and IEC 61508.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.bertrandt.com/en/\n- LinkedIn: https://www.linkedin.com/company/bertrandt-group\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (Bertrandt defence and aerospace pages, Brentwood/UK location), ADS members directory, Companies House (company 03129107)."}, {"name": "Beyond Blue Limited", "website": "https://www.beyondblue.tech", "linkedin": "https://www.linkedin.com/company/beyond-blue-limited", "hq": "Edinburgh, United Kingdom", "region": "Scotland", "size": "small", "headcount": "", "founded": "2019", "tags": ["defence", "cyber", "size-small", "type-consultancy", "type-sme", "owned-uk", "mbr-ads"], "summary": "Cyber security and operational resilience consultancy working with boards and senior leaders, with national security heritage.", "body": "# Beyond Blue\n\n> Cyber security and operational resilience consultancy working with boards and senior leaders, with national security heritage.\n\n## What they do\n\nBeyond Blue is a remote-first UK consultancy specialising in cyber security, crisis exercising and operational resilience. It works with senior teams and boards to prepare organisations for incident response and recovery, and to manage technology and cyber risk across the wider organisation. Its leadership and advisory team draw on senior roles in UK defence and national security, including the Ministry of Defence and GCHQ.\n\n## Products and solutions\n\n- **Organisational resilience** - strengthening response and recovery capabilities, scenario testing and crisis exercising for senior leaders.\n- **Supply chain resilience** - assessing and remediating risk across direct suppliers and lower-tier parties.\n- **Ecosystem resilience** - advising governments and regulators on building national resilience platforms.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group (associate member).\n\n## Links\n\n- Website: https://www.beyondblue.tech\n- LinkedIn: https://www.linkedin.com/company/beyond-blue-limited\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (beyondblue.tech), ADS members directory, Companies House (SC625508), company LinkedIn page."}, {"name": "Bikar Aerospace Metals Ltd", "website": "https://www.bikar.com/uk", "linkedin": "", "hq": "Bad Berleburg, Germany", "region": "South West England", "size": "small", "headcount": "", "founded": "2020", "tags": ["defence", "manufacturing", "air", "size-small", "type-sme", "owned-foreign", "mbr-ads"], "summary": "UK supplier of non-ferrous semi-finished metals for aerospace and defence applications.", "body": "# Bikar Aerospace Metals\n\n> UK supplier of non-ferrous semi-finished metals for aerospace and defence applications.\n\n## What they do\n\nBikar Aerospace Metals Ltd is the UK arm of the German BIKAR group, supplying semi-finished non-ferrous metals from a Bristol base. It stocks and processes aluminium, copper, brass and bronze, including aerospace aluminium, supplied as plates, sheets, bars, profiles, tubes, rings and precision-cut blanks. UK infrastructure includes two offices, a production facility and an additional warehouse, supporting processing, lead times and supply for aerospace applications. The parent group is headquartered in Bad Berleburg, Germany.\n\n## Products and solutions\n\n- **Aerospace aluminium** - aluminium grades for aerospace applications.\n- **Non-ferrous metals** - copper, brass and bronze in plate, sheet, bar, profile, tube and ring form.\n- **Precision-cut components** - precision blanks and cut-to-size parts.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.bikar.com/uk\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (bikar.com), ADS members directory, Companies House (12437111, incorporated 3 February 2020)."}, {"name": "Bitwise Limited", "website": "https://www.bitwisegroup.com", "linkedin": "https://www.linkedin.com/company/bitwise-ltd", "hq": "Dunfermline, United Kingdom", "region": "Scotland", "size": "medium", "headcount": "80+", "founded": "", "tags": ["defence", "software", "comms", "sensors", "test-evaluation", "size-medium", "type-sme", "owned-uk", "accr-iso9001", "accr-iso27001", "accr-ce", "accr-ce-plus", "accr-def-stan", "mbr-ads"], "summary": "Safety-critical and secure software engineering for defence, aerospace and other regulated sectors.", "body": "# Bitwise\n\n> Safety-critical and secure software engineering for defence, aerospace and other regulated sectors.\n\n## What they do\n\nBitwise provides software development, testing and software safety management for systems where assurance, safety and performance matter. It has worked in safety-critical software engineering for over 35 years and employs more than 80 staff across offices in Scotland and the Netherlands. Its Dunfermline headquarters provides secure labs and infrastructure audited and approved by defence sector customers. Defence work has covered surveillance, data monitoring, radio, video, secure communications and encryption.\n\n## Products and solutions\n\n- **Development** - software development across secure environments including radar and military communications.\n- **Testing** - independent verification and validation.\n- **Software safety management** - software safety cases and safety management to standards such as IEC 61508 and DEF STAN 00-56.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, ISO 27001:2022, ISO 13485, Cyber Essentials, Cyber Essentials Plus. Experience with IEC 61508, DO-178B/C and DEF STAN 00-56.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.bitwisegroup.com\n- LinkedIn: https://www.linkedin.com/company/bitwise-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (bitwisegroup.com), ADS members directory, Companies House (SC107588), company LinkedIn page."}, {"name": "Blackdot Solutions Ltd", "website": "https://blackdotsolutions.com", "linkedin": "https://www.linkedin.com/company/blackdot-solutions-ltd", "hq": "Cambridge, United Kingdom", "region": "East of England", "size": "small", "headcount": "40-50", "founded": "2011", "tags": ["defence", "software", "ai", "data", "isr", "size-small", "type-sme", "owned-uk", "mbr-ads"], "summary": "UK software company behind Videris, an open source intelligence platform for investigators and analysts.", "body": "# Blackdot Solutions\n\n> UK software company behind Videris, an open source intelligence platform for investigators and analysts.\n\n## What they do\n\nBlackdot Solutions develops Videris, an investigations platform that helps teams collect, analyse and visualise open source data. The company began developing Videris in 2014 to help organisations use internet data in the fight against crime. Its customers include government agencies, law enforcement and financial institutions.\n\n## Products and solutions\n\n- **Videris** - OSINT investigations platform that brings collection, analysis and reporting into one place, searching corporate registries, publicly available social media, and surface, deep and dark web sources.\n- **Videris Automate** - adds AI capabilities to automate investigations and screening processes.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-09-23** - Blackdot Solutions launched Videris Automate, using AI to speed OSINT, risk detection and decision-making. [source](https://www.helpnetsecurity.com/2025/09/23/blackdot-solutions-videris-automate/)\n\n## Links\n\n- Website: https://blackdotsolutions.com\n- LinkedIn: https://www.linkedin.com/company/blackdot-solutions-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (blackdotsolutions.com), Blackdot Solutions LinkedIn company page, ADS members directory, Companies House (07617704), Help Net Security."}, {"name": "Blacksmiths Group Ltd", "website": "https://blacksmithsgroup.com", "linkedin": "https://www.linkedin.com/company/blacksmiths-group-ltd", "hq": "Cheltenham, United Kingdom", "region": "South West", "size": "small", "headcount": "", "founded": "2015", "tags": ["defence", "cyber", "size-small", "type-consultancy", "type-sme", "owned-uk", "accr-iso9001", "accr-ce-plus", "mbr-ads"], "summary": "Defence and security specialists providing consultancy and technology for insider risk, threats and cyber security.", "body": "# Blacksmiths Group\n\n> Defence and security specialists providing consultancy and technology for insider risk, threats and cyber security.\n\n## What they do\n\nBlacksmiths is a team of physical and digital security specialists based in the UK and operating globally. The company provides consultancy and develops technology to help clients manage security challenges and defend against complex threats. Its teams hold skills acquired in UK intelligence, military and industry.\n\n## Products and solutions\n\n- **Threats** - assessment of threat actors, intent and capability, vulnerability and risk.\n- **Insider risk** - insider threat, behaviours and cultures, and personnel security.\n- **Cyber** - operational technology security, technical security and penetration testing.\n- **Security management** - risk management, security governance and leadership advisory.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001; Cyber Essentials Plus\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://blacksmithsgroup.com\n- LinkedIn: https://www.linkedin.com/company/blacksmiths-group-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (blacksmithsgroup.com), Blacksmiths Group LinkedIn company page, ADS members directory, Companies House (09875845)."}, {"name": "BlackTree Technologies Limited", "website": "https://blacktreetechnologies.co.uk", "linkedin": "https://www.linkedin.com/company/blacktree", "hq": "Worcester, United Kingdom", "region": "West Midlands", "size": "small", "headcount": "", "founded": "2012", "tags": ["defence", "comms", "c2", "ai", "data", "hardware", "size-small", "type-sme", "owned-uk", "mbr-ads"], "summary": "Supplier of tactical communications solutions to the UK Ministry of Defence.", "body": "# BlackTree Technologies\n\n> Supplier of tactical communications solutions to the UK Ministry of Defence.\n\n## What they do\n\nBlackTree Technologies provides tactical communications equipment to the UK MOD. Its work includes the Dismounted Data ary": "Designer and manufacturer of ground-based electronic-scanning radars for surveillance across land, coastline and air.", "body": "# Blighter Surveillance Systems\n\n> Designer and manufacturer of ground-based electronic-scanning radars for surveillance across land, coastline and air.\n\n## What they do\n\nBlighter designs and manufactures ground-based radars for surveillance of moving objects on the ground, coastline and in the air. The company delivers integrated multi-sensor packages comprising e-scan radars, cameras, thermal imagers, trackers and software. Its radars are deployed in 35 countries along borders, at coastal facilities, military bases and critical national infrastructure.\n\n## Products and solutions\n\n- **Blighter e-scan radars** - solid-state radars combining Passive Electronically Scanned Array technology with Frequency Modulated Continuous Wave and Doppler processing.\n- **BlighterNexus** - software platform for sensor integration, sensor fusion and command-and-control (C2).\n- **Multi-domain surveillance solutions** - ground surveillance, aerial threat detection and integrated sensor packages.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-06-10** - Blighter unveiled a long-range border surveillance radar system. [source](https://thedefensepost.com/2025/06/10/blighter-border-surveillance-radar/)\n\n## Links\n\n- Website: https://blighter.com\n- LinkedIn: https://www.linkedin.com/company/blighter-surveillance-systems\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (blighter.com), Blighter LinkedIn company page, ADS members directory, Companies House (09826773), The Defense Post."}, {"name": "Blue Bear Systems Research Ltd", "website": "https://bbsr.co.uk", "linkedin": "https://www.linkedin.com/company/bbsr-ltd", "hq": "Oakley, United Kingdom", "region": "East of England", "size": "medium", "headcount": "51-100", "founded": "2000", "tags": ["defence", "  UK defence sector and other regulated industries.", "body": "# BlueFort Security\n\n> Independent cyber security solutions partner serving the UK defence sector and other regulated industries.\n\n## What they do\n\nBlueFort Security is a UK cyber security solutions provider working across defence and other sectors including finance, public sector and healthcare. It operates as an independent Security Solutions Partner, using a framework of continuous discovery, validation and control to help clients assess, consolidate and optimise their security environments. For defence clients, BlueFort focuses on protecting mission-critical systems, information and operations from cyber threats.\n\n## Products and solutions\n\n- **External Attack Surface Management** - identification and management of an organisation's exposed assets.\n- **Continuous Threat Exposure Management (CTEM)** - ongoing assessment of cyber exposure.\n- **Identity and Zero Trust security** - cloud and identity security, including zero-trust identity access management.\n- **Optimised SIEM and cloud security posture management** - monitoring and cloud security services.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, ISO 27001, Cyber Essentials Plus\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.bluefort.com/\n- LinkedIn: https://www.linkedin.com/company/bluefort-security-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (bluefort.com), the company LinkedIn page, and Companies House (company number 06085154)."}, {"name": "Bluelightsdigital Ltd", "website": "https://www.bluelightsdigital.com/", "linkedin": "https://www.linkedin.com/company/bluelightsdigital-ltd", "hq": "Duxford, United Kingdom", "region": "East of England", "size": "micro", "headcount": "", "founded": "2015", "tags": ["defence", "isr", "data", "cyber", "training", "software", "size-micro", "type-sme", "mbr-ads"], "summary": "Digital investigation and intelligence capability building for law enforcement, intelligence agencies and military clients.", "body": "# Blue Lights Digital\n\n> Digital investigation and intelligence capability building for law enforcement, intelligence agencies and military clients.\n\n## What they do\n\nBlue Lights Digital (BLD) builds digital investigation and intelligence capability for law enforcement, intelligence agencies and militaries, combining consultancy, training and a portfolio of digital products. The company works in the digital investigation, intelligence and communications data fields, and routinely supports UK law enforcement and military partners. It offers an end-to-end service spanning capability assessment, technology and training design, and continuous reporting.\n\n## Products and solutions\n\n- **Digital investigation training** - courses covering digital forensics, communications data, open source intelligence, social media analysis and RF and WiFi propagation, delivered to law enforcement and military clients.\n- **Investigation platforms and products** - a portfolio of digital tools supporting complex investigations.\n- **Discovery consultancy** - tailored assessments of a client's capacity building needs.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.bluelightsdigital.com/\n- LinkedIn: https://www.linkedin.com/company/bluelightsdigital-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (bluelightsdigital.com), the ADS members directory (adsgroup.org.uk), the company LinkedIn page, and Companies House (company number 09430671)."}, {"name": "Blueskytec Ltd", "website": "https://blueskytec.com/", "linkedin": "https://www.linkedin.com/company/blueskytec", "hq": "Bath, United Kingdom", "region": "South West", "size": "micro", "headcount": "", "founded": "2012", "tags": ["defence", "cyber", "hardware", "maritime", "space", "size-micro", "type-startup", "mbr-ads", "prog-dasa"], "summary": "Cyber security hardware that protects industrial control systems and operational technology at the device level.", "body": "# Blueskytec\n\n> Cyber security hardware that protects industrial control systems and operational technology at the device level.\n\n## What they do\n\nBlueskytec develops hardware-based cyber security for cyber-physical systems, driving protection down to the control-systems level. Its devices are designed for industrial control systems, operational technology, IoT and transport, and for safety-critical use in marine, industrial, high-voltage and nuclear environments, including space, reactor rooms and underwater marine settings. The company is based in Bath and describes its products as designed, built, manufactured and distributed in Great Britain.\n\n## Products and solutions\n\n- **KeySpace encryption technology** - hardware encryption establishing and defending the integrity of communications between edge systems, designed to counter advanced persistent threats and zero-day attacks.\n- **Cyber-physical protection hardware** - devices for ICS, OT, IoT and transport across marine, land, air and space applications, designed to exceed IEC 62443 SL4.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-08-11** - Blueskytec secured a £1.5m investment from the British Business Bank's South West Investment Fund. [source](https://www.uktech.news/cybersecurity/blueskytec-1-5m-investment-20250811)\n\n## Links\n\n- Website: https://blueskytec.com/\n- LinkedIn: https://www.linkedin.com/company/blueskytec\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (blueskytec.com), the ADS members directory (adsgroup.org.uk), the company LinkedIn page, UKTN reporting, and Companies House (company number 07958649)."}, {"name": "Bluestaq Ltd", "website": "https://www.bluestaq.com/", "linkedin": "https://www.linkedin.com/company/bluestaq", "hq": "Colorado Springs, United States", "region": "London", "size": "micro", "headcount": "2-20", "founded": "2025", "tags": ["defence", "data", "software", "space", "isr", "size-micro", "type-sme", "owned-foreign", "mbr-ads"], "summary": "Data management software for defence, space and national security, including the Unified Data Library.", "body": "# Bluestaq\n\n> Data management software for defence, space and national security, including the Unified Data Library.\n\n## What they do\n\nBluestaq builds data management platforms for defence, space and national security customers. Its Unified Data Library aggregates and shares operational data across organisations, and its Global Data Marketplace supports data-driven collaboration across the United States, United Kingdom and Australia. Bluestaq Ltd is the UK subsidiary of Bluestaq LLC, incorporated in February 2025 and based in London.\n\n## Products and solutions\n\n- **Unified Data Library (UDL)** - a platform that ingests, stores and shares space and operational domain data for allied defence and intelligence users.\n- **Global Data Marketplace** - a service for sharing data across allied defence, space, security and intelligence sectors.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group; UKspace\n\n## Recent news\n\n- **2025-06-04** - Bluestaq expanded to the UK, backed by a $50M investment, to serve NATO defence networks. [source](https://spacenews.com/bluestaq-expands-globally-with-50m-from-one-bow-river-launches-uk-operations/)\n- **2025-04-08** - Bluestaq announced the launch of its UK subsidiary. [source](https://gazette.com/2025/04/08/colorado-springs-bluestaq-announces-launch-of-uk-subsidiary/)\n\n## Links\n\n- Website: https://www.bluestaq.com/\n- LinkedIn: https://www.linkedin.com/company/bluestaq\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory, Companies House (16270771), UKspace member directory, SpaceNews, Colorado Springs Gazette, company website."}, {"name": "BMT Group Ltd", "website": "https://www.bmt.org", "linkedin": "https://www.linkedin.com/company/bmt", "hq": "London, United Kingdom", "region": "London", "size": "large", "headcount": "1,350+", "founded": "1985", "tags": ["defence", "maritime", "simulation", "software", "type-consultancy", "size-large", "owned-uk", "mbr-ads"], "summary": "An international engineering, science and technology consultancy best known for naval design and maritime engineering.", "body": "# BMT\n\n> An international engineering, science and technology consultancy best known for naval design and maritime engineering.\n\n## What they do\n\nBMT Group is a multidisciplinary engineering, science and technology consultancy serving the defence and security, critical infrastructure, commercial shipping and environment sectors. It is a maritime-orientated high-end design house and technical consulting firm, and describes itself as the world's largest independent naval design consultancy. The company employs around 1,350 professionals across offices in the Americas, Asia Pacific and Europe.\n\n## Products and solutions\n\n- **Maritime design and naval architecture** - concept-to-detailed design services for advanced and specialised vessels.\n- **Defence design support** - contributions to programmes including the Queen Elizabeth class aircraft carriers, Tide class tankers, Type 31 frigates and the Fleet Solid Support programme.\n- **Risk and contract management** - engineering, design support and risk management consultancy.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group, Society of Maritime Industries\n\n## Recent news\n\n- **1985** - BMT was formed from the merger and privatisation of the British Shipbuilders Research Association and the National Maritime Institute. [source](https://en.wikipedia.org/wiki/BMT_Group)\n\n## Links\n\n- Website: https://www.bmt.org\n- LinkedIn: https://www.linkedin.com/company/bmt\n\n## Sources\n\nPublic information verified 2026-06-29. Sou port, company website."}, {"name": "Boeing Distribution Services III Limited", "website": "https://www.boeingdistribution.com/", "linkedin": "", "hq": "Chicago, United States", "region": "South East England", "size": "large", "headcount": "", "founded": "", "tags": ["defence", "air", "logistics", "hardware", "size-large", "type-prime", "owned-foreign", "mbr-ads"], "summary": "Aerospace and defence parts distribution and supply chain management.", "body": "# Boeing Distribution Services\n\n> Aerospace and defence parts distribution and supply chain management.\n\n## What they do\n\nBoeing Distribution Services distributes aircraft parts and consumables to civil and defence customers in the UK and globally. It carries products from over 250 aviation manufacturers, covering airframe parts, electrical components, hardware, avionics, instruments, and ground support and test equipment. It also provides supply chain management solutions for aerospace and defence customers. The UK operation runs a distribution site at Burgess Hill, West Sussex.\n\n## Products and solutions\n\n- **Parts distribution** - airframe parts, chemicals and consumables, electrical components, hardware, avionics and instruments.\n- **Supply chain management** - inventory and distribution solutions for aerospace and defence customers.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.boeingdistribution.com/\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory, Companies House (00446288), Boeing services location pages, company website."}, {"name": "Booth Welsh Automation Limited", "website": "https://boothwelsh.co.uk/", "linkedin": "https://www.linkedin.com/company/booth-welsh", "hq": "Irvine, Scotland", "region": "Scotland", "size": "medium", "headcount": "150-160", "founded": "1989", "tags": ["defence", "manufacturing", "software", "test-evaluation", "size-medium", "type-sme", "owned-uk", "mbr-ads"], "summary": "Integrated engineering services for the nuclear, defence and process sectors.", "body": "# Booth Welsh\n\n> Integrated engineering services for the nuclear, defence and process sectors.\n\n## What they do\n\nBooth Welsh provides integrated engineering services for highly regulated environments, including nuclear and defence. Its disciplines cover electrical, control and instrumentation, process engineering, mechanical and piping, civil and structural, automation, systems integration and digital transformation. The company has over 30 years of experience and works with government bodies and Tier 1 contractors, with staff trained for security-cleared environments.\n\n## Products and solutions\n\n- **Engineering services** - electrical, control and instrumentation, process, mechanical, civil and structural engineering.\n- **Automation and systems integration** - control systems integration and digital transformation for regulated industries.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** EDF Nuclear Professional Services Framework Agreements (from 2026)\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-12** - Booth Welsh secured two EDF Nuclear Professional Services Framework Agreements, running for five years from January 2026, supporting the UK nuclear fleet and Hinkley Point C. [source](https://boothwelsh.co.uk/booth-welsh-secures-edf-nuclear-professional-services-frameworks/)\n\n## Links\n\n- Website: https://boothwelsh.co.uk/\n- LinkedIn: https://www.linkedin.com/company/booth-welsh\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory, Companies House (02374159), company website."}, {"name": "Booz Allen Hamilton International (U.K.) Ltd", "website": "https://www.boozallen.com/", "linkedin": "https://uk.linkedin.com/company/booz-allen-hamilton-international-u.k.-ltd", "hq": "McLean, United States", "region": "East of England", "size": "large", "headcount": "", "founded": "2000", "tags": ["defence", "cyber", "data", "ai", "size-large", "type-consultancy", "owned-foreign", "mbr-ads"], "summary": "Management and technology consulting for defence, intelligence and government.", "body": "# Booz Allen Hamilton International (UK)\n\n> Management and technology consulting for defence, intelligence and government.\n\n## What they do\n\nBooz Allen Hamilton provides management and technology consulting in defence, intelligence and civil markets. Booz Allen Hamilton International (U.K.) Ltd is the UK entity of the US firm, registered in Huntingdon and engaged in management consultancy. The wider firm works in areas including digital, data, cyber and analytics for government and defence customers.\n\n## Products and solutions\n\n- **Consulting services** - management and technology consulting across defence, intelligence and government markets.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.boozallen.com/\n- LinkedIn: https://uk.linkedin.com/company/booz-allen-hamilton-international-u.k.-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory, Companies House (04078740), company website."}, {"name": "Border Holdings (U.K.) Ltd", "website": "https://www.britpart.com/", "linkedin": "", "hq": "Craven Arms, United Kingdom", "region": "West Midlands", "size": "medium", "headcount": "", "founded": "1982", "tags": ["defence", "land", "logistics", "manufacturing", "size-medium", "type-sme", "owned-uk", "mbr-ads"], "summary": "Independent wholesaler of parts and accessories for Land Rover vehicles, trading as Britpart.", "body": "# Border Holdings (Britpart)\n\n> Independent wholesaler of parts and accessories for Land Rover vehicles, trading as Britpart.\n\n## What they do\n\nBorder Holdings (U.K.) Ltd trades as Britpart, an independent wholesaler of parts and accessories for Land Rover and Range Rover vehicles. The company supplies customers worldwide, ranging from government agencies to trade outlets, across a catalogue of over 30,000 part numbers. Its range covers classic Series and Defender models through to current vehicles, relevant to military and ex-military Land Rover fleets still in service.\n\n## Products and solutions\n\n- **Britpart Land Rover parts** - own-label, OEM and genuine parts and accessories for Land Rover and Range Rover models, including Series and Defender vehicles used in military roles.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.britpart.com/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS Group member profile (https://www.adsgroup.org.uk/members/border-holdings-uk-ltd-1/); Companies House (https://find-and-update.company-information.service.gov.uk/company/01664243); Britpart website (https://www.britpart.com/)."}, {"name": "Bowman 3D (a division of Bowman International Ltd)", "website": "https://bowman3d.com/", "linkedin": "https://www.linkedin.com/company/bowman3d", "hq": "Abingdon, United Kingdom", "region": "South East", "size": "small", "headcount": "", "founded": "1992", "tags": ["defence", "air", "manufacturing", "hardware", "size-small", "type-manufacturer", "type-sme", "owned-uk", "mbr-ads"], "summary": "Production-volume additive manufacturing division of Bowman International Ltd, serving aerospace and defence.", "body": "# Bowman 3D\n\n> Production-volume additive manufacturing division of Bowman International Ltd, serving aerospace and defence.\n\n## What they do\n\nBowman 3D is the additive manufacturing division of Bowman International Ltd, a UK bearing and precision component manufacturer based in Abingdon. The division uses powder bed fusion 3D printing, including HP Multi Jet Fusion, to produce components in volumes from single prototypes to tens of thousands of parts. It works with aerospace and defence customers supplying production parts as well as gauges, jigs, fixtures and placeholder components.\n\n## Products and solutions\n\n- **Additive manufactured components** - 3D printed parts in engineering-grade materials produced to be traceable, accurate and verifiable, for aerospace and defence applications.\n- **Tooling and fixtures** - gauges, jigs, fixtures and placeholder components for aerospace OEMs.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group; Additive Manufacturing UK\n\n## Links\n\n- Website: https://bowman3d.com/\n- LinkedIn: https://www.linkedin.com/company/bowman3d\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS Group member profile (https://www.adsgroup.org.uk/members/bowman-3d-2/); Bowman 3D website (https://bowman3d.com/); Companies House, Bowman International Limited (https://find-and-update.company-information.service.gov.uk/company/02750164); Additive Manufacturing UK directory (https://additivemanufacturinguk.org.uk/organisation/bowman-3d/)."}, {"name": "Bowmill Engineering Ltd", "website": "https://bowmill.co.uk/", "linkedin": "https://www.linkedin.com/company/bowmill-engineering-ltd", "hq": "Poole, United Kingdom", "region": "South West", "size": "medium", "headcount": "175", "founded": "1970", "tags": ["defence", "air", "maritime", "manufacturing", "hardware", "test-evaluation", "size-medium", "type-manufacturer", "type-sme", "owned-uk", "mbr-ads"], "summary": "Sub-contract precision machining and surface finishing for the aerospace, defence and marine sectors.", "body": "# Bowmill Engineering\n\n> Sub-contract precision machining and surface finishing for the aerospace, defence and marine sectors.\n\n## What they do\n\nBowmill Engineering, part of the Bowmill Group, provides sub-contract machining, sub-assemblies and surface finishing treatments for the aerospace, defence and marine sectors. Established in 1970, it operates from sites in Poole, Dorset and Tewkesbury, Gloucestershire. The company manufactures components to sub-micron tolerances, from small valve assemblies to flying control assemblies and landing gear kits, with non-destructive testing and metal treatments available in-house through Bowmill Metal Treatments Ltd.\n\n## Products and solutions\n\n- **Precision machined components** - multi-disciplined machined products for aerospace, defence and marine customers.\n- **Assemblies** - sub-assemblies and final assembly, including flying control assemblies and landing gear kits.\n- **Surface finishing and testing** - metal treatment processing and non-destructive testing.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://bowmill.co.uk/\n- LinkedIn: https://www.linkedin.com/company/bowmill-engineering-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS Group member profile (https://www.adsgroup.org.uk/members/bowmill-engineering-ltd-2/); Bowmill website (https://bowmill.co.uk/about/); Companies House (https://find-and-update.company-information.service.gov.uk/company/00981453)."}, {"name": "Boyce Precision Engineering Ltd", "website": "https://boyceprecisionengineering.com/", "linkedin": "https://www.linkedin.com/company/boyce-precision-engineering-ltd", "hq": "Portadown, United Kingdom", "region": "Northern Ireland", "size": "small", "headcount": "27", "founded": "2006", "tags": ["defence", "air", "manufacturing", "hardware", "size-small", "type-manufacturer", "type-sme", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Precision CNC machining of high-specification components for aerospace and defence.", "body": "# Boyce Precision Engineering\n\n> Precision CNC machining of high-specification components for aerospace and defence.\n\n## What they do\n\nBoyce Precision Engineering is a family-founded business established in 2006 in Portadown, Northern Ireland, specialising in precision machined components for the aerospace, defence, pharmaceutical, textile, motorsport and food sectors. It machines components in aluminium, hard metals and engineered polymers, and supplies jigs, fixtures and sub-assemblies. The company became employee-owned in May 2024 through an Employee Ownership Trust covering its 27 staff.\n\n## Products and solutions\n\n- **Precision CNC components** - high-specification machined parts in aluminium, hard metals and engineered polymers for aerospace and defence.\n- **Jigs, fixtures and sub-assemblies** - tooling and assembled components.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS9100D; SC21 Silver Award\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2024-05-23** - Boyce Precision Engineering transferred to employee ownership through an Employee Ownership Trust covering its 27 staff. [source](https://boyceprecisionengineering.com/2024/05/23/employees-take-owned-uk/)\n\n## Links\n\n- Website: https://boyceprecisionengineering.com/\n- LinkedIn: https://www.linkedin.com/company/boyce-precision-engineering-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS Group member profile (https://www.adsgroup.org.uk/members/boyce-precision-engineering-2/); Boyce Precision Engineering website (https://boyceprecisionengineering.com/defence/); Companies House (https://find-and-update.company-information.service.gov.uk/company/NI061898); The Irish News (https://www.irishnews.com/news/business/employees-take-control-at-portadowns-boyce-precision-engineering-WCEDGXVXRNBYLIIJQXTANO4FQQ/)."}, {"name": "Bozeat Industrial Limited (t/a B. I. Engineering)", "website": "https://biengineering.co.uk", "linkedin": "https://www.linkedin.com/company/bi-engineering", "hq": "Wellingborough, United Kingdom", "region": "East Midlands", "size": "small", "headcount": "", "founded": "1975", "tags": ["defence", "manufacturing", "land", "size-small", "type-manufacturer", "type-sme", "owned-uk", "accr-ce", "accr-ce-plus", "accr-iso9001", "mbr-ads"], "summary": "Family-owned UK manufacturer of fabrications and assemblies for the defence and off-highway vehicle sectors.", "body": "# BI Engineering\n\n> Family-owned UK manufacturer of fabrications and assemblies for the defence and off-highway vehicle sectors.\n\n## What they do\n\nB. I. Engineering, the trading name of Bozeat Industrial Limited, has supplied manufactured parts and assemblies to the defence and commercial on- and off-highway sectors since 1975. It offers design, manufacture, supply and fitment of light, heavy and armoured fabrications, and specialises in vehicle engine cooling and heat transfer. It works with OEMs and Tier 1 suppliers, and houses its operations across 185,000 square feet of manufacturing, R&D, bonded stores and distribution facilities in Wellingborough.\n\n## Products and solutions\n\n- **Armoured and heavy fabrications** - light, heavy and armoured fabrications for military and off-highway vehicles.\n- **Vehicle engine cooling and heat transfer** - radiators, heat transfer and repair.\n- **Military vehicle seating** - in-house upholstery for military vehicle seating.\n- **Machining and finishing** - precision machine shop, press shop, paint, phosphating and hot-tin dipping.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, ISO 3834-2, DIN 2303, Cyber Essentials, Cyber Essentials Plus.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://biengineering.co.uk\n- LinkedIn: https://www.linkedin.com/company/bi-engineering\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (biengineering.co.uk), ADS members directory, Companies House (registered as Bozeat Industrial Limited, 01228801)."}, {"name": "Bradbury Group Limited", "website": "https://bradbury-group.com/", "linkedin": "https://www.linkedin.com/company/bradburygroup", "hq": "Scunthorpe, England", "region": "Yorkshire and the Humber", "size": "medium", "headcount": "", "founded": "1991", "tags": ["defence", "size-medium", "hardware", "manufacturing", "type-manufacturer", "type-sme", "owned-uk", "accr-iso9001", "accr-iso14001", "mbr-ads"], "summary": "Manufacturer of physical security doorsets, grilles and steel security products, with products certified for use across UK government and critical national infrastructure.", "body": "# Bradbury Group\n\n> Manufacturer of physical security doorsets, grilles and steel security products, with products certified for use across UK government and critical national infrastructure.\n\n## What they do\n\nBradbury Group is a UK manufacturer of physical security solutions, operating from a head office in Lincolnshire. It manufactures a portfolio of third-party accredited doorsets for security, fire, flood and acoustics, serving sectors including architecture and construction, utilities and defence. The business operates through four divisions: Bradbury Security, Extendor, Martin Roberts and Newton Security Doors.\n\n## Products and solutions\n\n- **Security doorsets** - steel security doors rated SR2 to SR4, plus fire, flood-defence and acoustic doorsets.\n- **Security grilles and cages** - including LPS 1175 SR3 certified grilles, certified and CPNI-approved for use by UK government departments and critical national infrastructure.\n- **Architectural and communal doors** - steel and aluminium entrance doors via the Martin Roberts and Newton divisions.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, ISO 14001, LPS 1175 (LPCB), Secured by Design, CPNI approval for SR3 grilles.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-12-03** - Launch of EcoLeaf, described as the UK's first low-carbon security-rated steel door, alongside a memorandum of understanding with thyssenkrupp Materials UK and Chainbridge Steel. [source](https://bradbury-group.com/news/next-generation-steel-comes-to-the-uk/)\n\n## Links\n\n- Website: https://bradbury-group.com/\n- LinkedIn: https://www.linkedin.com/company/bradburygroup\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Companies House (02752887), Bradbury Group website, Secured by Design directory, Bradbury Group LinkedIn company page."}, {"name": "Brimstone Site Investigation Ltd", "website": "https://www.brimstoneuxo.com/", "linkedin": "https://www.linkedin.com/company/brimstone-site-investigation", "hq": "Chatham, England", "region": "South East England", "size": "small", "headcount": "", "founded": "2016", "tags": ["defence", "size-small", "munitions", "isr", "drones", "type-sme", "owned-uk", "mbr-ads"], "summary": "Unexploded ordnance risk-mitigation and explosive ordnance disposal specialist serving construction, infrastructure and brownfield development in the UK and internationally.", "body": "# Brimstone Site Investigation\n\n> Unexploded ordnance risk-mitigation and explosive ordnance disposal specialist serving construction, infrastructure and brownfield development in the UK and internationally.\n\n## What they do\n\nBrimstone is a UXO (unexploded ordnance) risk-mitigation specialist for the construction, infrastructure and brownfield-development sectors. It describes itself as the only UK Government and MoD-assured contractor for explosive ordnance clearance and conventional munitions disposal. The team is drawn from explosive ordnance disposal personnel recruited from the British Army, Royal Navy and Royal Air Force.\n\n## Products and solutions\n\n- **UXO risk assessment and consultancy** - qualitative and quantitative desktop risk assessments, training, and a watching brief during site works.\n- **UXO survey** - intrusive and non-intrusive land and marine surveys, including pushcart, towed and drone-borne magnetometry and geophysical survey.\n- **Explosive ordnance disposal** - licensed EOD and conventional munitions disposal, delivered internationally.\n- **Remnant** - a live UXO intelligence platform monitoring and visualising reported UXO incidents.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** CPD-certified training provider; Armed Forces Covenant signatory.\n- **Memberships:** ADS Group; listed by the Geneva International Centre for Humanitarian Demining.\n\n## Recent news\n\n- **2026-06** - Launch of Remnant, a live UXO intelligence platform. [source](https://www.brimstoneuxo.com/uxo-news/)\n\n## Links\n\n- Website: https://www.brimstoneuxo.com/\n- LinkedIn: https://www.linkedin.com/company/brimstone-site-investigation\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Companies House (10253758), Brimstone website, GICHD listing, GOV.UK Armed Forces Covenant, Brimstone LinkedIn company page."}, {"name": "Broadway (Bristol) Engineering Co Ltd", "website": "https://broadwaygroup.co.uk/broadway-engineering/", "linkedin": "https://uk.linkedin.com/company/broadwayengineeringltd", "hq": "Bristol, England", "region": "South West England", "size": "medium", "headcount": "", "founded": "1938", "tags": ["defence", "air", "size-medium", "manufacturing", "hardware", "type-manufacturer", "type-sme", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Precision-machining manufacturer of high-complexity components for civil and defence aero-engine and airframe applications, and the founding business of the Broadway Group.", "body": "# Broadway Engineering\n\n> Precision-machining manufacturer of high-complexity components for civil and defence aero-engine and airframe applications, and the founding business of the Broadway Group.\n\n## What they do\n\nBroadway Engineering manufactures high-complexity, tight-tolerance machined components for aero-engine, power-generation and airframe applications, serving UK and international civil and defence aerospace customers. It is the founding business of the Broadway Group, an aerospace manufacturing group that also includes Broadway AVPE and Broadway GET, offering machining through to finishing and inspection. The company is based in Bristol and dates its founding to 1938.\n\n## Products and solutions\n\n- **Precision machining** - grinding, milling and turning of structural components and assemblies for aero-engines and airframes.\n- **Inspection and treatment** - non-destructive testing, pressure testing, heat treatment and surface treatments delivered across the group.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS/EN 9100 (aerospace quality, incorporating ISO 9001); Cyber Essentials Plus.\n- **Memberships:** ADS Group; West of England Aerospace Forum; Midlands Aerospace Alliance.\n\n## Recent news\n\n- **2026-04-20** - Broadway Group acquired General Engineering (Treatments) Ltd of Southend-on-Sea, trading as Broadway GET, adding surface-treatment capability. [source](https://www.midlandsaerospace.org.uk/broadway-apr26)\n\n## Links\n\n- Website: https://broadwaygroup.co.uk/broadway-engineering/\n- LinkedIn: https://uk.linkedin.com/company/broadwayengineeringltd\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Companies House (00400926), Broadway Group website, Airframer, Midlands Aerospace Alliance, Broadway Engineering LinkedIn company page."}, {"name": "Broder Aerospace Ltd", "website": "https://broder-aerospace.com/", "linkedin": "https://uk.linkedin.com/company/broder-aerospace", "hq": "Sheffield, United Kingdom", "region": "Yorkshire and the Humber", "size": "small", "headcount": "", "founded": "2020", "tags": ["defence", "size-small", "air", "land", "maritime", "logistics", "hardware", "type-sme", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Distributor and supplier of materials and equipment for air, land and marine commercial and defence requirements.", "body": "# Broder Aerospace\n\n> Distributor and supplier of materials and equipment for air, land and marine commercial and defence requirements.\n\n## What they do\n\nBroder Aerospace supplies and distributes materials and equipment into air, land and marine markets, covering both commercial and defence requirements. Its defence-facing range spans ground support equipment, hose and ducting, onboard power solutions, LED lighting, steel and alloys, and military HVAC systems, alongside managed MRO services and procurement support. Broder Aerospace is the defence and aerospace arm of Broder Metals Group Ltd; it was set up as a separately registered subsidiary in 2020 and is based in Sheffield.\n\n## Products and solutions\n\n- **Ground support equipment** - powered GSE systems for aircraft and platform support.\n- **Onboard power and lighting** - onboard power solutions and LED illumination for air, land and marine platforms.\n- **Military HVAC** - heating, ventilation and air conditioning systems for military tents and shelters.\n- **MRO and procurement** - maintenance, repair and overhaul services and procurement support.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, AS9120.\n- **Memberships:** ADS Group, West of England Aerospace Forum, North West Aerospace Alliance.\n\n## Links\n\n- Website: https://broder-aerospace.com/\n- LinkedIn: https://uk.linkedin.com/company/broder-aerospace\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Broder Aerospace website and products page, North West Aerospace Alliance capability guide, Defence Engage exhibitor profile, Companies House (12431752), Broder Aerospace LinkedIn company page. Broder Aerospace is a wholly owned subsidiary and defence arm of Broder Metals Group Ltd."}, {"name": "Broder Metals Group Limited", "website": "https://broder-metals-group.com/", "linkedin": "https://uk.linkedin.com/company/broder-metals-group", "hq": "Sheffield, United Kingdom", "region": "Yorkshire and the Humber", "size": "small", "headcount": "", "founded": "2003", "tags": ["defence", "size-small", "manufacturing", "hardware", "type-sme", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Independent stockist and distributor of high-specification stainless steels, nickel alloys and super alloys.", "body": "# Broder Metals Group\n\n> Independent stockist and distributor of high-specification stainless steels, nickel alloys and super alloys.\n\n## What they do\n\nBroder Metals Group is an independent stockist and distributor of high-specification stainless steels, nickel alloys and super alloys, supplying UK, European and worldwide markets. It serves oil and gas, petrochemical, power generation, marine and subsea, motorsport, nuclear and aerospace customers. Its defence and aerospace supply runs through its Broder Aerospace subsidiary. The business has traded since 2003 and is based in Sheffield.\n\n## Products and solutions\n\n- **Stainless steels** - high-specification stainless grades in round bar and other forms.\n- **Nickel and super alloys** - nickel alloys and super alloys for demanding applications.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, AS9120, ISO 19443.\n- **Memberships:** ADS Group, British Stainless Steel Association, North West Aerospace Alliance, Motorsport Industry Association.\n\n## Links\n\n- Website: https://broder-metals-group.com/\n- LinkedIn: https://uk.linkedin.com/company/broder-metals-group\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Broder Metals Group website and About page, British Stainless Steel Association member listing, UK Metals Expo, Companies House (05690539), Broder Metals Group LinkedIn company page. Broder Metals Group is the parent of Broder Aerospace Ltd, which holds the group's defence and aerospace capability."}, {"name": "Brookhouse Aerospace Limited", "website": "https://brookhouse-aerospace.com/", "linkedin": "https://uk.linkedin.com/company/brookhouseaero", "hq": "Darwen, United Kingdom", "region": "North West England", "size": "medium", "headcount": "160-180", "founded": "1985", "tags": ["defence", "size-medium", "air", "munitions", "uas", "manufacturing", "hardware", "type-manufacturer", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Build-to-print manufacturer of composite and metallic aerostructures for civil and defence aerospace.", "body": "# Brookhouse Aerospace\n\n> Build-to-print manufacturer of composite and metallic aerostructures for civil and defence aerospace.\n\n## What they do\n\nBrookhouse Aerospace is a build-to-print aerostructures and engineering specialist serving civil and defence aerospace. It operates three business units covering metallics and fabrication, composites, and surface treatments, producing composite structures, metallic detail parts, surface treatments and integrated assemblies across two sites in Lancashire. The company traces back to 1985 and operated under the Kaman and Brookhouse Composites names before a 2021 management buyout re-established it as an independent UK business.\n\n## Products and solutions\n\n- **Composite structures** - monolithic and sandwich parts in carbon fibre, glass and Aramid, autoclave-cured in clean room facilities.\n- **Metallics and fabrication** - sheet metal fabrications and machined metal parts, including high-volume CNC machining.\n- **Surface treatments** - surface treatment processes offered to external customers and used in-house.\n- **Defence end products** - aerostructures, fuselage and engine panels, missile structures and UAV components.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, AS9100, NADCAP.\n- **Memberships:** ADS Group, North West Aerospace Alliance, Composites UK.\n\n## Recent news\n\n- **2025-12** - Completed the acquisition of Midlands precision machining firm Parker Precision, adding CNC turning, milling and 5-axis grinding. [The Manufacturer](https://www.themanufacturer.com/articles/brookhouse-aerospace-completes-acquisition-of-parker-precision/)\n- **2025-01** - Opened a new manufacturing facility and head office in Darwen, relocating administration, engineering, programmes and metallics units. [Composites UK](https://compositesuk.co.uk/brookhouse-aerospace-new-factory/)\n\n## Links\n\n- Website: https://brookhouse-aerospace.com/\n- LinkedIn: https://uk.linkedin.com/company/brookhouseaero\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Brookhouse Aerospace website, North West Aerospace Alliance capability guide, Composites UK, The Manufacturer, Companies House (01898700), Brookhouse Aerospace LinkedIn company page."}, {"name": "Brownell Limited", "website": "https://brownell.co.uk/", "linkedin": "https://uk.linkedin.com/company/brownell-limited", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "", "founded": "1952", "tags": ["defence", "size-small", "manufacturing", "hardware", "air", "type-manufacturer", "owned-uk", "fw-joscar", "accr-iso9001", "accr-ce", "mbr-ads", "mbr-makeuk-defence"], "summary": "Designer and manufacturer of humidity, moisture and pressure-control products for sensitive electrical and electronic equipment.", "body": "# Brownell\n\n> Designer and manufacturer of humidity, moisture and pressure-control products for sensitive electrical and electronic equipment.\n\n## What they do\n\nBrownell designs and manufactures humidity, moisture and pressure-control products that protect sensitive electrical and electronic equipment from condensation, humidity and pressure effects. It has operated since 1952 and serves sectors from defence and security to power generation and distribution, with a stated focus on the aerospace and defence sectors. The company is based at Park Royal in London.\n\n## Products and solutions\n\n- **Desiccants** - desiccant bags, container desiccants, refills and packaging and preservation solutions, including Envirogel silica gel.\n- **Humidity indicators** - relative-humidity and condensation indicators.\n- **Breathers and valves** - pressure relief valves, immersion-proof breathers, transformer breathers and tank-vent dryers.\n- **VMAP** - Versatile Moisture Adsorbent Polymer, a mouldable or machinable adsorbent material developed for electronics, aerospace, defence and optics applications.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR.\n- **Accreditations:** ISO 9001, Cyber Essentials.\n- **Memberships:** ADS Group, Make UK Defence, Farnborough Aerospace Consortium.\n\n## Links\n\n- Website: https://brownell.co.uk/\n- LinkedIn: https://uk.linkedin.com/company/brownell-limited\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Brownell website and About page, Farnborough Aerospace Consortium membership listing, Companies House (04495331), Brownell LinkedIn company page. The business has traded since 1952; the current registered company dates from 2002."}, {"name": "Bruhn NewTech Limited", "website": "https://bruhn-newtech.com/", "linkedin": "https://www.linkedin.com/company/bruhn-newtech-as", "hq": "Søborg, Denmark", "region": "South West England", "size": "small", "headcount": "", "founded": "1997", "tags": ["defence", "size-small", "software", "c2", "sensors", "data", "type-sme", "owned-foreign", "backed-pe", "mbr-ads"], "summary": "Specialist developer of CBRN knowledge management and warning-and-reporting software for defence and civil authorities.", "body": "# Bruhn NewTech\n\n> Specialist developer of CBRN knowledge management and warning-and-reporting software for defence and civil authorities.\n\n## What they do\n\nBruhn NewTech develops chemical, biological, radiological and nuclear (CBRN) knowledge management software, sensor connectivity software, and battle management and command-and-control integration. Its products are used by defence forces and civil authorities in more than 30 countries. The group is headquartered in Søborg, Denmark, and the UK entity is a long-established subsidiary based in Salisbury, Wiltshire. The wider group is majority-owned by Nordic private equity firm Adelis Equity Partners following a 2024 acquisition.\n\n## Products and solutions\n\n- **CBRN-Analysis** - off-the-shelf CBRN information management, hazard prediction and warning and reporting application.\n- **CBRNE-Frontline** - companion CBRN warning-and-reporting and hazard-prediction application.\n- **SafeVita** - hazard monitoring and reaction planning for non-CBRN specialists.\n- **SCIM** - sensor connectivity software that integrates multiple sensor types into a single display and standard CBRN messaging.\n- **BRaCIS** - biological, radiological and chemical warning-and-reporting software for which Bruhn NewTech is the OEM to the UK MoD.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group, CBRN-UK, NATO ATP-45(F) standards committee.\n\n## Recent news\n\n- **2025** - Awarded a five-year single-source UK MoD support contract for the BRaCIS warning-and-reporting software, running to FY 2031 with two option years. [Find a Tender](https://www.find-tender.service.gov.uk/Notice/004357-2025)\n\n## Links\n\n- Website: https://bruhn-newtech.com/\n- LinkedIn: https://www.linkedin.com/company/bruhn-newtech-as\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Bruhn NewTech website, CBRN-UK member listing, UK Find a Tender service, Adelis Equity Partners announcement, Companies House (03336119), Bruhn NewTech LinkedIn company page. The group is Danish-headquartered; the UK entity (03336119) was incorporated in 1997 and is based in Salisbury."}, {"name": "Bruntons Aero Products Limited", "website": "https://www.bruntons.co.uk/", "linkedin": "https://uk.linkedin.com/company/bruntons-aero-products", "hq": "Musselburgh, Scotland", "region": "Scotland", "size": "small", "headcount": "", "founded": "1895", "tags": ["defence", "air", "maritime", "size-small", "manufacturing", "hardware", "type-manufacturer", "type-sme", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Manufacturer of machined components and mechanical cable assemblies for the aerospace supply chain, including flight control cables, helicopter winch cables and runway arrester pendants.", "body": "# Bruntons Aero Products\n\n> Manufacturer of machined components and mechanical cable assemblies for the aerospace supply chain, including flight control cables, helicopter winch cables and runway arrester pendants.\n\n## What they do\n\nBruntons Aero Products is a specialised manufacturer of machined components and mechanical cable assemblies, supplying direct to all levels of the aerospace supply chain across prototype, serial production and spares. It is a supplier of control cables and lanyards for the aviation industry and also supports the vintage aircraft market with streamline wires. The company operates from a facility in Musselburgh, near Edinburgh.\n\n## Products and solutions\n\n- **Aircraft control cables** - mechanical control cables from 1mm to 10mm diameter, flight control system cables, release mechanism cables and retaining cords.\n- **Helicopter winch cables** - cable assemblies for helicopter winch systems.\n- **Runway arrester pendants** - cross runway arrester ropes and pendants from 22mm to 32mm diameter for military and naval airfield arresting systems.\n- **Machined components and lanyards** - machined parts, lanyards and streamline wires.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS9100 Rev D (incorporating ISO 9001).\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026** - Listed as an exhibitor on the ADS Pavilion at Farnborough International Airshow 2026. [source](https://www.adsgroup.org.uk/farnborough-international-airshow-2026/)\n\n## Links\n\n- Website: https://www.bruntons.co.uk/\n- LinkedIn: https://uk.linkedin.com/company/bruntons-aero-products\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Companies House (00045894), Bruntons website, Bruntons LinkedIn company page."}, {"name": "Bryce Space and Technology Limited", "website": "https://www.brycetech.co.uk/", "linkedin": "https://www.linkedin.com/company/brycespaceandtechnology", "hq": "Alexandria, Virginia, United States", "region": "South East", "size": "small", "headcount": "", "founded": "2018", "tags": ["defence", "space", "data", "test-evaluation", "size-small", "type-consultancy", "type-sme", "owned-foreign", "mbr-ads"], "summary": "Technology and analytics consultancy serving the space, national security and aerospace and defence sectors.", "body": "# Bryce Space and Technology\n\n> Technology and analytics consultancy serving the space, national security and aerospace and defence sectors.\n\n## What they do\n\nBryceTech provides analysis, forecasting and advisory work on the space economy, covering civil, commercial and national security space programmes. It offers market, investment, strategic and technology analyses, along with acquisition and programme support. The firm has UK operations registered as Bryce Space and Technology Limited, with the wider group headquartered in Alexandria, Virginia, United States.\n\n## Products and solutions\n\n- **Space economy analysis** - data-driven market, investment and technology analysis of the global space sector.\n- **Aerospace and Defense practice** - a dedicated division supporting national security and defence customers.\n- **Biosecurity and Emerging Threats practice** - analysis and advisory work on emerging national security threats.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group; UKspace.\n\n## Links\n\n- Website: https://www.brycetech.co.uk/\n- LinkedIn: https://www.linkedin.com/company/brycespaceandtechnology\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS members directory (adsgroup.org.uk), BryceTech website (brycetech.co.uk, brycetech.com), Companies House (company 11306005), UKspace member listing."}, {"name": "BSE Engineering Group Limited", "website": "https://bse-eng.co.uk/", "linkedin": "", "hq": "Leighton Buzzard, England", "region": "East of England", "size": "micro", "headcount": "", "founded": "2024", "tags": ["defence", "test-evaluation", "size-micro", "type-consultancy", "type-sme", "mbr-ads"], "summary": "Systems engineering and project governance consultancy supporting defence, aerospace and infrastructure programmes.", "body": "# BSE Engineering Group\n\n> Systems engineering and project governance consultancy supporting defence, aerospace and infrastructure programmes.\n\n## What they do\n\nBSE Engineering Group provides systems engineering, verification and validation, and project governance services. It positions itself as taking ownership of complex engineering projects to support on-time delivery, working across defence, aerospace and infrastructure. The company was incorporated in September 2024 and is registered in Leighton Buzzard, Bedfordshire.\n\n## Products and solutions\n\n- **Systems engineering** - engineering support across the project lifecycle.\n- **Verification and validation** - V&V services for complex systems.\n- **Project governance** - programme governance and assurance.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://bse-eng.co.uk/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS members directory (adsgroup.org.uk), BSE Engineering Group website (bse-eng.co.uk), Companies House (company 15954668)."}, {"name": "BSL Express Spares Limited", "website": "https://www.bslexpress.com/", "linkedin": "", "hq": "Latchingdon, England", "region": "East of England", "size": "small", "headcount": "", "founded": "", "tags": ["defence", "hardware", "sensors", "comms", "maritime", "logistics", "size-small", "type-sme", "type-manufacturer", "mbr-ads"], "summary": "Supplier and manufacturer of obsolete electronic and electromechanical components for defence and aerospace systems.", "body": "# BSL Express Spares\n\n> Supplier and manufacturer of obsolete electronic and electromechanical components for defence and aerospace systems.\n\n## What they do\n\nBSL Express Spares sources, stocks, manufactures and supplies obsolete components, units and sub-assemblies used to keep electronic systems operational. It specialises in radar and communication spares for defence and commercial aircraft, and supplies parts for naval, land, communications, navigation, guidance, surface and submarine systems. The company is part of the UKC Group and is registered in Latchingdon, Essex.\n\n## Products and solutions\n\n- **Obsolete component supply** - sourcing and stock of legacy electronic and electromechanical parts.\n- **Radar and communications spares** - parts for defence and civilian radar, communications and navigation networks.\n- **NATO/NSN parts** - registered supplier and manufacturer of NATO stock-numbered parts.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.bslexpress.com/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS members directory (adsgroup.org.uk), BSL Express website (bslexpress.com), UKC Group website (ukc.group), Companies House (company 09392813)."}, {"name": "Butser Rubber Limited", "website": "https://www.butserrubber.com/", "linkedin": "https://www.linkedin.com/company/butser-rubber-limited", "hq": "Liss, England", "region": "South East", "size": "small", "headcount": "", "founded": "1978", "tags": ["defence", "air", "manufacturing", "hardware", "size-small", "type-sme", "type-manufacturer", "accr-def-stan", "mbr-ads"], "summary": "Custom rubber moulding manufacturer supplying components for the aerospace, defence and industrial sectors.", "body": "# Butser Rubber\n\n> Custom rubber moulding manufacturer supplying components for the aerospace, defence and industrial sectors.\n\n## What they do\n\nButser Rubber manufactures custom rubber mouldings, O rings, gaskets and rubber-bonded components from its site in Liss, Hampshire. It has supplied the aerospace and defence sectors for over 30 years, including direct supply to the UK Ministry of Defence and private defence companies in the UK, the United States and Europe. Components are produced to commercial, aerospace and defence specifications including DTD, AMS, Def Stan and BS.\n\n## Products and solutions\n\n- **Custom rubber mouldings** - bespoke moulded rubber and silicone components.\n- **Gaskets and O rings** - in-house gasket manufacture using rubbers, silicones and sponge materials.\n- **Rubber-bonded components** - rubber-to-metal bonded parts.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** components manufactured to Defence Standards (Def Stan), DTD, AMS and BS specifications.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.butserrubber.com/\n- LinkedIn: https://www.linkedin.com/company/butser-rubber-limited\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS members directory (adsgroup.org.uk), Butser Rubber website (butserrubber.com), Companies House (company 01358212)."}, {"name": "By Light Technologies Limited", "website": "https://bylight.com/", "linkedin": "", "hq": "McLean, Virginia, United States", "region": "North West", "size": "small", "headcount": "", "founded": "2024", "tags": ["defence", "cyber", "training", "simulation", "size-small", "type-sme", "owned-foreign", "mbr-ads"], "summary": "UK arm of a US defence technology firm providing cyber training, cyber ranges and simulation services.", "body": "# By Light Technologies\n\n> UK arm of a US defence technology firm providing cyber training, cyber ranges and simulation services.\n\n## What they do\n\nBy Light Technologies trains cyber operators, runs custom cyber ranges and provides protection for systems vulnerable to cyber attack, alongside modernised simulation and training services. The UK business, By Light Technologies Limited, was incorporated in February 2024 to support UK sovereign defence requirements, including the Ministry of Defence's training and cyber needs. The parent company is headquartered in McLean, Virginia, United States.\n\n## Produ
