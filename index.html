cts and solutions\n\n- **Cyber operator training** - training programmes for cyber operators.\n- **Cyber ranges** - custom cyber range environments.\n- **Simulation and training** - modernised simulation and training delivery.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2024-04-02** - By Light announced its strategic market expansion into the United Kingdom. [source](https://www.send2press.com/wire/by-light-announces-strategic-market-expansion-into-the-united-kingdom/)\n\n## Links\n\n- Website: https://bylight.com/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS members directory (adsgroup.org.uk), By Light website (bylight.com), Companies House (company 15483743), Send2Press newswire announcement (April 2024)."}, {"name": "C. Brandauer & Co Ltd", "website": "https://brandauer.co.uk/", "linkedin": "", "hq": "Birmingham, United Kingdom", "region": "West Midlands", "size": "small", "headcount": "64", "founded": "1862", "tags": ["defence", "manufacturing", "hardware", "test-evaluation", "size-small", "type-manufacturer", "type-sme", "owned-uk", "mbr-ads"], "summary": "Precision metal stamping and tooling manufacturer serving aerospace, defence and other engineering sectors.", "body": "# C. Brandauer & Co Ltd\n\n> Precision metal stamping and tooling manufacturer serving aerospace, defence and other engineering sectors.\n\n## What they do\n\nBrandauer is a contract precision metal stamping and tooling company based in Birmingham. It works in thin gauge materials, with material thicknesses from roughly 0.1mm to 2mm and tolerances measured in microns. The company supplies the automotive, aerospace, defence, mining and power generation sectors, and lists aerospace and defence among the markets it is targeting under its current ten-year plan.\n\n## Products and solutions\n\n- **Precision metal stamping** - high volume, thin gauge stamped components produced from in-house tooling.\n- **Tooling design and manufacture** - modular, in-house tooling solutions.\n- **Rapid prototyping** - laser cutting and tool-less precision metal forming to move a design from 2D drawing to formed 3D component.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-09-18** - Brandauer completed a management buyout keeping the company in UK ownership, alongside a ten-year growth plan and continued investment in precision engineering. [Express & Star](https://www.expressandstar.com/news/business/2025/09/18/historic-birmingham-metal-stamping-firm-brandauer-bought-out-by-management/)\n\n## Links\n\n- Website: https://brandauer.co.uk/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (brandauer.co.uk), ADS Group member directory (adsgroup.org.uk/members/c-brandauer-co-ltd-2/), Companies House (company 00071835), Express & Star, The Manufacturer."}, {"name": "C2 Risk Ltd", "website": "https://c2risk.com/", "linkedin": "https://www.linkedin.com/company/c2risk", "hq": "United Kingdom", "region": "", "size": "small", "headcount": "", "founded": "", "tags": ["defence", "cyber", "software", "data", "size-small", "type-sme", "type-scaleup", "owned-uk", "fw-gcloud", "mbr-ads", "mbr-techuk"], "summary": "UK risk and compliance software company providing a platform for third-party, vendor and cyber risk management.", "body": "# C2 Risk Ltd\n\n> UK risk and compliance software company providing a platform for third-party, vendor and cyber risk management.\n\n## What they do\n\nC2 Risk provides a risk management platform for organisations to assess, identify and mitigate risks across supplier, compliance, privacy and cyber programmes. The company draws on experience across the defence, public and private sectors and works with government and public sector organisations as well as commercial clients.\n\n## Products and solutions\n\n- **RiskStore** - online platform for managing risk, vendor and third-party assessments, and compliance in one place.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** G-Cloud.\n- **Memberships:** ADS Group, techUK (Cyber Resilience).\n\n## Recent news\n\n- **2025-02-21** - C2 Risk promoted its RiskStore risk management platform via its LinkedIn company page. [LinkedIn](https://www.linkedin.com/posts/c2risk_riskstore-risk-management-platform-activity-7296105967430057985-z7Ar)\n\n## Links\n\n- Website: https://c2risk.com/\n- LinkedIn: https://www.linkedin.com/company/c2risk\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (c2risk.com), LinkedIn company page (linkedin.com/company/c2risk), techUK (Cyber Resilience member resource), Companies House (company 09885860)."}, {"name": "C3 Systems Consulting Ltd", "website": "https://www.c3sc.co.uk/", "linkedin": "", "hq": "Salisbury, United Kingdom", "region": "South West", "size": "micro", "headcount": "", "founded": "2009", "tags": ["defence", "cyber", "c2", "software", "size-micro", "type-consultancy", "type-sme", "owned-uk", "fw-gcloud", "mbr-ads"], "summary": "Independent consultancy providing subject matter expertise and project teams to defence and security clients in the UK and overseas.", "body": "# C3 Systems Consulting Ltd\n\n> Independent consultancy providing subject matter expertise and project teams to defence and security clients in the UK and overseas.\n\n## What they do\n\nC3 Systems Consulting is an independent company providing subject matter expertise and project teams to defence and security clients across government and industry. The company describes more than 20 years of experience supporting defence and security customers, with work spanning operational analysis, research, development, architecture, implementation, assessment, and the provision of cyber and IT services and solutions.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** G-Cloud.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.c3sc.co.uk/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (c3sc.co.uk), ADS Group member directory (adsgroup.org.uk/members/c3-systems-consulting-ltd-1/), Digital Marketplace G-Cloud supplier listing, Companies House (company 07084523)."}, {"name": "CA Models Ltd", "website": "https://www.camodels.co.uk/", "linkedin": "", "hq": "Stirling, United Kingdom", "region": "Scotland", "size": "small", "headcount": "", "founded": "1983", "tags": ["defence", "manufacturing", "hardware", "test-evaluation", "size-small", "type-manufacturer", "type-sme", "owned-foreign", "fw-joscar", "accr-ce", "accr-iso9001", "mbr-ads"], "summary": "Rapid prototyping, additive manufacturing and model making company serving aerospace, defence and other sectors.", "body": "# CA Models Ltd\n\n> Rapid prototyping, additive manufacturing and model making company serving aerospace, defence and other sectors.\n\n## What they do\n\nCA Models is a rapid prototyping and model making business based in Stirling, Scotland, established in 1983. It works across aerospace, automotive, defence, marine, medical, oil and gas and product design. Capabilities include additive manufacturing in titanium, aluminium and stainless steel, SLA, SLS, FDM and DLP printing, five-axis CNC machining, vacuum casting and specialist model making. CA Models is part of the Prototal group following acquisition by Prototal Industries (Sweden); the Stirling operation continues under the CA Models name.\n\n## Products and solutions\n\n- **Additive manufacturing** - metal and polymer 3D printing including titanium, aluminium and stainless steel.\n- **Precision CNC machining** - five-axis machining for prototype and production parts.\n- **Model making and finishing** - vacuum casting, painting, powder coating, anodising and plating.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR registered.\n- **Accreditations:** ISO 9001, Cyber Essentials.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2024-02-01** - Prototal Industries acquired CA Models, adding metal additive manufacturing to the group and expanding its UK presence. [TCT Magazine](https://www.tctmagazine.com/additive-manufacturing-3d-printing-news/prototal-industries-acquires-Scottish-3d-printing-company-ca-models/)\n\n## Links\n\n- Website: https://www.camodels.co.uk/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (camodels.co.uk), ADS Group member directory (adsgroup.org.uk/members/ca-models-2/), TCT Magazine, Metal AM, Prototal group website."}, {"name": "Cablescan Limited", "website": "https://www.cablescan.co.uk", "linkedin": "https://uk.linkedin.com/company/cablescan-limited", "hq": "Brough, United Kingdom", "region": "Yorkshire and the Humber", "size": "small", "headcount": "", "founded": "2001", "tags": ["defence", "manufacturing", "hardware", "air", "land", "uas", "size-small", "type-sme", "type-manufacturer", "owned-foreign", "accr-iso9001", "accr-iso14001", "accr-ce-plus", "fw-joscar", "mbr-ads"], "summary": "Manufacturer of high-performance electrical cable assemblies, wiring harnesses and control panels for military and aerospace platforms.", "body": "# Cablescan\n\n> Manufacturer of high-performance electrical cable assemblies, wiring harnesses and control panels for military and aerospace platforms.\n\n## What they do\n\nCablescan manufactures and develops electrical cable assemblies, wiring harnesses, cables and control panels for military and aerospace customers. It holds onsite engineering and prototyping capability, supporting development through to volume manufacture, and maintains a large onsite stockholding of ground-vehicle material to respond to UK Urgent Operational Requirement (UoR) demands. The business was formed in 1994; the current legal entity was registered in 2001, and Cablescan was acquired by Amphenol Corporation in 2019.\n\n## Products and solutions\n\n- **Cable assemblies and wiring harnesses** - design, manufacture and test for military aerospace, naval, land vehicle and UAV applications.\n- **Control panels** - manufacture for defence and industrial platforms.\n- **Repair, overhaul and modification** - in-service support for existing assemblies.\n- **Laser wire marking, automatic testing and machine overbraiding** - supporting manufacturing capabilities.\n\nStated market sectors include military aerospace, naval, military land vehicles, unmanned aerial vehicles, communications, test equipment and security.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS9100, ISO 9001, ISO 14001, Cyber Essentials Plus, IPC-620, IPC J-STD-001, VG96927\n- **Frameworks:** JOSCAR registered; SC21 Silver\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.cablescan.co.uk\n- LinkedIn: https://uk.linkedin.com/company/cablescan-limited\n\n## Sources\n\nPublic information verified 2026-06-29. Companies House (04198380); ADS Group members directory; Cablescan company website; Cablescan LinkedIn company page; Amphenol Ltd website."}, {"name": "CAE (UK) plc", "website": "https://www.cae.com", "linkedin": "", "hq": "Montreal, Canada", "region": "South East England", "size": "large", "headcount": "", "founded": "1967", "tags": ["defence", "simulation", "training", "air", "land", "size-large", "type-prime", "type-integrator", "owned-foreign", "mbr-ads"], "summary": "UK arm of CAE Inc, providing synthetic training equipment and aircrew training to the UK armed forces.", "body": "# CAE (UK) plc\n\n> UK arm of CAE Inc, providing synthetic training equipment and aircrew training to the UK armed forces.\n\n## What they do\n\nCAE (UK) plc is a training systems integrator and synthetic training equipment provider, ranked as a key supplier to the UK Ministry of Defence. It provides synthetic training equipment and training services and holds Design Authority status for several British Army training systems. The RAF and Royal Navy use CAE UK for aircrew training across a range of platforms, from basic flying skills to advanced mission training and rehearsal.\n\nCAE (UK) plc is the UK subsidiary of CAE Inc, headquartered in Montreal, Canada. The UK entity dates to 1967 and is based at Burgess Hill, West Sussex, with the Medium Support Helicopter Aircrew Training Facility at RAF Benson.\n\n## Products and solutions\n\n- **Medium Support Helicopter Aircrew Training Facility (MSHATF)** - six full-mission simulators at RAF Benson (Chinook, Merlin and Puma) covering conversion through to pre-deployment mission rehearsal.\n- **Land training systems** - simulators for artillery fire control, direct fire gunnery, air defence engagement and target recognition; Design Authority for the Warrior Gunnery Turret Trainer, Warrior Desk Top Trainer and Artillery Fire Control Trainer.\n- **Single Synthetic Environment (SSE)** - mission-rehearsal capability work for UK Strategic Command.\n- **CAE London Burgess Hill** - simulator-based pilot training centre mixing civil and military rotary training.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** MoD Design Authority status for several Army training systems.\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-02-27** - MoD awarded CAE a £3.5m Warrior training system contract, a single-source award on the basis of CAE's Design Authority status, delivered from Burgess Hill. [UK Defence Journal](https://ukdefencejournal.org.uk/mod-awards-3-5m-warrior-training-system-contract-to-cae/)\n\n## Links\n\n- Website: https://www.cae.com\n\n## Sources\n\nPublic information verified 2026-06-29. Companies House (00921122); ADS Group members directory; CAE United Kingdom regional page; UK Defence Journal. No clean LinkedIn company-page slug for the UK entity was confirmed, so it is omitted."}, {"name": "Calian UK Ltd", "website": "https://www.calian.com", "linkedin": "https://ca.linkedin.com/company/calian", "hq": "Ottawa, Canada", "region": "South East England", "size": "large", "headcount": "", "founded": "2004", "tags": ["defence", "training", "simulation", "software", "size-large", "type-prime", "owned-foreign", "listed", "mbr-ads"], "summary": "UK arm of Canada's Calian Group, delivering military training, role-play exercises and simulation to the British Army and UK MoD.", "body": "# Calian UK\n\n> UK arm of Canada's Calian Group, delivering military training, role-play exercises and simulation to the British Army and UK MoD.\n\n## What they do\n\nCalian UK Ltd, formerly Mabway Limited, is a prime supplier to the British Army and UK MoD for large-scale military training, role-play exercise support and simulation. The UK business specialises in defence role-play environments (actors, audiences, adversaries and specialists) that simulate operational conditions for live military exercises, alongside technical and engineering education for naval and maritime forces.\n\nCalian UK is the UK operating company of Calian Group Ltd, a TSX-listed group headquartered in Ottawa, Canada. The UK entity dates to 2004 and is registered in Hampshire.\n\n## Products and solutions\n\n- **Live training and role-play exercise support** - managing realistic role-playing environments for military field exercises; prime supplier to the British Army.\n- **MaestroEDE** - exercise design, development and delivery software platform for large-scale military exercises.\n- **Immersive Training Technologies** - AR, VR, MR and XR training environments.\n- **Audio distribution and connectivity** - systems-agnostic connectivity of field radios for exercise command and control.\n- **Technical and engineering education** - for naval and maritime communities.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** EAL-recognised training provider (engineering and manufacturing qualifications).\n- **Memberships:** ADS Group; Armed Forces Covenant signatory.\n\n## Recent news\n\n- **2026-06** - Calian advanced NATO operational readiness and multi-domain training support. [Unmanned Systems Technology](https://www.unmannedsystemstechnology.com/2026/06/calian-advances-nato-operational-readiness-multi-domain-training-support/)\n- **2026-06** - Calian showcased mission-support solutions at Eurosatory 2026, Paris. [ADS Advance](https://www.adsadvance.co.uk/calian-showcasing-mission-support-solutions-at-eurosatory-2026.html)\n\n## Links\n\n- Website: https://www.calian.com\n- LinkedIn: https://ca.linkedin.com/company/calian\n\n## Sources\n\nPublic information verified 2026-06-29. Companies House (05136214); ADS Group members directory; Calian company website; Shephard Media; ADS Advance; Unmanned Systems Technology. The canonical LinkedIn company page is the Calian Group page; no separate verified standalone Calian UK company page was found."}, {"name": "Callen-Lenz Associates Limited", "website": "https://callenlenz.com", "linkedin": "https://uk.linkedin.com/company/callen-lenz", "hq": "Salisbury, United Kingdom", "region": "South West England", "size": "medium", "headcount": "51-200", "founded": "2007", "tags": ["defence", "uas", "drones", "autonomy", "isr", "air", "munitions", "size-medium", "type-sme", "type-manufacturer", "owned-uk", "accr-iso9001", "accr-ce-plus", "mbr-ads"], "summary": "UK developer that designs, manufactures and operates uncrewed and autonomous air systems for military customers.", "body": "# Callen-Lenz\n\n> UK developer that designs, manufactures and operates uncrewed and autonomous air systems for military customers.\n\n## What they do\n\nCallen-Lenz offers products, platforms and services across the uncrewed and autonomous air vehicle market. Design, development and manufacture of UAV platforms and associated avionic systems are performed in-house, alongside aviation services and technical consultancy for crewed and uncrewed aviation. All systems are manufactured in the UK, mostly from UK supply chains. The company was acquired by BAE Systems in 2024 into its FalconWorks research and development arm.\n\n## Products and solutions\n\n- **Koios** - compact medium VTOL platform for strategic ISR with a tactical footprint; range up to around 750 km and endurance up to around 10 hours.\n- **Nyan** - one-way effector (loitering munition); subject of a UK MoD contract and tested by the British Army.\n- **Fregata** - medium, high-endurance conventional take-off and landing ISR platform.\n- **Prometheus** - reconfigurable UAS for mapping and autonomous navigation of GNSS-denied subterranean environments.\n- **SkyCircuits** - wholly owned subsidiary producing high-integrity autopilots and mission management systems for crewed and uncrewed aviation.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, Cyber Essentials, Cyber Essentials Plus.\n- **Memberships:** ADS Group (Aerospace and Defence sectors).\n\n## Recent news\n\n- **2026-02-20** - UK awarded Callen-Lenz a £4.99m contract for Nyan one-way effectors to support deep-fire capability. [The Defense Post](https://thedefensepost.com/2026/02/20/uk-callen-lenz-owe-drones/)\n- **2024** - Acquired by BAE Systems FalconWorks. [Aviation Week](https://aviationweek.com/defense/aircraft-propulsion/bae-systems-falconworks-acquires-uas-developer-callen-lenz)\n\n## Links\n\n- Website: https://callenlenz.com\n- LinkedIn: https://uk.linkedin.com/company/callen-lenz\n\n## Sources\n\nPublic information verified 2026-06-29. Companies House (06361441); ADS Group members directory; Callen-Lenz company website; Callen-Lenz LinkedIn company page; The Defense Post; Shephard Media; Aviation Week."}, {"name": "Cam Lock Limited", "website": "https://www.camlocksafety.com", "linkedin": "https://www.linkedin.com/company/cam-lock-uk", "hq": "Aldershot, United Kingdom", "region": "South East England", "size": "medium", "headcount": "100+", "founded": "1986", "tags": ["defence", "manufacturing", "hardware", "air", "size-medium", "type-sme", "type-manufacturer", "accr-iso9001", "mbr-ads"], "summary": "Manufacturer of CBRN respiratory protection and life-support breathing apparatus for aircrew, military and emergency use.", "body": "# Cam Lock\n\n> Manufacturer of CBRN respiratory protection and life-support breathing apparatus for aircrew, military and emergency use.\n\n## What they do\n\nCam Lock designs and manufactures personal protection life-support systems: breathing apparatus and respiratory protection for aircrew, military, industrial and emergency use. Its defence focus is CBRN (chemical, biological, radiological, nuclear) respiratory protection for aircrew, with core strength in elastomeric mouldings and life-support products. The company is based in Aldershot, Hampshire, is part of the Camberley Group, and operates additional facilities in the USA, Canada, Asia Pacific and the Middle East.\n\n## Products and solutions\n\n- **CBRN Tactical Mask (aircrew respirator)** - CBRN aircrew mask qualified across platforms including Typhoon, Gripen, Rafale, Hawk, F-15, F-16, F-18, F-22 and F-35.\n- **JSAM-TA (Joint Service Aircrew Mask - Tactical Aircraft)** - supplied to the US Navy and Marine Corps, USAF, Australian Defence Force and Italian Air Force.\n- **Aircrew oxygen masks**\n- **FAST-mask and FAST-resQ** - escape respirator and emergency breathing apparatus.\n- **Industrial respirators and firefighter breathing apparatus** - including SCBA and emergency escape sets.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2026** - Exhibitor at Security & Policing 2026, Farnborough International. [Security & Policing](https://www.securityandpolicing.co.uk/exhibitors/exhibitors-list-2026/cam-lock-ltd/)\n\n## Links\n\n- Website: https://www.camlocksafety.com\n- LinkedIn: https://www.linkedin.com/company/cam-lock-uk\n\n## Sources\n\nPublic information verified 2026-06-29. Companies House (02037550); ADS Group members directory; Cam Lock company website; Cam Lock LinkedIn company page; Security & Policing 2026 exhibitor listing."}, {"name": "Camberley Rubber Mouldings Limited", "website": "https://www.camberleyrubber.com/", "linkedin": "https://uk.linkedin.com/company/camberley-rubber", "hq": "Aldershot, United Kingdom", "region": "South East England", "size": "small", "headcount": "", "founded": "1969", "tags": ["defence", "manufacturing", "hardware", "size-small", "type-sme", "type-manufacturer", "mbr-ads"], "summary": "Manufacturer of bespoke rubber mouldings and custom rubber components, supplying aerospace, defence and industrial markets.", "body": "# Camberley Rubber Mouldings\n\n> Manufacturer of bespoke rubber mouldings and custom rubber components, supplying aerospace, defence and industrial markets.\n\n## What they do\n\nCamberley Rubber Mouldings is a specialist technical manufacturer of bespoke rubber mouldings and custom-made rubber products, established in 1969. It produces precision rubber components and associated tooling for aerospace, electronics, pharmaceutical, industrial and military applications. Its machines support injection, compression and transfer moulding. The company is part of the Camberley Group, which also incorporates Cam Lock Ltd, a manufacturer of personal protection equipment for the aerospace, defence and industrial markets.\n\n## Products and solutions\n\n- **Bespoke rubber mouldings** - custom rubber components and tooling produced by injection, compression and transfer moulding for aerospace, defence and industrial customers.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.camberleyrubber.com/\n- LinkedIn: https://uk.linkedin.com/company/camberley-rubber\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (camberleyrubber.com, including the History page), ADS members directory (adsgroup.org.uk), Companies House (company 01043362), Airframer directory listing, company LinkedIn page."}, {"name": "Cambridge Aerospace Limited", "website": "https://www.cambridgeaerospace.com/", "linkedin": "https://www.linkedin.com/company/cambridgeaerospace", "hq": "London, United Kingdom", "region": "London", "size": "medium", "headcount": "~125", "founded": "2024", "tags": ["defence", "air", "munitions", "counter-uas", "manufacturing", "hardware", "size-medium", "type-manufacturer", "backed-vc"], "summary": "UK defence-technology company developing low-cost air and missile defence interceptors to counter drones and missiles.", "body": "# Cambridge Aerospace Limited\n\n> UK defence-technology company developing low-cost air and missile defence interceptors to counter drones and missiles.\n\n## What they do\n\nCambridge Aerospace is a UK defence-technology scale-up founded in 2024, focused on sovereign air and missile defence for the UK and allied customers. Its stated mission is to \"eliminate the risk of existential war in Europe\", developing scalable, low-cost interceptors against drone and cruise-missile threats. It is also establishing UK solid-rocket-motor manufacturing to underpin its own systems and supply chain.\n\n## Products and solutions\n\n- **Skyhammer** - tube-launched interceptor against slower, lower-value threats such as Shahed-style drones and subsonic missiles. Reported speed around Mach 0.7, range over 30 km, unit cost in the tens of thousands of dollars.\n- **Starhammer** - interceptor for faster, higher-value targets.\n- **Nightstar** - solid rocket motors, to be produced at a planned Norfolk facility for the company's own use and potential third-party sale.\n\n## Recent news\n\n- **2026-06-10** - In talks to raise around 300m USD at a roughly 3.5bn USD valuation. [source](https://www.bloomberg.com/news/articles/2026-06-10/cambridge-aerospace-in-talks-to-raise-at-3-5-billion-valuation)\n- **2026-04-13** - UK MoD orders a significant number of Skyhammer air-defence systems, with first deliveries expected from May 2026. [source](https://www.theregister.com/2026/04/13/cambridge_aerospace_skyhammer_interceptor/)\n\n## Links\n\n- Website: https://www.cambridgeaerospace.com/\n- LinkedIn: https://www.linkedin.com/company/cambridgeaerospace\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, Companies House (no. 15935962, active, incorporated 4 September 2024), Bloomberg, The Register, The Aviationist. Note: this is the defence-technology firm trading as \"Cambridge Aerospace\", not the long-established Marshall of Cambridge Aerospace Limited (Companies House no. 00245740), a separate company with a similar name. Headcount (~125) and operational siting (registered office London, planned solid-rocket-motor facility in Norfolk) are drawn from press reporting rather than filed records."}, {"name": "Cambridge Consultants Limited", "website": "https://www.cambridgeconsultants.com", "linkedin": "https://www.linkedin.com/company/cambridge-consultants", "hq": "Cambridge, United Kingdom", "region": "East of England", "size": "large", "headcount": "900+", "founded": "1960", "tags": ["defence", "ai", "cyber", "autonomy", "sensors", "rf", "comms", "quantum", "uas", "type-consultancy", "size-large", "owned-foreign", "mbr-ads"], "summary": "A deep-tech product development and engineering consultancy, part of Capgemini, with a defence and security practice.", "body": "# Cambridge Consultants\n\n> A deep-tech product development and engineering consultancy, part of Capgemini, with a defence and security practice.\n\n## What they do\n\nCambridge Consultants is a technology and product development consultancy that works across multiple industries including defence and security. Its defence work spans autonomous land, air and underwater vehicles, sensing and wireless technology, signal processing, machine learning, cyber defence and quantum technologies. The company employs more than 900 staff across offices in Cambridge, Boston, Tokyo and Singapore. Since 2021 it has been part of Capgemini Invent.\n\n## Products and solutions\n\n- **Autonomy and uncrewed systems** - development of autonomous land vehicles, UAVs and uncrewed underwater vehicles, including collaborative UAV fleets.\n- **Sensing and wireless** - radar, optical sensing for surveillance and CBRNE applications, positioning systems and electronic countermeasures.\n- **Cyber and quantum** - autonomous cyber defence engines, quantum key distribution and post-quantum encryption research.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2021** - Cambridge Consultants became part of Capgemini Invent following Capgemini's acquisition. [source](https://www.consultancy.eu/news/6387/capgemini-invent-expands-with-cambridge-consultants-and-frog)\n\n## Links\n\n- Website: https://www.cambridgeconsultants.com\n- LinkedIn: https://www.linkedin.com/company/cambridge-consultants\n\n## Sources\n\nPublic information verified 2026-06-29. Sources used: cambridgeconsultants.com, LinkedIn company page, Wikipedia, ADS Group member directory, Consultancy.eu, Capgemini press releases."}, {"name": "Cambridge Design Partnership Limited", "website": "https://www.cambridge-design.com/", "linkedin": "https://uk.linkedin.com/company/cambridge-design-partnership", "hq": "Cambridge, United Kingdom", "region": "East of England", "size": "medium", "headcount": "200-300", "founded": "1996", "tags": ["defence", "hardware", "test-evaluation", "size-medium", "type-consultancy", "owned-founder", "mbr-ads"], "summary": "Employee-owned product development and engineering consultancy with a defence and security capability alongside its consumer, healthcare and industrial work.", "body": "# Cambridge Design Partnership\n\n> Employee-owned product development and engineering consultancy with a defence and security capability alongside its consumer, healthcare and industrial work.\n\n## What they do\n\nCambridge Design Partnership (CDP) is an end-to-end product development consultancy that takes products from early insight and ideas through prototyping to production. Its multidisciplinary teams combine science, engineering and design across consumer, healthcare, industrial and defence and security sectors. The company became fully employee-owned in 2018 through an employee ownership trust.\n\n## Products and solutions\n\n- **Product development and engineering services** - design and engineering of complex, high-reliability systems and products for clients, including a dedicated defence and security capability.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.cambridge-design.com/\n- LinkedIn: https://uk.linkedin.com/company/cambridge-design-partnership\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (cambridge-design.com), ADS members directory (adsgroup.org.uk), Companies House (company 06786351), Cambridge Network defence and security project manager job listing, company LinkedIn page."}, {"name": "Cambridge Intelligence Limited", "website": "https://cambridge-intelligence.com/", "linkedin": "https://www.linkedin.com/company/cambridge-intelligence/", "hq": "Cambridge, United Kingdom", "region": "East of England", "size": "medium", "headcount": "", "founded": "2011", "tags": ["defence", "software", "data", "isr", "software", "size-medium", "type-software", "accr-iso27001"], "summary": "Cambridge-based developer of graph, timeline and geospatial data-visualisation SDKs used to build investigation tools for mission-critical software.", "body": "# Cambridge Intelligence Limited\n\n> Cambridge-based developer of graph, timeline and geospatial data-visualisation SDKs used to build investigation tools for mission-critical software.\n\n## What they do\n\nCambridge Intelligence provides visualisation software development kits (SDKs) that developers and product teams embed in their own applications to enable interactive exploration of complex, connected data. The tools are used in high-stakes domains including law enforcement, national security, cybersecurity and fraud prevention, where clarity, performance and reliability matter. The stated mission is to help people make sense of complex, connected data.\n\n## Products and solutions\n\n- **KeyLines** - JavaScript SDK for graph and network visualisation.\n- **ReGraph** - React SDK for state-driven graph visualisation.\n- **KronoGraph** - timeline visualisation SDK for investigating event data at scale.\n- **MapWeave** - geospatial visualisation SDK for uncovering connections in map-based data.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO/IEC 27001:2022 (information security management, certified via SOCOTEC, UKAS-accredited).\n\n## Recent news\n\n- **2025-05-23** - Released MapWeave, a new geospatial data-visualisation SDK. [source](https://www.bigdatawire.com/2025/05/23/cambridge-intelligence-delivers-new-geospatial-visualization-kit-mapweave/)\n- **2026** - Ongoing product releases, including KeyLines performance improvements and the end of Windows 10 support from 31 March 2026. [source](https://cambridge-intelligence.com/blog/)\n\n## Links\n\n- Website: https://cambridge-intelligence.com/\n- LinkedIn: https://www.linkedin.com/company/cambridge-intelligence/\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, Companies House (no. 07625370, active, incorporated 6 May 2011), the company's security framework page, BigDATAwire. Headcount not published; size band estimated from public evidence and flagged as unconfirmed."}, {"name": "Cambridge Pixel Ltd", "website": "https://cambridgepixel.com/", "linkedin": "https://www.linkedin.com/company/cambridge-pixel", "hq": "Royston, United Kingdom", "region": "East of England", "size": "small", "headcount": "~16", "founded": "2007", "tags": ["defence", "sensors", "software", "radar", "c2", "counter-uas", "maritime", "hardware", "size-small", "type-software", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Employee-owned UK developer of modular radar, camera and sensor processing software, SDKs and interface hardware for defence, maritime and security integrators.", "body": "# Cambridge Pixel Ltd\n\n> Employee-owned UK developer of modular radar, camera and sensor processing software, SDKs and interface hardware for defence, maritime and security integrators.\n\n## What they do\n\nCambridge Pixel develops modular radar, camera and sensor processing software, SDKs and interface hardware that let systems integrators and developers add radar capability to their systems with lower technical risk. It is a supplier of software-based radar tracking and scan-conversion solutions through its SPx software library and HPx hardware range, supporting over 80 makes and models of modern and legacy radar. The employee-owned company is based near Cambridge and serves customers in over 50 countries.\n\n## Products and solutions\n\n- **SPx** - modular software library and SDK for radar, camera and sensor processing.\n- **SPx Server V2** - radar tracking software; a 2026 update added proximity detection, HPx-700 support, and TAK and SAPIENT track-output formats.\n- **HPx** - radar input and interface hardware card range.\n- **HPx-700** - ARM-based edge Radar Input and Signal Processor that digitises analogue radars without a host PC.\n- **VSD-C2** - command-and-control display software bridging COTS and bespoke C2 systems.\n- Radar scan conversion and display, primary radar acquisition and target tracking, multi-sensor integration, and BlackTalon counter-UAS ecosystem integration.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001:2015 (quality management, BSI-audited).\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-04-30** - Released SPx Server V2, adding proximity detection, HPx-700 support and TAK/SAPIENT track outputs. [source](https://www.adsadvance.co.uk/cambridge-pixel-releases-spx-server-v2.html)\n- **2026-03** - Introduced the HPx-700 edge-based Radar Input and Signal Processor. [source](https://www.unmannedsystemstechnology.com/2026/03/cambridge-pixel-introduces-hpx-700-for-edge-based-radar-input-signal-processing/)\n- **2026-01-29** - Enhanced the BlackTalon counter-UAS ecosystem with advanced multi-sensor integration. [source](https://www.unmannedsystemstechnology.com/fr/2026/02/cambridge-pixel-ameliore-lecosysteme-c-uas-et-lintegration-multi-capteurs-de-blacktalon/)\n\n## Links\n\n- Website: https://cambridgepixel.com/\n- LinkedIn: https://www.linkedin.com/company/cambridge-pixel\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, Companies House (no. 06174486, incorporated 21 March 2007), ADS Group members directory, Unmanned Systems Technology, ADS Advance. Company switched to an employee-ownership model in 2020. Headcount (~16) is approximate."}, {"name": "Cambridge Sensoriis Ltd", "website": "https://www.cambsensoriis.com/", "linkedin": "https://uk.linkedin.com/company/cambridge-sensoriis", "hq": "Bishop's Stortford, United Kingdom", "region": "East of England", "size": "micro", "headcount": "", "founded": "2020", "tags": ["defence", "sensors", "rf", "uas", "drones", "isr", "size-micro", "type-startup", "owned-founder", "prog-dasa", "mbr-ads"], "summary": "Developer of low size, weight and power radar and sensing systems for uncrewed aerial vehicles in military and commercial use.", "body": "# Cambridge Sensoriis\n\n> Developer of low size, weight and power radar and sensing systems for uncrewed aerial vehicles in military and commercial use.\n\n## What they do\n\nCambridge Sensoriis develops micro-radar and sensing systems for uncrewed aerial vehicles. Its radars use frequency modulated continuous wave (FMCW) methodology in a low size, weight and power form factor, supporting operation in adverse weather and GNSS-denied environments. The company was founded in 2020 and is based in Bishop's Stortford.\n\n## Products and solutions\n\n- **RadarAware** - a compact, power-efficient radar weighing under 500 grams, with no moving parts and electronically steered antenna arrays, for detect-and-avoid and collision avoidance.\n- **ARC (Active Radar Cooperating)** - patented technology providing localisation based on direct radar range measurement, independent of satellites and resilient to jamming.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2024** - Awarded a Dstl contract to develop a UAV-deployed, radar-based solution for humanitarian demining (GARD ME), detecting unexploded ordnance. [source](https://www.cambsensoriis.com/dstl-contract-to-advance-uav-radar-for-humanitarian-demining/)\n\n## Links\n\n- Website: https://www.cambsensoriis.com/\n- LinkedIn: https://uk.linkedin.com/company/cambridge-sensoriis\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (cambsensoriis.com), ADS members directory (adsgroup.org.uk), Companies House (company 12586186), Janes and New Electronics coverage, company LinkedIn page."}, {"name": "Camcode Global Ltd", "website": "https://camcodeglobal.com/", "linkedin": "https://uk.linkedin.com/company/camcode-global-ltd", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "", "founded": "2012", "tags": ["defence", "logistics", "data", "hardware", "size-small", "type-sme", "mbr-ads"], "summary": "Provider of item-level asset identification, unique identification marking and traceability for defence using NATO standards.", "body": "# Camcode Global\n\n> Provider of item-level asset identification, unique identification marking and traceability for defence using NATO standards.\n\n## What they do\n\nCamcode Global is a defence technology company specialising in item-level traceability and asset identification using NATO standards. As a NATO and Partnership for Peace approved partner, it works to the STANAG 2290 / S2000 framework and unique identification (UID) to support asset tracking across the lifecycle. It was established in 2012 and has offices in the UK, the Netherlands, the USA and Australia.\n\n## Products and solutions\n\n- **UID marking and asset identification** - durable item-level marking and identification meeting standards including CDS-751, DEF STAN 05-132, MIL-STD-130, DEF(AUST) 1000C and DAOD 3038-0, delivered with an integrated mobile laser marking cart solution.\n- **Data cleansing** - asset data cleansing services to support traceability.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** NATO and Partnership for Peace approved partner; works to STANAG 2290 / S2000, DEF STAN 05-132 and MIL-STD-130\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://camcodeglobal.com/\n- LinkedIn: https://uk.linkedin.com/company/camcode-global-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (camcodeglobal.com), ADS members directory (adsgroup.org.uk), Companies House (company 07947287), company LinkedIn page."}, {"name": "Camulos Ltd", "website": "https://www.camulos.io/", "linkedin": "https://uk.linkedin.com/company/camulos", "hq": "Gloucester, United Kingdom", "region": "South West England", "size": "small", "headcount": "", "founded": "2020", "tags": ["defence", "cyber", "ai", "data", "software", "size-small", "type-sme", "owned-founder", "mbr-ads"], "summary": "Defence and national security company applying data science and artificial intelligence to cyber operations, analytics and cloud architecture.", "body": "# Camulos\n\n> Defence and national security company applying data science and artificial intelligence to cyber operations, analytics and cloud architecture.\n\n## What they do\n\nCamulos applies data science, artificial intelligence and human expertise to national security and cyber problems. Its work covers autonomous cyber operations, hybrid cloud architectures for national security partners, and intelligent analytics. The company was incorporated in 2020 and is formed and led by a team with experience in defence, national security and cyber organisations.\n\n## Products and solutions\n\n- **Autonomous cyber operations** - applying AI and data science to cyber operations for national security partners.\n- **Hybrid cloud architectures** - cloud architecture work enabling national security partners to deliver new capabilities.\n- **Intelligent analytics** - analytics services drawing on data science and AI.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.camulos.io/\n- LinkedIn: https://uk.linkedin.com/company/camulos\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (camulos.io), ADS members directory (adsgroup.org.uk), Companies House (company 12996891)."}, {"name": "CHAOS Industries", "website": "https://www.chaosinc.com", "linkedin": "https://www.linkedin.com/company/chaosindustries", "hq": "Los Angeles, United States", "region": "", "size": "medium", "headcount": "51-200", "founded": "2022", "tags": ["defence", "sensors", "radar", "counter-uas", "isr", "manufacturing", "size-medium", "type-manufacturer", "owned-uk-vc", "owned-foreign"], "summary": "US defence-technology company building distributed radar and sensing networks that detect airborne threats faster than traditional radar.", "body": "# CHAOS Industries\n\n> US defence-technology company building distributed radar and sensing networks that detect airborne threats faster than traditional radar.\n\n## What they do\n\nCHAOS Industries develops a multi-product portfolio of advanced sensing and detection systems powered by its Coherent Distributed Networks (CDN) technology. The products are aimed at warfighters, commercial air operators and border-protection teams, detecting and tracking drones, missiles and aircraft. The company describes itself as built by US veterans and Silicon Valley engineers, and is classified under Defense and Space Manufacturing.\n\n## Products and solutions\n\n- **Coherent Distributed Networks (CDN)** - flagship technology category. A self-forming network of time-synchronised sensor nodes using two-way time transfer and cooperative data processing, interoperable with command-and-control systems.\n- **Vanquish (CH001)** - distributed early-warning radar; expeditionary, low size, weight and power, for early warning and tracking against UAS, missiles and aircraft.\n- **Astria (CH002)** - long-range radar for high-precision tracking and extended-range surveillance.\n\n## Recent news\n\n- **2025-11-13** - Raised a 510m USD Series D led by Valor Equity Partners, taking total funding past 1bn USD at a 4.5bn USD valuation; also announced the acquisition of Ziva Corporation. [source](https://www.chaosinc.com/news/chaos-industries-raises-510-million-led-by-valor-equity-partners-to-accelerate-next-generation-defense-systems)\n- **2025-12-16** - US Army added CHAOS Industries' radar technology to its acquisition marketplace. [source](https://www.defensedaily.com/army-adds-chaos-industries-radar-technology-to-acquisition-marketplace/unmanned-systems/)\n- **2025-10-15** - Announced a partnership with Forterra on integrated autonomous counter-UAS capabilities. [source](https://www.chaosinc.com/news/chaos-industries-and-forterra-announce-partnership-to-deliver-integrated-autonomous-counter-uas-capabilities)\n\n## Links\n\n- Website: https://www.chaosinc.com\n- LinkedIn: https://www.linkedin.com/company/chaosindustries\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, LinkedIn company page, BusinessWire, Defense Daily. Founded 2022; HQ Los Angeles, with further offices including Washington DC, San Diego, London and Amman. Headcount is a LinkedIn range (51-200); given 229 associated members and the scale of funding the firm may be approaching the large band, but the verifiable public figure places it in the medium band. Key investors include Valor Equity Partners, NEA, Accel and 8VC."}, {"name": "Chess Dynamics Limited", "website": "https://www.chess-dynamics.com", "linkedin": "https://uk.linkedin.com/company/chess-dynamics-ltd", "hq": "Horsham, United Kingdom", "region": "South East England", "size": "medium", "headcount": "200+", "founded": "2005", "tags": ["defence", "sensors", "optronics", "isr", "counter-uas", "land", "maritime", "ai", "type-sme", "size-medium", "owned-uk", "mbr-ads"], "summary": "A systems house designing and manufacturing surveillance, fire control and electro-optical defence systems for land, sea and air.", "body": "# Chess Dynamics\n\n> A systems house designing and manufacturing surveillance, fire control and electro-optical defence systems for land, sea and air.\n\n## What they do\n\nChess Dynamics designs and manufactures integrated defence systems and electro-optical solutions for land and maritime domains, with capability extending to air defence. Its portfolio covers surveillance, targeting and fire control systems, counter-UAS protection, and real-time video and image processing for electro-optic systems. The company is based in Horsham, with further sites in Plymouth and Wokingham, and employs over 200 people. It is part of Cohort plc, which acquired a majority stake in 2018.\n\n## Products and solutions\n\n- **SeaEagle** - electro-optical and fire control systems for maritime surveillance, target tracking and naval gunfire control.\n- **Hawkeye** - modular multi-sensor systems for land-based reconnaissance, surveillance, targeting and ground-based air defence.\n- **Counter-UAS (C-UAS)** - drone detection, tracking and defeat systems integrating optics, AI tracking and layered countermeasures.\n- **Vision4ce** - AI-powered target detection, classification and tracking built on DEFT tracking and CHARM edge processing.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group, Society of Maritime Industries\n\n## Recent news\n\n- **2018** - Cohort plc acquired a majority share in Chess Dynamics. [source](https://www.chess-dynamics.com/about-our-story)\n\n## Links\n\n- Website: https://www.chess-dynamics.com\n- LinkedIn: https://uk.linkedin.com/company/chess-dynamics-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Sources used: chess-dynamics.com, LinkedIn company page, ADS Group member directory, Society of Maritime Industries directory, Unmanned Systems Technology, Military Embedded Systems."}, {"name": "Concurrent Technologies Plc", "website": "https://concurrent.tech", "linkedin": "https://uk.linkedin.com/company/concurrent-technologies-plc", "hq": "Colchester, United Kingdom", "region": "East of England", "size": "medium", "headcount": "", "founded": "1985", "tags": ["defence", "hardware", "manufacturing", "sensors", "software", "listed", "type-manufacturer", "size-medium", "owned-uk"], "summary": "A British designer and manufacturer of high-performance embedded computer products for critical defence and industrial applications.", "body": "# Concurrent Technologies\n\n> A British designer and manufacturer of high-performance embedded computer products for critical defence and industrial applications.\n\n## What they do\n\nConcurrent Technologies Plc develops and manufactures system-orientated solutions and high-performance computer products, based primarily on Intel processor technology, for use in critical embedded applications. Its products are used by integrators across the defence, security, aerospace, telecommunications, transportation, medical and industrial markets. The company is based in Colchester and is listed on the London Stock Exchange under the ticker CNC.\n\n## Products and solutions\n\n- **VPX and OpenVPX boards and systems** - 3U VPX processor boards and rugged box-level systems, including SOSA-aligned products.\n- **Single board computers** - embedded processor boards for mission computing, sensor processing and edge analytics.\n- **VME boards** - modern VME processor cards for legacy programme sustainment.\n\n## Frameworks, accreditations and memberships\n\n- **Listing:** London Stock Exchange (CNC)\n\n## Recent news\n\n- **2025** - Concurrent Technologies won a 5.3 million US dollar US defence design contract. [source](https://www.ajbell.co.uk/news/articles/concurrent-technologies-wins-53-million-us-defence-design-contract)\n\n## Links\n\n- Website: https://concurrent.tech\n- LinkedIn: https://uk.linkedin.com/company/concurrent-technologies-plc\n\n## Sources\n\nPublic information verified 2026-06-29. Sources used: concurrent.tech, LinkedIn company page, Companies House (01919979), London Stock Exchange, AJ Bell."}, {"name": "Consolite Technology Limited", "website": "https://www.consolite.co.uk/", "linkedin": "https://www.linkedin.com/company/consolite-technology-limited/", "hq": "Zeals, United Kingdom", "region": "South West England", "size": "small", "headcount": "", "founded": "1980", "tags": ["defence", "maritime", "hardware", "manufacturing", "sensors", "comms", "size-small", "type-manufacturer", "mbr-ads", "accr-iso9001"], "summary": "UK manufacturer of specialised military and naval lighting systems, including night-vision-compatible LED lighting and secure optical (LiFi) communications.", "body": "# Consolite Technology Limited\n\n> UK manufacturer of specialised military and naval lighting systems, including night-vision-compatible LED lighting and secure optical (LiFi) communications.\n\n## What they do\n\nConsolite Technology is a long-established UK company specialising in military lighting systems. Its historical focus on night-vision-goggle (NVG) lighting has expanded into broader requirements, with an emphasis on LED warship lighting. Its capabilities cover complete warship lighting systems with full EMC compliance and ATEX requirements, LED navigation light systems that are NVG-capable and COLREG-compliant, and LiFi solutions for secure communication on military platforms.\n\n## Products and solutions\n\n- **Naval and warship LED lighting** - complete internal and external packages, single or dual-mode (bright white or NVG-compatible), including explosion-proof variants.\n- **LED navigation light systems** - NVG-compliant while remaining COLREG-compliant, with touchscreen control (Lloyd's Register Type Approval, 2022).\n- **Smart Lighting System** - integrated zone-by-zone lighting control from a central point, commercially available since March 2025.\n- **NVG lighting products and services** - NVG filters, cockpit and warship upgrades, NVG-compliant lamps and LEDs.\n- **Military LiFi** - secure optical and wireless communication systems for military and naval platforms.\n- **Lighting testing and consultancy** - environmental, EMC and explosion-protection testing.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001:2015 (quality management, Bureau Veritas certified).\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-09-16** - Exhibited at DSEI 2025. [source](https://www.consolite.co.uk/dsei-2025/)\n- **2025-06-11** - Reported that the TruLiFi 6004 system it integrates gained FIPS 140-3 validation. [source](https://www.consolite.co.uk/fips/)\n- **2025-04-11** - Delivered all lighting for the fourth Type 31 frigate, HMS Bulldog. [source](https://www.consolite.co.uk/consolite-delivers-fourth-ship/)\n\n## Links\n\n- Website: https://www.consolite.co.uk/\n- LinkedIn: https://www.linkedin.com/company/consolite-technology-limited/\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, Companies House (no. 01530246, active, incorporated 26 November 1980), ADS Group members directory. Operating site at St Martin's Business Park, Zeals, Wiltshire; registered office in Bath. A subsidiary of Consolite Holdings Limited (Companies House no. 06779621), trading as \"Consolite Group\". Headcount not published from a primary source; size band estimated. No evidence of AS9100 or techUK membership found, so neither is asserted."}, {"name": "Cranfield Aerospace Solutions Ltd", "website": "https://cranfieldaerospace.com", "linkedin": "https://www.linkedin.com/company/cranfieldaerospace", "hq": "Cranfield, UK", "region": "East of England", "size": "medium", "headcount": "", "founded": "", "tags": ["defence", "air", "uas", "autonomy", "manufacturing", "size-medium", "type-sme", "fw-joscar", "accr-iso9001", "mbr-ads"], "summary": "Aerospace design, modification and propulsion technology company, now also developing hydrogen-electric flight.", "body": "# Cranfield Aerospace Solutions\n\n> Aerospace design, modification and propulsion technology company, now also developing hydrogen-electric flight.\n\n## What they do\n\nCranfield Aerospace Solutions (CAeS) is a UK aerospace company specialising in aircraft design, certification, complex modification and propulsion innovation, with around 30 years of heritage. It holds design organisation approvals for civil and military aircraft and runs programmes in special-mission integration, weapons and defensive-aids integration, and flight test. It is also developing hydrogen-electric, zero-emission propulsion and unmanned platforms.\n\n## Products and solutions\n\n- **Project Fresson** - hydrogen fuel-cell powertrain programme for passenger aircraft.\n- **Genesis** - modular, scalable hydrogen fuel-cell propulsion system for aerospace.\n- **Stingray (ST-5 / ST-7 / ST-15 / ST-18)** - family of hydrogen-electric, long-endurance, multi-role UAVs.\n- **Aircraft modification and integration** - design, certification and integration services for existing civil and military platforms, including special-mission conversions and weapons and defensive-aids integration.\n- **Consultancy** - aircraft design, systems integration, testing and analysis, and airworthiness certification.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR.\n- **Accreditations:** ISO 9001; CAA Part 21J Design Organisation Approval; UK MOD MAA DAOS (military design organisation approval).\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-12-10** - CAeS and Voxshell secured Digital Twin Accelerator funding to develop a generative-AI toolset for aircraft configuration optimisation. [source](https://cranfieldaerospace.com/voxshell-digital-twin-funding/)\n- **2025-11-19** - Unveiled the ST-5 Stingray hydrogen-electric multi-role UAV at the Dubai Airshow 2025. [source](https://cranfieldaerospace.com/st5stingray-multi-role-long-endurance-dronez/)\n\n## Links\n\n- Website: https://cranfieldaerospace.com\n- LinkedIn: https://www.linkedin.com/company/cranfieldaerospace\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (cranfieldaerospace.com), ADS members directory."}, {"name": "Cubic Corporation", "website": "https://www.cubic.com/", "linkedin": "https://www.linkedin.com/company/cubic-corporation", "hq": "San Diego, United States", "region": "", "size": "large", "headcount": "~6,000 worldwide", "founded": "1949", "tags": ["defence", "training", "simulation", "c2", "isr", "comms", "software", "size-large", "type-prime", "owned-foreign", "backed-pe"], "summary": "US defence and transportation technology group providing combat training systems, C4ISR and fare-collection systems.", "body": "# Cubic Corporation\n\n> US defence and transportation technology group providing combat training systems, C4ISR and fare-collection systems.\n\n## What they do\n\nCubic Corporation is a US multinational defence and public transportation technology company founded in 1949. It operates across realistic combat training systems, secure communications and networking, and command, control, communications, computers, intelligence, surveillance and reconnaissance (C4ISR) capabilities for the US and allied forces, alongside automated fare-collection systems for public transit. The company was publicly traded until 2021, when it was taken private by Veritas Capital and Evergreen Coast Capital.\n\n## Products and solutions\n\n- **Cubic Defense (formerly Cubic Global Defense / Cubic Mission Solutions)** - live, virtual and constructive military training systems, range instrumentation, laser-based training, and networked C4ISR capabilities.\n- **Cubic Transportation Systems** - automated fare-collection and integrated payment systems for public transport operators.\n\n## Recent news\n\n- **2026-06-03** - Cubic Defense awarded a SIM 2.0 live training modernisation contract by the Italian Army. [source](https://thedefensepost.com/2026/06/03/italy-cubic-defense-training-upgrade/amp/)\n- **2026-05-06** - Cubic awarded a follow-on contract from Lockheed Martin for P5 internal subsystems supporting F-35 Lot 21 production aircraft. [source](https://www.asdnews.com/news/defense/2026/05/06/cubic-awarded-followon-contract-supporting-lm-f35-air-combat-training-subsystems)\n- **2026-02-19** - Cubic selected to upgrade Romania's live training system. [source](https://www.asdnews.com/news/defense/2026/02/19/cubic-selected-upgrade-romanias-live-training-system-with-nextgen-capabilities)\n\n## Links\n\n- Website: https://www.cubic.com/\n- LinkedIn: https://www.linkedin.com/company/cubic-corporation\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (cubic.com), Wikipedia, Veritas Capital acquisition announcements, Army Technology, The Defense Post, ASD News."}, {"name": "Curtiss-Wright Defense Solutions", "website": "https://www.curtisswrightds.com/", "linkedin": "https://www.linkedin.com/showcase/curtiss-wright-defense-solutions/", "hq": "Davidson, United States", "region": "", "size": "large", "headcount": "", "founded": "", "tags": ["defence", "hardware", "electronics", "comms", "c2", "isr", "manufacturing", "size-large", "type-prime", "owned-foreign", "listed"], "summary": "Rugged embedded computing and electronic systems for manned and unmanned air, land and naval defence platforms.", "body": "# Curtiss-Wright Defense Solutions\n\n> Rugged embedded computing and electronic systems for manned and unmanned air, land and naval defence platforms.\n\n## What they do\n\nCurtiss-Wright Defense Solutions is the defence electronics arm of Curtiss-Wright Corporation, a US-listed engineering group headquartered in Davidson, North Carolina. It provides rugged embedded computing modules, electronic systems and networking and communication solutions for manned and unmanned rotorcraft, fixed-wing, ground and naval applications. Its products are based on open-architecture commercial off-the-shelf (COTS) technologies designed to meet size, weight, power and cost (SWaP-C) constraints. The NCS (Networking and Communication Solutions) line provides secure mobile networking and tactical data link processing.\n\n## Products and solutions\n\n- **Rugged embedded computing** - single board computers, FPGA processor cards, digital signal processors, I/O and communications boards, and video/graphics cards.\n- **Networking and Communication Solutions (NCS)** - secure mobile networks for distributed processing and time-sensitive data sharing, plus tactical data link processing.\n- **Computing and electronic systems** - integrated C5ISR and vetronics system solutions ruggedised for harsh land, air and sea environments.\n\n## Recent news\n\n- **2026-05-14** - Curtiss-Wright Corporation declared a quarterly dividend of 0.26 USD per share, payable 6 July 2026. [source](https://www.sec.gov/Archives/edgar/data/0000026324/000162828026031693/ex991_cwxq126xearnings.htm)\n\n## Links\n\n- Website: https://www.curtisswrightds.com/\n- LinkedIn: https://www.linkedin.com/showcase/curtiss-wright-defense-solutions/\n\n## Sources\n\nPublic information verified 2026-06-29. Curtiss-Wright Defense Solutions website, Curtiss-Wright Corporation SEC filings, Military Aerospace, Army Technology, LinkedIn showcase page."}, {"name": "Daintta Ltd", "website": "https://daintta.com", "linkedin": "https://www.linkedin.com/company/daintta", "hq": "London, UK", "region": "London", "size": "small", "headcount": "", "founded": "2019", "tags": ["defence", "data", "cyber", "comms", "ai", "software", "size-small", "type-consultancy", "mbr-ads"], "summary": "Data, digital, cyber and national-security consultancy serving government and defence.", "body": "# Daintta\n\n> Data, digital, cyber and national-security consultancy serving government and defence.\n\n## What they do\n\nDaintta is a UK consultancy providing technical and business expertise across data, digital, cyber security and telecommunications for the national security, law enforcement, central government and defence sectors. It works in complex environments to help clients secure and protect the UK and its interests, and to make informed decisions. It maintains offices in London and Cheltenham.\n\n## Products and solutions\n\n- **Data intelligence** - data lifecycle management, data strategy and data science capability development.\n- **Cyber security** - cyber strategy, Cyber Security Operations Centre implementation, and risk assessment aligned to government standards.\n- **Networks and communications** - telecoms security and network complexity work, including 5G security testing.\n- **CyINTer** - AI-supported cyber assessment tool aligned to the NCSC Cyber Assessment Framework.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-12-09** - Published insight on managing cyber risk for medium and small organisations. [source](https://daintta.com/challenges-in-managing-cyber-risk-for-medium-and-small-organisations/)\n- **2025-11-19** - Ran a webinar on reassessing under the NCSC Cyber Assessment Framework. [source](https://daintta.com/beyond-compliance-the-importance-of-reassessing-under-the-caf/)\n\n## Links\n\n- Website: https://daintta.com\n- LinkedIn: https://www.linkedin.com/company/daintta\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (daintta.com), Companies House (no. 12115375), ADS members directory."}, {"name": "Digi2al Ltd", "website": "https://www.digi2al.com", "linkedin": "https://www.linkedin.com/company/digi2al", "hq": "Hove, UK", "region": "South East", "size": "small", "headcount": "", "founded": "2013", "tags": ["defence", "software", "data", "ai", "cyber", "isr", "size-small", "type-consultancy", "fw-joscar", "accr-ce", "mbr-ads", "mbr-techuk"], "summary": "UK technology specialist delivering secure digital services, software and digital transformation to defence, security and public-sector clients.", "body": "# Digi2al Ltd\n\n> UK technology specialist delivering secure digital services, software and digital transformation to defence, security and public-sector clients.\n\n## What they do\n\nDigi2al was founded in 2013 to shape essential public services and deliver digital transformation, drawing on a team with backgrounds in defence, government, technology and the arts. The company focuses on user-centred design and builds tailored software and hardware, working across defence and security, government and public services, health and human performance, and climate and environment sectors.\n\n## Products and solutions\n\n- **Service Design and User Experience** - user research and design of public and defence digital services.\n- **Cloud Engineering** - cloud-based service development and delivery.\n- **Complex Code and Low Code** - custom software development.\n- **Cyber Security** - protection of systems, networks and data.\n- **OSINT Brokerage and Threat Intelligence** - open-source intelligence and threat intelligence services.\n- **Managed Services and Digi2al Labs** - ongoing support and innovation work.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR.\n- **Accreditations:** Cyber Essentials; Carbon Neutral; Armed Forces Covenant signatory.\n- **Memberships:** ADS Group; techUK; TechVets.\n\n## Recent news\n\n- **2026** - Companies House records show the company filed accounts made up to 31 January 2025; company status active. [source](https://find-and-update.company-information.service.gov.uk/company/08407866)\n\n## Links\n\n- Website: https://www.digi2al.com\n- LinkedIn: https://www.linkedin.com/company/digi2al\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, Companies House (08407866), ADS members directory."}, {"name": "Distance Technologies", "website": "https://distance.tech/", "linkedin": "https://www.linkedin.com/company/distance-technologies", "hq": "Helsinki, Finland", "region": "", "size": "small", "headcount": "", "founded": "2024", "tags": ["defence", "optronics", "sensors", "ai", "c2", "land", "size-small", "type-startup", "owned-foreign", "backed-vc"], "summary": "Finnish startup developing glasses-free mixed reality displays that turn transparent surfaces into augmented-reality screens.", "body": "# Distance Technologies\n\n> Finnish startup developing glasses-free mixed reality displays that turn transparent surfaces into augmented-reality screens.\n\n## What they do\n\nDistance Technologies is a Helsinki-based startup, founded in 2024, developing glasses-free mixed reality technology that transforms transparent surfaces into augmented-reality displays. The system uses AI and eye-tracking to project layered digital information into the user's natural line of sight without headsets or glasses. In defence it is applied to vehicle windshields and heads-up displays, showing real-time 3D tactical data, terrain mapping and AI-driven insights, including in low-visibility conditions such as darkness and smoke. The company initially targeted automotive use to prove low-cost mass production before extending into defence.\n\n## Products and solutions\n\n- **Glasses-free mixed reality display** - turns windshields and transparent surfaces into 3D AR displays driven by AI and eye-tracking, with defence applications in military vehicle heads-up displays.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** Member of the Patria-led eALLIANCE collaboration on next-generation mixed reality HUDs.\n\n## Recent news\n\n- **2026-01-30** - Reported development of mixed reality vehicle displays giving armoured vehicle crews enhanced situational vision. [source](https://tech.eu/2026/01/30/how-distance-technologies-is-building-x-ray-like-vision-for-tank-commanders/)\n- **2025** - Closed a 10M EUR seed round led by GV (Google Ventures), with FOV Ventures and Maki.vc participating; GV's first Finnish investment. [source](https://siliconcanals.com/distance-technologies-secures-e10m/)\n\n## Links\n\n- Website: https://distance.tech/\n- LinkedIn: https://www.linkedin.com/company/distance-technologies\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (distance.tech), Silicon Canals, Tech.eu, National Defense Magazine, Helsinki Times."}, {"name": "Drone Defence Services Ltd", "website": "https://www.dronedefence.co.uk/", "linkedin": "https://uk.linkedin.com/company/drone-defence", "hq": "Retford, United Kingdom", "region": "East Midlands", "size": "small", "headcount": "", "founded": "2017", "tags": ["defence", "counter-uas", "drones", "sensors", "rf", "size-small", "type-sme", "owned-uk"], "summary": "UK counter-UAS company delivering drone detection, tracking, identification and mitigation systems.", "body": "# Drone Defence Services Ltd\n\n> UK counter-UAS company delivering drone detection, tracking, identification and mitigation systems.\n\n## What they do\n\nDrone Defence Services Ltd is a UK counter-UAS company incorporated in 2017, based at the Drone Innovation Centre, West Carr Business Park, Retford. It uses proprietary technologies to detect, track and identify drones across wide areas on land or at sea using multi-sensory technology, and to disrupt drone command and navigation radio transmissions in any weather, day or night. The company states its systems are intended for qualified defence, government and security organisations and are subject to UK export controls.\n\n## Products and solutions\n\n- **AeroStrike** - high-speed kinetic drone interceptor reaching up to 270 km/h, with an intercept envelope of 100-200 km/h, up to 10 minutes endurance and a 13 km operating range; non-explosive and recoverable architecture.\n- **AeroTracker** - flight monitoring, tasking and intercept management platform, integrating with radar, RF and EO/IR detection systems.\n- **Detection and mitigation systems** - multi-sensory wide-area drone detection, tracking and identification, plus RF disruption of drone command and navigation links.\n\n## Recent news\n\n- **2026-02-02** - Unveiled AeroStrike, a high-speed kinetic drone interceptor for high-threat environments. [source](https://www.dronedefence.co.uk/news/dd-unveils-high-speed-drone-interceptor)\n\n## Links\n\n- Website: https://www.dronedefence.co.uk/\n- LinkedIn: https://uk.linkedin.com/company/drone-defence\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (dronedefence.co.uk), Companies House (10886588), DroneLife, Unmanned Airspace, The Defense Post."}, {"name": "Eagle Ray Robotics Ltd", "website": "https://www.eaglerayrobotics.com/", "linkedin": "https://www.linkedin.com/company/eaglerayrobotics", "hq": "Edinburgh, United Kingdom", "region": "Scotland", "size": "micro", "headcount": "", "founded": "2023", "tags": ["defence", "autonomy", "robotics", "maritime", "ai", "sensors", "uas", "size-micro", "type-startup", "owned-uk"], "summary": "Edinburgh startup building cooperative autonomy and distributed sensing for uncrewed subsea systems.", "body": "# Eagle Ray Robotics Ltd\n\n> Edinburgh startup building cooperative autonomy and distributed sensing for uncrewed subsea systems.\n\n## What they do\n\nEagle Ray Robotics Ltd is an Edinburgh-based startup, incorporated in 2023, developing technologies that let autonomous systems operate more effectively in the subsea domain. Its work focuses on distributed sensing, cooperative autonomy and intelligent underwater systems supporting defence, offshore energy and environmental monitoring. The company develops a distributed autonomy platform that enables underwater vehicles to operate as a coordinated sensing network, sharing updates while submerged.\n\n## Products and solutions\n\n- **ConstelX (Constellation OS)** - a fleet intelligence operating system that connects heterogeneous autonomous underwater vehicles into cooperative subsea sensing networks, integrating with onboard vehicle software so operators can add cooperative sensing to existing platforms.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** Member of the Ocean Autonomy Cluster.\n\n## Recent news\n\n- **2026-03** - First product release of Constellation OS scheduled, with the company seeking integration partners. [source](https://www.eaglerayrobotics.com/technology)\n- **2025** - Presented at Shell Startup Engine Demo Day, London. [source](https://www.eaglerayrobotics.com/about)\n\n## Links\n\n- Website: https://www.eaglerayrobotics.com/\n- LinkedIn: https://www.linkedin.com/company/eaglerayrobotics\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (eaglerayrobotics.com), Companies House (SC788462), Ocean Autonomy Cluster, Bayes Centre, company LinkedIn page. Defence relevance confirmed: defence is named as a primary domain on the company's own site."}, {"name": "EDM Limited", "website": "https://edmgroupltd.com", "linkedin": "https://uk.linkedin.com/company/edm-ltd", "hq": "Manchester, United Kingdom", "region": "North West England", "size": "large", "headcount": "", "founded": "1971", "tags": ["defence", "simulation", "training", "manufacturing", "air", "size-large", "type-manufacturer", "owned-uk", "accr-iso9001", "accr-iso14001", "accr-ce-plus", "mbr-ads", "mbr-makeuk"], "summary": "Manchester manufacturer of high-performance training simulators and emergency-training equipment for the civil aviation, defence and rail sectors.", "body": "# EDM Limited\n\n> Manchester manufacturer of high-performance training simulators and emergency-training equipment for the civil aviation, defence and rail sectors.\n\n## What they do\n\nEDM designs and manufactures training simulators and emergency-training equipment, describing itself as the world's leading supplier of training simulators to the civil aviation and defence markets. Product lines span full-scale cabin crew trainers, maintenance rigs, fire and smoke devices, and defence procedure and maintenance trainers. It is a JOSCAR-registered first-tier supplier and a UK, USA and NATO defence-approved supplier.\n\n## Products and solutions\n\n- **Cabin Emergency Evacuation Trainers (CEETs)** - fuselage-based trainers for cabin crew SOP, SEP and CRM drills, including smoke, fire and evacuation scenarios, in static or motion-based configurations.\n- **Door trainers, cabin service trainers and full-size mockups** - civil aviation cabin and crew training devices.\n- **Defence procedure trainers, maintenance trainers, ejection seats, simulators and full-size replicas** - synthetic training and maintenance simulators plus ground support equipment.\n- **Virtual Slide Trainer** - a recently launched training product.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001:2015, ISO 14001:2015, AS9100D, Cyber Essentials Plus, JOSCAR registered, RISQS verified (rail). Approved supplier to UK, USA and NATO defence, and to Airbus, Boeing, BAE Systems, Rolls-Royce, Martin Baker and Lockheed Martin.\n- **Memberships:** ADS Group, Make UK, North West Aerospace Alliance, BSI, National Training and Simulation Association.\n\n## Recent news\n\n- **2025-2026** - Acquired Safety Training Systems, Inc. (STS) of Tulsa, USA, combining aviation and defence training capability. [source](https://edmgroupltd.com/)\n- **2025-2026** - Won a Boeing 787 and 777 combination Cabin Emergency Evacuation Trainer order from a major US airline. [source](https://www.aero-mag.com/edm-wins-cabin-emergency-evacuation-trainer-order-us-airline/)\n\n## Links\n\n- Website: https://edmgroupltd.com\n- LinkedIn: https://uk.linkedin.com/company/edm-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (edmgroupltd.com, overview and quality/accreditations pages), Companies House (01001465), ADS Group members directory, LinkedIn company page, North West Aerospace Alliance capability guide, Aerospace Manufacturing news. LinkedIn lists the company-size band as 201-500 employees; no exact public headcount is published."}, {"name": "Envitia", "website": "https://www.envitia.com", "linkedin": "https://uk.linkedin.com/company/envitia", "hq": "Horsham, United Kingdom", "region": "South East England", "size": "medium", "headcount": "", "founded": "1989", "tags": ["defence", "gis", "data", "software", "ai", "isr", "c2", "size-medium", "type-sme", "type-consultancy", "owned-uk", "backed-pe", "accr-iso9001", "accr-iso27001", "accr-ce", "mbr-techuk"], "summary": "UK geospatial and data software and services firm serving defence, national security and central government.", "body": "# Envitia\n\n> UK geospatial and data software and services firm serving defence, national security and central government.\n\n## What they do\n\nEnvitia is an IT services and consulting company specialising in complex data challenges. Its consultancy and technical engineering teams deliver data solutions that enable defence, national security and central government customers to make better decisions. Stated specialties include software engineering, mapping and geospatial, data modelling, data quality, data governance, analytics, and AI and machine learning. The operating entity is Envitia Ltd, under holding company Envitia Group Limited.\n\n## Products and solutions\n\n- **MapLink Pro** - a cross-platform suite of geospatial software development toolkits used as a foundation for command and control, ISR, situational awareness, and training and simulation applications. MapLink Pro 11 was released in 2025. Publicly named integrators include BAE Systems, Lockheed Martin, Northrop Grumman, General Dynamics and IBM.\n- **Data Discovery Platform (DDP)** - a modular geospatial data discovery, cataloguing and processing platform with open-standards APIs to discover, harvest, transform and visualise data, used in UK and US military systems.\n- **Service lines** - AI and machine learning, architecture, cloud services, data analytics and visualisation, data quality and management, digital and data strategy, geospatial, and software engineering.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, ISO/IEC 27001, Cyber Essentials, JOSCAR registered (certification badges carried on the company homepage).\n- **Memberships:** techUK.\n\n## Recent news\n\n- **2026-06** - Envitia announced work supporting Defra's digital-first ambitions. [source](https://www.envitia.com/2026/06/envitia-supports-digital-transformation-defra/)\n- **2025-02** - MapLink Pro 11 launched. [source](https://www.envitia.com/2025/02/officially-live-maplink-pro-11/)\n\n## Links\n\n- Website: https://www.envitia.com\n- LinkedIn: https://uk.linkedin.com/company/envitia\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (envitia.com, MapLink Pro and news pages), Companies House (Envitia Ltd 02348404, Envitia Group Limited 03982993), LinkedIn company page, techUK white paper listing. LinkedIn lists the company-size band as 51-200 employees, with headcount reported as approaching 100. Backed by Maven Capital Partners following a 2020 management buyout of Envitia Group."}, {"name": "Etherstack plc", "website": "https://www.etherstack.com", "linkedin": "https://www.linkedin.com/company/etherstack", "hq": "Reading, UK", "region": "South East", "size": "small", "headcount": "", "founded": "2012", "tags": ["defence", "comms", "rf", "software", "size-small", "type-sme", "listed", "mbr-ads"], "summary": "Tactical radio and mission-critical communications technology; UK-incorporated, ASX-listed.", "body": "# Etherstack\n\n> Tactical radio and mission-critical co
