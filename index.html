f Goodwin PLC. Its products are used across applications including electric vehicles, energy storage, consumer electronics, government facilities and defence systems.\n\n## Products and solutions\n\n- **AVD lithium battery fire extinguishers** - portable extinguishers using the Aqueous Vermiculite Dispersion agent.\n- **Fixed suppression systems** - installed systems for lithium-ion battery fire containment.\n- **Fire blankets** - specialist blankets for lithium battery fires.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.avdfire.com\n- LinkedIn: https://www.linkedin.com/company/avdfire\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (avdfire.com); ADS Group member directory; Companies House (company 14933398); Goodwin PLC website; AVD Fire LinkedIn company page."}, {"name": "Aveillant Limited", "website": "https://www.thalesgroup.com", "linkedin": "https://www.linkedin.com/company/aveillant-ltd", "hq": "Cambridge, United Kingdom", "region": "East of England", "size": "small", "headcount": "", "founded": "2011", "tags": ["defence", "radar", "sensors", "counter-uas", "isr", "air", "size-small", "type-sme", "owned-foreign", "mbr-ads"], "summary": "Developer of 3D Holographic Radar for drone detection and air surveillance.", "body": "# Aveillant\n\n> Developer of 3D Holographic Radar for drone detection and air surveillance.\n\n## What they do\n\nAveillant is a radar technology company that pioneered 3D Holographic Radar. Unlike mechanically or electronically scanned systems, Holographic Radar transmits a wide-angle pulse and forms multiple simultaneous receive beams, maintaining a continuous picture of the full airspace volume. The company is based in Cambridge and was acquired by the Thales Group in November 2017, so it now operates as part of the French-headquartered Thales. The Companies House entity remains active.\n\n## Products and solutions\n\n- **Gamekeeper** - Holographic Radar system to detect, track and classify drones, including micro systems, providing 3D tracks and classification to discriminate drones from birds with detection at long range.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2017-11-28** - Thales completed its acquisition of Aveillant. [source](https://www.thalesgroup.com/en/worldwide/defence/press-release/thales-completes-acquisition-aveillant-world-pioneer-holographic)\n\n## Links\n\n- Website: https://www.thalesgroup.com\n- LinkedIn: https://www.linkedin.com/company/aveillant-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Thales Group website and press release; ADS Group member directory; Companies House (company 07645131); industry reporting (Unmanned Airspace, Airport Technology)."}, {"name": "Avella Security Limited", "website": "https://www.avella-security.com", "linkedin": "https://www.linkedin.com/company/avellasecurity", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "", "founded": "2015", "tags": ["defence", "cyber", "size-small", "type-sme", "type-consultancy", "owned-uk", "accr-ce-plus", "accr-iso9001", "accr-iso27001", "mbr-ads"], "summary": "Managed security service provider delivering cyber and physical security to government and critical national infrastructure.", "body": "# Avella Security\n\n> Managed security service provider delivering cyber and physical security to government and critical national infrastructure.\n\n## What they do\n\nAvella Security is a boutique managed security service provider working with central government and clients designated as Operators of Essential Services or part of the UK's critical national infrastructure. It holds multiple National Cyber Security Centre accreditations and delivers cyber and physical security services. The company is registered in London.\n\n## Products and solutions\n\n- **Cyber security consultancy** - NCSC Assured Cyber Security Consultancy across Audit and Review, Risk Management and Security Architecture.\n- **Cyber incident exercising** - NCSC Assured Service Provider of Cyber Incident Exercising.\n- **Cyber Resilience Audit** - independent cyber audits for buyers on behalf of Cyber Oversight Bodies.\n- **Security testing** - CHECK-approved penetration testing under the NCSC scheme.\n- **Physical security services** - physical security to complement cyber services.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 27001, ISO 9001, Cyber Essentials Plus; NCSC Assured Cyber Security Consultancy; CHECK-approved.\n- **Memberships:** ADS Group; Chartered Institute of Information Security.\n\n## Links\n\n- Website: https://www.avella-security.com\n- LinkedIn: https://www.linkedin.com/company/avellasecurity\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (avella-security.com); National Cyber Security Centre organisation pages; ADS Group member directory; Companies House (company 09393211); Avella LinkedIn company page."}, {"name": "Avencys", "website": "", "linkedin": "", "hq": "Berkshire, United Kingdom", "region": "South East", "size": "small", "headcount": "", "founded": "", "tags": ["defence", "test-evaluation", "size-small", "type-consultancy", "type-sme", "mbr-ads"], "summary": "Professional services provider supporting defence customers in systems engineering and project management.", "body": "# Avencys\n\n> Professional services provider supporting defence customers in systems engineering and project management.\n\n## What they do\n\nAvencys is a professional services provider that primarily supports defence customers across systems engineering, product management and project management. It is an ADS Group member based in Berkshire.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- ADS member directory: https://www.adsgroup.org.uk/members/\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory (member listing for Avencys, Berkshire, South East)."}, {"name": "Avenue3", "website": "https://avenue3.com", "linkedin": "https://www.linkedin.com/company/avenue3/", "hq": "Leeds, England", "region": "Yorkshire and the Humber", "size": "micro", "headcount": "", "founded": "2020", "tags": ["defence", "data", "software", "size-micro", "type-consultancy", "mbr-ads", "prog-mercury"], "summary": "A Leeds-based digital and data consultancy specialising in open data standards for healthcare and public-sector providers.", "body": "# Avenue3\n\n> A Leeds-based digital and data consultancy specialising in open data standards for healthcare and public-sector providers.\n\n## What they do\n\nAvenue3 describes itself as a technology partner for government and public-sector providers, specialising in the adoption of open data standards and open data solutions. It builds solutions that keep health data independent of the applications that use it, on the principle that separating data from software improves flexibility, reduces cost and supports long-term access and interoperability. Its defence relevance is specific: it holds a UK Ministry of Defence contract to deliver a deployable electronic health record for military clinicians.\n\n## Products and solutions\n\n- **Strategy** - advice to shape digital strategies around open data.\n- **Discovery** - stakeholder engagement, identifying system challenges and producing technical roadmaps for complex projects.\n- **Architecture** - specialists designing and implementing scalable open data system integrations.\n- **Engineering** - openEHR engineers building scalable open-data solutions for data management and healthcare delivery.\n- **Project Mercury** - a secure, deployable electronic health record system for UK Defence Medical Services, supporting offline data access and sharing across devices.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group (listed under Professional Services). openEHR International industry partner.\n\n## Recent news\n\n- **2026-01-08** - UK Defence Medical Services awarded Avenue3 a contract reported at GBP 2.5m to roll out Project Mercury, a deployable military electronic health record system, with first live release scheduled for Spring 2026. [The Defense Post](https://thedefensepost.com/2026/01/08/uk-avenue3-project-digital-health/)\n\n## Links\n\n- Website: https://avenue3.com\n- LinkedIn: https://www.linkedin.com/company/avenue3/\n- Companies House: https://find-and-update.company-information.service.gov.uk/company/13040131\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, ADS Group member listing (https://www.adsgroup.org.uk/members/avenue3-ltd-1/), Companies House (company number 13040131, status Active, incorporated 24 November 2020, previously named Augment Digital Limited, registered office Leeds), and The Defense Post. Size band indicative: the company files under the small/micro regime and no headcount is published. The website footer carries certification badge images that could not be read from a text fetch, so no ISO or Cyber Essentials accreditation is asserted here."}, {"name": "Aviation and Security Assistance (UK) Ltd", "website": "", "linkedin": "", "hq": "United Kingdom", "region": "", "size": "small", "headcount": "", "founded": "", "tags": ["defence", "air", "maritime", "training", "size-small", "type-sme", "mbr-ads"], "summary": "Provider of security, aviation and travel services to corporate, private and government clients.", "body": "# Aviation and Security Assistance (UK)\n\n> Provider of security, aviation and travel services to corporate, private and government clients.\n\n## What they do\n\nAviation and Security Assistance (UK) Ltd is part of the ASA Group, established in 1999, which operates from registered offices in seven countries. The group delivers security, aviation and travel services to corporate, private and government clients, with a core specialism in the Asia Pacific region. The UK entity is a signatory to the Armed Forces Covenant.\n\n## Products and solutions\n\n- **Aviation services** - ground handling and permits, air charter, and slots.\n- **Security services** - executive protection, secure transportation, maritime security, and technical surveillance counter measures (TSCM).\n- **Consulting and investigations** - risk assessment, due diligence, investigations, crisis management and response planning.\n- **Training** - security and travel-related training courses.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n- **Other:** Armed Forces Covenant signatory.\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory; GOV.UK Armed Forces Covenant business listing; ASA Group public materials."}, {"name": "Aviation Works Ltd", "website": "https://caelinova.com", "linkedin": "https://www.linkedin.com/company/caelinova", "hq": "London, UK", "region": "London", "size": "micro", "headcount": "", "founded": "2018", "tags": ["defence", "air", "hardware", "test-evaluation", "size-micro", "type-sme", "type-startup", "owned-founder", "mbr-ads"], "summary": "Developer of emergency oxygen systems for commercial and defence aircraft using patented breathing technology.", "body": "# Caeli Nova\n\n> Developer of emergency oxygen systems for commercial and defence aircraft using patented breathing technology.\n\n## What they do\n\nCaeli Nova (the trading name of Aviation Works Ltd) was established in 2018 by founders with backgrounds in medicine and aviation, following research into the optimisation of human body oxygenation at altitude. The company develops patented breathing technology to improve passenger and crew safety and survivability in challenging environments. It works with both commercial and defence aerospace operators.\n\n## Products and solutions\n\n- **Cordillera** - an emergency oxygen system for commercial and military passenger aircraft, designed to protect passengers in the event of a loss of cabin pressure and to allow an aircraft to divert safely at a higher altitude following a decompression event.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2024-09** - Patent assets relating to the breathing technology were assigned to Aviation Works Ltd. [source](https://patents.google.com/patent/US11648360B2/de)\n\n## Links\n\n- Website: https://caelinova.com\n- LinkedIn: https://www.linkedin.com/company/caelinova\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (caelinova.com), Companies House (company 11304154, Aviation Works Limited), Runway Girl Network coverage, Google Patents."}, {"name": "AVIC Cabin Systems (UK) Limited", "website": "https://www.aviccabinsystemsuk.com", "linkedin": "https://www.linkedin.com/company/avic-cabin-systems-uk", "hq": "Beijing, China", "region": "South West", "size": "large", "headcount": "", "founded": "2018", "tags": ["defence", "air", "manufacturing", "hardware", "size-large", "type-manufacturer", "owned-foreign", "mbr-ads"], "summary": "Designer and manufacturer of aircraft cabin interiors for commercial and military aircraft.", "body": "# AVIC Cabin Systems UK\n\n> Designer and manufacturer of aircraft cabin interiors for commercial and military aircraft.\n\n## What they do\n\nAVIC Cabin Systems UK (trading as ACS UK) designs, manufactures, certifies and maintains cabin interiors for major airlines on Airbus and Boeing aircraft. The UK operation is based in Bournemouth and continues programmes previously delivered as AIM Altitude. AIM Altitude has worked on military aircraft programmes including the Eurofighter Typhoon and the Merlin helicopter, and has been a supplier to the Ministry of Defence and BAE Systems. The UK business is part of the AVIC Cabin Systems group, which is owned by Aviation Industry Corporation of China (AVIC), headquartered in Beijing.\n\n## Products and solutions\n\n- **Cabin interiors** - galleys, stowages, bars, lounges, feature panels and premium cabin interior products.\n- **Composites** - advanced materials, complex mouldings and decorative finishes with in-house testing capability.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- None confirmed in the last 12 months from public sources at time of verification.\n\n## Links\n\n- Website: https://www.aviccabinsystemsuk.com\n- LinkedIn: https://www.linkedin.com/company/avic-cabin-systems-uk\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (aviccabinsystemsuk.com), Companies House (company 11577055), ADS members directory (adsgroup.org.uk), Airframer, Runway Girl Network coverage."}, {"name": "AVL Powertrain UK Limited", "website": "https://www.avl.com/en/locations/avl-powertrain-uk-limited", "linkedin": "https://www.linkedin.com/company/avl-in-the-united-kingdom", "hq": "Graz, Austria", "region": "East of England", "size": "medium", "headcount": "", "founded": "2005", "tags": ["defence", "land", "simulation", "test-evaluation", "software", "size-medium", "type-sme", "owned-foreign", "mbr-ads"], "summary": "UK engineering, simulation and testing arm of AVL, including powertrain work for the security and defence sector.", "body": "# AVL Powertrain UK\n\n> UK engineering, simulation and testing arm of AVL, including powertrain work for the security and defence sector.\n\n## What they do\n\nAVL Powertrain UK is the UK subsidiary of AVL List GmbH, a mobility technology company headquartered in Graz, Austria, working in development, simulation and testing. The UK operation runs engineering and technical centres in Basildon and Coventry with powertrain test beds, virtual test beds and battery and electronics laboratories. AVL's security and defence work provides engineering for military powertrains across internal combustion, hybrid and electric systems for land, sea and aviation platforms, designed to meet military standards. AVL Powertrain UK is a signatory to the Armed Forces Covenant.\n\n## Products and solutions\n\n- **Powertrain engineering** - development of internal combustion, hybrid and electric powertrains for defence platforms.\n- **Simulation and testing** - powertrain test beds, virtual test beds, hardware-in-the-loop and battery and electronics laboratories.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- None confirmed in the last 12 months from public sources at time of verification.\n\n## Links\n\n- Website: https://www.avl.com/en/locations/avl-powertrain-uk-limited\n- LinkedIn: https://www.linkedin.com/company/avl-in-the-united-kingdom\n\n## Sources\n\nPublic information verified 2026-06-29. AVL corporate website (avl.com), Companies House (company 05442936), ADS members directory (adsgroup.org.uk), GOV.UK Armed Forces Covenant business list."}, {"name": "Avon Protection Limited", "website": "https://www.avon-protection.com", "linkedin": "https://www.linkedin.com/company/avonprotection", "hq": "Melksham, UK", "region": "South West", "size": "large", "headcount": "", "founded": "", "tags": ["defence", "cbrn", "hardware", "manufacturing", "sensors", "size-large", "type-manufacturer", "listed", "mbr-ads"], "summary": "Manufacturer of respiratory protection, CBRN and ballistic protection equipment for military and first responders.", "body": "# Avon Protection\n\n> Manufacturer of respiratory protection, CBRN and ballistic protection equipment for military and first responders.\n\n## What they do\n\nAvon Protection develops and manufactures respiratory protection system technology and related protective equipment. It has supplied protection solutions to the UK Ministry of Defence and allied forces for many decades and is a supplier of CBRN respiratory equipment to the United States Department of Defense. Its product range covers respirators, CBRN protective wear, escape devices, self-contained breathing apparatus, powered air purifying respirators, thermal imaging and underwater systems. The business is part of Avon Technologies plc, listed on the London Stock Exchange, with its operation based in Melksham, Wiltshire.\n\n## Products and solutions\n\n- **Air purifying respirators** - full face masks including the FM50, FM53, FM54, M50, M53A1, C50 and PC50.\n- **CBRN protective wear** - the EXOSKIN range of protective clothing.\n- **Self-contained breathing apparatus** - the ST50, ST53 and ST54 systems.\n- **Powered air purifying respirators (PAPR)** - including CS-PAPR and MP-PAPR units.\n- **Thermal imaging** - the Mi-TIC range of thermal imaging cameras.\n- **Underwater systems** - the MCM100 underwater rebreather.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- None confirmed in the last 12 months from public sources at time of verification.\n\n## Links\n\n- Website: https://www.avon-protection.com\n- LinkedIn: https://www.linkedin.com/company/avonprotection\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (avon-protection.com), Avon Technologies plc corporate site, Companies House (company 02676395). The legacy entity Avon Protection Systems Limited (SC304932) is dissolved; the live operation trades as Avon Protection under Avon Technologies plc."}, {"name": "AVoptics", "website": "https://www.avoptics.com", "linkedin": "https://www.linkedin.com/company/avoptics-ltd", "hq": "Yeovil, England", "region": "South West England", "size": "small", "headcount": "", "founded": "2005", "tags": ["defence", "optronics", "rf", "comms", "hardware", "manufacturing", "space", "size-small", "type-manufacturer", "accr-iso9001", "accr-as9100", "accr-ce-plus", "mbr-ads", "prog-diana"], "summary": "UK supplier of engineered fibre-optic, photonic, electrical and electronic solutions for harsh aerospace, defence and space environments.", "body": "# AVoptics\n\n> UK supplier of engineered fibre-optic, photonic, electrical and electronic solutions for harsh aerospace, defence and space environments.\n\n## What they do\n\nAVoptics (A V Optics Limited) provides engineered photonic solutions for harsh environments and supplies aerospace and defence primes. Its capability spans production, with operators accredited to internationally recognised aerospace fibre-optic standards, and a consultancy division of scientists, engineers and technicians experienced in optics and photonics for harsh environments. The company is based in Yeovil, Somerset, with a research and development facility in Chepstow, Wales.\n\n## Products and solutions\n\n- **Free Space Optics (FSO/FSOC)** - laser-based optical communications, including the \"Galahad\" modulated retro-reflector system for covert, secure, low size, weight and power links.\n- **Cable assemblies** - build-to-print or full design service.\n- **Test equipment and components** - inspection, hand tools, curing, polishing, cleaning, components and ready-made patchcord assemblies, sold via an online shop.\n- **Services** - research and development, fibre-optic training to internationally recognised standards, design, calibration, on-site services, in-field repair and test, and an environmental testing facility.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, AS9100, Cyber Essentials Plus.\n- **Memberships:** ADS Group. NATO DIANA programme participant.\n\n## Recent news\n\n- **2025-06** - Company news post following the RAF Cosford Air Show (held June 2025). [AVoptics](https://www.avoptics.com/news/company-news/what-a-weekend-at-the-raf-cosford-air-show.htm)\n\n## Links\n\n- Website: https://www.avoptics.com\n- LinkedIn: https://www.linkedin.com/company/avoptics-ltd\n- Companies House: https://find-and-update.company-information.service.gov.uk/company/05654119\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (About Us, Company News), Companies House (company number 05654119, status Active, incorporated 14 December 2005, registered office Yeovil), ADS Group member listing (https://www.adsgroup.org.uk/members/av-optics-ltd-2/), NATO DIANA cohort listing, and LinkedIn company page. Size band indicative: the company self-describes as small and no headcount is published. Recent news items on the company site do not carry visible dates, which limits firm dating."}, {"name": "AVPE Systems Ltd", "website": "https://broadwaygroup.co.uk/avpe-systems/", "linkedin": "https://www.linkedin.com/company/avpe-precision-engineering", "hq": "Bristol, UK", "region": "South West", "size": "medium", "headcount": "", "founded": "2021", "tags": ["defence", "air", "manufacturing", "hardware", "size-medium", "type-sme", "type-manufacturer", "mbr-ads"], "summary": "Manufacturer of complex machined components and sub-assemblies for civil and defence aerospace.", "body": "# AVPE Systems\n\n> Manufacturer of complex machined components and sub-assemblies for civil and defence aerospace.\n\n## What they do\n\nAVPE Systems, based in Bitton near Bristol, supplies complex machined components and sub-assemblies to aerospace OEM and Tier 1 customers across civil, defence and aftermarket sectors. It specialises in airframe and landing gear parts and the machining of castings, forgings and 3D printed parts, supplying flight-critical parts for aircraft including the A320, A350 and A220, as well as helicopters and military aircraft. AVPE Systems is part of Broadway Group, formed in 2021 to bring together Broadway Engineering and AVPE Systems.\n\n## Products and solutions\n\n- **Complex machining** - CNC milling, turning, grinding and thread rolling.\n- **Sub-assembly and supply chain management** - for serial production and MRO programmes.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- None confirmed in the last 12 months from public sources at time of verification.\n\n## Links\n\n- Website: https://broadwaygroup.co.uk/avpe-systems/\n- LinkedIn: https://www.linkedin.com/company/avpe-precision-engineering\n\n## Sources\n\nPublic information verified 2026-06-29. Broadway Group website (broadwaygroup.co.uk), Companies House (company 13143655), ADS members directory (adsgroup.org.uk), Aerospace Manufacturing and PES Media coverage."}, {"name": "AWE plc", "website": "https://www.awe.co.uk/", "linkedin": "", "hq": "Aldermaston, United Kingdom", "region": "South East", "size": "large", "headcount": "250+", "founded": "1950", "tags": ["defence", "munitions", "manufacturing", "test-evaluation", "size-large", "owned-uk"], "summary": "UK Ministry of Defence body responsible for the design, manufacture and in-service support of the warheads for the UK's nuclear deterrent.", "body": "# AWE plc\n\n> UK Ministry of Defence body responsible for the design, manufacture and in-service support of the warheads for the UK's nuclear deterrent.\n\n## What they do\n\nAWE designs, manufactures and supports the nuclear warheads for the UK's continuous at-sea deterrent, and applies its specialist expertise to wider national security work. Its activity spans the warhead life cycle, from concept, assessment and design, through component manufacture and assembly, to in-service support and eventual decommissioning and disposal. The organisation is owned by the Ministry of Defence and operates as a government body rather than a commercial supplier.\n\n## Products and solutions\n\n- **Warhead design and manufacture** - design, production and assembly of warhead components for the UK's nuclear deterrent.\n- **In-service support** - maintenance and assurance of the warhead stockpile across its life cycle.\n- **National security science and technology** - specialist research applied to wider defence and security challenges.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Regulated by the Office for Nuclear Regulation across its Aldermaston and Burghfield sites.\n\n## Recent news\n\n- **2025-09** - AWE highlighted at DSEI and across MOD deterrent announcements as the body delivering warhead capability for the UK's strategic deterrent. [source](https://www.awe.co.uk/)\n\n## Links\n\n- Website: https://www.awe.co.uk/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources used: AWE company website (awe.co.uk), Companies House (company 02763902), Office for Nuclear Regulation, Wikipedia. AWE is a Ministry of Defence body rather than a typical ADS SME; no ADS membership was confirmed, so the ADS membership line and mbr-ads tag are omitted. No verified LinkedIn company page was identified, so the LinkedIn line is omitted."}, {"name": "Awerian Limited", "website": "https://awerian.net/", "linkedin": "https://uk.linkedin.com/company/awerian-uk", "hq": "Melbourn, United Kingdom", "region": "East of England", "size": "medium", "headcount": "31", "founded": "2021", "tags": ["defence", "cyber", "ai", "autonomy", "ew", "software", "hardware", "size-medium", "type-consultancy", "mbr-ads"], "summary": "Technology consultancy in the homeland security and defence space, providing research, development and technology demonstrators for the UK and its allies.", "body": "# Awerian Limited\n\n> Technology consultancy in the homeland security and defence space, providing research, development and technology demonstrators for the UK and its allies.\n\n## What they do\n\nAwerian is a TTP Group company based near Cambridge, formed from an internal group within TTP plc that had worked in defence and related areas for over a decade. It provides research and development services intended to extend the ability of the UK and its allies to defend themselves. Its work runs from ideas generation through rapid design and implementation of technology demonstrators to complete product design and transfer to manufacture.\n\n## Products and solutions\n\n- **Science and technology** - applied research addressing defence and security problems.\n- **Cyber** - cyber capability development.\n- **Artificial intelligence and machine learning** - AI/ML applied to defence and security.\n- **Autonomous systems** - design and development of autonomous capability.\n- **Electromagnetics** - electromagnetics engineering, complemented by bespoke designs for technology demonstrators and special products.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://awerian.net/\n- LinkedIn: https://uk.linkedin.com/company/awerian-uk\n\n## Sources\n\nPublic information verified 2026-06-29. Sources used: Awerian company website (awerian.net), Awerian LinkedIn company page, ADS members directory, Companies House (company 13173806)."}, {"name": "Axillium Research Ltd", "website": "https://www.axillium.com/", "linkedin": "https://uk.linkedin.com/company/axillium-research", "hq": "Daventry, United Kingdom", "region": "East Midlands", "size": "small", "headcount": "", "founded": "", "tags": ["defence", "data", "size-small", "type-consultancy", "mbr-ads"], "summary": "Independent research and innovation agency that designs and manages collaborative R&D programmes across aerospace, automotive and defence.", "body": "# Axillium Research Ltd\n\n> Independent research and innovation agency that designs and manages collaborative R&D programmes across aerospace, automotive and defence.\n\n## What they do\n\nAxillium is an independent research and innovation agency working with businesses, public bodies and universities to deliver R&D projects, programmes and clusters. It brings people and technology together in collaborative research programmes that are complex and innovative, and supports companies in delivering technology innovation. It works across the aerospace, automotive and defence sectors.\n\n## Products and solutions\n\n- **Collaborative R&D programmes** - design and management of multi-partner research programmes.\n- **Innovation advisory and grant funding support** - support for companies accessing R&D funding and structuring innovation work.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2018-03** - Axillium delivered a pilot of the Cross-Sector Innovation Framework for the UK Defence Solutions Centre, through ADS. [source](https://www.makeuk.org/news-and-events/news/2018/03/06/axillium-research-csif-pilot)\n\n## Links\n\n- Website: https://www.axillium.com/\n- LinkedIn: https://uk.linkedin.com/company/axillium-research\n\n## Sources\n\nPublic information verified 2026-06-29. Sources used: Axillium company website (axillium.com), Axillium LinkedIn company page, ADS members directory, Make UK. The Companies House number is omitted because several related Axillium entities are registered and the specific registration for the ADS-listed Axillium Research Ltd could not be confirmed."}, {"name": "Axis Electronics Limited", "website": "https://www.axis-electronics.com/", "linkedin": "https://uk.linkedin.com/company/axis-electronics-ltd", "hq": "Bedford, United Kingdom", "region": "East of England", "size": "medium", "headcount": "", "founded": "1995", "tags": ["defence", "air", "manufacturing", "hardware", "test-evaluation", "size-medium", "type-manufacturer", "owned-foreign", "fw-joscar", "accr-ce-plus", "accr-iso9001", "accr-iso27001", "mbr-ads"], "summary": "Electronic manufacturing services provider specialising in high-reliability, high-mix electronics for the defence and aerospace sectors.", "body": "# Axis Electronics Limited\n\n> Electronic manufacturing services provider specialising in high-reliability, high-mix electronics for the defence and aerospace sectors.\n\n## What they do\n\nAxis Electronics was formed in 1995 as a UK contract electronic manufacturing services (EMS) provider. It specialises in the design, manufacture and testing of high-technology, high-mix, low-to-medium volume electronic products for defence and aerospace, alongside security, automotive, oil and gas and industrial customers. The Bedford facility is MOD approved for handling protected information and applies cyber security controls aligned to the Defence Cyber Protection Partnership. Axis was acquired by Cicor Group in November 2021 and operates within Cicor's group of EMS companies.\n\n## Products and solutions\n\n- **Contract electronics manufacturing** - high-reliability, complex PCBA and system assembly and test.\n- **Design and test services** - electronics design, manufacture and testing to defence and aerospace workmanship standards (IPC-A-610 Class 3, J-STD-001 Class 3).\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR.\n- **Accreditations:** AS9100 (including ISO 9001), ISO 27001, Cyber Essentials Plus; SC21 award winner; MOD approved for handling protected information.\n- **Memberships:** ADS Group, Space UK.\n\n## Recent news\n\n- **2021-11-30** - Cicor Group acquired Axis Electronics Ltd, bringing the company into its EMS group. [source](https://www.cicor.com/en/news/article/cicor-acquires-british-contract-manufacturer-axis-electronics-ltd/)\n\n## Links\n\n- Website: https://www.axis-electronics.com/\n- LinkedIn: https://uk.linkedin.com/company/axis-electronics-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Sources used: Axis Electronics company website (axis-electronics.com), Axis Electronics LinkedIn company page, ADS members directory, Cicor Group. Axis is a UK entity owned by Switzerland-headquartered Cicor Group, hence the owned-foreign tag; the company itself is UK-based in Bedford."}, {"name": "Axon' Cable Limited", "website": "https://www.axon-cable.com/en/axon-cable-united-kingdom", "linkedin": "https://uk.linkedin.com/company/axon-cable-uk", "hq": "Montmirail, France", "region": "Scotland", "size": "medium", "headcount": "50+", "founded": "", "tags": ["defence", "air", "space", "manufacturing", "hardware", "rf", "size-medium", "type-manufacturer", "owned-foreign", "mbr-ads"], "summary": "UK subsidiary of the Axon' Cable group, a vertically integrated manufacturer of wire, cable, connectors and cable assemblies for defence, aerospace and space.", "body": "# Axon' Cable Limited\n\n> UK subsidiary of the Axon' Cable group, a vertically integrated manufacturer of wire, cable, connectors and cable assemblies for defence, aerospace and space.\n\n## What they do\n\nAxon' Cable is a vertically integrated manufacturer of high-performance interconnect solutions for defence, military aerospace and space applications, marking 60 years of the group in 2025. The group is headquartered in Montmirail, France, with a UK presence through its Rosyth site in Fife. The UK operation employs over 50 people and carries out prototyping, engineering development and small to medium scale manufacturing. Group strengths include fluoropolymer insulated and flat cable, complex Micro and Nano-D harnessing, RF and EMI shielding and Mil-1553B databus looms.\n\n## Products and solutions\n\n- **Cables and wire** - fluoropolymer insulated and flat cable constructions.\n- **Connectors and harnesses** - complex Micro-D and Nano-D harnessing and cable assemblies.\n- **Interconnect for mission-critical systems** - RF and EMI shielding and Mil-1553B databus looms, from polymer extrusion to clean-room assembly.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-09** - Axon' Cable showcased its 60-year interconnect heritage for defence, aerospace and space at DSEI 2025, ExCeL London. [source](https://www.adsadvance.co.uk/axon-cable-showcases-60-year-heritage-at-dsei-2025.html)\n\n## Links\n\n- Website: https://www.axon-cable.com/en/axon-cable-united-kingdom\n- LinkedIn: https://uk.linkedin.com/company/axon-cable-uk\n\n## Sources\n\nPublic information verified 2026-06-29. Sources used: Axon' Cable company website (axon-cable.com), Axon' Cable UK LinkedIn company page, ADS members directory, Companies House (company SC122228), ADS Advance, UK Defence Tech. The group is headquartered in Montmirail, France, hence hq is set to France and the owned-foreign tag applied; the UK subsidiary (registered in Scotland, number SC122228) operates from Rosyth, Fife."}, {"name": "AXYZ Automation (U.K.) Limited", "website": "https://www.axyz.com", "linkedin": "", "hq": "Telford, United Kingdom", "region": "West Midlands", "size": "small", "headcount": "", "founded": "1996", "tags": ["defence", "manufacturing", "hardware", "size-small", "type-manufacturer", "type-sme", "owned-foreign", "mbr-ads"], "summary": "Supplier of CNC routers, knife cutting systems and waterjet machines for sectors including aerospace, defence, security and space.", "body": "# AXYZ Automation UK\n\n> Supplier of CNC routers, knife cutting systems and waterjet machines for sectors including aerospace, defence, security and space.\n\n## What they do\n\nAXYZ Automation (U.K.) Limited supplies CNC cutting equipment, working alongside the WARDJET waterjet brand under the same group. The company makes configurable CNC routers and knife systems for processing aluminium, composites, plastics and metals, with motion control, high-speed cutting and options such as automatic tool changers. Per its ADS profile, AXYZ and WARDJET serve aerospace, defence, security and space alongside other engineering sectors. The UK operation is based in Telford and forms part of an international CNC cutting business.\n\n## Products and solutions\n\n- **CNC routers** - configurable router systems for cutting aluminium, composites, plastics and metals.\n- **Knife cutting systems** - automated knife systems for sheet and roll materials.\n- **WARDJET waterjet systems** - waterjet cutting machines with custom configurations for a range of materials.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.axyz.com\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, AXYZ website, Companies House."}, {"name": "AYR Orbis Limited", "website": "https://www.ayrorbis.com", "linkedin": "", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "", "founded": "2001", "tags": ["defence", "logistics", "isr", "uas", "drones", "autonomy", "size-small", "type-sme", "mbr-ads"], "summary": "Logistics and operational support provider for civil protection and defence, including unmanned systems for ISTAR, cargo and ground support.", "body": "# AYR Orbis\n\n> Logistics and operational support provider for civil protection and defence, including unmanned systems for ISTAR, cargo and ground support.\n\n## What they do\n\nAYR Orbis Limited provides logistics and operational support across humanitarian, peacekeeping, disaster relief and contingency operations, working with governments, NGOs, UN agencies and multinational organisations. The company states it has worked across 47 countries and has expanded into unmanned technologies for civil protection and defence. Its work spans uncrewed systems for Intelligence, Surveillance, Target Acquisition and Reconnaissance (ISTAR), heavy-lift cargo transport, and unmanned ground vehicle support, supported by in-house research and development and verification and validation activity. The company has previously traded as AYR Aviation, AYR Group and AYR Logistics.\n\n## Products and solutions\n\n- **Integrated logistics support** - turnkey logistics and operational support for missions in austere environments.\n- **Unmanned ISTAR** - uncrewed systems for intelligence, surveillance, target acquisition and reconnaissance.\n- **Unmanned cargo and ground support** - heavy-lift cargo UAS and all-weather, all-terrain unmanned ground vehicle support.\n- **UAS training and consultancy** - certification pathways, integrated training and instruction for VLOS and BVLOS operations.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.ayrorbis.com\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, AYR Orbis website, Companies House."}, {"name": "B&H Worldwide Ltd", "website": "https://bhworldwide.com", "linkedin": "https://www.linkedin.com/company/bh-worldwide", "hq": "West Drayton, United Kingdom", "region": "London", "size": "medium", "headcount": "", "founded": "1988", "tags": ["defence", "air", "logistics", "size-medium", "type-sme", "backed-pe", "mbr-ads"], "summary": "Specialist aviation and aerospace logistics provider, including bespoke defence logistics solutions.", "body": "# B&H Worldwide\n\n> Specialist aviation and aerospace logistics provider, including bespoke defence logistics solutions.\n\n## What they do\n\nB&H Worldwide was established in the United Kingdom in 1988 and provides logistics services dedicated to the aviation and aerospace industry. It handles time-critical and routine shipments of aerospace components for airlines, MROs, stockists, leasing companies and OEMs, including aircraft engines, avionics, rotables and consumables. The company operates from hubs in locations including London, Birmingham, Amsterdam, Frankfurt, Dubai, Singapore, Hong Kong and Australia, with 24/7 AOG support. Among its sector services it offers bespoke defence logistics covering routine, critical and AOG, out-of-gauge and dangerous goods cargo. In March 2026 an affiliate of Sun European Partners completed an investment in the company.\n\n## Products and solutions\n\n- **AOG and critical logistics** - 24/7 aircraft-on-ground and time-critical freight services.\n- **Defence logistics** - tailored defence logistics for routine, critical, AOG, out-of-gauge and dangerous goods cargo.\n- **Warehousing and inventory** - forward stocking locations and inventory management for aerospace parts.\n- **Engine transport and storage** - movement and storage of aircraft engines.\n- **Trade compliance and customs clearance** - customs and trade compliance support across markets.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS/EN/JISQ 9120, ISO 9001, IATA, AEO (UK), Cyber Essentials.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-03-26** - An affiliate of Sun European Partners completed an investment in B&H Worldwide Ltd. [source](https://www.businesswire.com/news/home/20260326128591/en/Sun-European-Affiliate-Completes-an-Investment-in-BH-Worldwide-Ltd.)\n\n## Links\n\n- Website: https://bhworldwide.com\n- LinkedIn: https://www.linkedin.com/company/bh-worldwide\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, B&H Worldwide website, Companies House, Business Wire."}, {"name": "B.C.B. International Limited", "website": "https://bcbin.com", "linkedin": "https://www.linkedin.com/company/bcb-international-ltd", "hq": "Cardiff, United Kingdom", "region": "Wales", "size": "medium", "headcount": "", "founded": "1979", "tags": ["defence", "manufacturing", "hardware", "land", "maritime", "logistics", "size-medium", "type-sme", "type-manufacturer", "owned-uk", "mbr-ads"], "summary": "Cardiff-based manufacturer of survival, protective and mission-support equipment for the British Army and NATO forces.", "body": "# BCB International\n\n> Cardiff-based manufacturer of survival, protective and mission-support equipment for the British Army and NATO forces.\n\n## What they do\n\nBCB International designs, manufactures and supplies survival, protective and mission-support equipment. It serves the British Army and the defence, security, government, humanitarian and maritime sectors worldwide. Many of its core products are standard issue to NATO troops, and over 200 of its products hold NATO approvals. The brand markets a heritage dating to 1854; the current legal entity was incorporated in 1979.\n\n## Products and solutions\n\n- **Soldier survivability and sustainment** - individual first aid kits, trauma pouches, haemostatic dressings, stretchers, survival medical kits, FireDragon fuel and stoves, water purification and shelter systems.\n- **ATMIS multispectral camouflage** - signature management across UV, visual, NIR, SWIR, TIR and radar, including patrol cloaks and vehicle concealment nets.\n- **Blast Boxers** - ballistic protective undergarments for groin and femoral protection.\n- **Marine survival** - life-raft survival packs, marine pyrotechnics, water rations and self-inflating maritime body armour.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Ownership\n\nAcquired by Wescom Group in January 2025 and integrated into Wescom Defence in August 2025 around four capability pillars: prime contracting support, operational infrastructure, soldier survivability and sustainability, and multispectral camouflage. The operating facility remains in Cardiff.\n\n## Recent news\n\n- **2025-08-29** - Wescom Defence announced a new capability model with the strategic integration of BCB International. [source](https://wescom-group.com/wescom-news/wescom-defence-announces-new-capability-model-with-strategic-integration-of-bcb-international/)\n\n## Links\n\n- Website: https://bcbin.com\n- LinkedIn: https://www.linkedin.com/company/bcb-international-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (bcbin.com), ADS member listing (adsgroup.org.uk/members/bcb-international-ltd-1/), Companies House (01442485), Wescom Group news."}, {"name": "Babcock International Group plc", "website": "https://www.babcockinternational.com", "linkedin": "https://www.linkedin.com/company/babcock-international-group", "hq": "London, United Kingdom", "region": "London", "size": "large", "headcount": "10,000+", "founded": "1989", "tags": ["defence", "maritime", "land", "air", "training", "logistics", "manufacturing", "size-large", "type-prime", "listed", "owned-uk", "mbr-ads"], "summary": "A UK aerospace, defence and nuclear engineering services company, supporting the Royal Navy, the wider armed forces and critical national infrastructure.", "body": "# Babcock International Group\n\n> A UK aerospace, defence and nuclear engineering services company, supporting the Royal Navy, the wider armed forces and critical national infrastructure.\n\n## What they do\n\nBabcock International Group plc is a British aerospace, defence and nuclear engineering services company based in London. Although it holds civil contracts, its main business is with public bodies, particularly the UK Ministry of Defence. The company is listed on the London Stock Exchange and is a constituent of the FTSE 100, operating across the UK and overseas in Africa, North America, South America, Europe and Australasia.\n\n## Products and solutions\n\n- **Submarine and naval base support** - sustainment, refit and infrastructure services for the Royal Navy's fleet and nuclear submarines, including work at Devonport.\n- **Arrowhead frigate** - the Type 31 / Arrowhead 140 frigate design, built for the Royal Navy and offered for export.\n- **Defence training and equipment support** - through-life support, training and engineering services for land, air and naval platforms.\n- **Nuclear engineering** - decommissioning and submarine dismantling services.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2026-04-03** - Babcock agreed a six-month bridging contract with the MOD to maintain continuity of naval base and nuclear submarine fleet support services following completion of the five-year FMSP contract. [source](https://www.navaltoday.com/2026/04/03/babcock-secures-bridging-contract-to-support-uks-naval-base-and-submarine-fleet/)\n- **2025-06-05** - Babcock awarded a GBP 114 million, three-year contract to prepare for the first defuelling of a decommissioned Royal Navy nuclear submarine in over 20 years, at Devonport. [source](https://www.navalnews.com/naval-news/2025/06/babcock-secures-contract-to-support-first-nuclear-submarine-defueling-operations-in-20-years/)\n\n## Links\n\n- Website: https://www.babcockinternational.com\n- LinkedIn: https://www.linkedin.com/company/babcock-international-group\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (babcockinternational.com), LinkedIn company page, Companies House, Wikipedia, Naval News, Naval Today."}, {"name": "Babel Street", "website": "https://www.babelstreet.com", "linkedin": "https://www.linkedin.com/company/babelstreet", "hq": "Reston, Virginia, USA", "region": "London", "size": "large", "headcount": "", "founded": "2009", "tags": ["defence", "ai", "isr", "data", "software", "cyber", "size-large", "type-prime", "owned-foreign", "backed-pe", "mbr-ads"], "summary": "Risk intelligence software for defence, intelligence, law enforcement and regulated industries.", "body": "# Babel Street\n\n> Risk intelligence software for defence, intelligence, law enforcement and regulated industries.\n\n## What they do\n\nBabel Street, founded in 2009, provides AI-driven risk intelligence used by defence, intelligence, law enforcement and regulated organisations. Its platform ingests records across languages, domains and regions to support identity and vendor vetting, situational awareness and threat intelligence, with entity resolution, risk scoring, event detection and network mapping. The company is headquartered in the Washington, D.C. area, with offices including London, Canberra and Ottawa; its UK presence operates as Babel Street Limited. The UK entity is registered under the former Basis Technology Ltd name, the multilingual text analytics and digital forensics business Babel Street acquired.\n\n## Products and solutions\n\n- **Babel Street Insights** - threat intelligence, identity and risk analysis across multilingual open and licensed data.\n- **Identity and vendor risk intelligence** - vetting of identities and vendor networks.\n- **Strategic threat intelligence** - situational awareness and threat detection for government and defence.\n- **Rosette text analytics** - multilingual entity extraction, name matching and translation for identity resolution.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-05-21** - Babel Street launched Insights Investigator, an agentic AI platform for intelligence investigations. [source](https://thedefensepost.com/2026/05/21/babel-ai-insights-investigator/)\n\n## Links\n\n- Website: https://www.babelstreet.com\n- LinkedIn: https://www.linkedin.com/company/babelstreet\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Babel Street website, Companies House, The Defense Post."}, {"name": "BAE Systems plc", "website": "https://www.baesystems.com", "linkedin": "https://www.linkedin.com/company/bae-systems", "hq": "London, United Kingdom", "region": "London", "size": "large", "headcount": "~93,500 worldwide", "founded": "", "tags": ["defence", "air", "land", "maritime", "cyber", "isr", "c2", "munitions", "manufacturing", "software", "size-large", "type-prime", "listed", "owned-uk", "mbr-ads"], "summary": "Britain's largest defence company, supplying air, land and naval platforms, electronics, cyber and security services worldwide.", "body": "# BAE Systems\n\n> Britain's largest defence company, supplying air, land and naval platforms, electronics, cyber and security services worldwide.\n\n## What they do\n\nBAE Systems plc is a British multinational aerospace, defence and security company headquartered in London. It is the largest defence contractor in Europe. Its products and services span air, land and naval forces, alongside advanced electronics, security, information technology and support services. The company employs around 93,500 people worldwide.\n\n## Products and solutions\n\n- **Type 26 frigates** - City Class anti-submarine warfare frigates built in Glasgow for the Royal Navy and export customers.\n- **Combat aircraft** - including the Eurofighter Typhoon and the Tempest future combat air programme.\n- **Combat vehicles and munitions** - armoured vehicles, artillery and ammunition for land forces.\n- **Electronic systems and cyber** - avionics, electronic warfare, and cyber and intelligence services.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-12** - The UK MOD awarded BAE Systems a GBP 4.2 billion contract to build five more Type 26 frigates in Glasgow, sustaining over 4,000 jobs. [source](https://www.baesystems.com/en-uk/article/bae-systems-awarded-4-2bn-contract-to-build-five-more-type-26-frigates-in-glasgow)\n- **2025-08-31** - Norway confirmed plans to acquire at least five Type 26 frigates from the UK in a deal worth around GBP 10 billion. [source](https://breakingdefense.com/2025/09/norway-selects-uk-type-26-frigates-under-13-5-billion-plan/)\n\n## Links\n\n- Website: https://www.baesystems.com\n- LinkedIn: https://www.linkedin.com/company/bae-systems\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (baesystems.com), LinkedIn company page, Companies House, Wikipedia, Breaking Defense."}, {"name": "Bagira Systems UK Ltd", "website": "https://www.bagirasys.com", "linkedin": "https://www.linkedin.com/company/bagira-systems", "hq": "Rishon LeZion, Israel", "region": "London", "size": "small", "headcount": "", "founded": "2023", "tags": ["defence", "simulation", "training", "land", "uas", "size-small", "type-sme", "owned-foreign", "mbr-ads"], "summary": "UK arm of an Israeli training and simulation company supplying live, virtual and constructive military training systems.", "body": "# Bagira Systems UK\n\n> UK arm of an Israeli training and simulation company supplying live, virtual and constructive military training systems.\n\n## What they do\n\nBagira Systems designs, develops and supports training and simulation systems for military forces, covering live, virtual and constructive training. The company states it trains soldiers across more than 40 sites worldwide. Bagira Systems UK Ltd is the UK entity, registered in London in 2023; the wider business is headquartered in Israel. In 2023 Bagira won a UK Ministry of Defence contract for its Magnet live tactical engagement simulation system, delivered to the British Army with UK partner Babcock International.\n\n## Products and solutions\n\n- **Magnet live training system** - force-on-force tactical engagement simulation using real weapons without blank ammunition.\n- **JTAC and joint fires training** - simulation for joint terminal attack controller and joint fires training.\n- **UAV mission simulator** - simulation for unmanned aerial vehicle mission training.\n- **Infantry skills trainer** - simulator for individual and small-team infantry skills.\n- **Howitzer and artillery crew trainers** - crew training simulators for artillery systems.\n- **CBRN simulation** - training simulation for chemical, biological, radiological and nuclear scenarios.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2023-05-03** - Bagira was selected to supply its Magnet live tactical training system to the UK under the R-TES requirement, supported by Babcock International. [source](https://euro-sd.com/2023/05/news/31436/bagira-chosen-to-fulfil-uk-r-tes-training-requirement/)\n\n## Links\n\n- Website: https://www.bagirasys.com\n- LinkedIn: https://www.linkedin.com/company/bagira-systems\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Bagira Systems website, Companies House, Euro-SD."}, {"name": "Baker Hicks Limited", "website": "https://bakerhicks.com", "linkedin": "https://www.linkedin.com/company/bakerhicks", "hq": "Warwick, United Kingdom", "region": "West Midlands", "size": "large", "headcount": "~1300", "founded": "1957", "tags": ["defence", "simulation", "data", "manufacturing", "size-large", "type-consultancy", "owned-uk", "listed", "accr-ce-plus", "mbr-ads"], "summary": "Multi-disciplinary design, engineering and project delivery consultancy with a dedicated defence sector practice.", "body": "# BakerHicks\n\n> Multi-disciplinary design, engineering and project delivery consultancy with a dedicated defence sector practice.\n\n## What they do\n\nBakerHicks is a design, engineering and project delivery consultancy working across infrastructure, life sciences, industrial and public sector markets. It operates a defined defence business unit providing integrated design and engineering services for regulated and secure environments. The firm traces its origins to IDC Group, founded in 1957, and is part of the listed Morgan Sindall Group.\n\n## Products and solutions\n\n- **Defence design and engineering** - integrated design, project management and compliance services for secure and regulated defence environments.\n- **Digital asset and configuration management** - asset and configuration record management, laser scan-to-BIM and AR/VR modelling for defence infrastructure.\n- **Continuous at Sea Deterrent support** - work supporting the UK submarine-based nuclear deterrent programme.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Cyber Essentials Plus; Armed Forces Covenant (Silver); PAS 2080.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-06-24** - Published a feature on its serving Reservists for Reserves Day. [source](https://bakerhicks.com/en/insights/celebrating-our-reservists)\n\n## Links\n\n- Website: https://bakerhicks.com\n- LinkedIn: https://www.linkedin.com/company/bakerhicks\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (bakerhicks.com, including the defence sector page), LinkedIn company page, Companies House (company 06256571), ADS Group member directory, Morgan Sindall Group website."}, {"name": "Barnbrook Systems Limited", "website": "https://barnbrooksystems.com", "linkedin": "https://www.linkedin.com/company/barnbrook-systems-ltd", "hq": "Fareham, England", "region": "South East England", "size": "small", "headcount": "~50", "founded": "1978", "tags": ["defence", "maritime", "air", "hardware", "manufacturing", "sensors", "data", "size-small", "type-manufacturer", "accr-iso9001", "accr-as9100", "accr-ce", "mbr-ads"], "summary": "UK aerospace, defence, maritime and rail engineering firm designing and manufacturing electro-mechanical switching and safety-critical systems, with MRO services and IIoT asset-monitoring technology.", "body": "# Barnbrook Systems Limited\n\n> UK aerospace, defence, maritime and rail engineering firm designing and manufacturing electro-mechanical switching and safety-critical systems, with MRO services and IIoT asset-monitoring technology.\n\n## What they do\n\nBarnbrook designs, manufactures and supports control systems, relays and contactors, and pressure transducers and systems for the aerospace, aviation, defence, maritime, rail and commercial sectors. It provides Maintenance, Repair and Overhaul (MRO) to extend the life of older defence assets such as fighter aircraft and warships, and is building Parts Manufacturer Approval (PMA) capability. It also develops IIoT remote-sensing technology for real-time asset monitoring. The company is based in Fareham, Hampshire, with offices in Virginia, USA, and Prague, Czech Republic.\n\n## Products and solutions\n\n- **Relays, contactors and circuit breakers** - electromechanical and solid-state.\n- **Pressure transducers and systems, power controllers, engine control units and solenoids.**\n- **Actuators and test sets** - flight and fire-suppression actuators and bespoke test sets.\n- **Rail braking controller systems.**\n- **Intelligent in-flight refuelling switch** - uses BlueCube sensing to detect pressure changes and cut pumps to prevent spills.\n- **BlueCube** - an IIoT remote-sensing and tracking system monitoring temperature, pressure, humidity, GPS location, current and movement across assets such as trains, boats and aircraft.\n- **E:BAG** - a lithium-ion battery fire-suppression bag.\n- **MRO and PMA services** for aerospace and defence.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Cyber Essentials, AS9100D (EN 9100:2018), ISO 9001, CAA Part 21-G, CAA Part 145, FAA FAR 145, Gulfstream UK145 approval, SIL2 (IEC 61508-2:2010).\n- **Memberships:** ADS Group, Farnborough Aerospace Consortium (founding member), International Institute of Obsolescence Management, Make UK Defence. Armed Forces Covenant signatory.\n\n## Recent news\n\n- **2025-12-18** - Reported a year of growth, including a new North America office in Virginia, a seven-figure ten-year contract to supply relays for Rolls-Royce engines on a foreign navy's destroyer fleet, and repeat orders for its helicopter refuelling switch. [Aerospace Innovations](https://aerospace-innovations.com/barnbrook-systems-set-to-build-on-transformative-year-in-2026/)\n\n## Links\n\n- Website: https://barnbrooksystems.com\n- LinkedIn: https://www.linkedin.com/company/barnbrook-systems-ltd\n- Companies House: https://find-and-update.company-information.service.gov.uk/company/01362146\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (Our Company), Companies House (company number 01362146, status Active, incorporated 10 April 1978, registered office Fareham, Hampshire), LinkedIn company page, ADS Group, Armed Forces Covenant business listing, Aerospace Innovations and the Portsmouth News. Headcount stated by the company as nearly 50."}, {"name": "Barrier Networks Limited", "website": "https://www.barriernetworks.com", "linkedin": "https://www.linkedin.com/company/barriernetworks", "hq": "Glasgow, United Kingdom", "region": "Scotland", "size": "small", "headcount": "10-49", "founded": "2006", "tags": ["defence", "cyber", "software", "size-small", "type-sme", "owned-uk", "fw-gcloud", "accr-iso27001", "accr-iso9001", "accr-ce-plus", "mbr-ads"], "summary": "Scottish managed security service provider delivering cyber defence, penetration testing and incident response, including to government and MoD customers.", "body": "# Barrier Networks\n\n> Scottish managed security service provider delivering cyber defence, penetration testing and incident response, including to government and MoD customers.\n\n## What they do\n\nBarrier Networks is a Glasgow-based managed security service provider and value-added reseller. It provides defensive cyber operations, vulnerability management, penetration testing, governance and compliance, operational technology security and managed security operations. The company lists HMG and MoD among the sectors it serves and is certified under the NCSC Cyber Incident Response scheme.\n\n## Products and solutions\n\n- **Barrier Blue** - defensive cyber operations, threat detection and response.\n- **Barrier Red** - offensive security and penetration testing.\n- **Barrier OT** - operational technology and critical national infrastructure security.\n- **Cyber Incident Response** - 24/7 managed incident response, certified under the NCSC CIR scheme.\n- **Managed SOC** - managed security operations centre services.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** G-Cloud supplier.\n- **Accreditations:** ISO 27001; ISO 9001; Cyber Essentials Plus; IASME Gold; CREST (penetration testing and SOC); NCSC Cyber Incident Response certified.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-07-31** - Published guidance on NCSC CIR certification and its status as a certified incident response provider. [source](https://www.barriernetworks.com/blog/not-all-incident-response-teams-are-equal-the-value-of-ncsc-cir-certification)\n- **2025-01-29** - Detailed its work with OPSWAT on security for the critical national infrastructure sector. [source](https://www.barriernetworks.com/blog/barrier-networks-and-opswat-elevating-security-for-the-cni-sector)\n\n## Links\n\n- Website: https://www.barriernetworks.com\n- LinkedIn: https://www.linkedin.com/company/barriernetworks\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (barriernetworks.com), LinkedIn company page, Companies House (company SC305542), ADS Group member directory (members/barrier-networks-ltd-1)."}, {"name": "Barum and Dewar Limited", "website": "https://www.barumanddewar.com", "linkedin": "https://www.linkedin.com/company/841149", "hq": "Barnstaple, United Kingdom", "region": "South West England", "size": "medium", "headcount": "", "founded": "1996", "tags": ["defence", "manufacturing", "hardware", "logistics", "air", "space", "maritime", "size-medium", "type-sme", "type-manufacturer", "owned-uk", "fw-joscar", "accr-iso9001", "accr-ce", "accr-ce-plus", "mbr-ads"], "summary": "UK manufacturer of protective cases, transit containers and packaging solutions for the defence, aerospace and space sectors.", "body": "# Barum & Dewar\n\n> UK manufacturer of protective cases, transit containers and packaging solutions for the defence, aerospace and space sectors.\n\n## What they do\n\nBarum & Dewar designs and manufactures complete packaging solutions for the defence, space, aerospace, subsea and industrial sectors. The company offers in-house technical design (3D CAD), foam engineering and the manufacture of bespoke shipping containers, handling equipment and protective cases, alongside off-the-shelf transit cases and 19\" racks. It has supplied the UK MoD, NATO and defence primes for over 20 years.\n\n## Products and solutions\n\n- **Bespoke shipping containers** - engineered containers for payloads from 5kg to 5000kg.\n- **Foam engineering** - in-house foam facility producing custom protective inserts.\n- **19\" racks** - COTS, COTS+ and bespoke rack systems, including half-19\" formats.\n- **Protective cases** - aluminium, plastic and flight cases, including distribution of Zarges, Peli, SKB, Thermodyne and Hardigg.\n- **Sewn products** - rugged fabric covers and tarpaulins.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR registered.\n- **Accreditations:** ISO 9001; Cyber Essentials; Cyber Essentials Plus.\n- **Memberships:** ADS Group; West of England Aerospace Forum.\n\n## Ownership\n\nAcquired by Macfarlane Group in October 2023. Operates within Macfarlane Packaging while retaining the Barum & Dewar brand and legal entity. The company is registered in Scotland (Glasgow) with its manufacturing operation in Barnstaple, Devon.\n\n## Recent news\n\n- **2025** - Selected by NATO JEWCS for a large equipment deployment case, with delivery in summer 2025. [source](https://barumanddewar.com/news/barum-dewar-selected-by-nato-jewcs-for-large-equipment-deployment-case)\n- **2025** - Awarded the Azalea mission contract. [source](https://www.adsadvance.co.uk/barum-dewar-awarded-azalea-mission-contract.html)\n\n## Links\n\n- Website: https://www.barumanddewar.com\n- LinkedIn: https://www.linkedin.com/company/841149\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (barumanddewar.com), ADS member listing (adsgroup.org.uk/members/barum-dewar-ltd-2/), Companies House (SC168649), ADS Advance and WEAF news."}, {"name": "Bastion Security Products Ltd", "website": "https://www.bastionprotects.com", "linkedin": "https://www.linkedin.com/company/bastion-security-products-ltd", "hq": "Newcastle upon Tyne, United Kingdom", "region": "North East England", "size": "small", "headcount": "", "founded": "2013", "tags": ["defence", "hardware", "manufacturing", "land", "size-small", "type-sme", "type-manufacturer", "owned-uk", "accr-iso9001", "accr-ce", "accr-ce-plus", "mbr-ads"], "summary": "UK manufacturer of modular, demountable secure room and armoured walling systems for government and defence use.", "body": "# Bastion Security Products\n\n> UK manufacturer of modular, demountable secure room and armoured walling systems for government and defence use.\n\n## What they do\n\nBastion specialises in modular, reusable secure room and partitioning systems. Its armoured walling and enclosure products provide burglar, bullet and blast resistance, along with resistance to forced entry and surreptitious attack. The bolt-together systems can divide an existing space, create five- or six-sided secure rooms of almost any size, or reinforce weak walls, and are demountable and relocatable.\n\n## Products and solutions\n\n- **BastionWALL A.C.E.** - CPNI-approved walling for UK Government use; meets the MOD physical security standard for highest-level secure containment.\n- **BastionWALL4** - LPS 1175 SR4 rated walling system.\n- **BastionWALL5** - LPS 1175 SR5 rated walling system.\n- **Multi-Threat modular room and walling system** - upgradable on site as threat levels change; holds LPS 1175 Issue 8 certifications D5 to G5 with a 120-minute fire integrity rating.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001; Cyber Essentials; Cyber Essentials Plus; CPNI approval; MOD physical security standard compliance; LPS 1175 product certifications (SR4, SR5, Issue 8 D5 to G5).\n- **Memberships:** ADS Group; Made in Britain; Secured by Design.\n\n## Ownership\n\nAcquired by BeaverFit in September 2025, folding Bastion's modular walling into BeaverFit's force-protection and deployable-infrastructure offering. UK design and manufacturing retained.\n\n## Recent news\n\n- **2025-09-04** - Acquired by BeaverFit to expand its global physical security capabilities; combined offering shown at DSEI 2025. [source](https://beaverfiteu.com/beaverfit-acquires-bastion-to-expand-global-physical-security-capabilities/)\n\n## Links\n\n- Website: https://www.bastionprotects.com\n- LinkedIn: https://www.linkedin.com/company/bastion-security-products-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS member listing (adsgroup.org.uk/members/bastion-security-products-ltd-1/), Companies House (08667108), BeaverFit acquisition release."}, {"name": "Battlespace Simulations, Inc.", "website": "https://www.bssim.com/", "linkedin": "https://www.linkedin.com/company/battlespace-simulations-inc-", "hq": "United States", "region": "", "size": "small", "headcount": "", "founded": "2005", "tags": ["defence", "simulation", "training", "software", "c2", "size-small", "type-sme", "owned-foreign"], "summary": "Military modelling, simulation and analysis software for multidomain combat training and rehearsal.", "body": "# Battlespace Simulations, Inc.\n\n> Military modelling, simulation and analysis software for multidomain combat training and rehearsal.\n\n## What they do\n\nBattlespace Simulations, Inc. (BSI) provides modelling, simulation and analysis software focused on multidomain combat simulation in near-peer threat environments, simulating the entire battlespace including non-visible effects. Its software is used by militaries and companies internationally for joint fires training, wargaming, mission planning and rehearsal, electronic warfare training, operational research and after-action review. In February 2025 BSI was acquired by FAAC Incorporated, a division of Arotech Corporation.\n\n## Products and solutions\n\n- **MACE (Modern Air Combat Environment)** - computer-generated forces engine used as the simulation engine behind multiple combat system simulations worldwide.\n- **ARMOR (Augmented Reality Mission Observation & Rehearsal)** - real-time 3D visualisation of the battlespace, with terrain that can be built anywhere in the world within MACE.\n\n## Recent news\n\n- **2025-02-28** - FAAC Incorporated, a division of Arotech Corporation, announced the acquisition of Battlespace Simulations. [source](https://www.faac.com/blog/2025/02/28/faac-incorporated-acquires-battlespace-simulations-inc/)\n\n## Links\n\n- Website: https://www.bssim.com/\n- LinkedIn: https://www.linkedin.com/company/battlespace-simulations-inc-\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (bssim.com), FAAC announcement, company LinkedIn page."}, {"name": "Beagle Technology Group Limited", "website": "https://www.beagletechnologygroup.com/", "linkedin": "https://www.linkedin.com/company/beagle-technology-group", "hq": "Christchurch, United Kingdom", "region": "South West", "size": "medium", "headcount": "", "founded": "1969", "tags": ["defence", "air", "manufacturing", "hardware", "test-evaluation", "size-medium", "type-manufacturer", "type-sme", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Designs and manufactures metallic and composite parts, structures and finished components for the aerospace, defence and marine markets.", "body": "# Beagle Technology Group\n\n> Designs and manufactures metallic and composite parts, structures and finished components for the aerospace, defence and marine markets.\n\n## What they do\n\nBeagle Technology Group designs and manufactures metallic and composite parts, structures and finished components for the aerospace, defence and marine markets. Metallic, composite, machining and design capabilities are offered in-house from its facility in Christchurch, Dorset. The company traces its origins to Beagle Aircraft and now supplies engineering and manufacturing services across several sectors.\n\n## Products and solutions\n\n- **Metallic assemblies and machining** - manufacture of metallic parts and structures.\n- **Composite structures** - design and manufacture of composite parts and components.\n- **Design and engineering** - in-house design capability supporting build to print and turnkey work.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, AS9100, with supporting NADCAP accreditations.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.beagletechnologygroup.com/\n- LinkedIn: https://www.linkedin.com/company/beagle-technology-group\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (beagletechnologygroup.com), ADS members directory (adsgroup.org.uk), Companies House (company 00968265), company LinkedIn page."}, {"name": "Beardsell & Sons Limited", "website": "https://bandsl.com/", "linkedin": "", "hq": "Maryport, United Kingdom", "region": "North West", "size": "micro", "headcount": "", "founded": "2018", "tags": ["defence", "land", "hardware", "manufacturing", "size-micro", "type-sme", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Supplier of force protection engineering, battlefield fortifications and hardened structures, trading as B+SL.", "body": "# Beardsell & Sons\n\n> Supplier of force protection engineering, battlefield fortifications and hardened structures, trading as B+SL.\n\n## What they do\n\nBeardsell & Sons, trading as B+SL, supplies force protection engineering, battlefield fortifications and hardened structures. The company applies existing and new technology to protective and infrastructure products for the defence sector. It is based at Glasson Industrial Estate, Maryport, Cumbria.\n\n## Products and solutions\n\n- **Universal Battle Trench (UBT)** - hardened fortification supplied as designed or tailored to user requirements, including protection of remote weapon stations and battlefield infrastructure.\n- **OG-SPB** - a product within the B+SL portfolio.\n- **GapX** - a gap-crossing concept developed for Dstl.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://bandsl.com/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (bandsl.com), ADS members directory (adsgroup.org.uk), Companies House (company 11630211)."}, {"name": "Beechnet Systems Limited", "website": "", "linkedin": "https://www.linkedin.com/company/beechnet-systems", "hq": "Silsoe, United Kingdom", "region": "East of England", "size": "micro", "headcount": "", "founded": "2010", "tags": ["defence", "hardware", "software", "sensors", "test-evaluation", "size-micro", "type-consultancy", "type-sme", "owned-uk", "mbr-ads"], "summary": "Sub-system design consultancy providing electronics, FPGA and software design for defence and commercial clients.", "body": "# Beechnet Systems\n\n> Sub-system design consultancy providing electronics, FPGA and software design for defence and commercial clients.\n\n## What they do\n\nBeechnet Systems is a sub-system design consultancy that provides electronics design, FPGA design and software design. It works with clients ranging from large defence companies to small commercial firms, supporting work from initial concept through prototype to full-scale production. The company is based in Silsoe, Bedfordshire.\n\n## Products and solutions\n\n- **Electronics and FPGA design** - design of experimental electronic sub-systems.\n- **Software design** - software development supporting sub-system work.\n- **Prototype to production** - support from early prototype through to production.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- LinkedIn: https://www.linkedin.com/company/beechnet-systems\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS members directory (adsgroup.org.uk), Companies House (company 07122667), company LinkedIn page."}, {"name": "Beechwood Equipment Limited", "website": "https://www.beechwoodequipment.com/", "linkedin": "https://www.linkedin.com/company/beechwood-equipment", "hq": "Guildford, United Kingdom", "region": "South East", "size": "small", "headcount": "", "founded": "1987", "tags": ["defence", "optronics", "sensors", "drones", "robotics", "land", "size-small", "type-sme", "owned-uk", "accr-iso9001", "accr-ce", "mbr-ads"], "summary": "Importer and distributor of defence and emergency services equipment, including electro optics, UAVs, ballistic protection and specialist clothing.", "body": "# Beechwood Equipment\n\n> Importer and distributor of defence and emergency services equipment, including electro optics, UAVs, ballistic protection and specialist clothing.\n\n## What they do\n\nBeechwood Equipment is an importer and distributor of equipment for the defence and emergency services sectors. Founded in 1987 and based in Guildford, Surrey, the company supplies and supports soldier systems, specialist law enforcement products and rescue equipment. Areas of expertise include electro optics, optics, UAVs and UGVs, ballistic protection and specialist clothing. It is an approved MoD supplier and a Police National Framework supplier.\n\n## Products and solutions\n\n- **Optics and electro optics** - optical sights, electro-optics and through-life support.\n- **Drones and robotics** - UAV and UGV systems from a range of partner brands.\n- **Clothing and protection** - ballistic protection and specialist clothing.\n- **Tactical and duty equipment** - tactical and duty kit for military and law enforcement users.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** various MoD, Police and commercial framework contracts.\n- **Accreditations:** ISO 9001:2015; Cyber Essentials; Armed Forces Covenant signatory.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.beechwoodequipment.com/\n- LinkedIn: https://www.linkedin.com/company/beechwood-equipment\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: company website (beechwoodequipment.com), ADS members directory (adsgroup.org.uk), GOV.UK Armed Forces Covenant listing, company LinkedIn page."}, {"name": "Belcan Engineering Services UK Limited", "website": "https://www.belcan.com/", "linkedin": "", "hq": "Cincinnati, United States", "region": "", "size": "large", "headcount": "", "founded": "1996", "tags": ["defence", "air", "space", "software", "manufacturing", "test-evaluation", "size-large", "type-consultancy", "owned-foreign", "mbr-ads"], "summary": "UK arm of Belcan, a global engineering and technical services supplier to aerospace, defence and space.", "body": "# Belcan Engineering Services UK\n\n> UK arm of Belcan, a global engineering and technical services supplier to aerospa
