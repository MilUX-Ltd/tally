facturing", "hardware", "size-small", "type-sme", "type-manufacturer", "mbr-ads"], "summary": "Precision fastener manufacturer for the aerospace and defence industries, based in Glossop, Derbyshire.", "body": "# AF Fasteners\n\n> Precision fastener manufacturer for the aerospace and defence industries, based in Glossop, Derbyshire.\n\n## What they do\n\nAF Fasteners is a fastener manufacturer dedicated to the global aerospace industry, with over 50 years of experience in high-performance fastener manufacturing. The company manufactures precision systems in house and is approved to supply leading aerospace companies. It offers over 2,500 products, including licensed production of the Phillips Screw Company drive systems range. AF Fasteners is part of the FMT Group.\n\n## Products and solutions\n\n- **Aerospace fasteners** - in-house manufactured precision fastener systems, including alloy steel bolts.\n- **Licensed drive systems** - production of the Phillips Screw Company range.\n- **CNC components** - precision machined components and PTFE fasteners.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026** - Approved by Airbus and listed on the AQPL for the NAS6603-6 range, covering 947 part numbers across NAS6603 to NAS6606 hex head bolts. [source](https://affasteners.com/approval-update/)\n\n## Links\n\n- Website: https://affasteners.com\n- LinkedIn: https://www.linkedin.com/company/af-fasteners\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (affasteners.com), ADS members directory."}, {"name": "AFD Systems Limited", "website": "https://www.afd-systems.com", "linkedin": "https://www.linkedin.com/company/afd-systems", "hq": "Blackpool, United Kingdom", "region": "North West", "size": "small", "headcount": "30+", "founded": "2009", "tags": ["defence", "air", "space", "manufacturing", "test-evaluation", "size-small", "type-sme", "accr-iso9001", "accr-iso27001", "accr-iso14001", "accr-ce", "fw-joscar", "mbr-ads"], "summary": "Advanced engineering and manufacturing business serving the aerospace and defence sectors, based at Blackpool Airport.", "body": "# AFD Systems\n\n> Advanced engineering and manufacturing business serving the aerospace and defence sectors, based at Blackpool Airport.\n\n## What they do\n\nAFD Systems is an advanced engineering and manufacturing business serving the aerospace and defence sectors, with additional work in space, nuclear, rail, medical and motorsport. Formerly Airframe Designs, it rebranded to AFD Systems in 2025. Since launching in 2009 it has completed over 600 projects across air, land and sea platforms. The company is headquartered at Blackpool Airport's Enterprise Zone and employs over 30 specialists.\n\n## Products and solutions\n\n- **Systems integration** and **airframe engineering** for new design, modification and repair.\n- **Cabin interior engineering** and **reverse engineering**.\n- **Additive manufacturing**, **innovative tooling solutions** and **high integrity test rigs**.\n- **Metrology and 3D scanning**.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR, Exostar.\n- **Accreditations:** AS9100, ISO 14001, ISO 27001, Cyber Essentials.\n- **Memberships:** ADS Group, Composites UK, North West Aerospace Alliance.\n\n## Recent news\n\n- **2025-10-21** - Airframe Designs Limited rebranded to AFD Systems, reflecting expanded scope beyond its original focus. [source](https://www.adsadvance.co.uk/airframe-designs-rebrands-to-afd-systems.html)\n\n## Links\n\n- Website: https://www.afd-systems.com\n- LinkedIn: https://www.linkedin.com/company/afd-systems\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (afd-systems.com), ADS members directory, ADS Advance, Companies House (07081294)."}, {"name": "Agentycs Limited", "website": "https://agentycs.com", "linkedin": "https://www.linkedin.com/company/agentycs", "hq": "Hythe, United Kingdom", "region": "South East", "size": "micro", "headcount": "", "founded": "2024", "tags": ["defence", "ai", "data", "software", "isr", "autonomy", "size-micro", "type-startup", "owned-uk", "mbr-ads"], "summary": "UK sovereign agentic AI platform for defence, intelligence, government and enterprise.", "body": "# Agentycs\n\n> UK sovereign agentic AI platform for defence, intelligence, government and enterprise.\n\n## What they do\n\nAgentycs is a UK company building agentic AI that operates across high-side and low-side networks, deployed from a UK sovereign cloud or at the tactical edge. The platform fuses structured, unstructured and sensor data in an AI-native lakehouse and supports hybrid search, natural-language analytics and agentic reasoning. It is designed to run in air-gapped, disconnected and comms-degraded environments without reliance on US hyperscalers or foreign infrastructure.\n\n## Products and solutions\n\n- **Agentycs Platform** - end-to-end AI operating platform spanning a data and knowledge fabric (Atom), inference orchestration (Anima), mission applications (Agent2) and deployment runtime and edge (Apex).\n- **Agentycs-in-a-Box (AIB)** - a rugged, self-contained, man-portable AI appliance preloaded with models, lakehouse and agentic stack, able to run offline and reach initial operating capability rapidly.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://agentycs.com\n- LinkedIn: https://www.linkedin.com/company/agentycs\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (agentycs.com, Defence and Intelligence pages), Companies House (16066135), ADS Group members directory, company LinkedIn page."}, {"name": "Agilent Technologies LDA UK Limited", "website": "https://www.agilent.com", "linkedin": "", "hq": "Santa Clara, United States", "region": "North West", "size": "large", "headcount": "", "founded": "2013", "tags": ["defence", "sensors", "test-evaluation", "manufacturing", "air", "size-large", "type-manufacturer", "owned-foreign", "listed", "mbr-ads"], "summary": "UK arm of Agilent's Raman spectroscopy business, formerly Cobalt Light Systems, making security and material-identification instruments.", "body": "# Agilent Technologies LDA UK\n\n> UK arm of Agilent's Raman spectroscopy business, formerly Cobalt Light Systems, making security and material-identification instruments.\n\n## What they do\n\nAgilent Technologies LDA UK is the UK entity behind the former Cobalt Light Systems, a Harwell spin-out acquired by Agilent Technologies in 2017. It develops and manufactures Raman spectroscopy instruments that identify chemicals and materials through opaque barriers and sealed containers. Applications span aviation security screening, hazardous-material and chemical-warfare-agent identification, and pharmaceutical quality control. The parent, Agilent Technologies, is a US-listed company headquartered in Santa Clara, California; this UK entity is registered in Cheadle, Cheshire.\n\n## Products and solutions\n\n- **Insight200M** - liquid explosive detection system (LEDS) for aviation security, screening common container types for liquid explosives.\n- **Resolve** - handheld Raman analyser for rapid identification of explosives, narcotics, toxic industrial chemicals and chemical warfare agents through sealed, opaque containers.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2022-11-29** - Agilent deployed its next-generation explosive detection system at London Heathrow Airport. [source](https://www.agilent.com/about/newsroom/presrel/2022/29nov-ca22035.html)\n- **2017-07** - Agilent Technologies acquired Raman spectroscopy innovator Cobalt Light Systems. [source](https://www.agilent.com/about/newsroom/presrel/2017/07jul-gp17014.html)\n\n## Links\n\n- Website: https://www.agilent.com\n\n## Sources\n\nPublic information verified 2026-06-29. Agilent newsroom and product pages, Companies House (08815891), ADS Group members directory, Harwell Campus profile."}, {"name": "Agility Cyber Limited", "website": "https://www.agilitycyber.co.uk", "linkedin": "https://www.linkedin.com/company/agility-cyber", "hq": "Warwick, United Kingdom", "region": "West Midlands", "size": "micro", "headcount": "", "founded": "2023", "tags": ["defence", "cyber", "software", "size-micro", "type-sme", "type-consultancy", "owned-uk", "accr-ce", "mbr-ads"], "summary": "Independent UK cyber security consultancy providing security assessment and assurance services.", "body": "# Agility Cyber\n\n> Independent UK cyber security consultancy providing security assessment and assurance services.\n\n## What they do\n\nAgility Cyber is an independent cyber security consultancy offering security assessment, assurance and training services. It carries out assessments across physical security, servers and wider infrastructure, and positions itself as vendor-independent, delivering all work with a UK-based team. The company is named as a supplier to UK central government departments, the wider public sector and charities.\n\n## Products and solutions\n\n- **Security assessment services** - physical security, server and infrastructure security assessments to evaluate and help remediate risk.\n- **Cyber security training** - training delivered by certified specialists.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Cyber Essentials\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.agilitycyber.co.uk\n- LinkedIn: https://www.linkedin.com/company/agility-cyber\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (agilitycyber.co.uk), Companies House (15236270), ADS Group members directory, company LinkedIn page."}, {"name": "AirBorn International Limited", "website": "https://www.airborninternational.com", "linkedin": "https://www.linkedin.com/company/airborn-int", "hq": "Edenbridge, United Kingdom", "region": "South East", "size": "medium", "headcount": "50+", "founded": "1999", "tags": ["defence", "hardware", "manufacturing", "air", "space", "size-medium", "type-manufacturer", "owned-foreign", "mbr-ads"], "summary": "UK manufacturer of cable assemblies, looms and connectors for aerospace, defence and space.", "body": "# AirBorn International\n\n> UK manufacturer of cable assemblies, looms and connectors for aerospace, defence and space.\n\n## What they do\n\nAirBorn International is the UK arm of AirBorn, a manufacturer founded in 1958 that began producing electronic connectors for the military and aerospace industries. The Edenbridge, Kent facility manufactures cable assemblies, looms and connectors for aerospace (civil and military), space, defence, geophysics and medical markets, with experience across telecoms, transportation and maritime environments. The wider AirBorn group operates manufacturing in the USA and the UK, with operations in Europe and Asia.\n\n## Products and solutions\n\n- **Cable assemblies and looms** - custom interconnect assemblies for aerospace, defence and space applications.\n- **Connectors** - electronic connectors for military, aerospace and harsh-environment use.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2024** - AirBorn established a new international headquarters and manufacturing facility in Kent. [source](https://www.adsadvance.co.uk/airborn-establishes-new-international-hq-and-manufacturing-facility-in-kent.html)\n\n## Links\n\n- Website: https://www.airborninternational.com\n- LinkedIn: https://www.linkedin.com/company/airborn-int\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (airborninternational.com), Companies House (03734105), ADS Group members directory and member spotlight, ADS Advance, company LinkedIn page."}, {"name": "Airbox Systems Limited", "website": "https://airboxsystems.com", "linkedin": "https://www.linkedin.com/company/airbox-systems", "hq": "Wantage, United Kingdom", "region": "South East", "size": "small", "headcount": "", "founded": "2008", "tags": ["defence", "software", "c2", "isr", "gis", "air", "land", "size-small", "type-sme", "owned-uk", "fw-gcloud", "accr-iso27001", "mbr-ads"], "summary": "UK developer of situational awareness and mapping software for defence, aviation and emergency services.", "body": "# Airbox Systems\n\n> UK developer of situational awareness and mapping software for defence, aviation and emergency services.\n\n## What they do\n\nAirbox Systems is an independent UK company founded in 2008 that develops software to help users visualise their environment and share operational data. Its tools cover planning, execution and after-action review, run across iOS, Android and Windows on laptops, tablets and phones, and can operate offline with stored maps and charts. The software is used by law enforcement, military, special forces, search and rescue, fire and medical emergency services.\n\n## Products and solutions\n\n- **ACANS** - Aviation Command and Aircraft Navigation System, situational awareness software for aircrews.\n- **MOSAIC** - Mission Optimised Situational Awareness Information Collaboration, situational awareness software for ground users.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** G-Cloud (Crown Commercial Service Digital Marketplace)\n- **Accreditations:** ISO 27001, ISO 22301\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://airboxsystems.com\n- LinkedIn: https://www.linkedin.com/company/airbox-systems\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (airboxsystems.com), Companies House (06534784), ADS Group members directory, Crown Commercial Service Digital Marketplace (G-Cloud), company LinkedIn page."}, {"name": "Airbus Defence and Space Limited", "website": "https://www.airbus.com/en/products-services/defence", "linkedin": "https://www.linkedin.com/company/airbus-defence-and-space", "hq": "Stevenage, United Kingdom", "region": "East of England", "size": "large", "headcount": "2,600+ across Stevenage and Portsmouth", "founded": "2014", "tags": ["defence", "space", "isr", "comms", "sensors", "manufacturing", "air", "size-large", "type-prime", "listed", "owned-foreign", "mbr-ads"], "summary": "The defence and space division of Airbus, designing and building military satellites, secure communications and space systems in the UK.", "body": "# Airbus Defence and Space\n\n> The defence and space division of Airbus, designing and building military satellites, secure communications and space systems in the UK.\n\n## What they do\n\nAirbus Defence and Space is the military and space systems division of Airbus, formed in 2014 from the restructuring of EADS. In the UK it designs, manufactures and operates satellites and space systems, with major sites at Stevenage and Portsmouth and further capability in Newport, Guildford, Newcastle and Chippenham. Stevenage is a centre for satellite design, manufacture and operations; Portsmouth houses the largest clean room complex in the UK and develops satellite payloads.\n\n## Products and solutions\n\n- **Skynet** - military satellite communications systems for the UK Ministry of Defence, including the Skynet 6A satellite built in the UK.\n- **Oberon** - two synthetic aperture radar satellites providing space-based intelligence, surveillance and reconnaissance for the UK MOD.\n- **Space systems** - telecommunications, Earth observation, scientific and meteorology satellites and spacecraft propulsion.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-02-10** - Airbus awarded the UK MOD's Oberon contract, worth GBP 127 million, to design and build two synthetic aperture radar ISR satellites in the UK for launch in 2027. [source](https://www.airbus.com/en/newsroom/press-releases/2025-02-airbus-awarded-oberon-satellites-contract-by-uk-mod)\n\n## Links\n\n- Website: https://www.airbus.com/en/products-services/defence\n- LinkedIn: https://www.linkedin.com/company/airbus-defence-and-space\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (airbus.com), LinkedIn company page, Companies House, Wikipedia."}, {"name": "Airis Security Technologies Ltd", "website": "https://airis-security.com", "linkedin": "https://www.linkedin.com/company/airis-security-technologies", "hq": "London, United Kingdom", "region": "London", "size": "micro", "headcount": "", "founded": "2013", "tags": ["defence", "cyber", "software", "test-evaluation", "size-micro", "type-sme", "type-consultancy", "mbr-ads"], "summary": "Cyber security specialists providing vulnerability research, reverse engineering and security engineering services.", "body": "# Airis Security Technologies\n\n> Cyber security specialists providing vulnerability research, reverse engineering and security engineering services.\n\n## What they do\n\nAiris Security Technologies is a cyber security consultancy offering engineering and consulting services. The company describes its work as specialist vulnerability research and reverse engineering using low-level expertise across a range of platforms. Its consultants and developers help clients apply these services to secure their platforms.\n\n## Products and solutions\n\n- **Vulnerability research** - low-level research across multiple platforms.\n- **Reverse engineering** - analysis of software and systems.\n- **Security integration** - support for clients securing their own platforms.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://airis-security.com\n- LinkedIn: https://www.linkedin.com/company/airis-security-technologies\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (airis-security.com), ADS members directory (adsgroup.org.uk), Companies House (company 08408868)."}, {"name": "Airnesco Group Ltd", "website": "https://airnesco.com", "linkedin": "https://www.linkedin.com/company/airnesco-group-ltd", "hq": "Maidstone, United Kingdom", "region": "South East", "size": "micro", "headcount": "", "founded": "1996", "tags": ["defence", "land", "maritime", "hardware", "manufacturing", "size-micro", "type-sme", "type-manufacturer", "mbr-ads"], "summary": "Designer and manufacturer of pneumatic barrel cleaning systems for military weapon platforms.", "body": "# Airnesco Group\n\n> Designer and manufacturer of pneumatic barrel cleaning systems for military weapon platforms.\n\n## What they do\n\nAirnesco designs and manufactures specialist compressed air products for bore cleaning applications, supplying air tools and associated equipment to industrial and military markets. The company's weapon care equipment cleans rifled and smooth barrels, mortars and launchers from 12.7mm upwards. From its head office in Kent it works with agents, distributors and licensees internationally.\n\n## Products and solutions\n\n- **Barrel Cleaning System (BCS)** - pneumatically powered system for cleaning smooth and rifled barrels, mortars and launchers of calibre 12.7mm and above.\n- **Small Gauge BCS** - for weapon platforms with a calibre between 12.7mm and 40mm.\n- **Large Gauge BCS** - for weapon platforms with a calibre between 57mm and 203mm, with larger sizes available.\n\nThe Airnesco BCS entered UK MoD trials in the late 1990s and was accepted into service with the Royal Navy and British Army by 2000. It is also used by other armed forces internationally.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://airnesco.com\n- LinkedIn: https://www.linkedin.com/company/airnesco-group-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (airnesco.com), ADS members directory (adsgroup.org.uk), Companies House (company 03183992)."}, {"name": "AirTanker", "website": "https://www.airtanker.co.uk/", "linkedin": "https://uk.linkedin.com/company/airtanker-services", "hq": "Carterton, United Kingdom", "region": "South East", "size": "large", "headcount": "~702", "founded": "2007", "tags": ["defence", "air", "logistics", "size-large", "type-prime", "owned-foreign"], "summary": "Operator of the RAF Voyager fleet, delivering air-to-air refuelling and strategic air transport under a long-term MOD contract.", "body": "# AirTanker\n\n> Operator of the RAF Voyager fleet, delivering air-to-air refuelling and strategic air transport under a long-term MOD contract.\n\n## What they do\n\nAirTanker delivers and supports the Royal Air Force's fleet of 14 Airbus A330-200 Multi-Role Tanker Transport aircraft, designated Voyager in RAF service, under a 27-year Private Finance Initiative contract signed with the Ministry of Defence in 2008. AirTanker Services Limited operates and maintains the fleet, providing air-to-air refuelling, strategic air transport and aeromedical evacuation. The Voyager became fully operational as a tanker in 2013, replacing the VC10. AirTanker is delivered through a partnership of aviation and defence shareholders including Airbus, Babcock, Rolls-Royce and Thales.\n\n## Products and solutions\n\n- **Air-to-air refuelling** - Voyager operating as a dedicated air-to-air refuelling platform able to carry up to 109 tonnes of fuel.\n- **Strategic air transport** - passenger and freight air transport for the RAF and government, including aeromedical evacuation.\n- **Fleet operation and maintenance** - operation and through-life support of the 14-aircraft Voyager fleet, with surge aircraft available for commercial use and military recall.\n\n## Frameworks, accreditations and memberships\n\n- (None confirmed from public sources as at 2026-06-29.)\n\n## Recent news\n\n- No dated public news items confirmed within the last 12 months as at 2026-06-29.\n\n## Links\n\n- Website: https://www.airtanker.co.uk/\n- LinkedIn: https://uk.linkedin.com/company/airtanker-services\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (airtanker.co.uk), LinkedIn company page, RAF (raf.mod.uk), Companies House (06279646)."}, {"name": "AirTanker Services Limited", "website": "https://www.airtanker.co.uk", "linkedin": "https://www.linkedin.com/company/airtanker-services", "hq": "Carterton, United Kingdom", "region": "South East", "size": "large", "headcount": "", "founded": "2007", "tags": ["defence", "air", "logistics", "training", "size-large", "type-prime", "mbr-ads"], "summary": "Operator of the Royal Air Force's Voyager air-to-air refuelling and transport fleet.", "body": "# AirTanker Services\n\n> Operator of the Royal Air Force's Voyager air-to-air refuelling and transport fleet.\n\n## What they do\n\nAirTanker Services operates the RAF's fleet of Airbus A330 Multi-Role Tanker Transport aircraft, in RAF service known as Voyager. Voyager is a dedicated air-to-air refuelling platform that also operates in air transport and aeromedical evacuation roles. In 2008 the AirTanker consortium signed a 27-year contract with the Ministry of Defence to deliver and support 14 MRTT aircraft under the Future Strategic Tanker Aircraft (FSTA) programme. AirTanker's responsibilities span aircraft delivery, crew training, maintenance and dispatch.\n\n## Products and solutions\n\n- **Voyager fleet operation** - operation and support of 14 A330 MRTT aircraft for the RAF.\n- **Military flying** - delivery of air-to-air refuelling and air transport capability.\n- **Maintenance** - end-to-end aircraft maintenance.\n- **Training** - aircrew and ground crew training.\n- **Civil flying and leasing** - non-core aircraft made available to the civil leasing market.\n\nNine aircraft form a core fleet for the RAF; the five non-core aircraft are available to the RAF and can also be offered to other parties, including civil leasing.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** Future Strategic Tanker Aircraft (FSTA) PFI contract with the MoD\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.airtanker.co.uk\n- LinkedIn: https://www.linkedin.com/company/airtanker-services\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (airtanker.co.uk), RAF (raf.mod.uk), Defence Equipment & Support (des.mod.uk), ADS members directory (adsgroup.org.uk), Companies House (company 06279646)."}, {"name": "AKP Limited", "website": "https://www.akp.ltd", "linkedin": "https://www.linkedin.com/company/akp-ltd", "hq": "Great Yarmouth, United Kingdom", "region": "East of England", "size": "small", "headcount": "", "founded": "", "tags": ["defence", "air", "hardware", "manufacturing", "size-small", "type-sme", "type-manufacturer", "accr-iso9001", "mbr-ads"], "summary": "Sub-contract precision engineering company supplying machined components to aerospace and defence.", "body": "# AKP\n\n> Sub-contract precision engineering company supplying machined components to aerospace and defence.\n\n## What they do\n\nAKP is a sub-contract manufacturer of precision component parts, offering CNC milling, turning and multi-axis machining for component sizes from around 1mm to 150mm. It serves sectors including aerospace, defence, subsea, oil and gas, medical, motorsport and marine. For aerospace it supplies precision components for applications such as avionic connectors, systems and actuation, and commercial aircraft seating.\n\n## Products and solutions\n\n- **CNC milling and turning** - precision machined components to tight tolerances.\n- **Multi-axis and sliding head machining** - complex component manufacture.\n- **Manual machining** - additional machining services.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001:2015, AS9100D\n- **Memberships:** ADS Group; Made in Britain\n\n## Links\n\n- Website: https://www.akp.ltd\n- LinkedIn: https://www.linkedin.com/company/akp-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (akp.ltd), ADS members directory (adsgroup.org.uk), Made in Britain members directory (madeinbritain.org)."}, {"name": "Albacom Limited", "website": "https://albacom.co.uk", "linkedin": "https://www.linkedin.com/company/albacom-ltd", "hq": "Dundee, United Kingdom", "region": "Scotland", "size": "small", "headcount": "", "founded": "1989", "tags": ["defence", "hardware", "manufacturing", "test-evaluation", "size-small", "type-sme", "type-manufacturer", "mbr-ads"], "summary": "Designer and manufacturer of high-voltage power supplies and power electronics for defence and industrial applications.", "body": "# Albacom\n\n> Designer and manufacturer of high-voltage power supplies and power electronics for defence and industrial applications.\n\n## What they do\n\nAlbacom is a Dundee-based engineering company supplying high-voltage power supplies and power electronics, with complete engineering services covering design, machining, assembly and testing. The company supplies products into military applications in international defence markets and also serves aerospace and industrial sectors. The name combines \"Alba\", an old word for Scotland, with \"com\" for the company's microwave background.\n\n## Products and solutions\n\n- **High-voltage power supplies** - engineered for defence and industrial use.\n- **Power electronics** - bespoke power electronics products.\n- **Engineering services** - mechanical design, sub-contract assembly, CNC machining, lifting and load testing, and vibration and environmental testing.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** IPC certified (IPC-A-610 and related soldering, wiring and inspection standards); BSI\n- **Memberships:** ADS Group; Scottish Engineering; Lifting Equipment Engineers Association (LEEA)\n\n## Links\n\n- Website: https://albacom.co.uk\n- LinkedIn: https://www.linkedin.com/company/albacom-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (albacom.co.uk), ADS members directory (adsgroup.org.uk), Companies House (company SC121731)."}, {"name": "Aleph Insights Limited", "website": "https://alephinsights.com/", "linkedin": "https://www.linkedin.com/company/aleph-insights", "hq": "Hoddesdon, United Kingdom", "region": "East of England", "size": "micro", "headcount": "", "founded": "2014", "tags": ["defence", "ai", "data", "cyber", "isr", "size-micro", "type-sme", "type-consultancy", "accr-ce", "accr-ce-plus", "mbr-ads"], "summary": "Analytical and data science consultancy serving defence, security and intelligence customers.", "body": "# Aleph Insights\n\n> Analytical and data science consultancy serving defence, security and intelligence customers.\n\n## What they do\n\nAleph Insights is an analytical consultancy and data science company founded in 2014 by analysts from the UK Ministry of Defence. It develops analytical, data-driven and AI-based solutions for problems where complexity is high and data quality is low. Since founding it has delivered projects across defence, security, intelligence, insurance and cyber security.\n\n## Products and solutions\n\n- **Data science R&D** - applied research and concept prototyping of analytical and data tools.\n- **Analysis and forecasting** - scenario development, probabilistic assessment and decision support.\n- **Technology roadmapping and dataset creation** - structured analytical support for technical and policy decisions.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Cyber Essentials, Cyber Essentials Plus\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://alephinsights.com/\n- LinkedIn: https://www.linkedin.com/company/aleph-insights\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, Companies House (company 09135108), ADS members directory."}, {"name": "Alford Technologies Limited", "website": "https://www.explosives.net/", "linkedin": "https://www.linkedin.com/company/alford-technologies", "hq": "Trowbridge, United Kingdom", "region": "South West England", "size": "small", "headcount": "", "founded": "1985", "tags": ["defence", "munitions", "land", "maritime", "training", "hardware", "manufacturing", "size-small", "type-sme", "type-manufacturer", "accr-iso9001", "accr-iso14001", "accr-ce", "accr-ce-plus", "mbr-ads"], "summary": "Designs and manufactures explosive charge systems for explosive ordnance disposal, counter-IED and breaching.", "body": "# Alford Technologies\n\n> Designs and manufactures explosive charge systems for explosive ordnance disposal, counter-IED and breaching.\n\n## What they do\n\nAlford Technologies designs and manufactures user-filled, patented explosive charge container systems used by explosive ordnance disposal (EOD) and counter-IED organisations in military, government and commercial sectors worldwide. Founded in 1985 by Dr Sidney Alford, it supplies explosive solutions for breaching, unexploded ordnance, conventional munitions disposal and improvised explosive device disposal. It also runs Alford Training, delivering counter-IED, EOD and breaching courses at ranges in the South West of England.\n\n## Products and solutions\n\n- **Vulcan** - shaped charge used for bomb disposal and deliberate disruption of unexploded ordnance.\n- **Krakatoa** - cutting and shaped charge for demolition and disposal tasks.\n- **Pluton** - maritime EOD kit for low-order disposal of underwater unexploded ordnance.\n- **REDS** - ROV EOD Deployment System for remote underwater disposal.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, ISO 14001, Cyber Essentials, Cyber Essentials Plus\n- **Memberships:** ADS Group, Counter-EO UK\n\n## Recent news\n\n- **2026-05-15** - Signed a memorandum of understanding with S. Carfil SA and MATE-FIN to develop EOD, breaching and explosive ordnance capabilities in Romania. [source](https://www.explosives.net/alford-romania-partners-specialist-manufacturing-eod-capabilities/)\n- **2026-04-02** - Alford's Vulcan shaped charge used in controlled disposal of a WWII bomb at Singapore Changi Airport. [source](https://www.explosives.net/alford-vulcan-defeats-uxo-singapore-airport/)\n\n## Links\n\n- Website: https://www.explosives.net/\n- LinkedIn: https://www.linkedin.com/company/alford-technologies\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, Companies House (company 01914544), ADS members directory, Counter-EO UK members directory."}, {"name": "ALL.SPACE Networks Limited", "website": "https://www.all.space/", "linkedin": "https://www.linkedin.com/company/allspaceltd", "hq": "Reading, United Kingdom", "region": "South East England", "size": "medium", "headcount": "", "founded": "2013", "tags": ["defence", "space", "comms", "rf", "hardware", "software", "size-medium", "type-scaleup", "backed-vc", "mbr-ads"], "summary": "Develops multi-orbit, multi-network satellite communications terminals for defence and government.", "body": "# ALL.SPACE Networks\n\n> Develops multi-orbit, multi-network satellite communications terminals for defence and government.\n\n## What they do\n\nALL.SPACE develops satellite communications terminals built around a single antenna that connects simultaneously to multiple satellites across different orbits (LEO, MEO, GEO, HEO) and networks. The company markets the result as resilient, jam-resistant communications-on-the-move across land, sea and air, with a dedicated government and defence line of business. It was founded in 2013 as Isotropic Systems and renamed ALL.SPACE in 2022. The company has raised approximately 160 million US dollars, with backers including Seraphim Space, Boeing, AE Industrial Partners, Promus Ventures and BOKA Group.\n\n## Products and solutions\n\n- **Hydra 2** - dual-link, multi-orbit Ka-band mobility terminal.\n- **Hydra 4** - quad-link terminal connecting military Ka, commercial Ka, Ku and L-band simultaneously.\n- **Hydra MAX** - dual-beam, full-duplex satellite communications terminal for on-the-move connectivity.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2026-04-30** - York Space Systems agreed to acquire ALL.SPACE for 355 million US dollars, with completion expected in Q3 2026. [source](https://www.satellitetoday.com/finance/2026/04/30/york-space-systems-to-acquire-terminal-developer-all-space-in-355m-deal/)\n- **2026-04** - Royal Canadian Navy selected the ALL.SPACE Hydra 4 mobility terminal for shore-based satellite communications trials. [source](https://www.all.space/insights/royal-canadian-navy-selects-all-space-hydra-4-mobility-terminal-for-shore-based-satcom-trials)\n\n## Links\n\n- Website: https://www.all.space/\n- LinkedIn: https://www.linkedin.com/company/allspaceltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, Companies House (company 08706503), SpaceNews, Via Satellite, BusinessWire."}, {"name": "Allan Webb Ltd", "website": "https://allanwebb.co.uk/", "linkedin": "https://www.linkedin.com/company/allan-webb-ltd", "hq": "Stonehouse, United Kingdom", "region": "South West England", "size": "large", "headcount": "", "founded": "1983", "tags": ["defence", "logistics", "data", "size-large", "type-sme", "type-consultancy", "accr-iso9001", "accr-iso27001", "accr-iso14001", "accr-ce-plus", "mbr-ads"], "summary": "Supportability engineering and through-life support consultancy for defence and other regulated sectors.", "body": "# Allan Webb\n\n> Supportability engineering and through-life support consultancy for defence and other regulated sectors.\n\n## What they do\n\nAllan Webb is a supportability engineering and asset-management consultancy. It provides support engineering, technical documentation, obsolescence management, NATO codification and integrated logistic support to reduce whole-life cost and increase operational availability. The company works across defence, aerospace, nuclear, rail, industrial and renewables, with many staff drawn from former Ministry of Defence inventory management roles. I rge", "headcount": "6,000+ in the UK", "founded": "", "tags": ["defence", "logistics", "training", "munitions", "software", "size-large", "type-prime", "type-integrator", "listed", "owned-foreign"], "summary": "A global engineering and project delivery company supporting UK defence, nuclear and energy programmes from its Warrington base.", "body": "# Amentum\n\n> A global engineering and project delivery company supporting UK defence, nuclear and energy programmes from its Warrington base.\n\n## What they do\n\nAmentum is a global engineering, project management and solutions integration company. Its UK arm is headquartered in Warrington and employs more than 6,000 people, providing programme, project and engineering services to major UK defence, nuclear and energy organisations. Its UK defence work includes safety and technology services for the Royal Navy's nuclear submarines, management of the UK military training estate for the Defence Infrastructure Organisation, and engineering support for the Atomic Weapons Establishment. The parent company is headquartered in Chantilly, Virginia, USA.\n\n## Products and solutions\n\n- **Submarine safety and technology services** - supporting the Royal Navy submarines that deliver Operation Relentless.\n- **Hypersonic capability development** - systems engineering, mission planning, test design and safety systems under the UK's Hypersonic Technologies and Capability Development Framework.\n- **Nuclear engineering and decommissioning** - design, safety case and project management at Sellafield and other UK nuclear sites.\n- **Training estate management** - maintenance of the UK military training estate.\n\n## Recent news\n\n- **2026-02-17** - Amentum selected to advance UK hypersonic strike capabilities, awarded a GBP 12 million Industry Mission Partner contract by Team Hypersonics UK. [source](https://www.amentum.com/news/amentum-selected-to-advance-uk-hypersonic-strike-capabilities/)\n- **2025-09-18** - Amentum announced plans to create 3,000 UK jobs amid expansion in nuclear and defence work. [source](https://www.businesswire.com/news/home/20250918182574/en/Amentum-to-Create-3000-Jobs-as-U.K.-Nuclear-Renaissance-and-Defence-Spending-Boost-Growth)\n\n## Links\n\n- Website: https://www.amentum.com\n- LinkedIn: https://www.linkedin.com/company/amentumcorp\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (amentum.com), LinkedIn company page, Companies House, Businesswire, UK Government (gov.uk)."}, {"name": "AMETEK Airtechnology Group Limited", "website": "https://www.ametek-airtechnology.com", "linkedin": "https://www.linkedin.com/company/ametek-airtechnology-group", "hq": "Basingstoke, UK", "region": "South East", "size": "large", "headcount": "", "founded": "", "tags": ["defence", "air", "sensors", "hardware", "manufacturing", "size-large", "type-manufacturer", "owned-foreign", "listed", "mbr-ads"], "summary": "Designer and manufacturer of thermal management and motion control products for aerospace and defence platforms.", "body": "# AMETEK Airtechnology Group\n\n> Designer and manufacturer of thermal management and motion control products for aerospace and defence platforms.\n\n## What they do\n\nAMETEK Airtechnology Group is a design-to-manufacture business specialising in custom, build-to-specification thermal management and motion control products for the aerospace, defence, oil and gas, and rail industries. It develops and manufactures high-integrity equipment and systems across multiple specialist facilities. It is part of AMETEK Inc., a US-listed corporation.\n\n## Products and solutions\n\n- **Thermal management** - active and passive cooling, vapour cycle systems, environmental control and air-conditioning, engine and gearbox cooling, heaters and fan heaters.\n- **Motion control** - high-performance motors, generators, alternators, electric and direct-drive fans, and advanced electro-mechanical actuators.\n- **Sensors** - angular speed and position sensors.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- None confirmed in the last 12 months from public sources at time of verification.\n\n## Links\n\n- Website: https://www.ametek-airtechnology.com\n- LinkedIn: https://www.linkedin.com/company/ametek-airtechnology-group\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (ametek-airtechnology.com), AMETEK corporate site, ADS members directory (adsgroup.org.uk/members/ametek-airtechnology-group-limited-2/)."}, {"name": "Amfax Limited", "website": "https://www.amfax.co.uk/", "linkedin": "https://www.linkedin.com/company/amfax", "hq": "Blandford Forum, United Kingdom", "region": "South West", "size": "small", "headcount": "", "founded": "1986", "tags": ["defence", "test-evaluation", "software", "hardware", "manufacturing", "size-small", "type-sme", "type-manufacturer", "fw-joscar", "accr-ce", "accr-iso9001", "mbr-ads"], "summary": "Test engineering company designing and manufacturing automated test equipment and related hardware for the aerospace and defence sectors.", "body": "# Amfax\n\n> Test engineering company designing and manufacturing automated test equipment and related hardware for the aerospace and defence sectors.\n\n## What they do\n\nAmfax designs, builds and supports automated test equipment (ATE) and test engineering solutions, alongside electronic, electrical and mechanical engineering services. It provides bespoke cable, harness and wiring loom manufacture and test fixtures. The company is a National Instruments system integrator partner, with LabVIEW and TestStand at the core of its software work.\n\n## Products and solutions\n\n- **Automated test equipment (ATE)** - design and build of PXI-based and custom test systems.\n- **Test fixtures, cables and harnesses** - bespoke interconnect and wiring loom manufacture.\n- **PCB assembly inspection** - inspection systems supplied through the Amfax A3DI brand.\n- **Test software** - LabVIEW and TestStand development, plus the SAM test executive.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS9100 Rev D; Cyber Essentials; ISO 9001.\n- **Frameworks:** JOSCAR registered.\n- **Memberships:** ADS Group; Midlands Aerospace Alliance.\n\n## Links\n\n- Website: https://www.amfax.co.uk/\n- LinkedIn: https://www.linkedin.com/company/amfax\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (amfax.co.uk), ADS Group member listing, Companies House (02079750)."}, {"name": "Amphenol Limited", "website": "https://www.amphenol.co.uk/", "linkedin": "https://www.linkedin.com/company/amphenol-ltd", "hq": "Whitstable, United Kingdom", "region": "South East", "size": "large", "headcount": "", "founded": "1963", "tags": ["defence", "hardware", "manufacturing", "air", "land", "maritime", "space", "size-large", "type-manufacturer", "owned-foreign", "listed", "mbr-ads"], "summary": "UK manufacturer of high-performance interconnect systems and connectors for military aircraft, naval, ground, space and soldier-system applications.", "body": "# Amphenol\n\n> UK manufacturer of high-performance interconnect systems and connectors for military aircraft, naval, ground, space and soldier-system applications.\n\n## What they do\n\nAmphenol Limited designs, manufactures and supplies connectors and cable assemblies for harsh-environment defence and aerospace applications. Its products cover circular and rectangular connectors, hermetic and fibre-optic connectors, cable assemblies and EMI/EMP filter connectors. The UK business is based in Whitstable, Kent, and is part of the US-listed Amphenol Corporation.\n\n## Products and solutions\n\n- **MIL-DTL-38999 circular connectors** - standard military circular interconnect range.\n- **Rhino and Raptor series** - high-power and high-voltage connectors for vehicle and electric-flight applications.\n- **Databus connectors** - MIL-STD-1553B data transmission interconnect.\n- **Fibre-optic connectors and cable assemblies** - high-speed data interconnect for airborne and ground systems.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2024-06-25** - Amphenol Ltd introduced its Molliflex flat and foldable power and data cable. [source](https://www.amphenol.co.uk/article/introducing-molliflex/)\n\n## Links\n\n- Website: https://www.amphenol.co.uk/\n- LinkedIn: https://www.linkedin.com/company/amphenol-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (amphenol.co.uk), ADS Group member listing. Amphenol Limited is the UK subsidiary of the US-listed Amphenol Corporation."}, {"name": "AMS Global Solutions", "website": "https://www.ams.global/", "linkedin": "https://www.linkedin.com/company/ams-integrated-solutions", "hq": "Exeter, United Kingdom", "region": "South West", "size": "medium", "headcount": "", "founded": "2001", "tags": ["defence", "logistics", "training", "land", "size-medium", "type-sme", "accr-iso9001", "accr-iso14001", "mbr-ads"], "summary": "Defence support services provider specialising in maintenance, repair and overhaul of military land systems and equipment.", "body": "# AMS Global Solutions\n\n> Defence support services provider specialising in maintenance, repair and overhaul of military land systems and equipment.\n\n## What they do\n\nAMS provides defence support services for military land systems and equipment, including maintenance, repair, overhaul and modernisation programmes, logistics and end-to-end supply chain. It works for governments across Europe, Asia, Africa and the Middle East. The company is also referred to as AMS Integrated Solutions and operates from offices in Exeter, Dubai and Florida.\n\n## Products and solutions\n\n- **Maintenance, Repair & Overhaul (MRO)** - through-life equipment support and modernisation programmes.\n- **Field Support Representatives (FSR)** - frontline technical support working alongside armed forces per l secondary barrier systems for aircraft.\n- **Fire protection** - fire containment products.\n- **Defence** - troop and vehicle protection solutions, including RPG protection armour and airframe restraints.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Cyber Essentials; CAA and FAA approvals.\n- **Frameworks:** JOSCAR registered.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2024-12-12** - TransDigm Group profiled the AmSafe Bridport business in its corporate spotlight series. [source](https://www.transdigm.com/2024/02/12/amsafe/)\n\n## Links\n\n- Website: https://www.amsafebridport.com/\n- LinkedIn: https://www.linkedin.com/company/amsafe-bridport\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (amsafebridport.com), ADS Group member listing, Companies House (00140449), TransDigm Group website. AmSafe Bridport Limited is a UK subsidiary of the US-listed TransDigm Group."}, {"name": "Amulet Hotkey Ltd", "website": "https://www.amulethotkey.com/", "linkedin": "https://www.linkedin.com/company/amulet-hotkey", "hq": "Newton Abbot, United Kingdom", "region": "South West", "size": "medium", "headcount": "", "founded": "1990", "tags": ["defence", "hardware", "cyber", "c2", "isr", "land", "air", "maritime", "size-medium", "type-manufacturer", "owned-uk", "mbr-ads", "mbr-techuk"], "summary": "Designer and manufacturer of secure remote computing and infrastructure for government, defence and security organisations.", "body": "# Amulet Hotkey\n\n> Designer and manufacturer of secure remote computing and infrastructure for government, defence and security organisations.\n\n## What they do\n\nAmulet Hotkey designs, manufactures and integrates secure remote computing solutions for government, defence and financial-services customers. Its infrastructure centralises compute in the data centre and delivers it to thin and zero clients and remote workstations, keeping data off endpoint devices. Products are engineered and manufactured in the UK and tested for use across land, air and sea in Five Eyes nations. The company was previously named Amulet Electronics Limited.\n\n## Products and solutions\n\n- **Secure thin and zero clients** - endpoint devices designed to keep data within the data centre, including the MagNOS zero client.\n- **CoreStation remote workstations** - dedicated high-performance remote workstation platforms (RX360, RX660).\n- **DX1500 secure client** - thin client designed for security and reliability.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group; techUK; PICMG.\n\n## Links\n\n- Website: https://www.amulethotkey.com/\n- LinkedIn: https://www.linkedin.com/company/amulet-hotkey\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (amulethotkey.com), ADS Group member listing, techUK member directory, Companies House (02505963)."}, {"name": "Analytics Engines Limited", "website": "https://analyticsengines.com/", "linkedin": "https://www.linkedin.com/company/analytics-engines", "hq": "Belfast, United Kingdom", "region": "Northern Ireland", "size": "small", "headcount": "~20", "founded": "2008", "tags": ["defence", "ai", "data", "isr", "software", "size-small", "type-sme", "type-consultancy", "owned-uk", "mbr-ads"], "summary": "Belfast data and AI company, with a defence and security capability embedding AI into hardware platforms for edge analytics.", "body": "# Analytics Engines\n\n> Belfast data and AI company, with a defence and security capability embedding AI into hardware platforms for edge analytics.\n\n## What they do\n\nAnalytics Engines helps organisations use data and artificial intelligence across AI strategy, data science, data engineering and delivery enablement. It works as a data services consultancy rather than a single-product vendor. Alongside commercial verticals it has a defence and security thread, embedding AI directly into hardware platforms for analytics at the point of collection.\n\n## y, LinkedIn company page, Companies House (13878631)."}, {"name": "Angloco Limited", "website": "https://angloco.co.uk/", "linkedin": "https://www.linkedin.com/company/angloco-limited", "hq": "Batley, United Kingdom", "region": "Yorkshire and the Humber", "size": "medium", "headcount": "", "founded": "1965", "tags": ["defence", "land", "manufacturing", "size-medium", "type-sme", "type-manufacturer", "owned-uk", "mbr-ads"], "summary": "British manufacturer of fire fighting and rescue vehicles, including airport crash tenders and vehicles for the UK Ministry of Defence.", "body": "# Angloco\n\n> British manufacturer of fire fighting and rescue vehicles, including airport crash tenders and vehicles for the UK Ministry of Defence.\n\n## What they do\n\nAngloco designs and manufactures fire fighting and rescue vehicles, with distribution and after-sales service worldwide. Its vehicles and equipment serve petro-chemical, industrial, airport, municipal, rescue and defence applications, with customers in over 50 countries. Most vehicles are custom-built to individual customer requirements.\n\n## Products and solutions\n\n- **Fire fighting vehicles** - aerial appliances, airport crash and rescue tenders, industrial and pumping appliances, tankers and special vehicles.\n- **Fire boats** - 14m to 23m fire fighting and rescue boats.\n- **Equipment** - Angloco Mist-Tech high-pressure misting systems and distributed rescue, foam and thermal imaging products.\n- **Services** - commissioning, training, service, maintenance, repair and spare parts.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group, listed under Manufacturing Organisations.\n\n## Recent news\n\n- **2025-01-31** - Selected with Emergency One to modernise Iraq's Civil Defence fleet under a UK Export Finance loan, supplying 31 vehicles, with delivery expected by March 2026. [source](https://www.gov.uk/government/news/uk-fire-engines-chosen-to-modernise-iraq-fleet)\n\n## Links\n\n- Website: https://angloco.co.uk/\n- LinkedIn: https://www.linkedin.com/company/angloco-limited\n\n## Sources\n\nPublic information verified 2026-06-29. Sources used: company website (angloco.co.uk), ADS members directory, Companies House (01958909), GOV.UK and UK Export Finance reporting. Angloco supplies fire and rescue vehicles to the UK MOD fleet under the outsourced Defence Fire and Rescue Project."}, {"name": "ANGOKA Limited", "website": "https://www.angoka.io/", "linkedin": "https://www.linkedin.com/company/angoka", "hq": "Belfast, United Kingdom", "region": "Northern Ireland", "size": "small", "headcount": "20-30", "founded": "2019", "tags": ["defence", "cyber", "software", "quantum", "type-startup", "size-small", "mbr-ads"], "summary": "Belfast cyber-security company securing machine-to-machine communications for connected systems and smart mobility.", "body": "# ANGOKA\n\n> Belfast cyber-security company securing machine-to-machine communications for connected systems and smart mobility.\n\n## What they do\n\nANGOKA is an IoT and machine-to-machine security company protecting communications for smart cities, smart mobility and connected industrial systems. Headquartered in Belfast, it has held offices in London and The Hague. Its patented approach secures the device and its identity rather than the network, safeguarding the integrity and provenance of machine-to-machine data even across untrusted networks.\n\n## Products and solutions\n\n- **Device identity and M2M security** - solutions that create trusted connections between machines, protecting communication integrity and data provenance for connected and autonomous systems.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n- **Programmes:** selected for the NCSC Cyber Accelerator.\n\n## Recent news\n\n- **2026** - ANGOKA announced an investment of around 1.8 million pounds to develop a cyber-security solution for the advanced manufacturing sector, backed by the Department for the Economy in Northern Ireland. [source](https://www.economy-ni.gov.uk/news/angoka-invest-nearly-ps2m-world-leading-cyber-security-solution-factory-future)\n\n## Links\n\n- Website: https://www.angoka.io/\n- LinkedIn: https://www.linkedin.com/company/angoka\n\n## Sources\n\nPublic information verified 2026-06-29. ANGOKA website, LinkedIn company page, Companies House, ADS Group members directory, Department for the Economy (NI), Infosecurity Magazine."}, {"name": "Anschuetz UK Ltd", "website": "https://www.anschuetz.com/who-we-are/anschuetz-uk/", "linkedin": "https://www.linkedin.com/company/anschutz-uk-ltd", "hq": "Kiel, Germany", "region": "South East England", "size": "small", "headcount": "", "founded": "2022", "tags": ["defence", "maritime", "sensors", "c2", "size-small", "type-integrator", "owned-foreign", "fw-joscar", "accr-iso9001", "accr-ce", "accr-ce-plus", "mbr-ads"], "summary": "UK naval navigation subsidiary of the German Anschütz group, supporting and integrating Royal Navy bridge and navigation systems.", "body": "# Anschuetz UK\n\n> UK naval navigation subsidiary of the German Anschütz group, supporting and integrating Royal Navy bridge and navigation systems.\n\n## What they do\n\nAnschuetz UK provides in-service support to Warship Integrated Navigation and Bridge Systems in the Royal Navy, and integrates navigation and surveillance systems in the UK. It is based at Portsdown Technology Park overlooking Portsmouth Harbour, positioned for waterfront response to ships at Portsmouth Naval Base and deploying engineers UK-wide. It is the UK entity of the Anschütz group, headquartered in Kiel, Germany, and ultimately owned by DMB Holding following the group's separation from Raytheon in 2023.\n\n## Products and solutions\n\n- **Warship Integrated Navigation and Bridge Systems** - design, integration and in-service support for Royal Navy warships including Type 45, Type 26 and Type 31.\n- **SYNAPSIS NAVAL** - integrated navigation system being installed on the Type 26 (HMS Glasgow).\n- **SMARTBLUE** - modular surveillance system for coastal surveillance and waterway management.\n- **Gyrocompasses and bridge systems** - parent group navigation portfolio including ECDIS and steering control.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR registered.\n- **Accreditations:** ISO 9001, Cyber Essentials, Cyber Essentials Plus.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026** - Completed the Factory Acceptance Test for the first Type 31 Inspiration Class warship integrated navigation and bridge system for the Royal Navy. [source](https://www.naval-technology.com/contractors/maritime-isr/raytheon-anschuetz/)\n\n## Links\n\n- Website: https://www.anschuetz.com/who-we-are/anschuetz-uk/\n- LinkedIn: https://www.linkedin.com/company/anschutz-uk-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Sources used: Anschütz UK website, ADS members directory, Companies House (14277721), Naval News and Naval Technology reporting. UK entity of the Anschütz group (Kiel, Germany), ultimate parent DMB Holding; the UK operation is a small Portsmouth-based service and integration team."}, {"name": "ANSYS UK Limited", "website": "https://www.ansys.com", "linkedin": "https://www.linkedin.com/company/ansys-inc", "hq": "Canonsburg, United States", "region": "Yorkshire and the Humber", "size": "large", "headcount": "", "founded": "1970", "tags": ["defence", "air", "simulation", "software", "test-evaluation", "size-large", "type-prime", "owned-foreign", "mbr-ads"], "summary": "UK subsidiary of Ansys, the engineering simulation software company whose tools are used across aerospace and defence.", "body": "# ANSYS UK\n\n> UK subsidiary of Ansys, the engineering simulation software company whose tools are used across aerospace and defence.\n\n## What they do\n\nAnsys develops engineering simulation software that predicts how product designs behave in real-world environments, spanning structures, fluids, electromagnetics and multiphysics. ANSYS UK Limited is the Sheffield-registered UK entity of Ansys Inc, headquartered in Canonsburg, Pennsylvania. Ansys was acquired by Synopsys in July 2025 and is now a wholly owned subsidiary of that US company. Its simulation tools are used across aerospace and defence, supported by a dedicated public defence industry programme.\n\n## Products and solutions\n\n- **Ansys Mechanical** - structural finite element analysis.\n- **Ansys Fluent** - computational fluid dynamics for fluid flow, heat transfer and reactions.\n- **Ansys HFSS** - 3D electromagnetic simulation used for antenna design in aerospace and defence.\n- **Ansys LS-DYNA** - explicit multiphysics for crash and impact, used in aerospace and military structural analysis.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group, listed under Professional Services.\n\n## Recent news\n\n- **2025-07-17** - Synopsys completed its acquisition of Ansys; Ansys common stock was delisted from NASDAQ. [source](https://news.synopsys.com/2025-07-17-Synopsys-Completes-Acquisition-of-Ansys)\n\n## Links\n\n- Website: https://www.ansys.com\n- LinkedIn: https://www.linkedin.com/company/ansys-inc\n\n## Sources\n\nPublic information verified 2026-06-29. Sources used: Ansys website including its defence industry page, ADS members directory, Companies House (03917515), Synopsys acquisition press release. UK entity of Ansys Inc (Canonsburg, USA), now owned by Synopsys; LinkedIn line is the global Ansys company page."}, {"name": "Antillion", "website": "https://www.antillion.com/", "linkedin": "https://uk.linkedin.com/company/antillion", "hq": "Bristol, United Kingdom", "region": "South West", "size": "small", "headcount": "", "founded": "2011", "tags": ["defence", "hardware", "software", "data", "manufacturing", "integrator", "size-small", "type-sme", "owned-uk"], "summary": "Defence and security product and services company designing deployable, ruggedised edge-computing systems.", "body": "# Antillion\n\n> Defence and security product and services company designing deployable, ruggedised edge-computing systems.\n\n## What they do\n\nAntillion is a product and services company based in Bristol, focused on the defence and security sectors. It designs edge-computing solutions that bring data-centre performance to defence, first-responder and security teams operating in challenging environments. The company has in-house mechanical and software design and build capability and integrates its systems into customer platforms. Antillion has over a decade of experience supporting NATO and UK MOD programmes, with UK offices in Bristol, Aylesbury and Tring and a US presence in Herndon, Virginia.\n\n## Products and solutions\n\n- **PACE FRONTIER** - purpose-built rugged edge compute platform for tactical field use, with a modular, shock-resistant design for secure high-performance computing in extreme environments.\n- **PACE AIR** - edge computing platform for high-performance data processing tailored to specific operational contexts.\n- **Deployable ruggedised systems** - tactical cloud and edge orchestration capabilities, including Azure Stack HCI deployments and automation.\n\n## Frameworks, accreditations and memberships\n\n- **Partnerships:** systems integrator for Everfox cross-domain and high-assurance cyber security capabilities.\n\n## Recent news\n\n- **2026-03-31** - Antillion announced a partnership with Everfox to expand secure, deployable edge capabilities, embedding Everfox technologies into the PACE AIR and FRONTIER platforms and acting as an Everfox systems integrator. [source](https://www.defenseadvancement.com/news/antillion-enters-partnership-to-secure-expand-deployable-edge-capabilities/)\n\n## Links\n\n- Website: https://www.antillion.com/\n- LinkedIn: https://uk.linkedin.com/company/antillion\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (antillion.com), LinkedIn company page, Defense Advancement, Companies House (07887122)."}, {"name": "APC Technology Group Ltd", "website": "https://apctech.com", "linkedin": "https://www.linkedin.com/company/apc-technology-group", "hq": "Rochester, UK", "region": "South East", "size": "medium", "headcount": "", "founded": "1982", "tags": ["defence", "rf", "comms", "hardware", "sensors", "electronics", "size-medium", "type-sme", "type-integrator", "owned-uk", "fw-joscar", "accr-iso9001", "accr-ce-plus", "mbr-ads"], "summary": "Specialist distributor and systems integrator of electronic components and sub-systems for the defence, avionics and aerospace sectors.", "body": "# APC Technology Group\n\n> Specialist distributor and systems integrator of electronic components and sub-systems for the defence, avionics and aerospace sectors.\n\n## What they do\n\nAPC Technology Group is a UK and Ireland distributor and specialist for over 100 global electronic-technology manufacturers, providing design-in, specification and sourcing of specialist electronic components, control technologies and connectivity products. Its main focus, accounting for the majority of its sales, is the defence, avionics and aerospace sectors, where mission-critical reliability is required. It supports defence manufacturers and military primes with high-reliability and MIL-STD technology for naval, land and avionic applications. It is part of Certify Holdings.\n\n## Products and solutions\n\n- **Defence-grade computing** - rugged laptops, tablets and displays, high-performance computing and MIL-STD VPX solutions for C4IS and military networking, built to SWaP-C constraints.\n- **RF and microwave** - RF sensors, military-spec connectors and sub-systems for secure communications, navigation, electronic warfare and radar.\n- **Mission-critical components** - analogue and mixed-signal ICs for flight control, navigation and engine management; rigid-flex PCBs; power and protection solutions.\n- **Component sourcing and testing** - anti-counterfeit and electrical testing to AS6171 for UK defence and aerospace customers.\n- **SCIF** - turnkey design and installation of Secure Compartmented Information Facilities.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR registered.\n- **Accreditations:** ISO 9001, AS9120, Cyber Essentials Plus.\n- **Memberships:** ADS Group, UKspace.\n\n## Recent news\n\n- **2026-01-21** - Extended its distribution agreement with Gotmic for millimetre-wave parts into Italy. [source](https://apctech.com)\n- **2025-09** - Exhibited at DSEI 2025 on the Certify Holdings stand and signed distribution agreements including DDC-I and Winchester Interconnect. [source](https://apctech.com/news/apc-strengthens-its-specialist-electronic-components-and-systems-offering-for-mission-critical-aerospace-and-defence-applications-at-dsei-2025.html)\n\n## Links\n\n- Website: https://apctech.com\n- LinkedIn: https://www.linkedin.com/company/apc-technology-group\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (apctech.com), Companies House (company 01635609), ADS members directory (adsgroup.org.uk/members/apc-technology-group-ltd-1/), DDC-I press release."}, {"name": "Apec Systems Limited", "website": "https://apecsystems.co.uk", "linkedin": "", "hq": "Coventry, UK", "region": "West Midlands", "size": "small", "headcount": "", "founded": "2007", "tags": ["defence", "isr", "sensors", "optronics", "surveillance", "hardware", "manufacturing", "size-small", "type-sme", "type-manufacturer", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "UK designer and manufacturer of bespoke covert camera and video surveillance systems for police, government and military customers.", "body": "# Apec Systems\n\n> UK designer and manufacturer of bespoke covert camera and video surveillance systems for police, government and military customers.\n\n## What they do\n\nApec Systems is an independently owned UK designer and manufacturer of bespoke camera and covert video surveillance solutions. It has operated in the government, law enforcement and security sectors for over 15 years, supplying short, medium and long-range surveillance camera systems to police, government agencies and military customers globally. The company emphasises VIP protection and operational surveillance.\n\n## Products and solutions\n\n- **Covert video surveillance systems** - bespoke camera solutions for short, medium and long-range surveillance.\n- **Surveillance vehicle conversions** - whole-vehicle platform integration for mobile surveillance.\n- **Deployed observation systems** - off-vehicle stand-off observation and intelligence gathering.\n- **Camera technologies** - low-light, pan-and-tilt, thermal and infrared imaging, and CCTV/ANPR cameras with control systems.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001:2015.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026** - Listed as an exhibitor at Security & Policing 2026. [source](https://www.securityandpolicing.co.uk/exhibitors/exhibitors-list-2026/apec-systems-limited/)\n\n## Links\n\n- Website: https://apecsystems.co.uk\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (apecsystems.co.uk), Companies House (company 06418325), ADS members directory (adsgroup.org.uk/members/apec-systems-limited-2/), Security & Policing 2026 exhibitor listing."}, {"name": "APEL Limited", "website": "https://apel-ltd.com", "linkedin": "https://www.linkedin.com/company/apel-ltd", "hq": "Wilmslow, UK", "region": "North West", "size": "small", "headcount": "", "founded": "1965", "tags": ["defence", "air", "hardware", "manufacturing", "size-small", "type-sme", "type-manufacturer", "owned-uk", "fw-joscar", "mbr-ads"], "summary": "Manufacturer of precision fasteners and machined components for the aerospace and defence industry.", "body": "# APEL\n\n> Manufacturer of precision fasteners and machined components for the aerospace and defence industry.\n\n## What they do\n\nAPEL Limited, established in 1965, is a manufacturer and supplier of precision fasteners and machined parts to the aerospace and defence industry. It supplies a worldwide customer base from its facility in Wilmslow, Cheshire. Its stated customers include BAE Systems, Airbus, Spirit AeroSystems, Bombardier and Beechcraft.\n\n## Products and solutions\n\n- **Precision aerospace fasteners** - bolts, nuts and machined fastening components for airframe and aircraft applications.\n- **Precision machined parts** - CNC-turned and milled components for aerospace and defence platforms, produced on sliding-head lathes and machining centres with CMM inspection.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR registered.\n- **Accreditations:** Nadcap; BSI-certified quality management.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://apel-ltd.com\n- LinkedIn: https://www.linkedin.com/company/apel-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (apel-ltd.com), Companies House (company 00851208), Airframer company profile."}, {"name": "APPH Limited", "website": "https://apph.com", "linkedin": "https://www.linkedin.com/company/apph-ltd", "hq": "Longueuil, Canada", "region": "North West", "size": "large", "headcount": "~400", "founded": "1985", "tags": ["defence", "air", "hardware", "manufacturing", "logistics", "size-large", "type-manufacturer", "owned-foreign", "accr-iso9001", "accr-itar", "mbr-ads"], "summary": "UK manufacturer of landing gear and hydraulic systems for civil and military aircraft, part of Canada's Heroux-Devtek.", "body": "# APPH\n\n> UK manufacturer of landing gear and hydraulic systems for civil and military aircraft, part of Canada's Heroux-Devtek.\n\n## What they do\n\nAPPH, trading as Heroux-Devtek UK, is a supplier of landing gear solutions for all aircraft types, including military helicopters, fighter jets, civil airliners and business jets. It designs, engineers, manufactures and provides aftermarket support for landing gear and hydraulic systems and sub-systems for fixed and rotary wing aircraft, for both OEM and aftermarket. It operates UK sites at Runcorn (Cheshire) and Kirkby-in-Ashfield (Nottinghamshire). It is part of Heroux-Devtek Inc. of Quebec, Canada, which was taken private by US firm Platinum Equity in February 2025.\n\n## Products and solutions\n\n- **Landing gear systems** - design and manufacture for fixed and rotary wing aircraft. Design programmes include the BAE Hawk, Saab Gripen, AW101 Merlin, Leonardo C-27J Spartan, and components for the Embraer KC-390.\n- **Hydraulic systems** - assemblies for landing gear and aircraft systems.\n- **Aerospace filtration** - fuel and oil filters.\n- **Aftermarket and MRO** - spares, overhaul and support, including MoD and US military fleet support.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS9100, ISO 9001, Nadcap, EASA Part 145, ITAR.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025-02-11** - Heroux-Devtek, APPH's parent, completed its acquisition by Platinum Equity and delisted from the TSX. [source](https://www.platinumequity.com/news/platinum-equity-completes-acquisition-of-heroux-devtek/)\n\n## Links\n\n- Website: https://apph.com\n- LinkedIn: https://www.linkedin.com/company/apph-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (apph.com), Companies House (company 01972451), ADS members directory (adsgroup.org.uk/members/apph-limited-2/), Heroux-Devtek and Platinum Equity press releases."}, {"name": "Applied Intuition UK Ltd", "website": "https://www.appliedintuition.com", "linkedin": "", "hq": "Mountain View, United States", "region": "", "size": "small", "headcount": "", "founded": "2025", "tags": ["defence", "autonomy", "simulation", "software", "ai", "maritime", "land", "air", "space", "size-small", "type-sme", "owned-foreign", "mbr-ads"], "summary": "UK subsidiary of Applied Intuition, providing autonomy software and simulation tooling for defence platforms across air, land, sea and space.", "body": "# Applied Intuition UK\n\n> UK subsidiary of Applied Intuition, providing autonomy software and simulation tooling for defence platforms across air, land, sea and space.\n\n## What they do\n\nApplied Intuition UK is the UK arm of Applied Intuition, a vehicle intelligence company headquartered in Mountain View, California. The UK subsidiary was established to deliver autonomy management and development systems for existing and next-generation defence platforms. It describes itself as a sovereign UK subsidiary working across air, space, land and sea domains.\n\n## Products and solutions\n\n- **Axion** - mission-critical toolchain for delivering and operating collaborative autonomy in contested environments, including the Axion Sim simulation product.\n- **Acuity** - autonomy software deployed directly onto the vehicle.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-05-28** - Applied Intuition opened its UK office in London, launching the UK subsidiary. [source](https://www.appliedintuition.com/press-releases/applied-intuition-opens-uk-office)\n- **2025** - Applied Intuition UK partnered with Kraken Technology Group, which will use Axion Sim for autonomous surface vehicle work. [source](https://www.appliedintuition.com/news/applied-intuition-uk-teams-with-kraken-technology-group)\n\n## Links\n\n- Website: https://www.appliedintuition.com\n- Defence site: https://www.appliedintuitiondefense.com\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: Companies House (company 16223681), ADS members directory, Applied Intuition press releases and blog, European Security & Defence."}, {"name": "Applied Space Solutions Limited", "website": "http://www.appliedspace.co.uk", "linkedin": "", "hq": "Camberley, United Kingdom", "region": "South East", "size": "small", "headcount": "", "founded": "2017", "tags": ["defence", "space", "isr", "sensors", "data", "ai", "size-small", "type-sme", "owned-uk", "mbr-ads"], "summary": "Aerospace engineering and systems company focused on space domain awareness, space situational awareness and space related analytics.", "body": "# Applied Space Solutions\n\n> Aerospace engineering and systems company focused on space domain awareness, space situational awareness and space related analytics.\n\n## What they do\n\nApplied Space Solutions is a privately owned aerospace engineering, system design and implementation company established in 2017 to carry out applied research in aerospace and defence. It focuses on space related analytics, applications and services, drawing on experience in the design, manufacture, launch and operation of space based systems. The company advocates for the responsible and sustainable use of space.\n\n## Products and solutions\n\n- **Space domain awareness** - astrodynamics, deep learning and object classification research.\n- **Flight dynamics software** - software for space object detection and tracking.\n- **Space traffic management** - capabilities supporting space situational awareness.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: http://www.appliedspace.co.uk\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: Companies House (company 10713029), ADS members directory, company website."}, {"name": "Appvia Ltd", "website": "https://www.appvia.io", "linkedin": "", "hq": "London, United Kingdom", "region": "London", "size": "medium", "headcount": "", "founded": "2017", "tags": ["defence", "cyber", "software", "data", "size-medium", "type-sme", "owned-uk", "fw-gcloud", "mbr-ads"], "summary": "Cloud platform engineering company providing self-service cloud provisioning, internal developer platforms and cloud consulting to regulated and public sector organisations.", "body": "# Appvia\n\n> Cloud platform engineering company providing self-service cloud provisioning, internal developer platforms and cloud consulting to regulated and public sector organisations.\n\n## What they do\n\nAppvia builds and operates secure cloud platforms, combining engineering services with open-source tooling. Its public self-description notes a UK-based, SC-cleared engineering team, and that its founders designed and delivered a Home Office cloud platform. It works across government, defence and finance in regulated, high-compliance environments.\n\n## Products and solutions\n\n- **Wayfinder** - self-service platform for cloud provisioning across AWS, Azure and GCP, with policy-enforced access controls.\n- **Cloud and platform services** - cloud architecture, automation, security and cost optimisation.\n- **Internal developer platforms, data platforms and landing zones.**\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** G-Cloud (Digital Marketplace supplier)\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.appvia.io\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: Companies House (company 10653692), ADS members directory, company website, UK Digital Marketplace (G-Cloud), AWS Partner directory."}, {"name": "APS Aegis Limited", "website": "http://www.apsaegis.co.uk", "linkedin": "", "hq": "Hove, United Kingdom", "region": "South East", "size": "small", "headcount": "", "founded": "2007", "tags": ["defence", "sensors", "counter-uas", "maritime", "land", "manufacturing", "size-small", "type-manufacturer", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Specialist provider of high security perimeter protection, access control, detection and monitoring systems.", "body": "# APS Aegis\n\n> Specialist provider of high security perimeter protection, access control, detection and monitoring systems.\n\n## What they do\n\nAPS Aegis supplies high security perimeter protection, access control, detection and monitoring systems for sensitive and critical sites. It offers land and marine protection, detection systems ranging from land-based stations to drone detection, access control with biometric integration, and full turnkey security solutions including installation and maintenance.\n\n## Products and solutions\n\n- **Anti-ram products** - tested and certified (K4, K12 and British Standards) rising road blockers, automatic bollards and a Tyre Killer Barrier System to protect against vehicular attack.\n- **Detection systems** - passive and discreet sensor systems including land-based stations and drone detection, for ports, harbours, pipelines and other critical applications.\n- **Access control** - centrally logged personnel and visitor control with biometric recognition integration.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001; Achilles (UVDB, FPAL, Source Select); CHAS; Construction Line; Safe Contractor\n- **Memberships:** ADS Group; United Nations supplier registration\n\n## Links\n\n- Website: http://www.apsaegis.co.uk\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: Companies House (company 06192679), ADS members directory, company website."}, {"name": "APSYS Risk Engineering Limited", "website": "http://www.apsys.eads.net", "linkedin": "", "hq": "Paris, France", "region": "South West", "size": "medium", "headcount": "", "founded": "2011", "tags": ["defence", "air", "test-evaluation", "size-medium", "type-consultancy", "owned-foreign", "mbr-ads"], "summary": "Risk management and safety engineering consultancy, an Airbus Group subsidiary, supporting aerospace and defence certification.", "body": "# APSYS Risk Engineering\n\n> Risk management and safety engineering consultancy, an Airbus Group subsidiary, supporting aerospace and defence certification.\n\n## What they do\n\nAPSYS is an engineering services company headquartered in Paris and a subsidiary of the Airbus Group, with operations including the UK. Its public self-description covers systems safety and certification, process
