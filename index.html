 airlines, original equipment manufacturers and governments. The company is headquartered in the Chicago area and operates across multiple countries, including a presence in the United Kingdom. AAR is listed on the New York Stock Exchange.\n\n## Products and solutions\n\n- **MRO services** - airframe maintenance, repair and overhaul for commercial, defence and government fleets.\n- **Supply chain and parts** - parts distribution and supply chain programmes for aircraft operators.\n- **Shelter and sustainment systems** - mobility and sustainment products for government and defence customers.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2025** - AAR signed an exclusive defence distribution agreement with AmSafe Bridport. [source](https://www.prnewswire.com/news-releases/aar-signs-exclusive-defense-distribution-agreement-with-amsafe-bridport-302541488.html)\n\n## Links\n\n- Website: https://www.aarcorp.com/\n- LinkedIn: https://www.linkedin.com/company/aar-corp\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, AAR CORP. website, PR Newswire, GlobalData company profile."}, {"name": "Abbattis Risk Management Ltd", "website": "https://www.abbattis.com/", "linkedin": "", "hq": "Zurich, Switzerland", "region": "", "size": "micro", "headcount": "", "founded": "", "tags": ["defence", "size-micro", "cyber", "type-sme", "type-consultancy", "owned-foreign", "mbr-ads"], "summary": "International security and risk management consultancy serving defence, critical national infrastructure and other sectors.", "body": "# Abbattis Risk Management\n\n> International security and risk management consultancy serving defence, critical national infrastructure and other sectors.\n\n## What they do\n\nAbbattis Risk Management has provided security and risk management consultancy since 2007. Its work includes security risk and design consulting, business continuity and crisis management, due diligence and analysis, close protection and maritime security, information and cyber security, and technical surveillance countermeasures. It states experience in critical national infrastructure, defence and national security, including military basecamp and defence infrastructure design and the safe storage of ammunition. The company operates globally, is registered in Switzerland and the United Arab Emirates, and has a UK-registered entity. It is listed by ADS under counter-terrorism and intelligence services.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group. Staff are listed on the UK Register of Security Engineers and Specialists (RSES).\n\n## Links\n\n- Website: https://www.abbattis.com/\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, Abbattis website, Companies House (16477900)."}, {"name": "ABSL Power Solutions Ltd", "website": "https://www.enersys.com/en-gb/products/batteries/absl/", "linkedin": "https://uk.linkedin.com/company/absl-power-solutions-ltd", "hq": "Reading, Pennsylvania, USA", "region": "South East England", "size": "medium", "headcount": "", "founded": "1993", "tags": ["defence", "size-medium", "hardware", "manufacturing", "space", "land", "maritime", "air", "type-manufacturer", "owned-foreign", "listed", "mbr-ads"], "summary": "Designer and manufacturer of lithium-ion and other batteries and power solutions for defence, space and aerospace.", "body": "# ABSL Power Solutions\n\n> Designer and manufacturer of lithium-ion and other batteries and power solutions for defence, space and aerospace.\n\n## What they do\n\nABSL Power Solutions researches, designs and manufactures rechargeable and non-rechargeable batteries, charging solutions, lithium-ion cells and control electronics. It serves defence, space, aerospace, marine and industrial markets. ABSL builds batteries used in military radios and portable communication systems, and in unmanned aerial, undersea and ground vehicles. The UK operation is based at Culham Science Centre in Oxfordshire. ABSL has its roots in AEA Technology and was acquired by the US company EnerSys in 2011; the ABSL brand now sits within EnerSys, which is listed on the New York Stock Exchange.\n\n## Products and solutions\n\n- **ABSL lithium-ion batteries** - battery packs for military vehicles, aircraft, submarines, underwater vehicles, missiles and weapons.\n- **Soldier and communications power** - batteries for military radios and portable communication systems.\n- **Space batteries** - batteries supplied for satellite and space mission systems.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001 (EnerSys quality certification).\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.enersys.com/en-gb/products/batteries/absl/\n- LinkedIn: https://uk.linkedin.com/company/absl-power-solutions-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group member directory, EnerSys ABSL product pages, Companies House (02840892), ABSL Power Solutions LinkedIn company page."}, {"name": "Accles and Pollock Limited", "website": "https://acclesandpollock.co.uk/", "linkedin": "https://uk.linkedin.com/company/accles-and-pollock-limited", "hq": "Oldbury, England", "region": "West Midlands", "size": "small", "headcount": "", "founded": "1896", "tags": ["defence", "size-small", "manufacturing", "hardware", "air", "type-sme", "type-manufacturer", "owned-uk", "fw-joscar", "accr-iso9001", "accr-iso14001", "mbr-ads"], "summary": "Manufacturer of precision manipulated tube assemblies for aerospace, defence and other high-integrity applications.", "body": "# Accles & Pollock\n\n> Manufacturer of precision manipulated tube assemblies for aerospace, defence and other high-integrity applications.\n\n## What they do\n\nAccles & Pollock manufactures low-volume, precision manipulated tube assemblies for high-integrity applications across the aerospace, defence, automotive and nuclear sectors. Based in the West Midlands, the company offers tube manipulation, CNC machining, assembly and testing, with components supplied with full product traceability. The business traces its origins to 1896.\n\n## Products and solutions\n\n- **Tube assemblies** - rigid and flexible pipes, ducts, tube coils, convoluted tube, fuel fillers and structural assemblies in materials including stainless steel, nickel alloys, inconel and titanium.\n- **Fluid management systems** - bespoke tubular products for high-specification applications.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR (achieved 2024)\n- **Accreditations:** AS9100, ISO 9001, ISO 14001, NADCAP for welding and brazing, IATF 16949\n- **Memberships:** ADS Group, Midlands Aerospace Alliance\n\n## Recent news\n\n- **2024-08** - Accles & Pollock achieved JOSCAR accreditation. [source](https://midlandsaerospace.org.uk/accles-and-pollock-news-aug24)\n\n## Links\n\n- Website: https://acclesandpollock.co.uk/\n- LinkedIn: https://uk.linkedin.com/company/accles-and-pollock-limited\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, LinkedIn company page, ADS members directory, Companies House (09931307), Midlands Aerospace Alliance."}, {"name": "Accord Global Technology Solutions Private Limited", "website": "https://www.altengt.com/", "linkedin": "https://in.linkedin.com/company/accord-global-technology-solutions-private-limited", "hq": "Bangalore, India", "region": "", "size": "large", "headcount": "", "founded": "1991", "tags": ["defence", "size-large", "software", "air", "space", "type-sme", "owned-foreign", "mbr-ads"], "summary": "Engineering services company specialising in GNSS technology for aerospace, defence and space applications.", "body": "# Accord Global Technology Solutions\n\n> Engineering services company specialising in GNSS technology for aerospace, defence and space applications.\n\n## What they do\n\nAccord Global Technology Solutions is an engineering services company with expertise in Global Navigation Satellite System (GNSS) technology, providing engineering services across aerospace, automotive and digital technology. The business is headquartered in Bangalore, India, and supplies GNSS-based solutions for strategic and space programmes, including work for the Defence Research and Development Organisation and the Indian Space Research Organisation. It is an ADS member with a UK presence.\n\nThe company was acquired by Alten S.A. in June 2023 and subsequently renamed ALTEN Global Technologies Private Limited.\n\n## Products and solutions\n\n- **GNSS receivers** - GNSS-based receivers and solutions, including dual-frequency IRNSS/NavIC receivers, for aerospace, automotive, industrial and timing applications.\n- **Embedded engineering services** - product engineering for avionics and real-time embedded systems.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2023-06** - Alten S.A. acquired Accord Global Technology Solutions, which was renamed ALTEN Global Technologies. [source](https://www.alten.com/wp-content/uploads/2023/09/AGTSPL-Press-Release-ENG.pdf)\n\n## Links\n\n- Website: https://www.altengt.com/\n- LinkedIn: https://in.linkedin.com/company/accord-global-technology-solutions-private-limited\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory, company and ALTEN websites, LinkedIn company page, ALTEN acquisition press release."}, {"name": "Accrofab (Alcester) Limited", "website": "https://www.accrofab.co.uk/", "linkedin": "https://uk.linkedin.com/company/accrofab", "hq": "Alcester, England", "region": "West Midlands", "size": "small", "headcount": "", "founded": "2018", "tags": ["defence", "size-small", "manufacturing", "hardware", "air", "type-sme", "type-manufacturer", "owned-uk", "accr-iso9001", "accr-itar", "mbr-ads"], "summary": "Manufacturer of fabricated and machined components for the aerospace, defence and power generation sectors.", "body": "# Accrofab\n\n> Manufacturer of fabricated and machined components for the aerospace, defence and power generation sectors.\n\n## What they do\n\nAccrofab manufactures complex, high-precision machined and fabricated components, with experience in hard alloys and exotic materials. Capabilities include laser cutting, fabrication, welding, superplastic forming and heat treatment, supporting new product introduction, volume production and legacy platforms. The company operates UK facilities including sites in Alcester and Derby, the latter established in 1977.\n\n## Products and solutions\n\n- **Fabricated and machined components** - precision parts for commercial and military engine programmes and airframe platforms.\n- **End-to-end manufacturing** - laser cutting, welding, superplastic forming and heat treatment under one supplier.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS9100, ISO 9001; ITAR-capable facilities\n- **Memberships:** ADS Group, Midlands Aerospace Alliance\n\n## Links\n\n- Website: https://www.accrofab.co.uk/\n- LinkedIn: https://uk.linkedin.com/company/accrofab\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, LinkedIn company page, ADS members directory, Companies House (11700293), Midlands Aerospace Alliance."}, {"name": "ACLAS Technics Limited", "website": "https://aclastechnics.com/", "linkedin": "https://uk.linkedin.com/company/aclastechnics", "hq": "Livingston, Scotland", "region": "Scotland", "size": "small", "headcount": "", "founded": "2002", "tags": ["defence", "size-small", "manufacturing", "air", "type-sme", "owned-uk", "fw-joscar", "mbr-ads"], "summary": "Aviation service provider offering repair, overhaul and inspection of flight controls and structural components.", "body": "# ACLAS Technics\n\n> Aviation service provider offering repair, overhaul and inspection of flight controls and structural components.\n\n## What they do\n\nACLAS Technics is an aviation service provider offering repair, overhaul and inspection of flight controls, leading edges and structural components, with work focused on ATR, Boeing and Airbus aircraft and serving airlines, OEMs and lessors. The company is based in Livingston, Scotland, and is a signatory to the UK Armed Forces Covenant.\n\n## Products and solutions\n\n- **Component repair and overhaul** - repair, overhaul and inspection of flight controls, leading edges and structural components.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** JOSCAR\n- **Accreditations:** EASA / FAA / TCCA Part 145 component repair organisation\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025** - ACLAS Technics confirmed its commitment to the UK Armed Forces Covenant. [source](https://aclastechnics.com/aclas-technics-is-committed-to-the-uk-armed-forces-covenant/)\n\n## Links\n\n- Website: https://aclastechnics.com/\n- LinkedIn: https://uk.linkedin.com/company/aclastechnics\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, LinkedIn company page, ADS members directory, Companies House (SC229729), GOV.UK Armed Forces Covenant."}, {"name": "Actica Consulting", "website": "https://www.actica.co.uk/", "linkedin": "https://uk.linkedin.com/company/actica-consulting", "hq": "Guildford, United Kingdom", "region": "South East", "size": "medium", "headcount": "~224", "founded": "1997", "tags": ["defence", "cyber", "software", "data", "size-medium", "type-consultancy", "owned-uk", "prog-dasa"], "summary": "Independent, UK-owned technology and management consultancy supporting public sector, defence and national security programmes.", "body": "# Actica Consulting\n\n> Independent, UK-owned technology and management consultancy supporting public sector, defence and national security programmes.\n\n## What they do\n\nActica Consulting is an independent, UK-owned technology and management consultancy based at Surrey Research Park, Guildford. It supports complex, high-security and mission-critical digital transformation programmes across the UK public sector, bringing architecture, data, cyber, transformation and engineering specialisms. The company has experience in defence, police, central and local government, and specialises in supporting the acquisition of ICT solutions, working across both waterfall and agile delivery methodologies.\n\n## Products and solutions\n\n- **Architecture and engineering consultancy** - enterprise and solution architecture support across defence and government programmes from inception to closedown.\n- **Cyber security consultancy** - NCSC-assured services in risk management and security architecture.\n- **Data and transformation services** - advisory support for data and digital transformation programmes.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** NCSC Assured Cyber Security Consultancy (Risk Management and Security Architecture).\n\n## Recent news\n\n- No dated public news items confirmed within the last 12 months as at 2026-06-29.\n\n## Links\n\n- Website: https://www.actica.co.uk/\n- LinkedIn: https://uk.linkedin.com/company/actica-consulting\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (actica.co.uk), LinkedIn company page, NCSC organisation listing, Companies House (03396854)."}, {"name": "ACUA Ocean Limited", "website": "https://www.ocean.tech/", "linkedin": "https://www.linkedin.com/company/acua-ocean", "hq": "Plymouth, United Kingdom", "region": "South West", "size": "micro", "headcount": "", "founded": "2020", "tags": ["defence", "maritime", "autonomy", "isr", "sensors", "type-startup", "size-micro", "owned-uk"], "summary": "UK developer of long-endurance uncrewed surface vessels for maritime security, defence and offshore operations.", "body": "# ACUA Ocean\n\n> UK developer of long-endurance uncrewed surface vessels for maritime security, defence and offshore operations.\n\n## What they do\n\nACUA Ocean designs and builds uncrewed surface vessels (USVs) for ocean monitoring, data collection and maritime security. The company, based at Turnchapel Wharf in Plymouth, focuses on long-endurance platforms built around stable hull designs intended to operate in high sea states for extended periods.\n\n## Products and solutions\n\n- **Pioneer USV** - a medium uncrewed surface vessel built on a SWATH hull for stability and endurance, used for tasks including surface ISR, sonar deployment and towed-array operation. ACUA states Pioneer was certified under the MCA Workboat Code 3.\n- **Medium USV design (MROS)** - a larger long-endurance uncrewed surface vessel concept with naval and civilian applications, developed under UK government-backed work.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Pioneer certified under the MCA Workboat Code 3.\n- **Memberships:** Society of Maritime Industries.\n\n## Recent news\n\n- **2026** - ACUA Ocean and HydroSurv announced their intention to merge, forming a combined UK maritime autonomy company. [source](https://www.maritimeindustries.org/news/acua-ocean-and-hydrosurv-announce-intention-merge)\n\n## Links\n\n- Website: https://www.ocean.tech/\n- LinkedIn: https://www.linkedin.com/company/acua-ocean\n\n## Sources\n\nPublic information verified 2026-06-29. ACUA Ocean website, LinkedIn company page, Companies House, Society of Maritime Industries, Navy Lookout, MarineLink."}, {"name": "Acuity Risk Management Limited", "website": "https://acuityrm.com/", "linkedin": "https://uk.linkedin.com/company/acuity-risk-management", "hq": "London, England", "region": "London", "size": "small", "headcount": "", "founded": "2019", "tags": ["defence", "size-small", "cyber", "software", "data", "type-sme", "owned-uk", "listed", "mbr-ads"], "summary": "Provider of the STREAM cyber governance, risk and compliance software platform.", "body": "# Acuity Risk Management\n\n> Provider of the STREAM cyber governance, risk and compliance software platform.\n\n## What they do\n\nAcuity Risk Management provides cyber governance, risk and compliance (GRC) software that helps organisations identify, assess and manage cyber security, IT and operational risks. Its clients operate in markets including government, defence, broadcasting, utilities, manufacturing and healthcare. The company is a wholly owned subsidiary of Acuity RM Group plc, whose shares trade on AIM under the ticker ACRM.\n\n## Products and solutions\n\n- **STREAM** - cyber GRC platform that collects and analyses data to present cyber risk in business terms, available as STREAM Cloud for rapid deployment and STREAM Classic for enterprise-scale modelling.\n- **Vendor Management Hub** - supplier and vendor risk management software.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2026-03** - Acuity Risk Management launched STREAM Cloud, a cloud-native edition of the STREAM platform aimed at the mid-market. [source](https://news.cision.com/acuity-rm-group-plc/r/acuity-risk-management-launches-stream--cloud,c4321795)\n- **2025** - Acuity RM won a defence sector contract for cyber-security software. [source](https://www.directorstalkinterviews.com/acuity-rm-wins-defence-sector-contract-for-cyber-security-software/4121221936)\n\n## Links\n\n- Website: https://acuityrm.com/\n- LinkedIn: https://uk.linkedin.com/company/acuity-risk-management\n\n## Sources\n\nPublic information verified 2026-06-29. Company website, LinkedIn company page, ADS members directory, Companies House (12369714), Acuity RM Group plc announcements."}, {"name": "Acumen Cyber Ltd", "website": "https://acumencyber.com/", "linkedin": "https://uk.linkedin.com/company/acumen-cyber", "hq": "Glasgow, United Kingdom", "region": "Scotland", "size": "small", "headcount": "", "founded": "2023", "tags": ["defence", "cyber", "size-small", "type-sme", "owned-founder", "accr-ce-plus", "accr-iso9001", "accr-iso27001", "accr-iso14001", "mbr-ads"], "summary": "Managed security services provider running a 24/7 CREST-accredited Security Operations Centre.", "body": "# Acumen Cyber\n\n> Managed security services provider running a 24/7 CREST-accredited Security Operations Centre.\n\n## What they do\n\nAcumen Cyber is a UK-based managed security services provider delivering enterprise-grade cyber defence to organisations of varying sizes. The company operates a 24/7 CREST-accredited Security Operations Centre, with each customer assigned a named SOC client lead. Its work includes threat monitoring, detection and response, drawing on technology partners including CrowdStrike, Elastic, Fortinet and Barracuda.\n\n## Products and solutions\n\n- **Managed SOC** - 24/7 CREST-accredited Security Operations Centre delivering monitoring, detection and incident response.\n- **Threat exposure management** - continuous validation of defensive controls using adversary emulation mapped to MITRE ATT&CK.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, ISO 14001, ISO 27001:2022, Cyber Essentials, Cyber Essentials Plus, CREST-accredited SOC.\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-05-29** - Acumen Cyber and AttackIQ announced a partnership to continuously validate cyber defences against real-world threats. [source](https://www.businesswire.com/news/home/20260529347212/en/Acumen-Cyber-and-AttackIQ-Partner-to-Continuously-Validate-Cyber-Defences-Against-Real-World-Threats)\n\n## Links\n\n- Website: https://acumencyber.com/\n- LinkedIn: https://uk.linkedin.com/company/acumen-cyber\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (acumencyber.com), ADS members directory (adsgroup.org.uk), Companies House (SC786217), BusinessWire press release, IT Security Guru."}, {"name": "Aczel Limited", "website": "https://aczel.org/", "linkedin": "", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "", "founded": "", "tags": ["defence", "type-consultancy", "type-sme", "size-small", "accr-ce-plus", "mbr-ads"], "summary": "Management consultancy serving the aerospace, defence and security sectors.", "body": "# Aczel\n\n> Management consultancy serving the aerospace, defence and security sectors.\n\n## What they do\n\nAczel is a management consultancy whose teams are drawn from experienced aerospace, defence and security industry practitioners. Its services focus on operational strategy, business winning and bid support, programme delivery, innovation management, supply chain and manufacturing optimisation, and regulatory compliance. In defence it supports clients across the maritime, air, land, space and cyber domains and across the procurement and operations chain.\n\n## Products and solutions\n\n- **Operational strategy** - translating business strategy into operations.\n- **Business winning** - support on competitive bids and new proposals.\n- **Programme delivery** - planning and executing complex defence programmes, including recovery of troubled programmes.\n- **Supply chain and manufacturing** - optimisation of internal and external operations.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Cyber Essentials, Cyber Essentials Plus.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://aczel.org/\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (aczel.org), ADS members directory (adsgroup.org.uk), Companies House (14762965)."}, {"name": "AdaCore Ltd", "website": "https://www.adacore.com/", "linkedin": "https://www.linkedin.com/company/adacore", "hq": "New York, United States", "region": "South West", "size": "medium", "headcount": "", "founded": "2018", "tags": ["defence", "software", "test-evaluation", "type-sme", "size-medium", "owned-foreign", "mbr-ads"], "summary": "Supplier of development and verification tools for safety- and security-critical software.", "body": "# AdaCore\n\n> Supplier of development and verification tools for safety- and security-critical software.\n\n## What they do\n\nAdaCore develops tools and provides support for the production of safety-critical and security-critical software. Its technologies are used by aerospace, defence and rail contractors for high-integrity systems including tactical command and control, missile and artillery launcher systems, and missile defence. The group is headquartered in New York, with the UK entity AdaCore Ltd (registered office in Yeovil) operating as a centre of excellence for safety- and security-critical software tools, opened in 2019.\n\n## Products and solutions\n\n- **GNAT Pro** - Ada/SPARK development toolchain for high-integrity software, with support for C/C++ and Rust.\n- **SPARK Pro** - formal verification toolset for software with stringent security requirements, based on a formally verifiable subset of Ada.\n- **QGen** - model-based code generator and static verifier for a safe subset of Simulink and Stateflow models.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://www.adacore.com/\n- LinkedIn: https://www.linkedin.com/company/adacore\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (adacore.com), ADS members directory (adsgroup.org.uk), Companies House (11581444), AdaCore UK expansion press release."}, {"name": "Adams Electronics (International) Limited", "website": "http://www.adamsinc.com", "linkedin": "", "hq": "East Grinstead, United Kingdom", "region": "South East", "size": "micro", "headcount": "", "founded": "1965", "tags": ["defence", "sensors", "hardware", "manufacturing", "type-manufacturer", "type-sme", "size-micro", "mbr-ads"], "summary": "Designer and manufacturer of specialised hand-held metal detection equipment.", "body": "# Adams Electronics\n\n> Designer and manufacturer of specialised hand-held metal detection equipment.\n\n## What they do\n\nAdams Electronics was established in 1965 and designs and manufactures hand-held metal detection equipment in the UK. Its products are aimed at police, security and law enforcement roles. The company's products conform to international standards including CE marking and IEC standards.\n\n## Products and solutions\n\n- **Hand-held metal detectors** - portable detection equipment designed and manufactured in the UK for police and security applications.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: http://www.adamsinc.com\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory (adsgroup.org.uk), Companies House (03546816)."}, {"name": "Adaptix Limited", "website": "https://adaptix.com/", "linkedin": "https://uk.linkedin.com/company/adaptixltd", "hq": "Eynsham, United Kingdom", "region": "South East", "size": "medium", "headcount": "", "founded": "", "tags": ["defence", "sensors", "test-evaluation", "hardware", "manufacturing", "type-manufacturer", "type-sme", "size-medium", "mbr-ads"], "summary": "Developer of 3D X-ray imaging technology with non-destructive testing for aerospace and defence.", "body": "# Adaptix\n\n> Developer of 3D X-ray imaging technology with non-destructive testing for aerospace and defence.\n\n## What they do\n\nAdaptix develops flat-panel 3D X-ray imaging technology that produces 3D images at doses and costs comparable to traditional 2D X-ray. The technology is applied across medical, veterinary and industrial sectors. Through its AdaptixNDE line, the company provides non-destructive testing capability relevant to aerospace and defence manufacturing and maintenance.\n\n## Products and solutions\n\n- **AdaptixNDE** - fast-acquisition, deployable, low-flux 3D X-ray capability for inspecting dry-preform composites, supporting manufacturing inspection, deployable maintenance inspection and through-life digital twins.\n- **3D X-ray imaging platform** - flat-panel source technology generating 3D images at low dose and cost.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group, Composites UK.\n\n## Links\n\n- Website: https://adaptix.com/\n- LinkedIn: https://uk.linkedin.com/company/adaptixltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (adaptix.com), ADS members directory (adsgroup.org.uk), Companies House (06857417), Composites UK directory."}, {"name": "Adarga Limited", "website": "https://www.adarga.ai", "linkedin": "https://www.linkedin.com/company/adargaai/", "hq": "London, United Kingdom", "region": "London", "size": "medium", "headcount": "", "founded": "2016", "tags": ["defence", "ai", "isr", "data", "software", "size-medium", "type-sme", "owned-uk", "mbr-ads"], "summary": "A British AI software company building information intelligence and decision-advantage tools for defence, security and resilience.", "body": "# Adarga\n\n> A British AI software company building information intelligence and decision-advantage tools for defence, security and resilience.\n\n## What they do\n\nAdarga develops artificial intelligence software that helps defence, national security and commercial organisations process and analyse large volumes of structured and unstructured data. Its platform fuses multimodal data from sources such as global news, reports and open-source intelligence to surface decision-ready insight. The company also offers a practitioner-led intelligence service, pairing analysts with its tooling to deliver mission-relevant analysis.\n\n## Products and solutions\n\n- **Catalyst** - multidomain data fusion platform underpinning Adarga's AI-driven solutions, combining deep-learning AI with symbolic reasoning for explainable analysis.\n- **Augur** - near real-time alerting and intelligence tool that detects, translates and scores alerts from open-source intelligence and publicly available information; evolved from the earlier Vantage application.\n- **Intelligence services** - practitioner-led analysis delivered through a Global Intelligence Centre and embedded analysts.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-01-28** - The UK awarded Adarga a contract worth up to 14.8 million US dollars to access and deploy its AI systems and services. [source](https://thedefensepost.com/2025/01/28/uk-adarga-ai-products/)\n- **2024-09-23** - UK Strategic Command's Defence Support selected Adarga's software to deliver enhanced information analysis. [source](https://www.businesswire.com/news/home/20240923763581/en/Defence-Support-Selects-Adargas-AI-Software-to-Deliver-Enhanced-Information-Analysis)\n\n## Links\n\n- Website: https://www.adarga.ai\n- LinkedIn: https://www.linkedin.com/company/adargaai/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources used: adarga.ai, LinkedIn company page, Companies House (09742902), ADS Group member directory, The Defense Post, Business Wire."}, {"name": "ADDEV Materials UK Limited", "website": "https://addevmaterials.com", "linkedin": "https://www.linkedin.com/company/addev-materials/", "hq": "Lyon, France", "region": "South East England", "size": "large", "headcount": "700+ (group)", "founded": "2006", "tags": ["defence", "air", "land", "space", "manufacturing", "hardware", "type-manufacturer", "size-large", "owned-foreign", "accr-iso9001", "mbr-ads"], "summary": "Aerospace and defence materials specialist: chemicals, coatings, adhesives, films, tapes and custom packaging, with a UK operation in Hampshire.", "body": "# ADDEV Materials UK Limited\n\n> Aerospace and defence materials specialist: chemicals, coatings, adhesives, films, tapes and custom packaging, with a UK operation in Hampshire.\n\n## What they do\n\nADDEV Materials is a supplier of high-performance materials for the aerospace and defence industries, covering engineered chemical solutions, advanced converting and custom packaging. The group designs custom value-added materials for aircraft manufacturers, equipment suppliers, airlines, MRO providers, operators and defence integrators. Its UK presence was established in 2019 through the acquisition of the Graytone Group, including Pexa and PSG, and the UK entity (formerly Graytone Limited) operates from Bordon, Hampshire. Headquarters of the wider group are in Lyon, France.\n\n## Products and solutions\n\n- **Adhesives, sealants and surface treatments** - aerospace-specification adhesives, sealants, cleaners, solvents and surface preparation fluids.\n- **Paints and coatings** - primers, topcoats, conformal coatings, corrosion inhibiting compounds (CICs) and specialty coatings; distribution of brands including AkzoNobel, PPG, Henkel and Sherwin-Williams.\n- **Tapes, foams, films and composites** - technical films, tapes, foams, laminates, composite fabrics, prepregs and resins.\n- **Converting and engineered components** - die-cut adhesives, foams, films, insulation, gaskets and bonding components.\n- **Custom packaging (Andpak)** - repackaging of aerospace chemicals into aerosols, cartridges, syringes, tubes, pouches and bespoke formats.\n- **Zip-Chem** - OEM-approved corrosion inhibitors, cleaners and lubricants for airlines, MROs and military operators.\n\nThe group serves commercial aviation, business aviation, MRO, space, air defence and land defence markets.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, EN/AS 9100, AS 9120, IATA dangerous goods compliance.\n- **Memberships:** ADS Group; Composites UK; North West Aerospace Alliance.\n\n## Recent news\n\n- **2025-12-24** - ADS member profile last updated. [source](https://www.adsgroup.org.uk/members/addev-materials-uk-ltd/)\n- **2026-02-20** - ADDEV Materials Aerospace and Defense \"Who Are We\" page updated, covering air defence and land defence segments. [source](https://eu.addevmaterials-aero.com/who-are-we/)\n\n## Links\n\n- Website: https://addevmaterials.com\n- LinkedIn: https://www.linkedin.com/company/addev-materials/\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory (adsgroup.org.uk); Companies House (company 03288952); ADDEV Materials Aerospace and Defense website (eu.addevmaterials-aero.com); ADDEV Materials group website (addevmaterials.com)."}, {"name": "Advai Ltd", "website": "https://www.advai.com/", "linkedin": "https://www.linkedin.com/company/advai", "hq": "London, United Kingdom", "region": "London", "size": "small", "headcount": "", "founded": "2020", "tags": ["defence", "ai", "software", "data", "type-startup", "size-small", "prog-dasa"], "summary": "UK deep-tech specialist in AI assurance, testing AI and machine-learning systems for robustness, safety and security.", "body": "# Advai\n\n> UK deep-tech specialist in AI assurance, testing AI and machine-learning systems for robustness, safety and security.\n\n## What they do\n\nAdvai is a UK deep-tech company focused on AI safety and security. It tests and evaluates artificial intelligence and machine-learning systems, including large language models and computer vision, so customers can assure them for deployment in business-critical or regulated environments. Its tooling stress-tests AI to find reliable operating boundaries and build early warning systems for natural or adversarial failure. From defence origins, the company now also serves regulated commercial sectors.\n\n## Products and solutions\n\n- **Advai platform** - testing, compliance assurance and continuous monitoring across the AI lifecycle, covering performance, security, safety, robustness, auditability and stability, producing go-live thresholds and evidence packs for deployment sign-off.\n\n## Frameworks, accreditations and memberships\n\n- **Programmes:** funded through the Defence and Security Accelerator (DASA) from 2020 across multiple projects.\n\n## Recent news\n\n- **2026-04-22** - Advai announced it is collaborating with the Financial Conduct Authority on the second cohort of AI Live Testing. [source](https://www.advai.com/journal/advai-collaborates-with-fca)\n\n## Links\n\n- Website: https://www.advai.com/\n- LinkedIn: https://www.linkedin.com/company/advai\n\n## Sources\n\nPublic information verified 2026-06-29. Advai website, LinkedIn company page, Companies House, GOV.UK (DASA case study and AI assurance techniques)."}, {"name": "Advanced Blast & Ballistic Systems Limited", "website": "https://www.advanced-blast.com/", "linkedin": "", "hq": "Ashbourne, England", "region": "East Midlands", "size": "micro", "headcount": "~5", "founded": "2009", "tags": ["defence", "land", "munitions", "hardware", "manufacturing", "counter-uas", "size-micro", "type-sme", "owned-uk", "mbr-ads"], "summary": "UK developer of active and passive blast-mitigation systems for armoured vehicle occupant survivability, with related emergency descent systems for eVTOL and light aircraft.", "body": "# Advanced Blast & Ballistic Systems Limited\n\n> UK developer of active and passive blast-mitigation systems for armoured vehicle occupant survivability, with related emergency descent systems for eVTOL and light aircraft.\n\n## What they do\n\nABBS develops survivability technology to protect the occupants of armoured vehicles from mine and IED under-belly blast. Its approach combines active systems that counteract the blast with passive shock-absorbing components, and the same rocket-motor expertise is applied to emergency descent systems for eVTOL aircraft through a joint venture. The company sits at the head of a group that includes Advanced Reaction Motor Systems (ARMS) and Active VTOL Crash Prevention (AVCP).\n\n## Products and solutions\n\n- **VGAM (Vehicle Global Acceleration Mitigation)** - patented Linear Rocket Motors (LRM) that counteract mine-blast lifting forces to prevent a vehicle being thrown into the air.\n- **VAFS (Vehicle Active Floor System)** - actuators that pull the floor away from occupants' feet to reduce floor-shock injury.\n- **CRBP (Composite Reinforced Belly Plate)** - a passive belly plate with composite beams and an energy-absorbing layer to reduce deformation and shock transfer.\n- **Minefield breaching vehicle concept** - a vehicle design with built-in mine resilience and protection against RPG and anti-tank missile strikes.\n- **Mine-resilient and mine-clearance uncrewed ground vehicles (UGVs)** - concepts applying ABBS technologies to lightweight autonomous platforms.\n- **AVCP zero-zero safety system** - ballistic recovery and emergency descent systems for eVTOL and light aircraft (via the AVCP joint venture).\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2025-10-03** - Article published, \"Can Europe Create a 'Drone Wall'\". [source](https://www.advanced-blast.com/can-europe-create-a-drone-wall/)\n- **2025-09-24** - Article published on developing solutions for threats from unmanned aerial systems (UAS). [source](https://www.advanced-blast.com/developing-solutions-for-threats-from-umanned-aerial-systems-uas/)\n- **2025-07-12** - Article published, \"Making Drone Munitions Safer\". [source](https://www.advanced-blast.com/making-drone-munitions-safer/)\n\n## Links\n\n- Website: https://www.advanced-blast.com/\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (advanced-blast.com), Companies House (company 07025669, find-and-update.company-information.service.gov.uk), company LinkedIn page, Army Technology contractor profile."}, {"name": "Advanced Logistics for Aerospace (UK) Limited", "website": "https://www.alacorporation.com/", "linkedin": "https://www.linkedin.com/company/advanced-logistics-for-aerospace-uk-limited", "hq": "Naples, Italy", "region": "South East England", "size": "small", "headcount": "", "founded": "1988", "tags": ["defence", "logistics", "manufacturing", "air", "type-integrator", "size-small", "owned-foreign", "backed-pe", "mbr-ads"], "summary": "UK arm of ALA Group, an Italy-headquartered supply chain integrator and distributor to the aerospace and defence sector.", "body": "# Advanced Logistics for Aerospace (UK) Limited\n\n> UK arm of ALA Group, an Italy-headquartered supply chain integrator and distributor to the aerospace and defence sector.\n\n## What they do\n\nAdvanced Logistics for Aerospace (UK) Limited is the UK entity of ALA Group (A.L.A. S.p.A.), an aerospace and defence supply chain integrator headquartered in Naples, Italy, with offices and operations across Italy, France, Germany, the United Kingdom, Israel and North America. The group describes itself as a single-source partner for the management and distribution of products, services and engineering solutions to aerospace and defence manufacturers, covering both production and aftermarket phases of programmes. The UK company is registered in Esher, Surrey, and was incorporated in 1988 under the former name Specialist Technologies Ltd.\n\n## Products and solutions\n\n- **Aerospace and defence supply chain integration** - distribution and management of hardware, components and engineered products for aerospace and defence OEMs and operators.\n- **Production and aftermarket logistics** - supply chain services spanning production support, spare parts distribution, inventory management and in-service support.\n- **Defence-sector product supply** - per the ADS member listing, product manufacturing and supply across defence-relevant categories including bomb disposal and explosive search equipment, CBRN and decontamination, asset tracking, replenishment-at-sea, search and rescue, and weapons storage.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** SC21 Bronze and SC21 Operational Excellence (per ADS member listing).\n- **Memberships:** ADS Group.\n\n## Recent news\n\n- **2026-02-17** - ALA Group signed a Memorandum of Understanding with TVS Supply Chain Solutions to jointly pursue aerospace and defence supply chain opportunities in India. [source](https://themachinemaker.com/tvs-supply-chain-solutions-and-ala-group-join-forces-for-indias-aerospace-and-defence-supply-chains/)\n- **2025-10-21** - H.I.G. Capital completed the acquisition of a majority stake in A.L.A. S.p.A. (Borsa Italiana ticker ALA.MI); the founding families retained a minority stake. [source](https://hig.com/news/h-i-g-capital-acquires-a-l-a-s-p-a/)\n\n## Links\n\n- Website: https://www.alacorporation.com/\n- LinkedIn: https://www.linkedin.com/company/advanced-logistics-for-aerospace-uk-limited\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS Group member directory (adsgroup.org.uk); Companies House (company 02265000); ALA Group corporate site (alacorporation.com); Aviation Week Marketplace supplier profile; H.I.G. Capital press release (October 2025); The Machine Maker (February 2026)."}, {"name": "Advanced Systems Understanding (ASU)", "website": "https://www.weareasu.com/", "linkedin": "https://uk.linkedin.com/company/weareasu", "hq": "United Kingdom", "region": "", "size": "small", "headcount": "", "founded": "2012", "tags": ["defence", "simulation", "software", "data", "size-small", "type-consultancy", "owned-veteran", "fw-gcloud"], "summary": "Employee-owned, veteran-led consultancy specialising in enterprise and systems architecture for defence and the wider public sector.", "body": "# Advanced Systems Understanding (ASU)\n\n> Employee-owned, veteran-led consultancy specialising in enterprise and systems architecture for defence and the wider public sector.\n\n## What they do\n\nAdvanced Systems Understanding (ASU) is an employee-owned, veteran-led consultancy operating at the intersection of systems thinking, strategy and transformation. It works with clients across defence, healthcare, transport and beyond, specialising in enterprise, business and solution architecture and in system-of-systems engineering. Its work analyses systems, processes and delivery models to help organisations evolve with clarity.\n\n## Products and solutions\n\n- **Enterprise and business architecture** - architecture-as-a-service consultancy across strategic domains of expertise.\n- **System-of-systems engineering** - tailored engineering and enterprise architecture consultancy for complex defence and public sector programmes.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** listed as a supplier on the G-Cloud Digital Marketplace.\n\n## Recent news\n\n- No dated public news items confirmed within the last 12 months as at 2026-06-29.\n\n## Links\n\n- Website: https://www.weareasu.com/\n- LinkedIn: https://uk.linkedin.com/company/weareasu\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (weareasu.com), LinkedIn company page, G-Cloud Digital Marketplace supplier listing, Companies House (08077295)."}, {"name": "Advanced Tactical Resources Limited", "website": "https://atr-ltd.co.uk", "linkedin": "https://uk.linkedin.com/company/advanced-tactical-resources-limted", "hq": "Reading, England", "region": "South East", "size": "micro", "headcount": "2-10", "founded": "2012", "tags": ["defence", "isr", "sensors", "comms", "training", "size-micro", "type-sme", "accr-iso9001", "mbr-ads"], "summary": "Specialist protection and risk management provider delivering training, security services and covert ISR equipment to defence, law enforcement and government.", "body": "# Advanced Tactical Resources Limited\n\n> Specialist protection and risk management provider delivering training, security services and covert ISR equipment to defence, law enforcement and government.\n\n## What they do\n\nATR provides specialist protection and risk management services, focused on training solutions, security strategies, services and specialist equipment. Its Military and Government Division supplies capabilities to defence, law enforcement and government agencies, including support to sensitive ISR and technical surveillance operations. The company also delivers regulated security qualifications, close protection, conflict management and first aid training.\n\n## Products and solutions\n\n- **Covert ISR equipment** - concealment systems, cameras, lenses and imaging components, GPS tracking, covert audio and video recording platforms, sensor and trigger technologies, transmission and specialist communications, and custom power solutions for extended deployments.\n- **Technical surveillance training** - hands-on programmes covering technical surveillance operator digital fabrication, mimicry and concealment, and technical operations, tailored to ISR and low-visibility missions.\n- **Technical services** - bespoke hide fabrication, technical system integration, product development and engineering support, and consultancy for ISR and covert operational requirements.\n- **Security and resilience training** - HEAT, CONDO, close protection, physical intervention, conflict management, trauma first aid and regulated qualifications.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001\n- **Memberships:** ADS Group. Signatory to the Armed Forces Covenant.\n\n## Recent news\n\n- **2025-12-24** - ADS membership profile last updated, listing capabilities across counter-terror and intelligence services, surveillance, security personnel, unmanned systems and training. [ADS Group](https://www.adsgroup.org.uk/members/advanced-tactical-resources-atr-ltd-1/)\n\n## Links\n\n- Website: https://atr-ltd.co.uk\n- LinkedIn: https://uk.linkedin.com/company/advanced-tactical-resources-limted\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (atr-ltd.co.uk Military and Government Division page); ADS Group member directory; Companies House (company number 08151240); GOV.UK Armed Forces Covenant business listing."}, {"name": "Advanced Tooling Systems UK Limited", "website": "", "linkedin": "", "hq": "Maidstone, Kent, United Kingdom", "region": "South East England", "size": "medium", "headcount": "75+", "founded": "2002", "tags": ["defence", "manufacturing", "hardware", "test-evaluation", "size-medium", "type-sme", "type-manufacturer", "mbr-ads"], "summary": "Toolmaker designing and manufacturing tooling, machines and production equipment for aerospace, defence, automotive and packaging.", "body": "# Advanced Tooling Systems UK\n\n> Toolmaker designing and manufacturing tooling, machines and production equipment for aerospace, defence, automotive and packaging.\n\n## What they do\n\nAdvanced Tooling Systems is a toolmaker operating from sites in Kent. Its engineers design, manufacture and commission tooling, machines and equipment for sectors including aerospace, automotive and packaging. The company offers planning, design and manufacture of full production process solutions.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- LinkedIn: https://uk.linkedin.com/company/advanced-tooling-systems-uk\n\n## Sources\n\nPublic information verified 2026-06-29. ADS Group members directory; Companies House (04610282)."}, {"name": "Advanex Europe Limited", "website": "https://advanex.co.uk", "linkedin": "https://www.linkedin.com/company/advanex-europe-ltd", "hq": "Southwell, Nottinghamshire, United Kingdom", "region": "East Midlands", "size": "medium", "headcount": "", "founded": "1988", "tags": ["defence", "air", "manufacturing", "hardware", "size-medium", "type-sme", "type-manufacturer", "owned-foreign", "accr-iso9001", "mbr-ads"], "summary": "Precision engineering company manufacturing springs, wire forms, deep drawn parts and metal inserts for aerospace and other sectors.", "body": "# Advanex Europe\n\n> Precision engineering company manufacturing springs, wire forms, deep drawn parts and metal inserts for aerospace and other sectors.\n\n## What they do\n\nAdvanex Europe is the European arm of the Advanex Group, a precision engineering business. It designs and manufactures springs (tension, compression and torsion), wire forms, precision pressings and stampings, deep drawn parts, coil thread inserts and metal inserts for composite materials. The company supplies aerospace OEMs and Tier 1 suppliers across civil and defence programmes, using processes including CNC coiling, deep drawing, micro-forming and multi-slide technology. It operates from sites at Southwell and Bilborough in Nottinghamshire and a facility in Prague, Czech Republic, as part of the wider Advanex Group, which is headquartered in Japan.\n\n## Products and solutions\n\n- **Springs and wire forms** - tension, compression and torsion springs and custom wire forms.\n- **Deep drawn components** - lightweight, high-strength parts for aerospace systems.\n- **Coil thread inserts** - tangless coil thread inserts (KATO).\n- **Insert mouldings** - precision metal inserts for composite materials.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** ISO 9001, IATF 16949, ISO 13485\n- **Memberships:** ADS Group; Institute of Spring Technology; Midlands Aerospace Alliance\n\n## Links\n\n- Website: https://advanex.co.uk\n- LinkedIn: https://www.linkedin.com/company/advanex-europe-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (advanex.co.uk aerospace and about pages); ADS Group members directory; Companies House (02301464)."}, {"name": "Advent IM Limited", "website": "https://www.advent-im.co.uk", "linkedin": "https://www.linkedin.com/company/advent-im", "hq": "Halesowen, West Midlands, United Kingdom", "region": "West Midlands", "size": "small", "headcount": "", "founded": "2002", "tags": ["defence", "cyber", "training", "size-small", "type-sme", "type-consultancy", "fw-joscar", "fw-gcloud", "fw-ccs", "accr-ce", "accr-iso9001", "accr-iso27001", "mbr-ads", "mbr-makeuk-defence"], "summary": "Independent information security and physical security consultancy supporting governance, risk and compliance, including for the defence sector.", "body": "# Advent IM\n\n> Independent information security and physical security consultancy supporting governance, risk and compliance, including for the defence sector.\n\n## What they do\n\nAdvent IM is an independent information security and physical security consultancy supporting governance, risk and compliance (GRC). It provides consultancy, training, outsourced solutions and testing across information and cyber security, physical security, business continuity, and data protection. In defence it supports adoption of the Secure by Design (SbD) process and works to frameworks including the Cyber Assessment Framework (CAF), JSP 440, ISO 27001 and the NIST Cybersecurity Framework. Its consultants are security vetted.\n\n## Products and solutions\n\n- **Secure by Design (SbD) support** - assurance of MOD capabilities in line with policy.\n- **Defence Cyber Certification (DCC)** - supplier cyber assurance across the defence supply chain.\n- **Physical security reviews and red teaming** - benchmarking and testing of physical security measures.\n- **Training Academy** - SIRO, IAO, data protection and security awareness training.\n- **Outsourced security solutions** - contingent security roles supplied on demand.\n\n## Frameworks, accreditations and memberships\n\n- **Frameworks:** G-Cloud; Digital Outcomes and Specialists; Cyber Security Services 3 (CCS)\n- **Accreditations:** ISO 27001; ISO 9001; Cyber Essentials\n- **Memberships:** ADS Group; Make UK Defence; JOSCAR\n\n## Recent news\n\n- **2025-02-24** - Advent IM announced membership of Make UK Defence. [source](https://www.advent-im.co.uk/makeuk-advent-im/)\n\n## Links\n\n- Website: https://www.advent-im.co.uk\n- LinkedIn: https://www.linkedin.com/company/advent-im\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (defence sector and memberships pages); ADS Group members directory; Companies House (04626377)."}, {"name": "AEI Systems Limited", "website": "https://aei-systems.com", "linkedin": "https://uk.linkedin.com/company/aei-systems-ltd", "hq": "Ascot, United Kingdom", "region": "South East England", "size": "small", "headcount": "", "founded": "1961", "tags": ["defence", "munitions", "land", "air", "maritime", "manufacturing", "hardware", "size-small", "type-sme", "type-manufacturer", "owned-foreign", "mbr-ads"], "summary": "Designer and manufacturer of medium-calibre cannon and weapon systems for air, land and naval platforms.", "body": "# AEI Systems\n\n> Designer and manufacturer of medium-calibre cannon and weapon systems for air, land and naval platforms.\n\n## What they do\n\nAEI Systems is a UK defence company specialising in the design, development, test, manufacture, validation and installation of medium-calibre weapons and weapon systems. It has engineering heritage dating to 1961 and works in revolver cannon technology across air, land and naval domains. The company is based in Ascot. Since 2023 it has been a subsidiary of the Turkish defence group Samsun Yurt Savunma (SYS), which acquired a majority stake.\n\n## Products and solutions\n\n- **Medium-calibre cannon** - 20mm, 25mm and 30mm cannon for integration into fast jets, armoured vehicles and naval platforms.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2023-02** - Samsun Yurt Savunma (SYS) acquired a majority stake in AEI Systems. [source](https://turdef.com/article/sys-acquires-english-defence-company-aei-systems)\n\n## Links\n\n- Website: https://aei-systems.com\n- LinkedIn: https://uk.linkedin.com/company/aei-systems-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (aei-systems.com); ADS Group members directory; Companies House (04462335); trade press on the SYS acquisition."}, {"name": "AERALIS Ltd", "website": "https://aeralis.com/", "linkedin": "https://www.linkedin.com/company/aeralis", "hq": "Bristol, United Kingdom", "region": "South West", "size": "small", "headcount": "", "founded": "2015", "tags": ["defence", "air", "training", "manufacturing", "type-startup", "size-small"], "summary": "UK developer of a modular family of jet aircraft built around reconfigurable common airframes.", "body": "# AERALIS\n\n> UK developer of a modular family of jet aircraft built around reconfigurable common airframes.\n\n## What they do\n\nAERALIS designs a family of modular jet aircraft built around a common core fuselage with interchangeable wing and engine modules, intended to be reconfigured to cover roles from basic and advanced jet training through to aerobatics, display and light combat. The company opened its first site in Bristol and has assembled an industry supply base around the programme.\n\n## Products and solutions\n\n- **AERALIS Advanced Jet Trainer (AJT)** - the initial variant of the modular family, an advanced jet trainer reconfigurable across multiple training and light-combat roles through common modules.\n\n## Recent news\n\n- **2026-05-14** - AERALIS entered administration after its main financial backer withdrew funding, with administrators citing sustained cash-flow pressure linked to delays to the UK Defence Investment Plan. [source](https://www.flightglobal.com/fixed-wing/2026/05/cashflow-pressures-send-uk-modular-trainer-developer-aeralis-into-administration/)\n\n## Links\n\n- Website: https://aeralis.com/\n- LinkedIn: https://www.linkedin.com/company/aeralis\n\n## Sources\n\nPublic information verified 2026-06-29. AERALIS website, LinkedIn company page, Companies House, FlightGlobal, Royal Aeronautical Society, Wikipedia."}, {"name": "Aero Metals Alliance UK Limited", "website": "https://www.aerometalsalliance.com", "linkedin": "https://www.linkedin.com/company/aerometalsalliance", "hq": "Wednesbury, West Midlands, United Kingdom", "region": "West Midlands", "size": "medium", "headcount": "", "founded": "2014", "tags": ["defence", "air", "manufacturing", "hardware", "logistics", "size-medium", "type-sme", "mbr-ads"], "summary": "Group of metal suppliers providing materials and supply chain management to aerospace and defence customers.", "body": "# Aero Metals Alliance UK\n\n> Group of metal suppliers providing materials and supply chain management to aerospace and defence customers.\n\n## What they do\n\nAero Metals Alliance (AMA) provides materials and supply chain management services to aerospace and defence companies. It brings together metal suppliers (Gould Alloys, Service Centres Aero, Sunshine Metals, PASU Progressive Alloy and Wolften) to offer stockholding, distribution and metal processing through service centres across the Americas, Europe and Asia Pacific. AMA acts as a single point of contact for OEMs and sub-contractors sourcing aeronautical metals, processing and related services.\n\n## Products and solutions\n\n- **Metal supply** - ferrous and nonferrous metals including titanium, nickel, stainless and re-melted alloys, tungsten, molybdenum and tantalum.\n- **Processing capabilities** - metal processing to British, American and German specifications and customer-specific grades.\n- **Centralised purchasing and supply chain services** - aggregated demand across a single supply chain.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group; West of England Aerospace Forum (WEAF)\n\n## Recent news\n\n- **2025-08** - Wolften joined the AMA group. [source](https://www.aerometalsalliance.com/whats-happening/wolften-join-the-ama-family)\n\n## Links\n\n- Website: https://www.aerometalsalliance.com\n- LinkedIn: https://www.linkedin.com/company/aerometalsalliance\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (aerometalsalliance.com); ADS Group members directory; Companies House (09306909)."}, {"name": "Aero Solutions UAV Ltd", "website": "", "linkedin": "https://uk.linkedin.com/company/aero-solutions-uav-ltd", "hq": "Weston, Hertfordshire, England", "region": "East of England", "size": "micro", "headcount": "", "founded": "2023", "tags": ["defence", "uas", "drones", "air", "size-micro", "type-sme", "type-startup", "owned-uk", "mbr-ads"], "summary": "UK developer of fixed-wing unmanned aerial systems for defence applications.", "body": "# Aero Solutions UAV Ltd\n\n> UK developer of fixed-wing unmanned aerial systems for defence applications.\n\n## What they do\n\nAero Solutions UAV Ltd designs, develops and deploys unmanned aerial systems. The company was incorporated in August 2023 and is registered in Hertfordshire. It works with partners across the UK engineering supply chain on military UAV platforms.\n\n## Products and solutions\n\n- **ASX-1** - a fixed-wing UAV platform described as modular and adaptable to customer-specific requirements, with a maximum take-off weight of 35 kg, payload capacity up to 20 kg and endurance up to 3 hours.\n- **HAMMER** - a one-way attack drone developed in partnership with Edinburgh Drone Company, carrying a warhead of around 2.5 kg (extendable), with range options of about 22 km standard or up to 50 km with an extended-range kit. Catapult launched.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Recent news\n\n- **2026-01-26** - The HAMMER one-way attack drone, developed by Edinburgh Drone Company with Aero Solutions, was reported with a 2.5 kg warhead and extended-range options. [UK Defence Journal](https://ukdefencejournal.org.uk/edinburgh-drone-company-launches-hammer-attack-drone/)\n- **2026-06** - The ASX-1 fixed-wing UAV platform was introduced. [sUAS News](https://www.suasnews.com/2026/06/introducing-the-asx-1-built-around-your-mission/)\n\n## Links\n\n- LinkedIn: https://uk.linkedin.com/company/aero-solutions-uav-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS members directory (adsgroup.org.uk), Companies House (company 15070990), the company LinkedIn page, UK Defence Journal, sUAS News."}, {"name": "AeroGlow Int Limited", "website": "https://www.aeroglowinternational.com/", "linkedin": "https://uk.linkedin.com/company/aeroglow-int-limited", "hq": "Salisbury, Wiltshire, England", "region": "South West", "size": "micro", "headcount": "", "founded": "2014", "tags": ["defence", "land", "hardware", "manufacturing", "size-micro", "type-sme", "type-manufacturer", "owned-uk", "mbr-ads"], "summary": "Supplier of emergency escape and survivability lighting systems for military armoured vehicles.", "body": "# AeroGlow International\n\n> Supplier of emergency escape and survivability lighting systems for military armoured vehicles.\n\n## What they do\n\nAeroGlow International, based in Salisbury, supplies survivability systems for military armoured fighting vehicles. The company has worked in soldier safety and escape lighting for around two decades. Its systems are in service on military platforms internationally.\n\n## Products and solutions\n\n- **HaLO** - emergency escape lighting for armoured vehicles, designed to aid crew egress.\n- **VELS (Vehicle Escape Lighting System)** - the UK military designation for the escape lighting product.\n- **EELS (Emergency Egress Lighting System)** - the US military designation for the product.\n- Related capabilities include attitude warning, blast recording, handheld IR light detectors and bespoke capacitor packs.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.aeroglowinternational.com/\n- LinkedIn: https://uk.linkedin.com/company/aeroglow-int-limited\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS members directory (adsgroup.org.uk), Companies House (company 09348632), the company website and LinkedIn page."}, {"name": "Aeromet International Limited", "website": "https://www.aeromet.co.uk/", "linkedin": "https://uk.linkedin.com/company/aeromet-international-plc", "hq": "Worcester, England", "region": "West Midlands", "size": "medium", "headcount": "", "founded": "1982", "tags": ["defence", "manufacturing", "hardware", "air", "size-medium", "type-sme", "type-manufacturer", "owned-uk", "accr-iso9001", "mbr-ads"], "summary": "Supplier of aluminium and magnesium castings and finished cast parts for the aerospace and defence industries.", "body": "# Aeromet International\n\n> Supplier of aluminium and magnesium castings and finished cast parts for the aerospace and defence industries.\n\n## What they do\n\nAeromet International is a supplier of aluminium and magnesium castings and fully finished, assembly-ready cast parts for aerospace and defence customers. It has over 40 years of casting experience and operates three UK sites. It supplies aerospace and defence OEMs and supply-chain companies including Airbus, Boeing, Rolls-Royce, Safran and Embraer.\n\n## Products and solutions\n\n- **Sand castings** - aluminium and magnesium sand castings.\n- **Investment castings** - aluminium investment castings by conventional and SOPHIA processes.\n- **SOPHIA high-property investment castings** - a high-property casting process.\n- **A20X** - an aluminium casting alloy developed by Aeromet.\n- Cast components include avionic chassis and housings, escape doors, aero-engine heat exchangers, air intakes, structural castings and transmission castings.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Nadcap (reported as the first foundry to achieve Nadcap Metallic Materials Manufacturing accreditation); ISO 9001\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://www.aeromet.co.uk/\n- LinkedIn: https://uk.linkedin.com/company/aeromet-international-plc\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS members directory (adsgroup.org.uk), Companies House (company 01626585), the company website and LinkedIn page."}, {"name": "Aerospace & Airworthiness Consultancy Enterprises Limited", "website": "", "linkedin": "https://uk.linkedin.com/company/aace-ltd", "hq": "Oxford, England", "region": "South East", "size": "small", "headcount": "", "founded": "1997", "tags": ["defence", "air", "land", "maritime", "test-evaluation", "size-small", "type-sme", "type-consultancy", "owned-uk", "owned-founder", "mbr-ads"], "summary": "Independent consultancy in system safety engineering and airworthiness for defence.", "body": "# Aerospace & Airworthiness Consultancy Enterprises (AACE)\n\n> Independent consultancy in system safety engineering and airworthiness for defence.\n\n## What they do\n\nAACE is a family-owned, independent SME providing technical and engineering advice across the land, sea and air domains to the Ministry of Defence and the wider defence enterprise. It specialises in system safety engineering, airworthiness assessments, logistics and operational assurance, with personnel experienced as operators, maintainers and regulators. The company has experience spanning the design, build, operation and in-service support of systems.\n\n## Products and solutions\n\n- **System safety engineering** - safety assessment and assurance across defence platforms.\n- **Airworthiness and integrity management** - independent airworthiness assessment and certification support across military and civil environments.\n- **Compliance audits and technical evaluations** - including policy development and RPAS airspace integration.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group\n\n## Links\n\n- LinkedIn: https://uk.linkedin.com/company/aace-ltd\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS members directory (adsgroup.org.uk), Companies House (company 03377828), the company LinkedIn page."}, {"name": "Aerospace Logistics Ltd", "website": "https://asl-uk.com", "linkedin": "https://www.linkedin.com/company/asl-aerospace-logistics-limited", "hq": "Horsham, United Kingdom", "region": "South East", "size": "medium", "headcount": "", "founded": "1979", "tags": ["defence", "air", "maritime", "land", "logistics", "size-medium", "type-sme", "owned-uk", "mbr-ads"], "summary": "Supplier, source and repairer of military aircraft, vehicle and marine spare parts and components.", "body": "# ASL (Aerospace Logistics)\n\n> Supplier, source and repairer of military aircraft, vehicle and marine spare parts and components.\n\n## What they do\n\nAerospace Logistics Ltd (ASL) supplies, sources and repairs equipment and components to keep platforms operational, with through-life support. It specialises in military defence products, with expertise in UK and US rotary and fixed-wing platforms, ground support and maintenance bay equipment. ASL works with overseas air forces, navies and defence organisations, including NATO and the UK MOD.\n\n## Products and solutions\n\n- **Air** - supply, stocking and repair of aerospace equipment and components for platform serviceability.\n- **Sea** - fleet equipment maintenance for the marine industry to end of life.\n- **Land** - repair of military vehicle, power generation and mass transit equipment.\n- **Repair and overhaul** - service, maintenance, repair, overhaul and manufacture across product ranges.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: https://asl-uk.com\n- LinkedIn: https://www.linkedin.com/company/asl-aerospace-logistics-limited\n\n## Sources\n\nPublic information verified 2026-06-29. ADS members directory (adsgroup.org.uk/members/asl-1), company website (asl-uk.com), Companies House (company 01435045). Aerospace Logistics Ltd is headquartered in Horsham, West Sussex."}, {"name": "Aerospace Metal Finishers Limited", "website": "https://amfni.com/", "linkedin": "", "hq": "Ballymena, Northern Ireland", "region": "Northern Ireland", "size": "small", "headcount": "11", "founded": "2002", "tags": ["defence", "manufacturing", "hardware", "air", "test-evaluation", "size-small", "type-sme", "type-manufacturer", "owned-uk", "accr-iso9001", "accr-iso14001", "mbr-ads"], "summary": "Surface treatment and non-destructive testing provider for the aerospace and defence sectors.", "body": "# Aerospace Metal Finishers\n\n> Surface treatment and non-destructive testing provider for the aerospace and defence sectors.\n\n## What they do\n\nAerospace Metal Finishers, based in Ballymena, provides non-destructive testing and surface treatments for the aerospace and defence sectors. The company was established in 2002 and is part of the Dontaur Group. It holds prime contractor and OEM approvals including Bombardier, Boeing, Airbus, Safran Aircelle, Moog, GE Aerospace, GKN Aerospace and Thales Air Defence.\n\n## Products and solutions\n\n- **Chemical processing** - anodising (hard, tartaric sulphuric, chromic acid, sulphuric acid, boric/sulphuric), passivation, conversion coating, titanium pickle and etch.\n- **Non-destructive testing (NDT)** - magnetic flaw detection, fluorescent penetrant inspection, hardness and conductivity testing.\n- **Blasting and paint** - dry abrasive blasting, dry film lubricant, fuel tank coating, anti-fret and protective paint finishes.\n- **In-house laboratory** - salt spray corrosion testing, coating thickness and adhesion testing, chemical analysis.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** Nadcap (Chemical Processing and NDT); AS9100; ISO 9001; ISO 14001; ADS SC21 Bronze\n- **Memberships:** ADS Group\n\n## Links\n\n- Website: https://amfni.com/\n\n## Sources\n\nPublic information verified 2026-06-29. Sources: ADS members directory (adsgroup.org.uk), Companies House (company NI042958), the company website (amfni.com)."}, {"name": "Aerospace Metallic Supply Limited", "website": "http://www.aerometallic.com", "linkedin": "https://www.linkedin.com/company/aerospace-metallic-supply-limited", "hq": "Reading, United Kingdom", "region": "South East", "size": "small", "headcount": "", "founded": "2009", "tags": ["defence", "air", "manufacturing", "logistics", "size-small", "type-sme", "type-manufacturer", "accr-iso9001", "mbr-ads"], "summary": "Distributor and processor of metallic materials with supply chain services for the aerospace and defence markets.", "body": "# Aerospace Metallic Supply\n\n> Distributor and processor of metallic materials with supply chain services for the aerospace and defence markets.\n\n## What they do\n\nAerospace Metallic Supply Limited, trading as Aero Metallic, supplies aerospace and commercial materials and supply chain services to the aerospace, defence and specialist engineering markets globally. The company describes itself as a processor and distributor in the aerospace and defence industry, offering supply chain management covering cost reduction, demand and inventory management, and tailored supply and processing.\n\n## Products and solutions\n\n- **Material supply** - aerospace and commercial metallic materials for aerospace and defence customers.\n- **Processing** - plate cutting, bar cutting, close tolerance guillotining and poly-coating in house, with sheet routing, laser cutting, precision grinding, water jet cutting, heat treatment, first stage machining and non-destructive testing via partners.\n- **Supply chain management** - inventory management and tailored supply and processing packages.\n\n## Frameworks, accreditations and memberships\n\n- **Accreditations:** AS9100 Rev D, AS9120 Rev B, ISO 9001:2015.\n- **Memberships:** ADS Group.\n\n## Links\n\n- Website: http://www.aerometallic.com\n- LinkedIn: https://www.linkedin.com/company/aerospace-metallic-supply-limited\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (aerometallic.com), ADS members directory, Companies House (07008118)."}, {"name": "Aerossurance Limited", "website": "https://aerossurance.com", "linkedin": "https://www.linkedin.com/company/aerossurance", "hq": "Aberdeen, United Kingdom", "region": "Scotland", "size": "micro", "headcount": "", "founded": "2014", "tags": ["defence", "air", "uas", "training", "test-evaluation", "size-micro", "type-sme", "type-consultancy", "mbr-ads"], "summary": "Aberdeen-based aviation consultancy helping organisations procure and assure aviation services across civil and military operations.", "body": "# Aerossurance\n\n> Aberdeen-based aviation consultancy helping organisations procure and assure aviation services across civil and military operations.\n\n## What they do\n\nAerossurance is an aviation consultancy founded in 2014 and based in Aberdeen, Scotland, supporting customers globally. It helps organisations procure aviation services by identifying requirements, developing technical specifications, conducting market analyses, preparing tenders and draft contracts, and evaluating bids. It helps organisations assure aviation services through reviews, audits, investigations and supplier contract management. The company has worldwide experience across fixed wing, rotary wing and UAS/RPAS operations, onshore and offshore, civil and military.\n\n## Products and solutions\n\n- **Procurement support** - aviation requirements definition, technical specifications, tendering and contract evaluation.\n- **Assurance** - aviation reviews, audits, accident investigation and supplier contract management.\n- **Specialist advisory** - airworthiness, certification, safety and risk management, expert witness work, and support to civil and military regulators.\n\n## Frameworks, accreditations and memberships\n\n- **Memberships:** ADS Group, Flight Safety Foundation, British Helicopter Association, Offshore Energies UK, HeliOffshore.\n\n## Recent news\n\n- **2026-05-20** - Published analysis articles on aviation accidents and helicopter safety, including a French Navy Schiebel Camcopter S-100 water impact. [source](https://aerossurance.com/blog/)\n\n## Links\n\n- Website: https://aerossurance.com\n- LinkedIn: https://www.linkedin.com/company/aerossurance\n\n## Sources\n\nPublic information verified 2026-06-29. Company website (aerossurance.com), ADS members directory, Companies House (SC468226)."}, {"name": "Aerowind Ireland Ltd", "website": "https://www.aerowindireland.com", "linkedin": "https://www.linkedin.com/company/aerowind-ireland-limited", "hq": "Scariff, Ireland", "region": "", "size": "small", "headcount":
